<svg width="100%" viewBox="0 0 1320 470" xmlns="http://www.w3.org/2000/svg" role="img" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'PingFang SC','Microsoft YaHei',sans-serif">
<title>Python 字典相关数据结构的内存布局</title>
<desc>PyDictObject 通过 *ma_keys 指向 PyDictKeysObject；PyDictKeysObject 含 dk_refcnt、dk_size、dk_lookup、dk_usable、dk_nentries 和 dk_indices[]；dk_indices 是一组索引值（节省 PyDictKeyEntry 空间），这些索引指向真正存放数据的 PyDictKeyEntry 数组，每个 entry 含 me_hash、me_key、me_value。</desc>
<defs>
  <style>
    .ct{font-size:12px;font-weight:600;}
    .fd{font-size:11.5px;font-family:'SF Mono','JetBrains Mono',ui-monospace,Consolas,monospace;}
    .an{font-size:10.5px;}
    .cap{font-size:12px;}
  </style>
  <filter id="sh" x="-30%" y="-30%" width="160%" height="160%"><feDropShadow dx="0" dy="1.4" stdDeviation="2" flood-color="#2A2A28" flood-opacity="0.12"/></filter>
  <linearGradient id="gB" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#EFF3FA"/><stop offset="1" stop-color="#E0E9F6"/></linearGradient>
  <linearGradient id="gP" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#F3F1FD"/><stop offset="1" stop-color="#E9E6FB"/></linearGradient>
  <linearGradient id="gA" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#FAEFD9"/><stop offset="1" stop-color="#F4E6C8"/></linearGradient>
  <linearGradient id="gG" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#E9F6F1"/><stop offset="1" stop-color="#DBF0E7"/></linearGradient>
  <marker id="ah" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#8E8B80" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></marker>
</defs>

<rect x="0" y="0" width="1320" height="470" fill="#FBFAF6"/>

<!-- ===== PyDictObject (blue) ===== -->
<rect x="120" y="140" width="180" height="232" rx="10" fill="#FFFFFF" stroke="#C3D2E8" stroke-width="1" filter="url(#sh)"/>
<path d="M120,172 V150 Q120,140 130,140 H290 Q300,140 300,150 V172 Z" fill="url(#gB)"/>
<text x="210" y="161" text-anchor="middle" class="ct" fill="#28415F">PyDictObject</text>
<rect x="120" y="292" width="180" height="40" fill="#EEF3FA"/>
<g stroke="#ECEFF5"><line x1="120" y1="212" x2="300" y2="212"/><line x1="120" y1="252" x2="300" y2="252"/><line x1="120" y1="292" x2="300" y2="292"/><line x1="120" y1="332" x2="300" y2="332"/></g>
<g class="fd" fill="#28415F" text-anchor="middle">
  <text x="210" y="196">Pyobject_HEAD</text><text x="210" y="236">ma_used</text><text x="210" y="276">ma_version_tag</text><text x="210" y="316">*ma_keys</text><text x="210" y="356">**ma_values</text>
</g>
<g class="an" fill="#9A988F" text-anchor="end">
  <text x="108" y="195">python 基本类型</text><text x="108" y="235">字典 items 数量</text><text x="108" y="279">版本标识 · 更改即变</text>
</g>

<!-- ===== PyDictKeysObject (purple) ===== -->
<rect x="460" y="110" width="190" height="272" rx="10" fill="#FFFFFF" stroke="#CCC7F1" stroke-width="1" filter="url(#sh)"/>
<path d="M460,142 V120 Q460,110 470,110 H640 Q650,110 650,120 V142 Z" fill="url(#gP)"/>
<text x="555" y="131" text-anchor="middle" class="ct" fill="#2E2972">PyDictKeysObject</text>
<g stroke="#EEE9F6"><line x1="460" y1="182" x2="650" y2="182"/><line x1="460" y1="222" x2="650" y2="222"/><line x1="460" y1="262" x2="650" y2="262"/><line x1="460" y1="302" x2="650" y2="302"/><line x1="460" y1="342" x2="650" y2="342"/></g>
<g class="fd" fill="#2E2972" text-anchor="middle">
  <text x="555" y="166">dk_refcnt</text><text x="555" y="206">dk_size</text><text x="555" y="246">dk_lookup</text><text x="555" y="286">dk_usable</text><text x="555" y="326">dk_nentries</text><text x="555" y="366">dk_indices[]</text>
</g>
<g class="an" fill="#9A988F" text-anchor="end">
  <text x="452" y="209">大小为 2 的幂</text><text x="452" y="249">哈希查找函数</text><text x="452" y="329">已使用 entry 数</text>
</g>

<!-- ma_keys -> keys -->
<path d="M300,312 C380,312 380,290 460,290" fill="none" stroke="#8E8B80" stroke-width="1.7" marker-end="url(#ah)"/>

<!-- ===== dk_indices array (amber) ===== -->
<text x="900" y="100" text-anchor="middle" class="cap" fill="#7B7A72">dk_indices[]：存储索引值，减少 PyDictKeyEntry 的占用空间</text>
<rect x="720" y="116" width="360" height="40" rx="6" fill="#FFFFFF" stroke="#E8CB94" stroke-width="1" filter="url(#sh)"/>
<g stroke="#F0DEBB"><line x1="765" y1="116" x2="765" y2="156"/><line x1="810" y1="116" x2="810" y2="156"/><line x1="855" y1="116" x2="855" y2="156"/><line x1="900" y1="116" x2="900" y2="156"/><line x1="945" y1="116" x2="945" y2="156"/><line x1="990" y1="116" x2="990" y2="156"/><line x1="1035" y1="116" x2="1035" y2="156"/></g>
<g class="fd" fill="#5C3C08" text-anchor="middle">
  <text x="742" y="141">0</text><text x="787" y="141">0</text><text x="832" y="141">0</text><text x="877" y="141">0</text><text x="922" y="141">0</text><text x="967" y="141">0</text><text x="1012" y="141">0</text><text x="1057" y="141">0</text>
</g>
<!-- dk_indices -> array -->
<path d="M650,362 C688,362 690,136 718,136" fill="none" stroke="#8E8B80" stroke-width="1.7" marker-end="url(#ah)"/>
<!-- array -> entries -->
<path d="M900,156 L900,298" fill="none" stroke="#8E8B80" stroke-width="1.7" stroke-dasharray="5 4" marker-end="url(#ah)"/>
<text x="912" y="230" class="an" fill="#9A988F">索引指向 entry</text>

<!-- ===== PyDictKeyEntry x3 (green) ===== -->
<g>
  <!-- entry 1 -->
  <rect x="720" y="300" width="150" height="136" rx="9" fill="#FFFFFF" stroke="#A8DCC9" stroke-width="1" filter="url(#sh)"/>
  <path d="M720,328 V309 Q720,300 729,300 H861 Q870,300 870,309 V328 Z" fill="url(#gG)"/>
  <text x="795" y="320" text-anchor="middle" font-size="10.5" font-weight="600" fill="#0A463A">PyDictKeyEntry</text>
  <g stroke="#E4F0EA"><line x1="720" y1="364" x2="870" y2="364"/><line x1="720" y1="400" x2="870" y2="400"/></g>
  <g class="fd" fill="#0A463A" text-anchor="middle"><text x="795" y="346">me_hash</text><text x="795" y="382">me_key</text><text x="795" y="418">me_value</text></g>
  <!-- entry 2 -->
  <rect x="890" y="300" width="150" height="136" rx="9" fill="#FFFFFF" stroke="#A8DCC9" stroke-width="1" filter="url(#sh)"/>
  <path d="M890,328 V309 Q890,300 899,300 H1031 Q1040,300 1040,309 V328 Z" fill="url(#gG)"/>
  <text x="965" y="320" text-anchor="middle" font-size="10.5" font-weight="600" fill="#0A463A">PyDictKeyEntry</text>
  <g stroke="#E4F0EA"><line x1="890" y1="364" x2="1040" y2="364"/><line x1="890" y1="400" x2="1040" y2="400"/></g>
  <g class="fd" fill="#0A463A" text-anchor="middle"><text x="965" y="346">me_hash</text><text x="965" y="382">me_key</text><text x="965" y="418">me_value</text></g>
  <!-- entry 3 -->
  <rect x="1060" y="300" width="150" height="136" rx="9" fill="#FFFFFF" stroke="#A8DCC9" stroke-width="1" filter="url(#sh)"/>
  <path d="M1060,328 V309 Q1060,300 1069,300 H1201 Q1210,300 1210,309 V328 Z" fill="url(#gG)"/>
  <text x="1135" y="320" text-anchor="middle" font-size="10.5" font-weight="600" fill="#0A463A">PyDictKeyEntry</text>
  <g stroke="#E4F0EA"><line x1="1060" y1="364" x2="1210" y2="364"/><line x1="1060" y1="400" x2="1210" y2="400"/></g>
  <g class="fd" fill="#0A463A" text-anchor="middle"><text x="1135" y="346">me_hash</text><text x="1135" y="382">me_key</text><text x="1135" y="418">me_value</text></g>
</g>

<!-- right annotations -->
<g stroke="#D9D6CC"><line x1="1210" y1="346" x2="1226" y2="346"/><line x1="1210" y1="382" x2="1226" y2="382"/><line x1="1210" y1="418" x2="1226" y2="418"/></g>
<g class="an" fill="#9A988F">
  <text x="1230" y="350">保存 hash 值</text><text x="1230" y="386">保存 key</text><text x="1230" y="422">保存 value</text>
</g>
</svg>
