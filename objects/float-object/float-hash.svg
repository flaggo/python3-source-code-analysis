<svg width="100%" viewBox="0 0 600 200" xmlns="http://www.w3.org/2000/svg" role="img" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'PingFang SC','Microsoft YaHei',sans-serif">
<title>数值相等的 int 与 float 哈希一致</title>
<desc>整数 1 与浮点数 1.0 数值相等（1 == 1.0），CPython 让它们的哈希也相等（hash(1) == hash(1.0)）。因此在字典里它们是同一个键：d = {1: 'a'} 之后，d[1.0] 也得到 'a'。</desc>
<defs>
  <style>
    .ti{font-size:13px;font-weight:600;}
    .v{font-size:14px;font-weight:700;font-family:'SF Mono','JetBrains Mono',ui-monospace,Consolas,monospace;}
    .lab{font-size:11.5px;}
    .cap{font-size:12px;font-family:'SF Mono','JetBrains Mono',ui-monospace,Consolas,monospace;}
  </style>
  <filter id="sh" x="-30%" y="-30%" width="160%" height="160%"><feDropShadow dx="0" dy="1.4" stdDeviation="2" flood-color="#2A2A28" flood-opacity="0.12"/></filter>
  <linearGradient id="gG" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#E9F6F1"/><stop offset="1" stop-color="#DBF0E7"/></linearGradient>
  <linearGradient id="gP" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#F3F1FD"/><stop offset="1" stop-color="#E9E6FB"/></linearGradient>
  <marker id="ah" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#8E8B80" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker>
</defs>

<rect x="0" y="0" width="600" height="200" fill="#FBFAF6"/>
<text x="300" y="30" text-anchor="middle" class="ti" fill="#0A463A">数值相等的 int 与 float 是同一个字典键</text>

<rect x="40" y="54" width="100" height="34" rx="9" fill="url(#gG)" stroke="#A8DCC9" stroke-width="1" filter="url(#sh)"/><text x="90" y="76" text-anchor="middle" class="v" fill="#0A463A">int 1</text>
<rect x="40" y="112" width="100" height="34" rx="9" fill="url(#gG)" stroke="#A8DCC9" stroke-width="1" filter="url(#sh)"/><text x="90" y="134" text-anchor="middle" class="v" fill="#0A463A">float 1.0</text>

<g fill="none" stroke="#8E8B80" stroke-width="1.6" marker-end="url(#ah)">
  <path d="M140,71 C200,71 210,90 268,96"/>
  <path d="M140,129 C200,129 210,110 268,104"/>
</g>

<rect x="270" y="74" width="150" height="52" rx="10" fill="#FFFFFF" stroke="#C0BDB4" stroke-width="1" filter="url(#sh)"/>
<text x="345" y="95" text-anchor="middle" class="lab" fill="#46453F">1 == 1.0</text>
<text x="345" y="113" text-anchor="middle" class="lab" fill="#46453F">hash 相同</text>

<path d="M420,100 H452" fill="none" stroke="#8E8B80" stroke-width="1.6" marker-end="url(#ah)"/>
<rect x="454" y="78" width="120" height="44" rx="10" fill="url(#gP)" stroke="#CCC7F1" stroke-width="1" filter="url(#sh)"/>
<text x="514" y="105" text-anchor="middle" class="lab" fill="#2E2972">字典里同一项</text>

<text x="300" y="178" text-anchor="middle" class="cap" fill="#9A988F">d = {1: 'a'}　→　d[1.0] 也得到 'a'</text>
</svg>
