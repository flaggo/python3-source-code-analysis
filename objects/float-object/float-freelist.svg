<svg width="100%" viewBox="0 0 620 200" xmlns="http://www.w3.org/2000/svg" role="img" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'PingFang SC','Microsoft YaHei',sans-serif">
<title>浮点数的 free list 缓冲池</title>
<desc>CPython 用一条单链表 free_list 缓存被释放的浮点对象，最多保存 100 个。创建 PyFloat_FromDouble 时若链表非空就取链表头复用，否则才 malloc 新建；浮点数销毁时挂回链表头，超过 100 个才真正释放。</desc>
<defs>
  <style>
    .ti{font-size:13px;font-weight:600;}
    .b{font-size:11px;font-family:'SF Mono','JetBrains Mono',ui-monospace,Consolas,monospace;}
    .lab{font-size:11px;}
    .cap{font-size:11.5px;}
  </style>
  <filter id="sh" x="-30%" y="-30%" width="160%" height="160%"><feDropShadow dx="0" dy="1.4" stdDeviation="2" flood-color="#2A2A28" flood-opacity="0.12"/></filter>
  <linearGradient id="gG" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#E9F6F1"/><stop offset="1" stop-color="#DBF0E7"/></linearGradient>
  <marker id="ah" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#8E8B80" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker>
</defs>

<rect x="0" y="0" width="620" height="200" fill="#FBFAF6"/>
<text x="310" y="30" text-anchor="middle" class="ti" fill="#0A463A">浮点数缓冲池 free_list（单链表，最多 100 个）</text>

<rect x="30" y="62" width="92" height="36" rx="9" fill="url(#gG)" stroke="#A8DCC9" stroke-width="1" filter="url(#sh)"/><text x="76" y="85" text-anchor="middle" class="b" fill="#0A463A">free_list</text>
<g fill="none" stroke="#8E8B80" stroke-width="1.5" marker-end="url(#ah)">
  <path d="M122,80 H156"/><path d="M250,80 H284"/><path d="M378,80 H412"/>
</g>
<g>
  <rect x="158" y="62" width="92" height="36" rx="9" fill="#FFFFFF" stroke="#A8DCC9" stroke-width="1" filter="url(#sh)"/><text x="204" y="85" text-anchor="middle" class="b" fill="#0A463A">空闲 float</text>
  <rect x="286" y="62" width="92" height="36" rx="9" fill="#FFFFFF" stroke="#A8DCC9" stroke-width="1" filter="url(#sh)"/><text x="332" y="85" text-anchor="middle" class="b" fill="#0A463A">空闲 float</text>
  <rect x="414" y="62" width="92" height="36" rx="9" fill="#FFFFFF" stroke="#A8DCC9" stroke-width="1" filter="url(#sh)"/><text x="460" y="85" text-anchor="middle" class="b" fill="#0A463A">空闲 float</text>
</g>
<text x="520" y="85" class="lab" fill="#9A988F">⋯ ≤ 100</text>

<text x="310" y="142" text-anchor="middle" class="cap" fill="#9A988F">创建 PyFloat_FromDouble：链表非空就取链表头复用，否则 malloc 新建</text>
<text x="310" y="164" text-anchor="middle" class="cap" fill="#9A988F">销毁：挂回链表头；已满 100 个时才真正释放</text>
</svg>
