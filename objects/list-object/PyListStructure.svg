<svg width="100%" viewBox="0 0 620 320" xmlns="http://www.w3.org/2000/svg" role="img" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'PingFang SC','Microsoft YaHei',sans-serif">
<title>PyListObject 存储结构</title>
<desc>PyListObject 基于 PyVarObject（含 PyObject ob_base 与 ob_size），通过 *ob_item 指向元素指针数组，allocated 记录数组容量。执行 lst=[]; lst.append(1) 后 ob_size 为 1、allocated 为 4，ob_item 第 0 项为 1，其余为 null。</desc>
<defs>
  <style>
    .ct{font-size:13px;font-weight:600;}
    .sct{font-size:11px;font-weight:600;}
    .fd{font-size:12.5px;font-family:'SF Mono','JetBrains Mono',ui-monospace,Consolas,monospace;}
    .cap{font-size:12px;}
    .tag{font-size:11px;}
  </style>
  <filter id="sh" x="-30%" y="-30%" width="160%" height="160%"><feDropShadow dx="0" dy="1.4" stdDeviation="2" flood-color="#2A2A28" flood-opacity="0.12"/></filter>
  <linearGradient id="gB" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#EFF3FA"/><stop offset="1" stop-color="#E0E9F6"/></linearGradient>
  <marker id="ah" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#8E8B80" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></marker>
</defs>

<rect x="0" y="0" width="620" height="320" fill="#FBFAF6"/>

<!-- outer card PyListObject -->
<rect x="60" y="40" width="240" height="230" rx="11" fill="#FFFFFF" stroke="#C3D2E8" stroke-width="1" filter="url(#sh)"/>
<path d="M60,74 V51 Q60,40 71,40 H289 Q300,40 300,51 V74 Z" fill="url(#gB)"/>
<text x="180" y="62" text-anchor="middle" class="ct" fill="#28415F">PyListObject</text>

<!-- nested PyVarObject -->
<rect x="76" y="84" width="208" height="96" rx="8" fill="#FBFCFE" stroke="#CCD8EA" stroke-width="1"/>
<path d="M76,112 V92 Q76,84 84,84 H276 Q284,84 284,92 V112 Z" fill="#EAEFF8"/>
<text x="180" y="102" text-anchor="middle" class="sct" fill="#4A5E80">PyVarObject</text>
<line x1="76" y1="146" x2="284" y2="146" stroke="#E4E9F2"/>
<text x="180" y="133" text-anchor="middle" class="fd" fill="#28415F">PyObject ob_base</text>
<text x="180" y="167" text-anchor="middle" class="fd" fill="#28415F">ob_size = 1</text>

<!-- *ob_item (pointer) -->
<rect x="60" y="180" width="240" height="45" fill="#EEF3FA"/>
<line x1="60" y1="180" x2="300" y2="180" stroke="#E4E9F2"/>
<text x="84" y="207" class="fd" fill="#28415F">*ob_item</text>
<!-- allocated -->
<line x1="60" y1="225" x2="300" y2="225" stroke="#E4E9F2"/>
<text x="84" y="252" class="fd" fill="#28415F">allocated</text>
<text x="276" y="252" text-anchor="end" class="fd" fill="#28415F">4</text>

<!-- pointer arrow -->
<path d="M300,202 C360,202 360,139 418,139" fill="none" stroke="#8E8B80" stroke-width="1.7" marker-end="url(#ah)"/>

<!-- items array -->
<text x="490" y="108" text-anchor="middle" class="tag" fill="#9A988F">ob_item（容量 allocated = 4）</text>
<rect x="420" y="120" width="140" height="152" rx="8" fill="#FFFFFF" stroke="#C3D2E8" stroke-width="1" filter="url(#sh)"/>
<rect x="420" y="120" width="140" height="38" rx="8" fill="#E4F2EB"/>
<g stroke="#E4E9F2"><line x1="420" y1="158" x2="560" y2="158"/><line x1="420" y1="196" x2="560" y2="196"/><line x1="420" y1="234" x2="560" y2="234"/></g>
<text x="490" y="144" text-anchor="middle" class="fd" fill="#0A463A">1</text>
<g class="fd" fill="#A9B4C4"><text x="490" y="182" text-anchor="middle">null</text><text x="490" y="220" text-anchor="middle">null</text><text x="490" y="258" text-anchor="middle">null</text></g>

<text x="310" y="300" text-anchor="middle" class="cap" fill="#9A988F">lst = []; lst.append(1)　→　ob_size = 1，allocated = 4</text>
</svg>
