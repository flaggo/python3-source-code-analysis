<svg width="100%" viewBox="0 0 700 180" xmlns="http://www.w3.org/2000/svg" role="img" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'PingFang SC','Microsoft YaHei',sans-serif">
<title>类的创建：class 语句 → type(name, bases, namespace)</title>
<desc>class 语句会被编译成对 __build_class__ 的调用：先执行类体得到一个命名空间字典，再调用元类（默认是 type）以 type(name, bases, namespace) 创建类型对象。所以「类」本身就是 type 的实例。</desc>
<defs>
  <style>
    .ti{font-size:12.5px;font-weight:600;}
    .b{font-size:11.5px;font-weight:600;}
    .c{font-size:10.5px;font-family:'SF Mono','JetBrains Mono',ui-monospace,Consolas,monospace;}
    .s{font-size:10px;}
  </style>
  <filter id="sh" x="-30%" y="-30%" width="160%" height="160%"><feDropShadow dx="0" dy="1.4" stdDeviation="2" flood-color="#2A2A28" flood-opacity="0.12"/></filter>
  <linearGradient id="gN" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#F1EFE8"/><stop offset="1" stop-color="#E7E4DA"/></linearGradient>
  <linearGradient id="gP" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#F3F1FD"/><stop offset="1" stop-color="#E9E6FB"/></linearGradient>
  <marker id="ah" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#8E8B80" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker>
</defs>

<rect x="0" y="0" width="700" height="180" fill="#FBFAF6"/>
<text x="350" y="30" text-anchor="middle" class="ti" fill="#2E2972">class 语句背后：调用元类 type(name, bases, namespace) 造类</text>

<g fill="none" stroke="#8E8B80" stroke-width="1.6" marker-end="url(#ah)">
  <path d="M186,96 H214"/><path d="M408,96 H436"/>
</g>

<rect x="24" y="64" width="162" height="64" rx="9" fill="url(#gN)" stroke="#D8D3C6" stroke-width="1" filter="url(#sh)"/>
<text x="105" y="90" text-anchor="middle" class="c" fill="#33322E">class Foo(Base):</text>
<text x="105" y="106" text-anchor="middle" class="c" fill="#33322E">    x = 1</text>
<text x="105" y="120" text-anchor="middle" class="s" fill="#7B7A72">（类体 → 命名空间字典）</text>

<rect x="216" y="64" width="192" height="64" rx="9" fill="url(#gP)" stroke="#CCC7F1" stroke-width="1" filter="url(#sh)"/>
<text x="312" y="90" text-anchor="middle" class="b" fill="#2E2972">type(name, bases, namespace)</text>
<text x="312" y="108" text-anchor="middle" class="s" fill="#4A4396">__build_class__ 调用元类（默认 type）</text>
<text x="312" y="122" text-anchor="middle" class="s" fill="#4A4396">→ type_new 创建类型对象</text>

<rect x="438" y="64" width="238" height="64" rx="9" fill="#FFFFFF" stroke="#CCC7F1" stroke-width="1.1" filter="url(#sh)"/>
<text x="557" y="92" text-anchor="middle" class="b" fill="#2E2972">类型对象 Foo</text>
<text x="557" y="112" text-anchor="middle" class="s" fill="#4A4396">它本身是 type 的实例（type(Foo) is type）</text>
</svg>
