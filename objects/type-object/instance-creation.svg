<svg width="100%" viewBox="0 0 700 160" xmlns="http://www.w3.org/2000/svg" role="img" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'PingFang SC','Microsoft YaHei',sans-serif">
<title>实例创建：type_call → __new__ → __init__</title>
<desc>调用 MyClass() 时，type_call 先调用 tp_new（对应 __new__）分配并返回一个新对象，再调用 tp_init（对应 __init__）初始化它，最后得到实例。</desc>
<defs>
  <style>
    .ti{font-size:12.5px;font-weight:600;}
    .b{font-size:12px;font-weight:600;}
    .c{font-size:11px;font-family:'SF Mono','JetBrains Mono',ui-monospace,Consolas,monospace;}
    .s{font-size:10.5px;}
  </style>
  <filter id="sh" x="-30%" y="-30%" width="160%" height="160%"><feDropShadow dx="0" dy="1.4" stdDeviation="2" flood-color="#2A2A28" flood-opacity="0.12"/></filter>
  <linearGradient id="gN" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#F1EFE8"/><stop offset="1" stop-color="#E7E4DA"/></linearGradient>
  <linearGradient id="gB" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#EFF3FA"/><stop offset="1" stop-color="#E0E9F6"/></linearGradient>
  <linearGradient id="gG" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#E9F6F1"/><stop offset="1" stop-color="#DBF0E7"/></linearGradient>
  <linearGradient id="gA" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#FAEFD9"/><stop offset="1" stop-color="#F4E6C8"/></linearGradient>
  <marker id="ah" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#8E8B80" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker>
</defs>

<rect x="0" y="0" width="700" height="160" fill="#FBFAF6"/>
<text x="350" y="30" text-anchor="middle" class="ti" fill="#28415F">MyClass() 背后：type_call 依次调用 __new__、__init__</text>

<g fill="none" stroke="#8E8B80" stroke-width="1.6" marker-end="url(#ah)">
  <path d="M156,98 H188"/><path d="M334,98 H366"/><path d="M512,98 H544"/>
</g>

<rect x="24" y="74" width="132" height="48" rx="9" fill="url(#gN)" stroke="#D8D3C6" stroke-width="1" filter="url(#sh)"/><text x="90" y="103" text-anchor="middle" class="c" fill="#33322E">MyClass()</text>
<rect x="190" y="70" width="144" height="56" rx="9" fill="url(#gB)" stroke="#C3D2E8" stroke-width="1" filter="url(#sh)"/><text x="262" y="95" text-anchor="middle" class="b" fill="#28415F">tp_new (__new__)</text><text x="262" y="112" text-anchor="middle" class="s" fill="#4A5E80">分配并返回新对象</text>
<rect x="368" y="70" width="144" height="56" rx="9" fill="url(#gG)" stroke="#A8DCC9" stroke-width="1" filter="url(#sh)"/><text x="440" y="95" text-anchor="middle" class="b" fill="#0A463A">tp_init (__init__)</text><text x="440" y="112" text-anchor="middle" class="s" fill="#0C5945">初始化实例</text>
<rect x="546" y="74" width="130" height="48" rx="9" fill="url(#gA)" stroke="#E8CB94" stroke-width="1" filter="url(#sh)"/><text x="611" y="103" text-anchor="middle" class="b" fill="#5C3C08">实例对象</text>
</svg>
