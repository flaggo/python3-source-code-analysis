<svg width="100%" viewBox="0 0 660 220" xmlns="http://www.w3.org/2000/svg" role="img" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'PingFang SC','Microsoft YaHei',sans-serif">
<title>方法是描述符：访问时绑定 self</title>
<desc>类里定义的函数是非数据描述符（只有 __get__）。在实例上访问 p.m 时，触发 func_descr_get，返回一个把函数和实例绑定起来的「绑定方法」（自动带上 self=p）；在类上访问 P.m 时则返回函数本身。这就是方法能拿到 self 的原因。</desc>
<defs>
  <style>
    .ti{font-size:12.5px;font-weight:600;}
    .b{font-size:11.5px;font-weight:600;}
    .c{font-size:11px;font-family:'SF Mono','JetBrains Mono',ui-monospace,Consolas,monospace;}
    .s{font-size:10.5px;}
  </style>
  <filter id="sh" x="-30%" y="-30%" width="160%" height="160%"><feDropShadow dx="0" dy="1.4" stdDeviation="2" flood-color="#2A2A28" flood-opacity="0.12"/></filter>
  <linearGradient id="gB" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#EFF3FA"/><stop offset="1" stop-color="#E0E9F6"/></linearGradient>
  <linearGradient id="gG" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#E9F6F1"/><stop offset="1" stop-color="#DBF0E7"/></linearGradient>
  <linearGradient id="gN" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#F1EFE8"/><stop offset="1" stop-color="#E7E4DA"/></linearGradient>
  <marker id="ah" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#8E8B80" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker>
</defs>

<rect x="0" y="0" width="660" height="220" fill="#FBFAF6"/>
<text x="330" y="28" text-anchor="middle" class="ti" fill="#28415F">方法是描述符：实例上访问时绑定 self</text>

<!-- center: function in class -->
<rect x="246" y="52" width="168" height="44" rx="9" fill="url(#gN)" stroke="#D8D3C6" stroke-width="1" filter="url(#sh)"/>
<text x="330" y="72" text-anchor="middle" class="b" fill="#33322E">类 P 里的函数 m</text>
<text x="330" y="88" text-anchor="middle" class="s" fill="#7B7A72">非数据描述符（只有 __get__）</text>

<!-- left: instance access -->
<path d="M256,96 C200,116 170,128 150,144" fill="none" stroke="#8E8B80" stroke-width="1.5" marker-end="url(#ah)"/>
<text x="170" y="120" class="c" fill="#46453F">p.m（实例）</text>
<rect x="40" y="148" width="240" height="52" rx="9" fill="url(#gG)" stroke="#A8DCC9" stroke-width="1" filter="url(#sh)"/>
<text x="160" y="170" text-anchor="middle" class="b" fill="#0A463A">func.__get__(p, P) → 绑定方法</text>
<text x="160" y="188" text-anchor="middle" class="s" fill="#0C5945">自动带上 self = p（即 PyMethod_New）</text>

<!-- right: class access -->
<path d="M404,96 C460,116 490,128 510,144" fill="none" stroke="#8E8B80" stroke-width="1.5" marker-end="url(#ah)"/>
<text x="430" y="120" class="c" fill="#46453F">P.m（类）</text>
<rect x="380" y="148" width="240" height="52" rx="9" fill="url(#gB)" stroke="#C3D2E8" stroke-width="1" filter="url(#sh)"/>
<text x="500" y="170" text-anchor="middle" class="b" fill="#28415F">函数 m 本身</text>
<text x="500" y="188" text-anchor="middle" class="s" fill="#4A5E80">不绑定（obj 为 None）</text>
</svg>
