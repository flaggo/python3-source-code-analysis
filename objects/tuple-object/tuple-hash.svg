<svg width="100%" viewBox="0 0 620 250" xmlns="http://www.w3.org/2000/svg" role="img" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'PingFang SC','Microsoft YaHei',sans-serif">
<title>元组的可哈希性取决于内容</title>
<desc>元组的哈希由各元素的哈希混合而成。(1,2,3) 的元素都可哈希，混合后得到一个整数哈希值。(1,[2]) 里有一个列表，对它求哈希失败（list 不可哈希），于是整个元组都不可哈希。</desc>
<defs>
  <style>
    .ct{font-size:12.5px;font-weight:600;}
    .v{font-size:13px;font-family:'SF Mono','JetBrains Mono',ui-monospace,Consolas,monospace;}
    .lab{font-size:11px;font-family:'SF Mono','JetBrains Mono',ui-monospace,Consolas,monospace;}
    .cap{font-size:12px;}
  </style>
  <filter id="sh" x="-30%" y="-30%" width="160%" height="160%"><feDropShadow dx="0" dy="1.4" stdDeviation="2" flood-color="#2A2A28" flood-opacity="0.12"/></filter>
  <linearGradient id="gA" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#FAEFD9"/><stop offset="1" stop-color="#F4E6C8"/></linearGradient>
  <linearGradient id="gG" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#E9F6F1"/><stop offset="1" stop-color="#DBF0E7"/></linearGradient>
  <linearGradient id="gR" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#F8EEEE"/><stop offset="1" stop-color="#F1E1E1"/></linearGradient>
  <marker id="ah" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#8E8B80" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker>
</defs>

<rect x="0" y="0" width="620" height="250" fill="#FBFAF6"/>

<!-- row 1: hashable -->
<rect x="32" y="44" width="116" height="40" rx="9" fill="url(#gA)" stroke="#E8CB94" stroke-width="1" filter="url(#sh)"/>
<text x="90" y="69" text-anchor="middle" class="v" fill="#5C3C08">(1, 2, 3)</text>
<line x1="148" y1="64" x2="210" y2="64" stroke="#8E8B80" stroke-width="1.6" marker-end="url(#ah)"/>
<rect x="212" y="40" width="184" height="48" rx="9" fill="#FFFFFF" stroke="#C0BDB4" stroke-width="1" filter="url(#sh)"/>
<text x="304" y="60" text-anchor="middle" class="cap" fill="#46453F">逐个求哈希再混合</text>
<text x="304" y="78" text-anchor="middle" class="lab" fill="#7B7A72">h(1) ⊕ h(2) ⊕ h(3)</text>
<line x1="396" y1="64" x2="448" y2="64" stroke="#8E8B80" stroke-width="1.6" marker-end="url(#ah)"/>
<rect x="450" y="44" width="138" height="40" rx="9" fill="url(#gG)" stroke="#A8DCC9" stroke-width="1" filter="url(#sh)"/>
<text x="519" y="69" text-anchor="middle" class="ct" fill="#0A463A">一个整数哈希</text>

<!-- row 2: unhashable -->
<rect x="32" y="150" width="116" height="40" rx="9" fill="url(#gA)" stroke="#E8CB94" stroke-width="1" filter="url(#sh)"/>
<text x="90" y="175" text-anchor="middle" class="v" fill="#5C3C08">(1, [2])</text>
<line x1="148" y1="170" x2="210" y2="170" stroke="#8E8B80" stroke-width="1.6" marker-end="url(#ah)"/>
<rect x="212" y="146" width="184" height="48" rx="9" fill="#FFFFFF" stroke="#C0BDB4" stroke-width="1" filter="url(#sh)"/>
<text x="304" y="166" text-anchor="middle" class="cap" fill="#46453F">对 [2] 求哈希 → 失败</text>
<text x="304" y="184" text-anchor="middle" class="lab" fill="#8A5151">list 不可哈希</text>
<line x1="396" y1="170" x2="448" y2="170" stroke="#8E8B80" stroke-width="1.6" marker-end="url(#ah)"/>
<rect x="450" y="150" width="138" height="40" rx="9" fill="url(#gR)" stroke="#E0C6C6" stroke-width="1" filter="url(#sh)"/>
<text x="519" y="175" text-anchor="middle" class="ct" fill="#5C3030">整个元组不可哈希</text>

<text x="310" y="226" text-anchor="middle" class="cap" fill="#9A988F">只要有一个元素不可哈希，整个元组就不可哈希（因而不能作字典键/集合元素）</text>
</svg>
