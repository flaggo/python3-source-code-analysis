<svg width="100%" viewBox="0 0 640 390" xmlns="http://www.w3.org/2000/svg" role="img" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'PingFang SC','Microsoft YaHei',sans-serif">
<title>compact ASCII 字符串 "abc" 的内存布局</title>
<desc>compact 字符串把对象头和字符数据放在同一块连续内存里：PyASCIIObject 结构（含 ob_refcnt、ob_type、length、hash、state 位域、wstr）之后紧跟着字符数据 a b c 和结尾的 \0。state 位域里 kind=1、compact=1、ascii=1、ready=1，hash 初始为 -1。</desc>
<defs>
  <style>
    .ct{font-size:13px;font-weight:600;}
    .fd{font-size:12px;font-family:'SF Mono','JetBrains Mono',ui-monospace,Consolas,monospace;}
    .an{font-size:11px;}
    .lab{font-size:11.5px;}
    .cap{font-size:12px;}
  </style>
  <filter id="sh" x="-30%" y="-30%" width="160%" height="160%"><feDropShadow dx="0" dy="1.4" stdDeviation="2" flood-color="#2A2A28" flood-opacity="0.12"/></filter>
  <linearGradient id="gB" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#EFF3FA"/><stop offset="1" stop-color="#E0E9F6"/></linearGradient>
  <marker id="ah" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#8E8B80" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker>
</defs>

<rect x="0" y="0" width="640" height="390" fill="#FBFAF6"/>

<!-- contiguous-memory brace -->
<path d="M126,64 H116 V346 H126" fill="none" stroke="#C0BDB4" stroke-width="1.4"/>
<text x="108" y="208" text-anchor="middle" class="lab" fill="#9A988F" transform="rotate(-90 108 208)">一块连续内存（compact）</text>

<!-- PyASCIIObject struct -->
<rect x="140" y="64" width="240" height="236" rx="10" fill="#FFFFFF" stroke="#C3D2E8" stroke-width="1" filter="url(#sh)"/>
<path d="M140,96 V74 Q140,64 150,64 H370 Q380,64 380,74 V96 Z" fill="url(#gB)"/>
<text x="260" y="85" text-anchor="middle" class="ct" fill="#28415F">PyASCIIObject</text>
<rect x="140" y="232" width="240" height="34" fill="#EEF3FA"/>
<g stroke="#ECEFF5"><line x1="140" y1="130" x2="380" y2="130"/><line x1="140" y1="164" x2="380" y2="164"/><line x1="140" y1="198" x2="380" y2="198"/><line x1="140" y1="232" x2="380" y2="232"/><line x1="140" y1="266" x2="380" y2="266"/></g>
<g class="fd" fill="#28415F"><text x="154" y="118">ob_refcnt</text><text x="154" y="152">*ob_type</text><text x="154" y="186">length</text><text x="154" y="220">hash</text><text x="154" y="254">state（位域）</text><text x="154" y="288">*wstr</text></g>
<g class="fd" fill="#7B7A72" text-anchor="end"><text x="366" y="186">3</text><text x="366" y="220">-1</text></g>

<!-- char data, right after the struct -->
<text x="140" y="324" class="lab" fill="#7B7A72">字符数据（紧随结构体之后）</text>
<rect x="140" y="330" width="176" height="34" rx="6" fill="#FFFFFF" stroke="#E8CB94" stroke-width="1.1" filter="url(#sh)"/>
<g stroke="#EAD2A0"><line x1="184" y1="330" x2="184" y2="364"/><line x1="228" y1="330" x2="228" y2="364"/><line x1="272" y1="330" x2="272" y2="364"/></g>
<g class="fd" fill="#5C3C08" font-weight="700" text-anchor="middle"><text x="162" y="352">a</text><text x="206" y="352">b</text><text x="250" y="352">c</text><text x="294" y="352" fill="#B8B5AC" font-weight="400">\0</text></g>

<!-- state bitfield callout -->
<path d="M380,249 H404" fill="none" stroke="#8E8B80" stroke-width="1.5" marker-end="url(#ah)"/>
<rect x="410" y="206" width="200" height="92" rx="9" fill="#F7FAFF" stroke="#C3D2E8" stroke-width="1" filter="url(#sh)"/>
<text x="424" y="225" class="an" fill="#28415F" font-weight="600">state 位域：</text>
<g class="an" fill="#46453F" font-family="'SF Mono','JetBrains Mono',ui-monospace,Consolas,monospace">
  <text x="424" y="244">interned:2 = 0</text>
  <text x="424" y="261">kind:3 = 1  (1 字节)</text>
  <text x="424" y="278">compact:1 = 1</text>
  <text x="424" y="295">ascii:1 = 1 ready:1 = 1</text>
</g>

<text x="375" y="382" text-anchor="middle" class="cap" fill="#9A988F">对象头与字符数据共用一块内存：少一次内存分配，对 CPU 缓存更友好</text>
</svg>
