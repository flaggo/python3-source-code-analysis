<svg width="100%" viewBox="0 0 640 270" xmlns="http://www.w3.org/2000/svg" role="img" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'PingFang SC','Microsoft YaHei',sans-serif">
<title>arena / pool / block 三层内存结构</title>
<desc>pymalloc 一次向系统要一大块再自己切，分三级。arena 竞技场 256KB，向操作系统 mmap 批发的大块。一个 arena 切成约 64 个 pool 池，每个 pool 占一个内存页 4KB，一个 pool 只服务一种大小规格。一个 pool 再切成许多等大的 block 块，这才是真正交到对象手里的分配单元。图示一个 arena 含多个 pool，其中一个 pool 被放大，切成同样大小的 block，部分已用部分空闲。</desc>
<defs>
  <style>
    .ti{font-size:13px;font-weight:600;}
    .h{font-size:11px;font-weight:600;}
    .d{font-size:9.5px;}
    .c{font-size:9.5px;font-family:'SF Mono','JetBrains Mono',ui-monospace,Consolas,monospace;}
  </style>
  <filter id="sh" x="-30%" y="-30%" width="160%" height="160%"><feDropShadow dx="0" dy="1.4" stdDeviation="2" flood-color="#2A2A28" flood-opacity="0.12"/></filter>
  <linearGradient id="gN" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#F1EFE8"/><stop offset="1" stop-color="#E7E4DA"/></linearGradient>
  <linearGradient id="gB" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#EFF3FA"/><stop offset="1" stop-color="#E0E9F6"/></linearGradient>
  <linearGradient id="gG" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#EDF4EE"/><stop offset="1" stop-color="#DDEBE0"/></linearGradient>
  <marker id="ah" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#8E8B80" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker>
</defs>

<rect x="0" y="0" width="640" height="270" fill="#FBFAF6"/>
<text x="320" y="26" text-anchor="middle" class="ti" fill="#2E2972">arena → pool → block：批发再零售</text>

<!-- arena -->
<rect x="30" y="56" width="250" height="180" rx="12" fill="url(#gN)" stroke="#D8D3C6" filter="url(#sh)"/>
<text x="155" y="78" text-anchor="middle" class="h" fill="#33322E">arena　256 KB</text>
<text x="155" y="93" text-anchor="middle" class="d" fill="#9A988F">向 OS（mmap）批发</text>
<g>
  <rect x="50" y="104" width="46" height="46" rx="5" fill="url(#gB)" stroke="#C3D2E8"/>
  <rect x="104" y="104" width="46" height="46" rx="5" fill="url(#gG)" stroke="#BFD8C4"/>
  <rect x="158" y="104" width="46" height="46" rx="5" fill="url(#gB)" stroke="#C3D2E8"/>
  <rect x="212" y="104" width="46" height="46" rx="5" fill="url(#gB)" stroke="#C3D2E8"/>
  <rect x="50" y="158" width="46" height="46" rx="5" fill="url(#gB)" stroke="#C3D2E8"/>
  <rect x="104" y="158" width="46" height="46" rx="5" fill="url(#gB)" stroke="#C3D2E8"/>
  <rect x="158" y="158" width="46" height="46" rx="5" fill="url(#gB)" stroke="#C3D2E8"/>
  <rect x="212" y="158" width="46" height="46" rx="5" fill="url(#gB)" stroke="#C3D2E8"/>
</g>
<text x="155" y="224" text-anchor="middle" class="d" fill="#9A988F">切成约 64 个 pool（每个 4 KB）</text>

<!-- zoom pool -->
<path d="M150,127 L370,90" fill="none" stroke="#8E8B80" stroke-width="1.3" stroke-dasharray="3 3" marker-end="url(#ah)"/>
<path d="M150,127 L370,210" fill="none" stroke="#8E8B80" stroke-width="1.3" stroke-dasharray="3 3"/>

<rect x="370" y="70" width="240" height="160" rx="12" fill="url(#gG)" stroke="#BFD8C4" filter="url(#sh)"/>
<text x="490" y="92" text-anchor="middle" class="h" fill="#2F6B43">一个 pool　4 KB</text>
<text x="490" y="107" text-anchor="middle" class="d" fill="#6E8C74">只服务一种 size class</text>
<g class="c">
  <rect x="390" y="118" width="92" height="22" rx="4" fill="#7FB08A" stroke="#5E9270"/><text x="436" y="133" text-anchor="middle" fill="#FFF">block 已用</text>
  <rect x="490" y="118" width="92" height="22" rx="4" fill="#7FB08A" stroke="#5E9270"/><text x="536" y="133" text-anchor="middle" fill="#FFF">block 已用</text>
  <rect x="390" y="146" width="92" height="22" rx="4" fill="#FFF" stroke="#BFD8C4"/><text x="436" y="161" text-anchor="middle" fill="#6E8C74">空闲</text>
  <rect x="490" y="146" width="92" height="22" rx="4" fill="#FFF" stroke="#BFD8C4"/><text x="536" y="161" text-anchor="middle" fill="#6E8C74">空闲</text>
  <rect x="390" y="174" width="92" height="22" rx="4" fill="#FFF" stroke="#BFD8C4"/><text x="436" y="189" text-anchor="middle" fill="#6E8C74">空闲</text>
  <rect x="490" y="174" width="92" height="22" rx="4" fill="#FFF" stroke="#BFD8C4"/><text x="536" y="189" text-anchor="middle" fill="#6E8C74">空闲</text>
</g>
<text x="490" y="218" text-anchor="middle" class="d" fill="#6E8C74">切成等大 block —— 交给对象的分配单元</text>
</svg>
