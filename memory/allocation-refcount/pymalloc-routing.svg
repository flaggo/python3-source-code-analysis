<svg width="100%" viewBox="0 0 600 210" xmlns="http://www.w3.org/2000/svg" role="img" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'PingFang SC','Microsoft YaHei',sans-serif">
<title>pymalloc 的分流：512 字节阈值</title>
<desc>pymalloc 由一个阈值划界，SMALL_REQUEST_THRESHOLD 等于 512。请求小于等于 512 字节走 pymalloc 快路径，大于 512 字节直接转交系统 malloc。因为 Python 里绝大多数对象都很小，一个 int、一个小 tuple 都在百字节内，所以这条快路径覆盖了实际中的大部分分配。</desc>
<defs>
  <style>
    .ti{font-size:13px;font-weight:600;}
    .h{font-size:11px;font-weight:600;}
    .d{font-size:10px;}
    .c{font-size:10px;font-family:'SF Mono','JetBrains Mono',ui-monospace,Consolas,monospace;}
  </style>
  <filter id="sh" x="-30%" y="-30%" width="160%" height="160%"><feDropShadow dx="0" dy="1.4" stdDeviation="2" flood-color="#2A2A28" flood-opacity="0.12"/></filter>
  <linearGradient id="gP" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#F3F1FD"/><stop offset="1" stop-color="#E9E6FB"/></linearGradient>
  <linearGradient id="gN" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#F1EFE8"/><stop offset="1" stop-color="#E7E4DA"/></linearGradient>
  <marker id="ahg" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#6A63B0" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/></marker>
  <marker id="ah" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#8E8B80" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></marker>
</defs>

<rect x="0" y="0" width="600" height="210" fill="#FBFAF6"/>
<text x="300" y="28" text-anchor="middle" class="ti" fill="#2E2972">512 字节阈值划界</text>

<rect x="40" y="84" width="150" height="44" rx="9" fill="#FFFFFF" stroke="#CCC7F1" filter="url(#sh)"/>
<text x="115" y="104" text-anchor="middle" class="c" fill="#2E2972">内存请求</text>
<text x="115" y="120" text-anchor="middle" class="d" fill="#9A988F">PyObject_Malloc(n)</text>

<!-- decision -->
<path d="M250,106 L300,82 L350,106 L300,130 Z" fill="url(#gN)" stroke="#D8D3C6" filter="url(#sh)"/>
<text x="300" y="103" text-anchor="middle" class="c" fill="#33322E">n ≤ 512 ?</text>
<text x="300" y="118" text-anchor="middle" class="d" fill="#9A988F">阈值</text>
<path d="M190,106 H248" fill="none" stroke="#8E8B80" stroke-width="1.6" marker-end="url(#ah)"/>

<!-- yes: pymalloc -->
<rect x="410" y="56" width="160" height="44" rx="9" fill="url(#gP)" stroke="#CCC7F1" filter="url(#sh)"/>
<text x="490" y="76" text-anchor="middle" class="h" fill="#2E2972">pymalloc</text>
<text x="490" y="92" text-anchor="middle" class="d" fill="#46453F">小对象快路径</text>
<path d="M350,98 C380,90 390,82 408,80" fill="none" stroke="#6A63B0" stroke-width="1.7" marker-end="url(#ahg)"/>
<text x="378" y="68" text-anchor="middle" class="d" fill="#6A63B0">是</text>

<!-- no: malloc -->
<rect x="410" y="116" width="160" height="44" rx="9" fill="url(#gN)" stroke="#D8D3C6" filter="url(#sh)"/>
<text x="490" y="136" text-anchor="middle" class="h" fill="#33322E">系统 malloc</text>
<text x="490" y="152" text-anchor="middle" class="d" fill="#9A988F">大对象</text>
<path d="M350,114 C380,122 390,130 408,134" fill="none" stroke="#8E8B80" stroke-width="1.6" marker-end="url(#ah)"/>
<text x="378" y="148" text-anchor="middle" class="d" fill="#9A988F">否</text>

<text x="300" y="190" text-anchor="middle" class="d" fill="#9A988F">int、小 tuple 都在百字节内 → 大部分分配走 pymalloc</text>
</svg>
