<svg width="100%" viewBox="0 0 640 230" xmlns="http://www.w3.org/2000/svg" role="img" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'PingFang SC','Microsoft YaHei',sans-serif">
<title>分配/释放等于空闲链表的推拉</title>
<desc>每个 pool 内部维护一条空闲 block 链表。分配一个 block 就是从对应规格 pool 的空闲链表头取下一块，几个指针操作，不碰系统调用。释放一个 block 就是把它塞回空闲链表头，同样几个指针操作，内存不还给系统，留着下次同规格请求复用。于是造一个小对象又销毁这种最高频操作，退化成链表的一推一拉，快得很。</desc>
<defs>
  <style>
    .ti{font-size:13px;font-weight:600;}
    .h{font-size:11px;font-weight:600;}
    .d{font-size:10px;}
    .c{font-size:10px;font-family:'SF Mono','JetBrains Mono',ui-monospace,Consolas,monospace;}
  </style>
  <filter id="sh" x="-30%" y="-30%" width="160%" height="160%"><feDropShadow dx="0" dy="1.4" stdDeviation="2" flood-color="#2A2A28" flood-opacity="0.12"/></filter>
  <linearGradient id="gG" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#EDF4EE"/><stop offset="1" stop-color="#DDEBE0"/></linearGradient>
  <marker id="ah" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#8E8B80" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></marker>
  <marker id="ahg" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#2F6B43" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/></marker>
  <marker id="ahr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#C77A52" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/></marker>
</defs>

<rect x="0" y="0" width="640" height="230" fill="#FBFAF6"/>
<text x="320" y="28" text-anchor="middle" class="ti" fill="#2E2972">分配/释放 = 空闲链表的一推一拉</text>

<!-- free list chain -->
<text x="320" y="60" text-anchor="middle" class="h" fill="#2F6B43">pool 的空闲 block 链表</text>
<g class="c">
  <rect x="120" y="98" width="80" height="40" rx="7" fill="url(#gG)" stroke="#BFD8C4"/><text x="160" y="123" text-anchor="middle" fill="#2F6B43">block</text>
  <rect x="250" y="98" width="80" height="40" rx="7" fill="url(#gG)" stroke="#BFD8C4"/><text x="290" y="123" text-anchor="middle" fill="#2F6B43">block</text>
  <rect x="380" y="98" width="80" height="40" rx="7" fill="url(#gG)" stroke="#BFD8C4"/><text x="420" y="123" text-anchor="middle" fill="#2F6B43">block</text>
</g>
<path d="M200,118 H248" fill="none" stroke="#8E8B80" stroke-width="1.4" marker-end="url(#ah)"/>
<path d="M330,118 H378" fill="none" stroke="#8E8B80" stroke-width="1.4" marker-end="url(#ah)"/>
<text x="100" y="123" text-anchor="end" class="c" fill="#46453F">head →</text>

<!-- alloc: pop -->
<path d="M160,98 C160,72 120,72 95,72" fill="none" stroke="#2F6B43" stroke-width="1.7" marker-end="url(#ahg)"/>
<rect x="20" y="56" width="70" height="32" rx="7" fill="#FFF" stroke="#BFD8C4"/>
<text x="55" y="76" text-anchor="middle" class="d" fill="#2F6B43">分配 = 取下</text>

<!-- free: push -->
<path d="M95,160 C120,160 160,160 160,140" fill="none" stroke="#C77A52" stroke-width="1.7" marker-end="url(#ahr)"/>
<rect x="20" y="148" width="70" height="32" rx="7" fill="#FFF" stroke="#E8C9B5"/>
<text x="55" y="168" text-anchor="middle" class="d" fill="#9A4A2F">释放 = 塞回</text>

<text x="320" y="200" text-anchor="middle" class="d" fill="#9A988F">几个指针操作，不碰系统调用；释放的内存留着同规格复用，碎片受控</text>
</svg>
