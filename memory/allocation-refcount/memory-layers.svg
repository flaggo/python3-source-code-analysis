<svg width="100%" viewBox="0 0 560 280" xmlns="http://www.w3.org/2000/svg" role="img" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'PingFang SC','Microsoft YaHei',sans-serif">
<title>内存分配的分层</title>
<desc>CPython 在系统 malloc 之上叠几层缓存，让绝大多数小对象的分配走快速路径。从上往下：第 2 层对象级 free list，某些高频类型如 float、tuple、frame 自带的缓存，连 pymalloc 都不必惊动，最快；第 1 层 pymalloc，小对象小于等于 512 字节的专用分配器；第 0 层系统 malloc，兜底，大块内存以及 pymalloc 自己要的大块都向它要。请求优先走上层，命中即返回。</desc>
<defs>
  <style>
    .ti{font-size:13px;font-weight:600;}
    .h{font-size:12px;font-weight:600;}
    .d{font-size:10px;}
    .c{font-size:10px;font-family:'SF Mono','JetBrains Mono',ui-monospace,Consolas,monospace;}
  </style>
  <filter id="sh" x="-30%" y="-30%" width="160%" height="160%"><feDropShadow dx="0" dy="1.4" stdDeviation="2" flood-color="#2A2A28" flood-opacity="0.12"/></filter>
  <linearGradient id="gG" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#EDF4EE"/><stop offset="1" stop-color="#DDEBE0"/></linearGradient>
  <linearGradient id="gP" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#F3F1FD"/><stop offset="1" stop-color="#E9E6FB"/></linearGradient>
  <linearGradient id="gN" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#F1EFE8"/><stop offset="1" stop-color="#E7E4DA"/></linearGradient>
  <marker id="ah" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#8E8B80" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker>
</defs>

<rect x="0" y="0" width="560" height="280" fill="#FBFAF6"/>
<text x="280" y="28" text-anchor="middle" class="ti" fill="#2E2972">小对象分配，优先走上层快路径</text>

<rect x="120" y="50" width="320" height="56" rx="11" fill="url(#gG)" stroke="#BFD8C4" filter="url(#sh)"/>
<text x="280" y="72" text-anchor="middle" class="h" fill="#2F6B43">第 2 层　对象级 free list</text>
<text x="280" y="92" text-anchor="middle" class="d" fill="#3C5C46">float / tuple / frame 等高频类型的缓存（最快）</text>

<rect x="120" y="116" width="320" height="56" rx="11" fill="url(#gP)" stroke="#CCC7F1" filter="url(#sh)"/>
<text x="280" y="138" text-anchor="middle" class="h" fill="#2E2972">第 1 层　pymalloc</text>
<text x="280" y="158" text-anchor="middle" class="d" fill="#46453F">小对象（≤512 字节）专用分配器　← 本章主角</text>

<rect x="120" y="182" width="320" height="56" rx="11" fill="url(#gN)" stroke="#D8D3C6" filter="url(#sh)"/>
<text x="280" y="204" text-anchor="middle" class="h" fill="#33322E">第 0 层　系统 malloc</text>
<text x="280" y="224" text-anchor="middle" class="d" fill="#9A988F">兜底：大块内存、arena 都向它要</text>

<path d="M105,78 C90,78 90,144 105,144" fill="none" stroke="#8E8B80" stroke-width="1.4" marker-end="url(#ah)"/>
<path d="M105,144 C90,144 90,210 105,210" fill="none" stroke="#8E8B80" stroke-width="1.4" marker-end="url(#ah)"/>
<text x="64" y="148" text-anchor="middle" class="d" fill="#9A988F">未命中</text>
<text x="64" y="162" text-anchor="middle" class="d" fill="#9A988F">才下沉</text>

<text x="280" y="266" text-anchor="middle" class="d" fill="#9A988F">越靠上越快；绝大多数小对象停在上两层，不碰系统调用</text>
</svg>
