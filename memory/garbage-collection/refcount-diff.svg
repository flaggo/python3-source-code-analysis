<svg width="100%" viewBox="0 0 640 250" xmlns="http://www.w3.org/2000/svg" role="img" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'PingFang SC','Microsoft YaHei',sans-serif">
<title>引用计数差值：减掉内部引用，剩下外部引用</title>
<desc>判断对象是否从外部不可达，用引用计数做减法。一个对象的真实计数等于指向它的所有引用数，一部分来自垃圾候选集合内部，一部分来自集合外部即真正的根。第一步 update_refs 把 ob_refcnt 抄一份到 GC 头的 gc_refs，作为可随意涂改的工作副本，不破坏真实计数。第二步 subtract_refs 遍历每个候选对象，让它通过 tp_traverse 招出引用了谁，每招出一个集合内对象就把那对象的 gc_refs 减一。减完后 gc_refs 等于来自集合外部的引用数，大于 0 说明外部够得着不是垃圾，等于 0 说明引用全来自内部疑似垃圾。</desc>
<defs>
  <style>
    .ti{font-size:13px;font-weight:600;}
    .h{font-size:11px;font-weight:600;}
    .d{font-size:9.5px;}
    .c{font-size:10px;font-family:'SF Mono','JetBrains Mono',ui-monospace,Consolas,monospace;}
  </style>
  <filter id="sh" x="-30%" y="-30%" width="160%" height="160%"><feDropShadow dx="0" dy="1.4" stdDeviation="2" flood-color="#2A2A28" flood-opacity="0.12"/></filter>
  <linearGradient id="gP" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#F3F1FD"/><stop offset="1" stop-color="#E9E6FB"/></linearGradient>
  <linearGradient id="gB" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#EFF3FA"/><stop offset="1" stop-color="#E0E9F6"/></linearGradient>
  <linearGradient id="gG" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#EDF4EE"/><stop offset="1" stop-color="#DDEBE0"/></linearGradient>
  <marker id="ah" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#8E8B80" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></marker>
</defs>

<rect x="0" y="0" width="640" height="250" fill="#FBFAF6"/>
<text x="320" y="26" text-anchor="middle" class="ti" fill="#2E2972">gc_refs = 真实计数 − 内部引用 = 外部引用</text>

<rect x="24" y="58" width="180" height="120" rx="11" fill="url(#gB)" stroke="#C3D2E8" filter="url(#sh)"/>
<text x="114" y="80" text-anchor="middle" class="h" fill="#28415F">① update_refs</text>
<text x="114" y="104" text-anchor="middle" class="c" fill="#28415F">gc_refs = ob_refcnt</text>
<text x="114" y="128" text-anchor="middle" class="d" fill="#46453F">抄一份工作副本</text>
<text x="114" y="146" text-anchor="middle" class="d" fill="#9A988F">不动真实计数</text>
<text x="114" y="166" text-anchor="middle" class="d" fill="#9A988F">（在 GC 头里）</text>

<rect x="230" y="58" width="180" height="120" rx="11" fill="url(#gP)" stroke="#CCC7F1" filter="url(#sh)"/>
<text x="320" y="80" text-anchor="middle" class="h" fill="#2E2972">② subtract_refs</text>
<text x="320" y="104" text-anchor="middle" class="d" fill="#46453F">遍历每个对象的引用</text>
<text x="320" y="126" text-anchor="middle" class="d" fill="#46453F">指向的集合内对象</text>
<text x="320" y="148" text-anchor="middle" class="c" fill="#2E2972">gc_refs --</text>
<text x="320" y="166" text-anchor="middle" class="d" fill="#9A988F">减掉所有内部引用</text>

<rect x="436" y="58" width="180" height="120" rx="11" fill="url(#gG)" stroke="#BFD8C4" filter="url(#sh)"/>
<text x="526" y="80" text-anchor="middle" class="h" fill="#2F6B43">③ 判定</text>
<text x="526" y="106" text-anchor="middle" class="c" fill="#2F6B43">gc_refs &gt; 0</text>
<text x="526" y="122" text-anchor="middle" class="d" fill="#3C5C46">外部可达，留</text>
<text x="526" y="148" text-anchor="middle" class="c" fill="#9A4A2F">gc_refs == 0</text>
<text x="526" y="164" text-anchor="middle" class="d" fill="#9A4A2F">全是内部引用，疑似垃圾</text>

<path d="M204,118 H228" fill="none" stroke="#8E8B80" stroke-width="1.6" marker-end="url(#ah)"/>
<path d="M410,118 H434" fill="none" stroke="#8E8B80" stroke-width="1.6" marker-end="url(#ah)"/>

<text x="320" y="208" text-anchor="middle" class="d" fill="#9A988F">不需要枚举根 —— 用引用计数做减法，就能算出「外部引用数」</text>
</svg>
