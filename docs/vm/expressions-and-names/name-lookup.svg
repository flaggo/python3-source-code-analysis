<svg width="100%" viewBox="0 0 700 250" xmlns="http://www.w3.org/2000/svg" role="img" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'PingFang SC','Microsoft YaHei',sans-serif">
<title>LOAD_NAME 与 LOAD_GLOBAL 的运行期字典查找</title>
<desc>LOAD_NAME 在运行期依次查三个名字空间字典：先查局部 f_locals，没有就查全局 f_globals，再没有就查内建 f_builtins，三处都没有才报 NameError。LOAD_GLOBAL 则跳过局部、从全局这一步开始查（全局 → 内建）。与 LOAD_FAST 的一次数组索引相比，它们都要做字典查找，所以更慢。</desc>
<defs>
  <style>
    .ti{font-size:12.5px;font-weight:600;}
    .h{font-size:11.5px;font-weight:600;}
    .c{font-size:10.5px;font-family:'SF Mono','JetBrains Mono',ui-monospace,Consolas,monospace;}
    .d{font-size:10px;}
  </style>
  <filter id="sh" x="-30%" y="-30%" width="160%" height="160%"><feDropShadow dx="0" dy="1.4" stdDeviation="2" flood-color="#2A2A28" flood-opacity="0.12"/></filter>
  <linearGradient id="gP" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#F3F1FD"/><stop offset="1" stop-color="#E9E6FB"/></linearGradient>
  <linearGradient id="gB" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#EFF3FA"/><stop offset="1" stop-color="#E0E9F6"/></linearGradient>
  <linearGradient id="gN" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#F1EFE8"/><stop offset="1" stop-color="#E7E4DA"/></linearGradient>
  <linearGradient id="gG" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#E9F6F1"/><stop offset="1" stop-color="#DBF0E7"/></linearGradient>
  <marker id="ah" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#8E8B80" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></marker>
  <marker id="ahg" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#1E8B6F" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></marker>
</defs>

<rect x="0" y="0" width="700" height="250" fill="#FBFAF6"/>
<text x="350" y="26" text-anchor="middle" class="ti" fill="#2E2972">运行期查名字空间：依次查字典，查不到才报错</text>

<!-- three dict boxes -->
<rect x="70" y="92" width="150" height="70" rx="10" fill="url(#gP)" stroke="#CCC7F1" stroke-width="1.1" filter="url(#sh)"/>
<text x="145" y="116" text-anchor="middle" class="h" fill="#2E2972">① 局部 f_locals</text>
<text x="145" y="136" text-anchor="middle" class="c" fill="#6A63B0">{ ... }</text>
<text x="145" y="152" text-anchor="middle" class="d" fill="#9A988F">没有 →</text>

<rect x="275" y="92" width="150" height="70" rx="10" fill="url(#gB)" stroke="#C3D2E8" stroke-width="1.1" filter="url(#sh)"/>
<text x="350" y="116" text-anchor="middle" class="h" fill="#28415F">② 全局 f_globals</text>
<text x="350" y="136" text-anchor="middle" class="c" fill="#4A5E80">{ ... }</text>
<text x="350" y="152" text-anchor="middle" class="d" fill="#9A988F">没有 →</text>

<rect x="480" y="92" width="150" height="70" rx="10" fill="url(#gN)" stroke="#D8D3C6" stroke-width="1.1" filter="url(#sh)"/>
<text x="555" y="116" text-anchor="middle" class="h" fill="#46453F">③ 内建 f_builtins</text>
<text x="555" y="136" text-anchor="middle" class="c" fill="#8A887E">len, print …</text>
<text x="555" y="152" text-anchor="middle" class="d" fill="#0A463A">命中 ✓</text>

<g fill="none" stroke="#8E8B80" stroke-width="1.6" marker-end="url(#ah)">
  <path d="M220,127 H273"/><path d="M425,127 H478"/>
</g>

<!-- LOAD_NAME entry (from left, into box 1) -->
<rect x="20" y="104" width="44" height="46" rx="8" fill="#FFFFFF" stroke="#CCC7F1"/>
<text x="42" y="122" text-anchor="middle" class="d" fill="#2E2972">LOAD</text><text x="42" y="135" text-anchor="middle" class="d" fill="#2E2972">_NAME</text>
<path d="M30,158 C30,180 145,180 145,164" fill="none" stroke="#6A63B0" stroke-width="1.5" marker-end="url(#ah)"/>
<text x="88" y="196" text-anchor="middle" class="d" fill="#6A63B0">从①开始查</text>

<!-- LOAD_GLOBAL entry (into box 2) -->
<rect x="248" y="40" width="60" height="30" rx="8" fill="#FFFFFF" stroke="#C3D2E8"/>
<text x="278" y="59" text-anchor="middle" class="d" fill="#28415F">LOAD_GLOBAL</text>
<path d="M300,70 C320,76 335,82 348,90" fill="none" stroke="#4A5E80" stroke-width="1.5" marker-end="url(#ah)"/>
<text x="356" y="62" text-anchor="middle" class="d" fill="#4A5E80">跳过局部，从②开始</text>

<!-- result -->
<path d="M555,162 V184" fill="none" stroke="#1E8B6F" stroke-width="1.6" marker-end="url(#ahg)"/>
<text x="555" y="200" text-anchor="middle" class="d" fill="#0A463A">压入栈</text>

<text x="350" y="230" text-anchor="middle" class="d" fill="#9A988F">三处都没有 → NameError；相比 LOAD_FAST 的一次数组索引，查字典更慢</text>
</svg>
