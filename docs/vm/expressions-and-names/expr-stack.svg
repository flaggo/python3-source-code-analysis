<svg width="100%" viewBox="0 0 700 300" xmlns="http://www.w3.org/2000/svg" role="img" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'PingFang SC','Microsoft YaHei',sans-serif">
<title>a + b * c 在求值栈上的执行（设 a=1, b=2, c=3）</title>
<desc>表达式 a + b * c 编译成：依次 LOAD_FAST 压入 a、b、c，再 BINARY_MULTIPLY 把栈顶的 b、c 弹出相乘压回，最后 BINARY_ADD 把 a 和乘积相加。乘法先于加法发生，正是因为编译器按语法树结构把乘法指令排在了前面——运算优先级在编译期就固化进了字节码顺序。</desc>
<defs>
  <style>
    .ti{font-size:12.5px;font-weight:600;}
    .ins{font-size:10px;font-weight:600;font-family:'SF Mono','JetBrains Mono',ui-monospace,Consolas,monospace;}
    .v{font-size:12px;font-weight:600;font-family:'SF Mono','JetBrains Mono',ui-monospace,Consolas,monospace;}
    .d{font-size:9.5px;}
  </style>
  <filter id="sh" x="-30%" y="-30%" width="160%" height="160%"><feDropShadow dx="0" dy="1.4" stdDeviation="2" flood-color="#2A2A28" flood-opacity="0.12"/></filter>
  <linearGradient id="gG" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#E9F6F1"/><stop offset="1" stop-color="#DBF0E7"/></linearGradient>
  <linearGradient id="gA" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#FAEFD9"/><stop offset="1" stop-color="#F4E6C8"/></linearGradient>
  <marker id="ah" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#8E8B80" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></marker>
</defs>

<rect x="0" y="0" width="700" height="300" fill="#FBFAF6"/>
<text x="350" y="24" text-anchor="middle" class="ti" fill="#0A463A">a + b * c 在栈上求值 （设 a=1, b=2, c=3）</text>

<!-- arrows between 5 columns -->
<g fill="none" stroke="#8E8B80" stroke-width="1.5" marker-end="url(#ah)">
  <path d="M120,170 H140"/><path d="M250,170 H270"/><path d="M380,170 H400"/><path d="M510,170 H530"/>
</g>

<!-- col1 LOAD a -> [1] -->
<text x="70" y="58" text-anchor="middle" class="ins" fill="#5C3C08">LOAD_FAST a</text>
<rect x="34" y="120" width="72" height="100" rx="6" fill="#FFFFFF" stroke="#CFCABA"/>
<rect x="38" y="182" width="64" height="34" rx="5" fill="url(#gG)" stroke="#A8DCC9"/><text x="70" y="205" text-anchor="middle" class="v" fill="#0A463A">1</text>
<text x="70" y="238" text-anchor="middle" class="d" fill="#9A988F">压 a=1</text>

<!-- col2 LOAD b -> [1,2] -->
<text x="200" y="58" text-anchor="middle" class="ins" fill="#5C3C08">LOAD_FAST b</text>
<rect x="164" y="120" width="72" height="100" rx="6" fill="#FFFFFF" stroke="#CFCABA"/>
<rect x="168" y="182" width="64" height="34" rx="5" fill="url(#gG)" stroke="#A8DCC9"/><text x="200" y="205" text-anchor="middle" class="v" fill="#0A463A">1</text>
<rect x="168" y="146" width="64" height="34" rx="5" fill="url(#gG)" stroke="#A8DCC9"/><text x="200" y="169" text-anchor="middle" class="v" fill="#0A463A">2</text>
<text x="200" y="238" text-anchor="middle" class="d" fill="#9A988F">压 b=2</text>

<!-- col3 LOAD c -> [1,2,3] -->
<text x="330" y="58" text-anchor="middle" class="ins" fill="#5C3C08">LOAD_FAST c</text>
<rect x="294" y="120" width="72" height="100" rx="6" fill="#FFFFFF" stroke="#CFCABA"/>
<rect x="298" y="182" width="64" height="34" rx="5" fill="url(#gG)" stroke="#A8DCC9"/><text x="330" y="205" text-anchor="middle" class="v" fill="#0A463A">1</text>
<rect x="298" y="146" width="64" height="34" rx="5" fill="url(#gG)" stroke="#A8DCC9"/><text x="330" y="169" text-anchor="middle" class="v" fill="#0A463A">2</text>
<rect x="298" y="110" width="64" height="34" rx="5" fill="url(#gG)" stroke="#A8DCC9"/><text x="330" y="133" text-anchor="middle" class="v" fill="#0A463A">3</text>
<text x="330" y="238" text-anchor="middle" class="d" fill="#9A988F">压 c=3</text>

<!-- col4 BINARY_MULTIPLY -> [1,6] -->
<text x="460" y="58" text-anchor="middle" class="ins" fill="#5C3C08">BINARY_MULTIPLY</text>
<rect x="424" y="120" width="72" height="100" rx="6" fill="#FFFFFF" stroke="#CFCABA"/>
<rect x="428" y="182" width="64" height="34" rx="5" fill="url(#gG)" stroke="#A8DCC9"/><text x="460" y="205" text-anchor="middle" class="v" fill="#0A463A">1</text>
<rect x="428" y="146" width="64" height="34" rx="5" fill="url(#gA)" stroke="#E8CB94"/><text x="460" y="169" text-anchor="middle" class="v" fill="#5C3C08">6</text>
<text x="460" y="238" text-anchor="middle" class="d" fill="#9A988F">2·3 → 6</text>

<!-- col5 BINARY_ADD -> [7] -->
<text x="590" y="58" text-anchor="middle" class="ins" fill="#5C3C08">BINARY_ADD</text>
<rect x="554" y="120" width="72" height="100" rx="6" fill="#FFFFFF" stroke="#CFCABA"/>
<rect x="558" y="182" width="64" height="34" rx="5" fill="url(#gA)" stroke="#E8CB94"/><text x="590" y="205" text-anchor="middle" class="v" fill="#5C3C08">7</text>
<text x="590" y="238" text-anchor="middle" class="d" fill="#9A988F">1+6 → 7</text>

<text x="350" y="270" text-anchor="middle" class="d" fill="#9A988F" font-size="10.5px">乘法排在加法之前执行——优先级在编译期就固化进了字节码的顺序</text>
</svg>
