<svg width="100%" viewBox="0 0 700 240" xmlns="http://www.w3.org/2000/svg" role="img" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'PingFang SC','Microsoft YaHei',sans-serif">
<title>BUILD_LIST 3：把栈顶三个值打包成列表</title>
<desc>构建容器也是栈式套路。执行 [a, b, c] 时，先依次把 a、b、c 压入求值栈，再用 BUILD_LIST 3 把栈顶的三个值弹出、打包成一个列表对象，最后把这个列表压回栈顶。参数 3 就是元素个数。</desc>
<defs>
  <style>
    .ti{font-size:12.5px;font-weight:600;}
    .h{font-size:11px;font-weight:600;}
    .c{font-size:11px;font-family:'SF Mono','JetBrains Mono',ui-monospace,Consolas,monospace;}
    .v{font-size:12px;font-weight:600;font-family:'SF Mono','JetBrains Mono',ui-monospace,Consolas,monospace;}
    .d{font-size:10px;}
  </style>
  <filter id="sh" x="-30%" y="-30%" width="160%" height="160%"><feDropShadow dx="0" dy="1.4" stdDeviation="2" flood-color="#2A2A28" flood-opacity="0.12"/></filter>
  <linearGradient id="gG" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#E9F6F1"/><stop offset="1" stop-color="#DBF0E7"/></linearGradient>
  <linearGradient id="gB" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#EFF3FA"/><stop offset="1" stop-color="#E0E9F6"/></linearGradient>
  <linearGradient id="gA" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#FAEFD9"/><stop offset="1" stop-color="#F4E6C8"/></linearGradient>
  <marker id="ah" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#8E8B80" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></marker>
</defs>

<rect x="0" y="0" width="700" height="240" fill="#FBFAF6"/>
<text x="350" y="26" text-anchor="middle" class="ti" fill="#0A463A">BUILD_LIST 3：把栈顶三个值打包成列表（源码 [a, b, c]）</text>

<!-- before stack -->
<text x="120" y="62" text-anchor="middle" class="h" fill="#0A463A">栈：已压入 a、b、c</text>
<rect x="74" y="74" width="92" height="118" rx="6" fill="#FFFFFF" stroke="#CFCABA"/>
<rect x="78" y="152" width="84" height="36" rx="5" fill="url(#gG)" stroke="#A8DCC9"/><text x="120" y="176" text-anchor="middle" class="v" fill="#0A463A">a</text>
<rect x="78" y="116" width="84" height="36" rx="5" fill="url(#gG)" stroke="#A8DCC9"/><text x="120" y="140" text-anchor="middle" class="v" fill="#0A463A">b</text>
<rect x="78" y="80" width="84" height="36" rx="5" fill="url(#gG)" stroke="#A8DCC9"/><text x="120" y="104" text-anchor="middle" class="v" fill="#0A463A">c</text>

<!-- instruction -->
<rect x="250" y="108" width="180" height="50" rx="10" fill="url(#gA)" stroke="#E8CB94" filter="url(#sh)"/>
<text x="340" y="129" text-anchor="middle" class="c" fill="#5C3C08">BUILD_LIST 3</text>
<text x="340" y="146" text-anchor="middle" class="d" fill="#8A6A1E">弹出 3 个，打包成列表</text>
<path d="M166,133 H248" fill="none" stroke="#8E8B80" stroke-width="1.6" marker-end="url(#ah)"/>
<path d="M430,133 H512" fill="none" stroke="#8E8B80" stroke-width="1.6" marker-end="url(#ah)"/>

<!-- after stack: list pushed -->
<text x="600" y="62" text-anchor="middle" class="h" fill="#0A463A">栈：列表压回栈顶</text>
<rect x="540" y="74" width="120" height="118" rx="6" fill="#FFFFFF" stroke="#CFCABA"/>
<rect x="548" y="114" width="104" height="40" rx="6" fill="url(#gB)" stroke="#C3D2E8"/><text x="600" y="139" text-anchor="middle" class="v" fill="#28415F">[a, b, c]</text>
<text x="600" y="176" text-anchor="middle" class="d" fill="#9A988F">一个 list 对象</text>

<text x="350" y="216" text-anchor="middle" class="d" fill="#9A988F">参数 3 = 元素个数；BUILD_TUPLE、BUILD_MAP 等都是同一套「弹出 → 打包 → 压回」</text>
</svg>
