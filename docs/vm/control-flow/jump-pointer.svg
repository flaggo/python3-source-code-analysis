<svg width="100%" viewBox="0 0 700 250" xmlns="http://www.w3.org/2000/svg" role="img" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'PingFang SC','Microsoft YaHei',sans-serif">
<title>跳转指令改写 next_instr，决定下一条取哪条</title>
<desc>求值循环正常情况下顺序前进：取完一条指令，指令指针 next_instr 自动指向下一条。跳转指令打破这个顺序——JUMP_ABSOLUTE 用 JUMPTO 把 next_instr 直接改写成某个目标偏移，于是循环下一轮就从那里取指令。条件跳转 POP_JUMP_IF_FALSE 则按栈顶真假决定要不要改写。所有分支与循环都建立在「改写 next_instr」这一个动作上。</desc>
<defs>
  <style>
    .ti{font-size:12.5px;font-weight:600;}
    .c{font-size:11px;font-family:'SF Mono','JetBrains Mono',ui-monospace,Consolas,monospace;}
    .d{font-size:10px;}
    .h{font-size:11px;font-weight:600;}
  </style>
  <filter id="sh" x="-30%" y="-30%" width="160%" height="160%"><feDropShadow dx="0" dy="1.4" stdDeviation="2" flood-color="#2A2A28" flood-opacity="0.12"/></filter>
  <linearGradient id="gN" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#F1EFE8"/><stop offset="1" stop-color="#E7E4DA"/></linearGradient>
  <linearGradient id="gB" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#EFF3FA"/><stop offset="1" stop-color="#E0E9F6"/></linearGradient>
  <linearGradient id="gP" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#F3F1FD"/><stop offset="1" stop-color="#E9E6FB"/></linearGradient>
  <marker id="ah" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#8E8B80" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker>
  <marker id="ahp" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#6A63B0" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></marker>
</defs>

<rect x="0" y="0" width="700" height="250" fill="#FBFAF6"/>
<text x="350" y="28" text-anchor="middle" class="ti" fill="#2E2972">跳转 = 改写指令指针 next_instr</text>

<!-- bytecode column -->
<g class="c">
  <rect x="250" y="50" width="200" height="30" rx="6" fill="url(#gN)" stroke="#D8D3C6"/><text x="262" y="70" fill="#33322E">0  LOAD_FAST x</text>
  <rect x="250" y="84" width="200" height="30" rx="6" fill="url(#gN)" stroke="#D8D3C6"/><text x="262" y="104" fill="#33322E">2  POP_JUMP_IF_FALSE 8</text>
  <rect x="250" y="118" width="200" height="30" rx="6" fill="url(#gB)" stroke="#C3D2E8"/><text x="262" y="138" fill="#28415F">4  LOAD_CONST 1</text>
  <rect x="250" y="152" width="200" height="30" rx="6" fill="url(#gB)" stroke="#C3D2E8"/><text x="262" y="172" fill="#28415F">6  JUMP_ABSOLUTE 10</text>
  <rect x="250" y="186" width="200" height="30" rx="6" fill="url(#gP)" stroke="#CCC7F1"/><text x="262" y="206" fill="#2E2972">8  LOAD_CONST 2</text>
</g>

<!-- sequential advance arrows -->
<g fill="none" stroke="#8E8B80" stroke-width="1.5" marker-end="url(#ah)">
  <path d="M240,65 H248"/>
</g>
<text x="150" y="62" text-anchor="middle" class="h" fill="#46453F">顺序前进</text>
<text x="150" y="78" text-anchor="middle" class="d" fill="#9A988F">next_instr += 1</text>
<path d="M200,84 V112 H248" fill="none" stroke="#C0BDB4" stroke-width="1.3" stroke-dasharray="3 3" marker-end="url(#ah)"/>

<!-- jump arrow: JUMP_ABSOLUTE 10 / POP_JUMP_IF_FALSE 8 -->
<path d="M450,167 C520,167 520,201 452,201" fill="none" stroke="#6A63B0" stroke-width="1.8" marker-end="url(#ahp)"/>
<text x="560" y="150" text-anchor="middle" class="h" fill="#2E2972">跳转：改写 next_instr</text>
<text x="560" y="167" text-anchor="middle" class="d" fill="#6A63B0">JUMPTO(目标偏移)</text>
<text x="560" y="183" text-anchor="middle" class="d" fill="#6A63B0">下一轮从那里取</text>

<!-- POP_JUMP false branch -->
<path d="M450,99 C610,99 610,201 452,201" fill="none" stroke="#6A63B0" stroke-width="1.5" stroke-dasharray="5 4" marker-end="url(#ahp)"/>
<text x="650" y="120" text-anchor="middle" class="d" fill="#6A63B0">假→跳 8</text>

<text x="350" y="240" text-anchor="middle" class="d" fill="#9A988F">分支、循环、break 全都归结到这一个动作：改写「下一条取哪条」</text>
</svg>
