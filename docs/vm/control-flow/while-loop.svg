<svg width="100%" viewBox="0 0 700 280" xmlns="http://www.w3.org/2000/svg" role="img" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'PingFang SC','Microsoft YaHei',sans-serif">
<title>while 循环：靠往回跳形成循环</title>
<desc>while x > 0: x -= 1 编译成一个回跳结构。循环顶部先判断条件，POP_JUMP_IF_FALSE 在条件为假时跳出循环；条件为真则执行循环体，循环体末尾用 JUMP_ABSOLUTE 跳回顶部重新判断。循环就是「条件跳转 + 往回跳」两者配合的结果。</desc>
<defs>
  <style>
    .ti{font-size:12.5px;font-weight:600;}
    .c{font-size:10.5px;font-family:'SF Mono','JetBrains Mono',ui-monospace,Consolas,monospace;}
    .h{font-size:11px;font-weight:600;}
    .d{font-size:10px;}
  </style>
  <filter id="sh" x="-30%" y="-30%" width="160%" height="160%"><feDropShadow dx="0" dy="1.4" stdDeviation="2" flood-color="#2A2A28" flood-opacity="0.12"/></filter>
  <linearGradient id="gN" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#F1EFE8"/><stop offset="1" stop-color="#E7E4DA"/></linearGradient>
  <linearGradient id="gG" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#E9F6F1"/><stop offset="1" stop-color="#DBF0E7"/></linearGradient>
  <linearGradient id="gR" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#F8EEEE"/><stop offset="1" stop-color="#F1E1E1"/></linearGradient>
  <marker id="ahg" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#1E8B6F" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></marker>
  <marker id="ahr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#B07575" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></marker>
  <marker id="ahp" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#6A63B0" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></marker>
  <marker id="ah" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#8E8B80" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker>
</defs>

<rect x="0" y="0" width="700" height="280" fill="#FBFAF6"/>
<text x="350" y="26" text-anchor="middle" class="ti" fill="#2E2972">while x &gt; 0: x -= 1</text>

<!-- condition at top -->
<rect x="190" y="58" width="220" height="46" rx="10" fill="url(#gN)" stroke="#D8D3C6" filter="url(#sh)"/>
<text x="300" y="78" text-anchor="middle" class="h" fill="#33322E">判断条件 x &gt; 0</text>
<text x="300" y="95" text-anchor="middle" class="c" fill="#7B7A72">&gt;&gt; (回跳目标)  COMPARE_OP</text>

<!-- POP_JUMP_IF_FALSE -->
<rect x="190" y="118" width="220" height="42" rx="10" fill="#FFFFFF" stroke="#CFCABA" stroke-width="1.2" filter="url(#sh)"/>
<text x="300" y="144" text-anchor="middle" class="c" fill="#46453F">POP_JUMP_IF_FALSE （跳出）</text>
<path d="M300,104 V116" fill="none" stroke="#8E8B80" stroke-width="1.5" marker-end="url(#ah)"/>

<!-- body -->
<rect x="190" y="178" width="220" height="46" rx="10" fill="url(#gG)" stroke="#A8DCC9" filter="url(#sh)"/>
<text x="300" y="198" text-anchor="middle" class="h" fill="#0A463A">循环体：x -= 1</text>
<text x="300" y="215" text-anchor="middle" class="c" fill="#0C5945">真 → 执行</text>
<path d="M300,160 V176" fill="none" stroke="#1E8B6F" stroke-width="1.6" marker-end="url(#ahg)"/>

<!-- JUMP_ABSOLUTE back to top -->
<path d="M190,201 C90,201 90,81 188,81" fill="none" stroke="#6A63B0" stroke-width="1.9" marker-end="url(#ahp)"/>
<text x="84" y="144" text-anchor="middle" class="h" fill="#2E2972" transform="rotate(-90 84 144)">JUMP_ABSOLUTE 回跳</text>

<!-- exit on false -->
<path d="M410,139 C520,139 520,180 540,180" fill="none" stroke="#B07575" stroke-width="1.7" marker-end="url(#ahr)"/>
<rect x="486" y="158" width="170" height="44" rx="10" fill="url(#gR)" stroke="#E0C6C6" filter="url(#sh)"/>
<text x="571" y="178" text-anchor="middle" class="h" fill="#5C3030">假 → 跳出循环</text>
<text x="571" y="195" text-anchor="middle" class="c" fill="#7A3B3B">POP_BLOCK 后继续</text>

<text x="350" y="258" text-anchor="middle" class="d" fill="#9A988F">循环 = 条件跳转（决定要不要继续）+ JUMP_ABSOLUTE 往回跳（重新来一轮）</text>
</svg>
