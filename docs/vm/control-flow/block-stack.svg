<svg width="100%" viewBox="0 0 700 270" xmlns="http://www.w3.org/2000/svg" role="img" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'PingFang SC','Microsoft YaHei',sans-serif">
<title>block 栈：SETUP_LOOP 与 break / continue（Python 3.7）</title>
<desc>3.7 里循环用帧的 block 栈来记账。进入循环时 SETUP_LOOP 压一个块，记下循环结束的偏移和当前栈深度。break 不必静态知道循环出口在哪——它顺着 block 栈找到这个块、跳到记录的结束偏移；continue 则跳回循环顶部。循环正常结束时 POP_BLOCK 弹出这个块。</desc>
<defs>
  <style>
    .ti{font-size:12.5px;font-weight:600;}
    .c{font-size:10.5px;font-family:'SF Mono','JetBrains Mono',ui-monospace,Consolas,monospace;}
    .h{font-size:11px;font-weight:600;}
    .d{font-size:10px;}
  </style>
  <filter id="sh" x="-30%" y="-30%" width="160%" height="160%"><feDropShadow dx="0" dy="1.4" stdDeviation="2" flood-color="#2A2A28" flood-opacity="0.12"/></filter>
  <linearGradient id="gP" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#F3F1FD"/><stop offset="1" stop-color="#E9E6FB"/></linearGradient>
  <linearGradient id="gR" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#F8EEEE"/><stop offset="1" stop-color="#F1E1E1"/></linearGradient>
  <linearGradient id="gN" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#F1EFE8"/><stop offset="1" stop-color="#E7E4DA"/></linearGradient>
  <marker id="ah" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#8E8B80" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker>
  <marker id="ahr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#B07575" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></marker>
</defs>

<rect x="0" y="0" width="700" height="270" fill="#FBFAF6"/>
<text x="350" y="26" text-anchor="middle" class="ti" fill="#2E2972">block 栈：break / continue 怎么找到出口（3.7）</text>

<!-- frame's block stack -->
<text x="160" y="62" text-anchor="middle" class="h" fill="#2E2972">帧的 f_blockstack</text>
<rect x="56" y="74" width="208" height="86" rx="10" fill="url(#gP)" stroke="#CCC7F1" stroke-width="1.2" filter="url(#sh)"/>
<text x="160" y="96" text-anchor="middle" class="c" fill="#2E2972">循环块（SETUP_LOOP 压入）</text>
<text x="72" y="118" class="d" fill="#4A4396">b_type   = SETUP_LOOP</text>
<text x="72" y="136" class="d" fill="#4A4396">b_handler = 循环结束偏移</text>
<text x="72" y="153" class="d" fill="#4A4396">b_level   = 入栈时的栈深度</text>

<!-- SETUP_LOOP / POP_BLOCK labels -->
<path d="M160,74 V52 H300" fill="none" stroke="#8E8B80" stroke-width="1.4" marker-end="url(#ah)" transform="translate(0,0)"/>
<text x="350" y="50" class="c" fill="#46453F">SETUP_LOOP：进入循环时压入</text>
<path d="M264,150 H300" fill="none" stroke="#8E8B80" stroke-width="1.4" marker-end="url(#ah)"/>
<text x="304" y="154" class="c" fill="#46453F">POP_BLOCK：正常结束时弹出</text>

<!-- break -->
<rect x="430" y="92" width="230" height="64" rx="10" fill="url(#gR)" stroke="#E0C6C6" stroke-width="1.1" filter="url(#sh)"/>
<text x="545" y="113" text-anchor="middle" class="h" fill="#5C3030">break → BREAK_LOOP</text>
<text x="545" y="132" text-anchor="middle" class="d" fill="#7A3B3B">顺着 block 栈找到循环块，</text>
<text x="545" y="148" text-anchor="middle" class="d" fill="#7A3B3B">跳到它记录的「结束偏移」</text>
<path d="M430,124 C360,124 320,128 268,132" fill="none" stroke="#B07575" stroke-width="1.7" marker-end="url(#ahr)"/>

<!-- continue note -->
<rect x="430" y="172" width="230" height="42" rx="10" fill="url(#gN)" stroke="#D8D3C6" stroke-width="1.1" filter="url(#sh)"/>
<text x="545" y="192" text-anchor="middle" class="h" fill="#46453F">continue → 跳回循环顶部</text>
<text x="545" y="208" text-anchor="middle" class="d" fill="#8A887E">重新判断条件 / 取下一项</text>

<text x="350" y="246" text-anchor="middle" class="d" fill="#9A988F">好处：break 无需在编译期算出循环出口的绝对地址，运行期顺着 block 栈即可找到</text>
<text x="350" y="262" text-anchor="middle" class="d" fill="#9A988F">（3.8 起改用零开销异常表，SETUP_LOOP 被移除，但思路一脉相承）</text>
</svg>
