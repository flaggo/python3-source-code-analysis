<svg width="100%" viewBox="0 0 700 300" xmlns="http://www.w3.org/2000/svg" role="img" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'PingFang SC','Microsoft YaHei',sans-serif">
<title>for 循环靠迭代器协议：GET_ITER 与 FOR_ITER</title>
<desc>for x in seq 不直接遍历容器，而是走迭代器协议。GET_ITER 先对可迭代对象调用 iter() 得到一个迭代器，放在栈上。然后 FOR_ITER 反复对迭代器调用 next()：拿到值就压栈、交给循环体；某次 next() 抛出 StopIteration 就跳出循环。所以 for 本质是「先 iter，再不断 next 直到 StopIteration」。</desc>
<defs>
  <style>
    .ti{font-size:12.5px;font-weight:600;}
    .c{font-size:10.5px;font-family:'SF Mono','JetBrains Mono',ui-monospace,Consolas,monospace;}
    .h{font-size:11px;font-weight:600;}
    .d{font-size:10px;}
  </style>
  <filter id="sh" x="-30%" y="-30%" width="160%" height="160%"><feDropShadow dx="0" dy="1.4" stdDeviation="2" flood-color="#2A2A28" flood-opacity="0.12"/></filter>
  <linearGradient id="gA" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#FAEFD9"/><stop offset="1" stop-color="#F4E6C8"/></linearGradient>
  <linearGradient id="gB" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#EFF3FA"/><stop offset="1" stop-color="#E0E9F6"/></linearGradient>
  <linearGradient id="gG" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#E9F6F1"/><stop offset="1" stop-color="#DBF0E7"/></linearGradient>
  <linearGradient id="gR" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#F8EEEE"/><stop offset="1" stop-color="#F1E1E1"/></linearGradient>
  <marker id="ahg" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#1E8B6F" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></marker>
  <marker id="ahr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#B07575" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></marker>
  <marker id="ahp" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#6A63B0" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></marker>
  <marker id="ah" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#8E8B80" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker>
</defs>

<rect x="0" y="0" width="700" height="300" fill="#FBFAF6"/>
<text x="350" y="26" text-anchor="middle" class="ti" fill="#5C3C08">for x in seq：先 iter()，再不断 next()</text>

<!-- iterable -->
<rect x="40" y="60" width="130" height="46" rx="10" fill="url(#gB)" stroke="#C3D2E8" filter="url(#sh)"/>
<text x="105" y="80" text-anchor="middle" class="h" fill="#28415F">可迭代对象 seq</text>
<text x="105" y="97" text-anchor="middle" class="c" fill="#4A5E80">[1, 2, 3]</text>

<!-- GET_ITER -->
<path d="M170,83 H208" fill="none" stroke="#8E8B80" stroke-width="1.6" marker-end="url(#ah)"/>
<rect x="210" y="60" width="130" height="46" rx="10" fill="url(#gA)" stroke="#E8CB94" filter="url(#sh)"/>
<text x="275" y="80" text-anchor="middle" class="c" fill="#5C3C08">GET_ITER</text>
<text x="275" y="97" text-anchor="middle" class="d" fill="#8A6A1E">iter(seq) → 迭代器</text>

<!-- FOR_ITER -->
<path d="M340,83 H378" fill="none" stroke="#8E8B80" stroke-width="1.6" marker-end="url(#ah)"/>
<rect x="380" y="58" width="160" height="50" rx="10" fill="#FFFFFF" stroke="#CFCABA" stroke-width="1.3" filter="url(#sh)"/>
<text x="460" y="80" text-anchor="middle" class="c" fill="#46453F">FOR_ITER</text>
<text x="460" y="97" text-anchor="middle" class="d" fill="#9A988F">调用迭代器的 next()</text>

<!-- got value -> body -->
<path d="M460,108 V150" fill="none" stroke="#1E8B6F" stroke-width="1.7" marker-end="url(#ahg)"/>
<text x="540" y="132" text-anchor="middle" class="d" fill="#0A463A">拿到值 → 压栈给 x</text>
<rect x="370" y="154" width="180" height="50" rx="10" fill="url(#gG)" stroke="#A8DCC9" filter="url(#sh)"/>
<text x="460" y="174" text-anchor="middle" class="h" fill="#0A463A">循环体（用 x）</text>
<text x="460" y="191" text-anchor="middle" class="c" fill="#0C5945">STORE_FAST x; ...</text>

<!-- loop back to FOR_ITER -->
<path d="M370,179 C250,179 250,90 378,86" fill="none" stroke="#6A63B0" stroke-width="1.8" marker-end="url(#ahp)"/>
<text x="250" y="138" text-anchor="middle" class="h" fill="#2E2972" transform="rotate(-90 250 138)">JUMP_ABSOLUTE 回到 FOR_ITER</text>

<!-- StopIteration -> exit -->
<path d="M540,83 H600" fill="none" stroke="#B07575" stroke-width="1.7" marker-end="url(#ahr)"/>
<rect x="566" y="120" width="120" height="60" rx="10" fill="url(#gR)" stroke="#E0C6C6" filter="url(#sh)"/>
<text x="626" y="142" text-anchor="middle" class="h" fill="#5C3030">StopIteration</text>
<text x="626" y="160" text-anchor="middle" class="d" fill="#7A3B3B">→ 跳出循环</text>
<text x="626" y="174" text-anchor="middle" class="c" fill="#7A3B3B">JUMPBY 出口</text>
<path d="M626,108 V118" fill="none" stroke="#B07575" stroke-width="1.5" marker-end="url(#ahr)"/>

<text x="350" y="244" text-anchor="middle" class="d" fill="#9A988F">迭代器协议：__iter__ 给出迭代器，__next__ 逐个取值，耗尽时抛 StopIteration</text>
<text x="350" y="264" text-anchor="middle" class="d" fill="#9A988F">for 对一切可迭代对象（list、dict、文件、生成器…）都用这同一套机制</text>
</svg>
