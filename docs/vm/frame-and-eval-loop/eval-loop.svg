<svg width="100%" viewBox="0 0 700 300" xmlns="http://www.w3.org/2000/svg" role="img" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'PingFang SC','Microsoft YaHei',sans-serif">
<title>求值循环：取指令 → 派发 → 执行 → 再取指令</title>
<desc>虚拟机的核心是 ceval.c 里的求值循环。它周而复始地做三件事：先取出下一条字节码指令（NEXTOPARG 解出 opcode 与 oparg），再用一个巨大的 switch 按 opcode 跳转到对应分支，分支里执行该指令、操作求值栈，最后 DISPATCH 回到开头取下一条。如此一条接一条，直到遇到 RETURN_VALUE 返回。</desc>
<defs>
  <style>
    .ti{font-size:12.5px;font-weight:600;}
    .h{font-size:11.5px;font-weight:600;}
    .c{font-size:10.5px;font-family:'SF Mono','JetBrains Mono',ui-monospace,Consolas,monospace;}
    .d{font-size:10px;}
  </style>
  <filter id="sh" x="-30%" y="-30%" width="160%" height="160%"><feDropShadow dx="0" dy="1.4" stdDeviation="2" flood-color="#2A2A28" flood-opacity="0.12"/></filter>
  <linearGradient id="gB" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#EFF3FA"/><stop offset="1" stop-color="#E0E9F6"/></linearGradient>
  <linearGradient id="gP" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#F3F1FD"/><stop offset="1" stop-color="#E9E6FB"/></linearGradient>
  <linearGradient id="gG" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#E9F6F1"/><stop offset="1" stop-color="#DBF0E7"/></linearGradient>
  <linearGradient id="gR" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#F8EEEE"/><stop offset="1" stop-color="#F1E1E1"/></linearGradient>
  <marker id="ah" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#8E8B80" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></marker>
  <marker id="ahr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#B07575" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></marker>
</defs>

<rect x="0" y="0" width="700" height="300" fill="#FBFAF6"/>
<text x="350" y="28" text-anchor="middle" class="ti" fill="#28415F">求值循环：一条接一条地执行字节码</text>

<!-- three boxes in a cycle -->
<!-- 1 fetch -->
<rect x="60" y="96" width="170" height="64" rx="10" fill="url(#gB)" stroke="#C3D2E8" stroke-width="1.1" filter="url(#sh)"/>
<text x="145" y="120" text-anchor="middle" class="h" fill="#28415F">① 取下一条指令</text>
<text x="145" y="138" text-anchor="middle" class="c" fill="#4A5E80">NEXTOPARG()</text>
<text x="145" y="152" text-anchor="middle" class="d" fill="#6B7E9E">解出 opcode + oparg</text>

<!-- 2 dispatch -->
<rect x="265" y="96" width="170" height="64" rx="10" fill="url(#gP)" stroke="#CCC7F1" stroke-width="1.1" filter="url(#sh)"/>
<text x="350" y="120" text-anchor="middle" class="h" fill="#2E2972">② 按 opcode 派发</text>
<text x="350" y="138" text-anchor="middle" class="c" fill="#4A4396">switch (opcode)</text>
<text x="350" y="152" text-anchor="middle" class="d" fill="#6A63B0">跳到对应指令的分支</text>

<!-- 3 execute -->
<rect x="470" y="96" width="170" height="64" rx="10" fill="url(#gG)" stroke="#A8DCC9" stroke-width="1.1" filter="url(#sh)"/>
<text x="555" y="120" text-anchor="middle" class="h" fill="#0A463A">③ 执行该指令</text>
<text x="555" y="138" text-anchor="middle" class="d" fill="#0C5945">操作求值栈（压/弹/算）</text>
<text x="555" y="152" text-anchor="middle" class="c" fill="#0C5945">DISPATCH()</text>

<!-- arrows between -->
<g fill="none" stroke="#8E8B80" stroke-width="1.7" marker-end="url(#ah)">
  <path d="M230,128 H263"/>
  <path d="M435,128 H468"/>
</g>

<!-- loop back arrow from execute to fetch -->
<path d="M555,160 C555,210 145,210 145,162" fill="none" stroke="#8E8B80" stroke-width="1.7" marker-end="url(#ah)"/>
<text x="350" y="204" text-anchor="middle" class="d" fill="#9A988F">DISPATCH：回到 ① 取下一条 —— 周而复始</text>

<!-- exit on RETURN_VALUE -->
<rect x="470" y="234" width="170" height="40" rx="10" fill="url(#gR)" stroke="#E0C6C6" stroke-width="1.1" filter="url(#sh)"/>
<text x="555" y="258" text-anchor="middle" class="h" fill="#5C3030">遇 RETURN_VALUE → 退出循环</text>
<path d="M600,160 V232" fill="none" stroke="#B07575" stroke-width="1.6" marker-end="url(#ahr)"/>
<text x="638" y="200" text-anchor="middle" class="d" fill="#7A3B3B">返回</text>
</svg>
