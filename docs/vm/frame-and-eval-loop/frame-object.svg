<svg width="100%" viewBox="0 0 700 340" xmlns="http://www.w3.org/2000/svg" role="img" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'PingFang SC','Microsoft YaHei',sans-serif">
<title>帧对象 PyFrameObject：执行一段字节码的现场</title>
<desc>一个帧对象是执行某段字节码的完整现场。它通过 f_code 指向要执行的 code object；通过 f_globals、f_locals、f_builtins 指向取名字要用的三个名字空间；自带一个求值栈（f_valuestack 起点、f_stacktop 栈顶）供指令临时存放操作数；用 f_lasti 记录执行到第几条指令；并通过 f_back 指回调用它的上一个帧，从而把所有帧串成调用链。</desc>
<defs>
  <style>
    .ti{font-size:12.5px;font-weight:600;}
    .h{font-size:11.5px;font-weight:600;}
    .f{font-size:11px;font-family:'SF Mono','JetBrains Mono',ui-monospace,Consolas,monospace;}
    .d{font-size:10px;}
  </style>
  <filter id="sh" x="-30%" y="-30%" width="160%" height="160%"><feDropShadow dx="0" dy="1.4" stdDeviation="2" flood-color="#2A2A28" flood-opacity="0.12"/></filter>
  <linearGradient id="gP" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#F3F1FD"/><stop offset="1" stop-color="#E9E6FB"/></linearGradient>
  <linearGradient id="gN" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#F1EFE8"/><stop offset="1" stop-color="#E7E4DA"/></linearGradient>
  <linearGradient id="gA" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#FAEFD9"/><stop offset="1" stop-color="#F4E6C8"/></linearGradient>
  <linearGradient id="gB" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#EFF3FA"/><stop offset="1" stop-color="#E0E9F6"/></linearGradient>
  <linearGradient id="gG" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#E9F6F1"/><stop offset="1" stop-color="#DBF0E7"/></linearGradient>
  <marker id="ah" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#8E8B80" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker>
</defs>

<rect x="0" y="0" width="700" height="340" fill="#FBFAF6"/>
<text x="350" y="28" text-anchor="middle" class="ti" fill="#2E2972">帧对象：执行一段字节码的「现场」</text>

<!-- central frame -->
<rect x="270" y="96" width="170" height="172" rx="11" fill="url(#gP)" stroke="#CCC7F1" stroke-width="1.3" filter="url(#sh)"/>
<text x="355" y="118" text-anchor="middle" class="h" fill="#2E2972">帧 PyFrameObject</text>
<g class="f" fill="#2E2972">
  <text x="286" y="142">f_back</text>
  <text x="286" y="164">f_code</text>
  <text x="286" y="186">f_globals</text>
  <text x="286" y="208">f_locals</text>
  <text x="286" y="230">f_builtins</text>
  <text x="286" y="252">f_valuestack</text>
</g>

<!-- caller frame (top) via f_back -->
<rect x="290" y="44" width="130" height="34" rx="9" fill="url(#gN)" stroke="#D8D3C6" filter="url(#sh)"/>
<text x="355" y="65" text-anchor="middle" class="h" fill="#46453F">调用者的帧</text>
<path d="M355,96 V80" fill="none" stroke="#8E8B80" stroke-width="1.6" marker-end="url(#ah)"/>
<text x="368" y="92" class="d" fill="#9A988F">f_back</text>

<!-- code object (left) via f_code -->
<rect x="40" y="150" width="150" height="48" rx="9" fill="url(#gA)" stroke="#E8CB94" filter="url(#sh)"/>
<text x="115" y="170" text-anchor="middle" class="h" fill="#5C3C08">code object</text>
<text x="115" y="187" text-anchor="middle" class="d" fill="#8A6A1E">co_code 字节码 + 各表</text>
<path d="M270,164 H192" fill="none" stroke="#8E8B80" stroke-width="1.6" marker-end="url(#ah)"/>
<text x="222" y="158" class="d" fill="#9A988F">f_code</text>

<!-- namespaces (right) -->
<rect x="510" y="150" width="160" height="68" rx="9" fill="url(#gB)" stroke="#C3D2E8" filter="url(#sh)"/>
<text x="590" y="170" text-anchor="middle" class="h" fill="#28415F">三个名字空间</text>
<text x="590" y="188" text-anchor="middle" class="d" fill="#4A5E80">局部 / 全局 / 内建</text>
<text x="590" y="204" text-anchor="middle" class="d" fill="#4A5E80">取名字时按序查这三处</text>
<path d="M440,186 H508" fill="none" stroke="#8E8B80" stroke-width="1.6" marker-end="url(#ah)"/>

<!-- value stack (bottom) -->
<rect x="500" y="244" width="170" height="60" rx="9" fill="url(#gG)" stroke="#A8DCC9" filter="url(#sh)"/>
<text x="585" y="264" text-anchor="middle" class="h" fill="#0A463A">求值栈</text>
<text x="585" y="281" text-anchor="middle" class="d" fill="#0C5945">指令临时存放操作数的地方</text>
<text x="585" y="296" text-anchor="middle" class="d" fill="#0C5945">f_stacktop 指向栈顶</text>
<path d="M440,252 C470,256 480,262 498,268" fill="none" stroke="#8E8B80" stroke-width="1.6" marker-end="url(#ah)"/>

<text x="160" y="246" class="h" fill="#46453F">f_lasti</text>
<text x="160" y="263" class="d" fill="#8A887E">记录执行到第几条指令</text>
<text x="160" y="277" class="d" fill="#8A887E">（执行进度）</text>
<path d="M286,240 C240,238 210,245 200,250" fill="none" stroke="#C0BDB4" stroke-width="1.4" stroke-dasharray="3 3"/>
</svg>
