<svg width="100%" viewBox="0 0 700 300" xmlns="http://www.w3.org/2000/svg" role="img" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'PingFang SC','Microsoft YaHei',sans-serif">
<title>帧栈：f_back 把帧串成调用链</title>
<desc>每发生一次函数调用，就新建一个帧并压到帧栈顶；每个帧的 f_back 指回调用它的上一个帧。outer() 调用 inner() 时，inner 的帧在栈顶、f_back 指向 outer 帧，outer 帧再指向模块帧。这条由 f_back 串起来的链就是调用栈，出错时打印的 traceback 正是顺着它回溯的。</desc>
<defs>
  <style>
    .ti{font-size:12.5px;font-weight:600;}
    .h{font-size:11.5px;font-weight:600;}
    .f{font-size:11px;font-family:'SF Mono','JetBrains Mono',ui-monospace,Consolas,monospace;}
    .d{font-size:10px;}
  </style>
  <filter id="sh" x="-30%" y="-30%" width="160%" height="160%"><feDropShadow dx="0" dy="1.4" stdDeviation="2" flood-color="#2A2A28" flood-opacity="0.12"/></filter>
  <linearGradient id="gP" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#F3F1FD"/><stop offset="1" stop-color="#E9E6FB"/></linearGradient>
  <marker id="ah" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#6A63B0" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></marker>
</defs>

<rect x="0" y="0" width="700" height="300" fill="#FBFAF6"/>
<text x="350" y="30" text-anchor="middle" class="ti" fill="#2E2972">帧栈：每次调用压一个帧，f_back 指回调用者</text>

<!-- three stacked frames -->
<!-- module frame (bottom) -->
<rect x="200" y="210" width="300" height="56" rx="10" fill="url(#gP)" stroke="#CCC7F1" stroke-width="1.2" filter="url(#sh)"/>
<text x="220" y="232" class="h" fill="#2E2972">&lt;module&gt; 帧</text>
<text x="220" y="252" class="d" fill="#6A63B0">模块顶层代码，调用链的底部</text>
<text x="484" y="240" text-anchor="end" class="f" fill="#9A988F">f_back = NULL</text>

<!-- outer frame -->
<rect x="200" y="132" width="300" height="56" rx="10" fill="url(#gP)" stroke="#CCC7F1" stroke-width="1.2" filter="url(#sh)"/>
<text x="220" y="154" class="h" fill="#2E2972">outer 帧</text>
<text x="220" y="174" class="d" fill="#6A63B0">局部变量 msg = "hi"</text>

<!-- inner frame (top) -->
<rect x="200" y="54" width="300" height="56" rx="10" fill="url(#gP)" stroke="#CCC7F1" stroke-width="1.4" filter="url(#sh)"/>
<text x="220" y="76" class="h" fill="#2E2972">inner 帧 ← 栈顶（正在执行）</text>
<text x="220" y="96" class="d" fill="#6A63B0">sys._getframe() 拿到的就是它</text>

<!-- f_back arrows pointing down (back to caller) -->
<path d="M540,82 C580,82 580,160 542,160" fill="none" stroke="#6A63B0" stroke-width="1.7" marker-end="url(#ah)"/>
<text x="592" y="124" text-anchor="middle" class="f" fill="#6A63B0">f_back</text>
<path d="M540,160 C580,160 580,238 542,238" fill="none" stroke="#6A63B0" stroke-width="1.7" marker-end="url(#ah)"/>
<text x="592" y="202" text-anchor="middle" class="f" fill="#6A63B0">f_back</text>

<!-- caller direction labels on left -->
<text x="150" y="86" text-anchor="end" class="d" fill="#9A988F">后调用</text>
<text x="150" y="244" text-anchor="end" class="d" fill="#9A988F">先调用</text>
<path d="M150,98 V232" fill="none" stroke="#C0BDB4" stroke-width="1.2" stroke-dasharray="3 4"/>

<text x="350" y="288" text-anchor="middle" class="d" fill="#9A988F">调用链：inner → outer → &lt;module&gt;，traceback 正是顺着 f_back 回溯打印</text>
</svg>
