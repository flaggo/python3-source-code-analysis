<svg width="100%" viewBox="0 0 520 400" xmlns="http://www.w3.org/2000/svg" role="img" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'PingFang SC','Microsoft YaHei',sans-serif">
<title>异常机制全景：从抛出到栈展开</title>
<desc>异常发生有两种来源：显式的 raise 语句，或任何指令操作失败。两者都把线程的当前异常 curexc 字段填好，跳到求值循环的 error 标签；error 标签设置 why 为 WHY_EXCEPTION，并调用 PyTraceBack_Here 把当前帧记进 traceback，随后落入 fast_block_end 沿 block 栈逐块展开。展开有两种结局：命中某个 SETUP_EXCEPT 或 SETUP_FINALLY 块，跳到对应 handler，异常被接住；或 block 栈走完仍无人接，本帧返回 NULL，沿 f_back 调用链交给调用者帧重演展开，这就是跨帧穿透。</desc>
<defs>
  <style>
    .ti{font-size:13px;font-weight:600;}
    .h{font-size:11.5px;font-weight:600;}
    .d{font-size:10px;}
    .c{font-size:10px;font-family:'SF Mono','JetBrains Mono',ui-monospace,Consolas,monospace;}
  </style>
  <filter id="sh" x="-30%" y="-30%" width="160%" height="160%"><feDropShadow dx="0" dy="1.4" stdDeviation="2" flood-color="#2A2A28" flood-opacity="0.12"/></filter>
  <linearGradient id="gR" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#FBEFE9"/><stop offset="1" stop-color="#F6E2D6"/></linearGradient>
  <linearGradient id="gP" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#F3F1FD"/><stop offset="1" stop-color="#E9E6FB"/></linearGradient>
  <linearGradient id="gB" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#EFF3FA"/><stop offset="1" stop-color="#E0E9F6"/></linearGradient>
  <marker id="ah" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#8E8B80" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker>
  <marker id="ahr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#C77A52" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/></marker>
</defs>

<rect x="0" y="0" width="520" height="400" fill="#FBFAF6"/>
<text x="260" y="28" text-anchor="middle" class="ti" fill="#2E2972">异常 = 设置当前异常 + 跳 error + 沿 block 栈展开</text>

<!-- two sources -->
<rect x="55" y="48" width="180" height="44" rx="9" fill="url(#gR)" stroke="#E8C9B5" filter="url(#sh)"/>
<text x="145" y="67" text-anchor="middle" class="h" fill="#9A4A2F">raise 语句</text>
<text x="145" y="83" text-anchor="middle" class="c" fill="#9A4A2F">RAISE_VARARGS</text>
<rect x="285" y="48" width="180" height="44" rx="9" fill="url(#gR)" stroke="#E8C9B5" filter="url(#sh)"/>
<text x="375" y="67" text-anchor="middle" class="h" fill="#9A4A2F">任何操作失败</text>
<text x="375" y="83" text-anchor="middle" class="c" fill="#9A4A2F">goto error</text>

<path d="M145,92 C145,108 230,108 255,118" fill="none" stroke="#C77A52" stroke-width="1.6" marker-end="url(#ahr)"/>
<path d="M375,92 C375,108 290,108 265,118" fill="none" stroke="#C77A52" stroke-width="1.6" marker-end="url(#ahr)"/>

<!-- error label -->
<rect x="120" y="120" width="280" height="56" rx="10" fill="url(#gP)" stroke="#CCC7F1" filter="url(#sh)"/>
<text x="260" y="140" text-anchor="middle" class="h" fill="#2E2972">error 标签</text>
<text x="260" y="157" text-anchor="middle" class="d" fill="#46453F">why = WHY_EXCEPTION</text>
<text x="260" y="171" text-anchor="middle" class="d" fill="#46453F">PyTraceBack_Here(f)　→ 记一帧</text>

<path d="M260,176 V200" fill="none" stroke="#8E8B80" stroke-width="1.6" marker-end="url(#ah)"/>

<!-- unwind -->
<rect x="120" y="202" width="280" height="56" rx="10" fill="url(#gB)" stroke="#C3D2E8" filter="url(#sh)"/>
<text x="260" y="222" text-anchor="middle" class="h" fill="#28415F">fast_block_end — 沿 block 栈展开</text>
<text x="260" y="239" text-anchor="middle" class="d" fill="#46453F">逐块弹出，UNWIND_BLOCK 把求值栈清回 b_level</text>
<text x="260" y="252" text-anchor="middle" class="d" fill="#9A988F">return / break / continue / 异常　同走这一段</text>

<path d="M200,258 C190,278 160,288 150,300" fill="none" stroke="#8E8B80" stroke-width="1.6" marker-end="url(#ah)"/>
<path d="M320,258 C330,278 360,288 372,300" fill="none" stroke="#C77A52" stroke-width="1.6" marker-end="url(#ahr)"/>

<!-- outcome: caught -->
<rect x="20" y="302" width="240" height="62" rx="10" fill="url(#gB)" stroke="#C3D2E8" filter="url(#sh)"/>
<text x="140" y="322" text-anchor="middle" class="h" fill="#28415F">命中 try 块</text>
<text x="140" y="339" text-anchor="middle" class="d" fill="#46453F">SETUP_EXCEPT / SETUP_FINALLY</text>
<text x="140" y="354" text-anchor="middle" class="d" fill="#46453F">JUMPTO handler，异常被接住</text>

<!-- outcome: cross-frame -->
<rect x="272" y="302" width="232" height="62" rx="10" fill="url(#gR)" stroke="#E8C9B5" filter="url(#sh)"/>
<text x="388" y="322" text-anchor="middle" class="h" fill="#9A4A2F">块栈走完，无人接</text>
<text x="388" y="339" text-anchor="middle" class="d" fill="#9A4A2F">返回 NULL，沿 f_back 上交</text>
<text x="388" y="354" text-anchor="middle" class="d" fill="#9A4A2F">调用者帧重演展开（跨帧）</text>

<text x="260" y="386" text-anchor="middle" class="d" fill="#9A988F">帧内沿 block 栈展开，帧间沿 f_back 接力——异常从最深处一路炸到最外层</text>
</svg>
