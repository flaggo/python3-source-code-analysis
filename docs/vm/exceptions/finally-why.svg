<svg width="100%" viewBox="0 0 640 330" xmlns="http://www.w3.org/2000/svg" role="img" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'PingFang SC','Microsoft YaHei',sans-serif">
<title>finally 借 why_code 记住未竟之事</title>
<desc>finally 的「无论如何都执行」靠一种寄存—续做的机制。进入 finally 体之前，会往求值栈压一个标记，记下「本来要干什么」：try 体正常结束压 None；途中 return 或 continue 压对应的 why 整数和返回值；途中抛异常则压异常本身。finally 体照常执行。执行完，末尾的 END_FINALLY 把标记取回来，据它决定接着干什么：None 就正常往下走；why 整数就完成原来的 return 或 continue；异常就重新抛出、继续往外展开。一个 why_code，把三种情形统一成同一套机制。</desc>
<defs>
  <style>
    .ti{font-size:13px;font-weight:600;}
    .h{font-size:11px;font-weight:600;}
    .d{font-size:10px;}
    .c{font-size:10px;font-family:'SF Mono','JetBrains Mono',ui-monospace,Consolas,monospace;}
  </style>
  <filter id="sh" x="-30%" y="-30%" width="160%" height="160%"><feDropShadow dx="0" dy="1.4" stdDeviation="2" flood-color="#2A2A28" flood-opacity="0.12"/></filter>
  <linearGradient id="gN" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#F1EFE8"/><stop offset="1" stop-color="#E7E4DA"/></linearGradient>
  <linearGradient id="gB" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#EFF3FA"/><stop offset="1" stop-color="#E0E9F6"/></linearGradient>
  <linearGradient id="gP" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#F3F1FD"/><stop offset="1" stop-color="#E9E6FB"/></linearGradient>
  <linearGradient id="gR" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#FBEFE9"/><stop offset="1" stop-color="#F6E2D6"/></linearGradient>
  <linearGradient id="gG" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#EDF4EE"/><stop offset="1" stop-color="#DDEBE0"/></linearGradient>
  <marker id="ah" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#8E8B80" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker>
</defs>

<rect x="0" y="0" width="640" height="330" fill="#FBFAF6"/>
<text x="320" y="26" text-anchor="middle" class="ti" fill="#2E2972">finally：进门前寄存，出门后续做</text>

<!-- three inputs -->
<text x="95" y="56" text-anchor="middle" class="h" fill="#46453F">进 finally 前压入的标记</text>
<rect x="20" y="68" width="150" height="34" rx="7" fill="url(#gG)" stroke="#BFD8C4"/>
<text x="95" y="83" text-anchor="middle" class="c" fill="#2F6B43">None</text>
<text x="95" y="96" text-anchor="middle" class="d" fill="#3C5C46">try 体正常结束</text>
<rect x="20" y="110" width="150" height="34" rx="7" fill="url(#gB)" stroke="#C3D2E8"/>
<text x="95" y="125" text-anchor="middle" class="c" fill="#28415F">why + retval</text>
<text x="95" y="138" text-anchor="middle" class="d" fill="#46453F">return / continue</text>
<rect x="20" y="152" width="150" height="34" rx="7" fill="url(#gR)" stroke="#E8C9B5"/>
<text x="95" y="167" text-anchor="middle" class="c" fill="#9A4A2F">异常本身</text>
<text x="95" y="180" text-anchor="middle" class="d" fill="#9A4A2F">途中抛了异常</text>

<!-- finally body -->
<path d="M170,85 C200,85 200,127 228,127" fill="none" stroke="#8E8B80" stroke-width="1.4" marker-end="url(#ah)"/>
<path d="M170,127 H228" fill="none" stroke="#8E8B80" stroke-width="1.4" marker-end="url(#ah)"/>
<path d="M170,169 C200,169 200,127 228,127" fill="none" stroke="#8E8B80" stroke-width="1.4" marker-end="url(#ah)"/>
<rect x="230" y="104" width="150" height="46" rx="9" fill="url(#gP)" stroke="#CCC7F1" filter="url(#sh)"/>
<text x="305" y="124" text-anchor="middle" class="h" fill="#2E2972">finally 体</text>
<text x="305" y="140" text-anchor="middle" class="d" fill="#46453F">无论如何都执行</text>

<!-- END_FINALLY -->
<path d="M380,127 H418" fill="none" stroke="#8E8B80" stroke-width="1.5" marker-end="url(#ah)"/>
<rect x="420" y="104" width="150" height="46" rx="9" fill="url(#gN)" stroke="#D8D3C6" filter="url(#sh)"/>
<text x="495" y="124" text-anchor="middle" class="c" fill="#33322E">END_FINALLY</text>
<text x="495" y="140" text-anchor="middle" class="d" fill="#9A988F">取回标记，据它续做</text>

<!-- three outputs -->
<path d="M495,150 C495,180 300,180 250,206" fill="none" stroke="#8E8B80" stroke-width="1.3" marker-end="url(#ah)"/>
<path d="M495,150 V206" fill="none" stroke="#8E8B80" stroke-width="1.3" marker-end="url(#ah)"/>
<path d="M495,150 C495,180 700,180 740,206" fill="none" stroke="#8E8B80" stroke-width="1.3"/>

<rect x="120" y="208" width="170" height="42" rx="8" fill="url(#gG)" stroke="#BFD8C4"/>
<text x="205" y="226" text-anchor="middle" class="d" fill="#2F6B43">见 None</text>
<text x="205" y="242" text-anchor="middle" class="d" fill="#3C5C46">照常往下走</text>
<rect x="410" y="208" width="170" height="42" rx="8" fill="url(#gB)" stroke="#C3D2E8"/>
<text x="495" y="226" text-anchor="middle" class="d" fill="#28415F">见 why 整数</text>
<text x="495" y="242" text-anchor="middle" class="d" fill="#46453F">完成原来的 return/continue</text>

<rect x="265" y="262" width="240" height="40" rx="8" fill="url(#gR)" stroke="#E8C9B5"/>
<text x="385" y="280" text-anchor="middle" class="d" fill="#9A4A2F">见异常</text>
<text x="385" y="294" text-anchor="middle" class="d" fill="#9A4A2F">重新抛出，回 fast_block_end 继续展开</text>
<path d="M495,250 C495,256 430,258 420,262" fill="none" stroke="#8E8B80" stroke-width="1.2" marker-end="url(#ah)"/>
</svg>
