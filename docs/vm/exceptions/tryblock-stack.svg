<svg width="100%" viewBox="0 0 640 290" xmlns="http://www.w3.org/2000/svg" role="img" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'PingFang SC','Microsoft YaHei',sans-serif">
<title>PyTryBlock 与帧的 block 栈</title>
<desc>左边是一个 PyTryBlock 的三个字段：b_type 是块的种类（SETUP_EXCEPT / SETUP_FINALLY / SETUP_LOOP / EXCEPT_HANDLER），b_handler 是出事时跳转的 handler 字节码偏移，b_level 是入块时的求值栈深度，清理时退回到这里。右边是帧里的 f_blockstack 数组，进入 try 时 SETUP_EXCEPT 或 SETUP_FINALLY 压入一个块，f_iblock 指向栈顶。栈展开时从 f_iblock 指的栈顶往下逐块弹出。</desc>
<defs>
  <style>
    .ti{font-size:13px;font-weight:600;}
    .h{font-size:11.5px;font-weight:600;}
    .d{font-size:10px;}
    .c{font-size:11px;font-family:'SF Mono','JetBrains Mono',ui-monospace,Consolas,monospace;}
  </style>
  <filter id="sh" x="-30%" y="-30%" width="160%" height="160%"><feDropShadow dx="0" dy="1.4" stdDeviation="2" flood-color="#2A2A28" flood-opacity="0.12"/></filter>
  <linearGradient id="gB" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#EFF3FA"/><stop offset="1" stop-color="#E0E9F6"/></linearGradient>
  <linearGradient id="gR" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#FBEFE9"/><stop offset="1" stop-color="#F6E2D6"/></linearGradient>
  <marker id="ah" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#8E8B80" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker>
</defs>

<rect x="0" y="0" width="640" height="290" fill="#FBFAF6"/>
<text x="320" y="28" text-anchor="middle" class="ti" fill="#2E2972">block 栈：try 在哪、栈该清到哪</text>

<!-- left: PyTryBlock struct -->
<text x="150" y="58" text-anchor="middle" class="h" fill="#28415F">一个 PyTryBlock</text>
<rect x="40" y="70" width="220" height="150" rx="10" fill="#FFFFFF" stroke="#C3D2E8" filter="url(#sh)"/>
<rect x="40" y="70" width="220" height="46" rx="10" fill="url(#gB)" stroke="none"/>
<rect x="40" y="92" width="220" height="24" fill="url(#gB)"/>
<line x1="40" y1="116" x2="260" y2="116" stroke="#C3D2E8"/>
<text x="55" y="92" class="c" fill="#28415F">b_type</text>
<text x="250" y="92" text-anchor="end" class="d" fill="#46453F">块的种类</text>
<text x="55" y="108" class="d" fill="#9A988F">SETUP_EXCEPT / FINALLY …</text>
<line x1="40" y1="116" x2="260" y2="116" stroke="#E7E4DA"/>
<text x="55" y="148" class="c" fill="#28415F">b_handler</text>
<text x="250" y="148" text-anchor="end" class="d" fill="#46453F">出事跳哪去</text>
<text x="55" y="164" class="d" fill="#9A988F">handler 字节码偏移</text>
<line x1="40" y1="172" x2="260" y2="172" stroke="#E7E4DA"/>
<text x="55" y="196" class="c" fill="#28415F">b_level</text>
<text x="250" y="196" text-anchor="end" class="d" fill="#46453F">栈该清到哪</text>
<text x="55" y="212" class="d" fill="#9A988F">入块时的求值栈深度</text>

<!-- right: f_blockstack -->
<text x="470" y="58" text-anchor="middle" class="h" fill="#28415F">帧的 f_blockstack</text>
<rect x="400" y="120" width="160" height="30" rx="5" fill="url(#gR)" stroke="#E8C9B5"/>
<text x="480" y="139" text-anchor="middle" class="c" fill="#9A4A2F">SETUP_EXCEPT</text>
<rect x="400" y="152" width="160" height="30" rx="5" fill="#F1EFE8" stroke="#D8D3C6"/>
<text x="480" y="171" text-anchor="middle" class="c" fill="#9A988F">SETUP_LOOP</text>
<rect x="400" y="184" width="160" height="30" rx="5" fill="#F1EFE8" stroke="#D8D3C6"/>
<text x="480" y="203" text-anchor="middle" class="d" fill="#9A988F">… 更外层的块</text>

<!-- f_iblock pointer -->
<text x="392" y="139" text-anchor="end" class="d" fill="#C77A52">f_iblock →</text>
<path d="M300,120 C340,90 370,120 398,132" fill="none" stroke="#8E8B80" stroke-width="1.4" stroke-dasharray="3 3" marker-end="url(#ah)"/>
<text x="330" y="100" text-anchor="middle" class="d" fill="#9A988F">SETUP_EXCEPT 压入</text>

<text x="480" y="238" text-anchor="middle" class="d" fill="#9A988F">展开时从 f_iblock 指的栈顶往下逐块弹</text>
<path d="M480,184 V152" fill="none" stroke="#C77A52" stroke-width="1.3" stroke-dasharray="2 2"/>
</svg>
