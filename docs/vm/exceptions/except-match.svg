<svg width="100%" viewBox="0 0 640 330" xmlns="http://www.w3.org/2000/svg" role="img" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'PingFang SC','Microsoft YaHei',sans-serif">
<title>except 子句在求值栈上匹配异常</title>
<desc>展开循环跳到 except handler 时，求值栈顶已被压上异常的三件套 traceback、value、exc（exc 在最上）。handler 的字节码用 DUP_TOP 复制栈顶的异常类型，LOAD 出 except 后写的异常类，COMPARE_OP EXC_MATCH 判断是否匹配（含子类），POP_JUMP_IF_FALSE 据结果分流。匹配则 POP_TOP 三次弹掉三件套、执行 except 体、POP_EXCEPT 清理 EXCEPT_HANDLER 块，异常被消化。不匹配则落到 END_FINALLY，把异常重新抛出，回到 fast_block_end 继续往外层展开。</desc>
<defs>
  <style>
    .ti{font-size:13px;font-weight:600;}
    .h{font-size:11px;font-weight:600;}
    .d{font-size:10px;}
    .c{font-size:10.5px;font-family:'SF Mono','JetBrains Mono',ui-monospace,Consolas,monospace;}
  </style>
  <filter id="sh" x="-30%" y="-30%" width="160%" height="160%"><feDropShadow dx="0" dy="1.4" stdDeviation="2" flood-color="#2A2A28" flood-opacity="0.12"/></filter>
  <linearGradient id="gB" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#EFF3FA"/><stop offset="1" stop-color="#E0E9F6"/></linearGradient>
  <linearGradient id="gR" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#FBEFE9"/><stop offset="1" stop-color="#F6E2D6"/></linearGradient>
  <linearGradient id="gG" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#EDF4EE"/><stop offset="1" stop-color="#DDEBE0"/></linearGradient>
  <marker id="ah" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#8E8B80" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker>
  <marker id="ahr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#C77A52" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/></marker>
</defs>

<rect x="0" y="0" width="640" height="330" fill="#FBFAF6"/>
<text x="320" y="28" text-anchor="middle" class="ti" fill="#2E2972">except：拿栈顶的异常类型去比对</text>

<!-- value stack -->
<text x="90" y="60" text-anchor="middle" class="h" fill="#28415F">求值栈</text>
<rect x="30" y="70" width="120" height="30" rx="5" fill="url(#gR)" stroke="#E8C9B5"/><text x="90" y="90" text-anchor="middle" class="c" fill="#9A4A2F">exc（栈顶）</text>
<rect x="30" y="102" width="120" height="30" rx="5" fill="url(#gR)" stroke="#E8C9B5"/><text x="90" y="122" text-anchor="middle" class="c" fill="#9A4A2F">val</text>
<rect x="30" y="134" width="120" height="30" rx="5" fill="url(#gR)" stroke="#E8C9B5"/><text x="90" y="154" text-anchor="middle" class="c" fill="#9A4A2F">tb</text>
<text x="90" y="182" text-anchor="middle" class="d" fill="#9A988F">展开循环压上来的三件套</text>

<!-- compare instructions -->
<rect x="200" y="80" width="200" height="84" rx="9" fill="url(#gB)" stroke="#C3D2E8" filter="url(#sh)"/>
<text x="300" y="100" text-anchor="middle" class="c" fill="#28415F">DUP_TOP</text>
<text x="300" y="118" text-anchor="middle" class="c" fill="#28415F">LOAD  ValueError</text>
<text x="300" y="136" text-anchor="middle" class="c" fill="#28415F">COMPARE_OP EXC_MATCH</text>
<text x="300" y="154" text-anchor="middle" class="c" fill="#28415F">POP_JUMP_IF_FALSE</text>
<path d="M150,100 H198" fill="none" stroke="#8E8B80" stroke-width="1.5" marker-end="url(#ah)"/>

<!-- match branch -->
<path d="M400,108 C440,108 450,108 458,108" fill="none" stroke="#8E8B80" stroke-width="1.6" marker-end="url(#ah)"/>
<text x="430" y="100" text-anchor="middle" class="d" fill="#46453F">匹配</text>
<rect x="460" y="84" width="160" height="62" rx="9" fill="url(#gG)" stroke="#BFD8C4" filter="url(#sh)"/>
<text x="540" y="104" text-anchor="middle" class="h" fill="#2F6B43">异常被消化</text>
<text x="540" y="120" text-anchor="middle" class="d" fill="#3C5C46">POP_TOP×3 → except 体</text>
<text x="540" y="134" text-anchor="middle" class="d" fill="#3C5C46">POP_EXCEPT 收尾</text>

<!-- no match branch -->
<path d="M300,164 V196" fill="none" stroke="#C77A52" stroke-width="1.6" marker-end="url(#ahr)"/>
<text x="330" y="184" text-anchor="middle" class="d" fill="#C77A52">不匹配</text>
<rect x="200" y="198" width="200" height="60" rx="9" fill="url(#gR)" stroke="#E8C9B5" filter="url(#sh)"/>
<text x="300" y="218" text-anchor="middle" class="c" fill="#9A4A2F">END_FINALLY</text>
<text x="300" y="236" text-anchor="middle" class="d" fill="#9A4A2F">把异常重新抛出</text>
<text x="300" y="250" text-anchor="middle" class="d" fill="#9A4A2F">回 fast_block_end 继续展开</text>

<!-- loop hint to outer -->
<path d="M200,228 C120,228 110,228 100,210" fill="none" stroke="#C77A52" stroke-width="1.4" stroke-dasharray="4 3" marker-end="url(#ahr)"/>
<text x="120" y="276" text-anchor="middle" class="d" fill="#9A988F">往外层 try 找下一个 except</text>

<text x="320" y="308" text-anchor="middle" class="d" fill="#9A988F">多个 except 就是「不匹配就重抛、再比下一个」串起来的</text>
</svg>
