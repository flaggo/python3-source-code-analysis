<svg width="100%" viewBox="0 0 560 430" xmlns="http://www.w3.org/2000/svg" role="img" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'PingFang SC','Microsoft YaHei',sans-serif">
<title>fast_block_end 的栈展开循环</title>
<desc>栈展开是一段 while 循环。进入时 why 已是 WHY_EXCEPTION。循环条件是 f_iblock 大于 0，即 block 栈还有块。每轮：看栈顶的块 b 并弹出它，f_iblock 减一；执行 UNWIND_BLOCK 把求值栈清回 b 的 b_level，丢弃半算完的中间值；判断 b 是否是 try 块（SETUP_EXCEPT 或 SETUP_FINALLY）且 why 是异常——若是，则把异常的 type、value、traceback 三件套压上求值栈、压入 EXCEPT_HANDLER 块、把 why 置回 WHY_NOT、JUMPTO 到 handler，异常被接住，循环 break；若不是，继续下一轮往外层块找。若 block 栈走到底 why 仍是异常，跳出主循环，本帧返回 NULL 交给调用者。</desc>
<defs>
  <style>
    .ti{font-size:13px;font-weight:600;}
    .h{font-size:11px;font-weight:600;}
    .d{font-size:10px;}
    .c{font-size:10px;font-family:'SF Mono','JetBrains Mono',ui-monospace,Consolas,monospace;}
  </style>
  <filter id="sh" x="-30%" y="-30%" width="160%" height="160%"><feDropShadow dx="0" dy="1.4" stdDeviation="2" flood-color="#2A2A28" flood-opacity="0.12"/></filter>
  <linearGradient id="gB" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#EFF3FA"/><stop offset="1" stop-color="#E0E9F6"/></linearGradient>
  <linearGradient id="gR" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#FBEFE9"/><stop offset="1" stop-color="#F6E2D6"/></linearGradient>
  <linearGradient id="gP" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#F3F1FD"/><stop offset="1" stop-color="#E9E6FB"/></linearGradient>
  <marker id="ah" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#8E8B80" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker>
  <marker id="ahr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#C77A52" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/></marker>
</defs>

<rect x="0" y="0" width="560" height="430" fill="#FBFAF6"/>
<text x="280" y="28" text-anchor="middle" class="ti" fill="#2E2972">栈展开：沿 block 栈逐块找接盘的 try</text>

<!-- enter -->
<rect x="195" y="44" width="170" height="32" rx="8" fill="url(#gR)" stroke="#E8C9B5" filter="url(#sh)"/>
<text x="280" y="64" text-anchor="middle" class="c" fill="#9A4A2F">why = WHY_EXCEPTION</text>
<path d="M280,76 V90" fill="none" stroke="#8E8B80" stroke-width="1.5" marker-end="url(#ah)"/>

<!-- decision: blocks left? -->
<path d="M280,92 L370,124 L280,156 L190,124 Z" fill="url(#gB)" stroke="#C3D2E8" filter="url(#sh)"/>
<text x="280" y="120" text-anchor="middle" class="h" fill="#28415F">f_iblock &gt; 0 ?</text>
<text x="280" y="135" text-anchor="middle" class="d" fill="#9A988F">还有块吗</text>

<!-- no branch to right -->
<path d="M370,124 H430" fill="none" stroke="#C77A52" stroke-width="1.5" marker-end="url(#ahr)"/>
<text x="400" y="116" text-anchor="middle" class="d" fill="#C77A52">否</text>
<rect x="432" y="100" width="120" height="48" rx="9" fill="url(#gR)" stroke="#E8C9B5" filter="url(#sh)"/>
<text x="492" y="120" text-anchor="middle" class="h" fill="#9A4A2F">无人接</text>
<text x="492" y="136" text-anchor="middle" class="d" fill="#9A4A2F">返回 NULL → 调用者</text>

<!-- yes branch down -->
<path d="M280,156 V172" fill="none" stroke="#8E8B80" stroke-width="1.5" marker-end="url(#ah)"/>
<text x="296" y="168" class="d" fill="#46453F">是</text>

<rect x="170" y="174" width="220" height="34" rx="8" fill="#FFFFFF" stroke="#C3D2E8"/>
<text x="280" y="195" text-anchor="middle" class="c" fill="#28415F">看栈顶块 b，f_iblock--</text>
<path d="M280,208 V220" fill="none" stroke="#8E8B80" stroke-width="1.5" marker-end="url(#ah)"/>

<rect x="150" y="222" width="260" height="40" rx="8" fill="#FFFFFF" stroke="#C3D2E8"/>
<text x="280" y="240" text-anchor="middle" class="c" fill="#28415F">UNWIND_BLOCK(b)</text>
<text x="280" y="254" text-anchor="middle" class="d" fill="#9A988F">求值栈清回 b_level，丢弃中间值</text>
<path d="M280,262 V276" fill="none" stroke="#8E8B80" stroke-width="1.5" marker-end="url(#ah)"/>

<!-- decision: is try block & exception? -->
<path d="M280,278 L400,316 L280,354 L160,316 Z" fill="url(#gB)" stroke="#C3D2E8" filter="url(#sh)"/>
<text x="280" y="310" text-anchor="middle" class="h" fill="#28415F">b 是 try 块？</text>
<text x="280" y="325" text-anchor="middle" class="d" fill="#9A988F">SETUP_EXCEPT / FINALLY</text>

<!-- no: loop back -->
<path d="M160,316 H70 V124 H190" fill="none" stroke="#8E8B80" stroke-width="1.5" stroke-dasharray="4 3" marker-end="url(#ah)"/>
<text x="70" y="220" text-anchor="middle" class="d" fill="#9A988F">否</text>
<text x="70" y="234" text-anchor="middle" class="d" fill="#9A988F">下一块</text>

<!-- yes: caught -->
<path d="M280,354 V372" fill="none" stroke="#C77A52" stroke-width="1.6" marker-end="url(#ahr)"/>
<text x="296" y="368" class="d" fill="#C77A52">是</text>
<rect x="120" y="374" width="320" height="46" rx="9" fill="url(#gP)" stroke="#CCC7F1" filter="url(#sh)"/>
<text x="280" y="393" text-anchor="middle" class="h" fill="#2E2972">异常被接住</text>
<text x="280" y="409" text-anchor="middle" class="d" fill="#46453F">压入异常三件套 · why=WHY_NOT · JUMPTO handler · break</text>
</svg>
