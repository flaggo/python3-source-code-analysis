<svg width="100%" viewBox="0 0 640 250" xmlns="http://www.w3.org/2000/svg" role="img" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'PingFang SC','Microsoft YaHei',sans-serif">
<title>函数调用流水线：从 CALL_FUNCTION 到新建一帧</title>
<desc>调用一个 Python 函数的链路。字节码 CALL_FUNCTION 把活儿交给 call_function，它按被调对象类型分派，Python 函数走 _PyFunction_FastCallKeywords，最终落到核心 _PyEval_EvalCodeEx。后者新建一个帧、把实参绑定进帧的局部变量区 fastlocals，然后调起上一章的求值循环 _PyEval_EvalFrameDefault 执行字节码。一句话：调用等于新建一帧加绑定参数加跑求值循环。</desc>
<defs>
  <style>
    .ti{font-size:13px;font-weight:600;}
    .h{font-size:10.5px;font-weight:600;}
    .d{font-size:9.5px;}
    .c{font-size:10px;font-family:'SF Mono','JetBrains Mono',ui-monospace,Consolas,monospace;}
  </style>
  <filter id="sh" x="-30%" y="-30%" width="160%" height="160%"><feDropShadow dx="0" dy="1.4" stdDeviation="2" flood-color="#2A2A28" flood-opacity="0.12"/></filter>
  <linearGradient id="gN" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#F1EFE8"/><stop offset="1" stop-color="#E7E4DA"/></linearGradient>
  <linearGradient id="gB" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#EFF3FA"/><stop offset="1" stop-color="#E0E9F6"/></linearGradient>
  <linearGradient id="gP" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#F3F1FD"/><stop offset="1" stop-color="#E9E6FB"/></linearGradient>
  <marker id="ah" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#8E8B80" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker>
</defs>

<rect x="0" y="0" width="640" height="250" fill="#FBFAF6"/>
<text x="320" y="28" text-anchor="middle" class="ti" fill="#2E2972">调用 = 新建一帧 + 绑定参数 + 跑求值循环</text>

<!-- pipeline boxes -->
<rect x="20" y="58" width="130" height="40" rx="8" fill="url(#gN)" stroke="#D8D3C6" filter="url(#sh)"/>
<text x="85" y="74" text-anchor="middle" class="c" fill="#33322E">CALL_FUNCTION</text>
<text x="85" y="89" text-anchor="middle" class="d" fill="#9A988F">字节码指令</text>

<rect x="170" y="58" width="130" height="40" rx="8" fill="url(#gN)" stroke="#D8D3C6" filter="url(#sh)"/>
<text x="235" y="74" text-anchor="middle" class="c" fill="#33322E">call_function</text>
<text x="235" y="89" text-anchor="middle" class="d" fill="#9A988F">按类型分派</text>

<rect x="320" y="58" width="150" height="40" rx="8" fill="url(#gB)" stroke="#C3D2E8" filter="url(#sh)"/>
<text x="395" y="74" text-anchor="middle" class="c" fill="#28415F">_PyFunction_</text>
<text x="395" y="89" text-anchor="middle" class="c" fill="#28415F">FastCallKeywords</text>

<rect x="490" y="58" width="130" height="40" rx="8" fill="url(#gP)" stroke="#CCC7F1" filter="url(#sh)"/>
<text x="555" y="74" text-anchor="middle" class="c" fill="#2E2972">_PyEval_</text>
<text x="555" y="89" text-anchor="middle" class="c" fill="#2E2972">EvalCodeEx</text>

<path d="M150,78 H168" fill="none" stroke="#8E8B80" stroke-width="1.5" marker-end="url(#ah)"/>
<path d="M300,78 H318" fill="none" stroke="#8E8B80" stroke-width="1.5" marker-end="url(#ah)"/>
<path d="M470,78 H488" fill="none" stroke="#8E8B80" stroke-width="1.5" marker-end="url(#ah)"/>

<!-- evalcodeex expands down -->
<path d="M555,98 V120" fill="none" stroke="#8E8B80" stroke-width="1.5" marker-end="url(#ah)"/>
<rect x="180" y="122" width="380" height="58" rx="10" fill="#FFFFFF" stroke="#CCC7F1" filter="url(#sh)"/>
<text x="370" y="142" text-anchor="middle" class="h" fill="#2E2972">_PyEval_EvalCodeEx 的两件大事</text>
<text x="280" y="164" text-anchor="middle" class="c" fill="#28415F">① 新建帧 + 绑定参数</text>
<text x="470" y="164" text-anchor="middle" class="c" fill="#28415F">② 跑求值循环</text>

<path d="M370,180 V200" fill="none" stroke="#8E8B80" stroke-width="1.5" marker-end="url(#ah)"/>
<rect x="220" y="202" width="300" height="34" rx="8" fill="url(#gN)" stroke="#D8D3C6"/>
<text x="370" y="223" text-anchor="middle" class="c" fill="#33322E">_PyEval_EvalFrameDefault（上一章的心脏）</text>
</svg>
