<svg width="100%" viewBox="0 0 640 290" xmlns="http://www.w3.org/2000/svg" role="img" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'PingFang SC','Microsoft YaHei',sans-serif">
<title>闭包用 cell 盒子共享外层变量</title>
<desc>闭包的物理基础是 cell 对象，一个只有 ob_ref 一个字段的盒子。被内层函数引用的外层变量不作为普通局部变量存放，而是装进 cell。外层函数 make_counter 的 co_cellvars 里的 count，与内层函数 inc 的 co_freevars 里的 count，指向同一个 cell 盒子。外层把 count 装进盒子，内层通过闭包拿到同一个盒子的引用，于是双方读写同一处。哪怕 make_counter 早已返回、它的帧本该销毁，cell 盒子仍被 inc 的闭包引用而存活，这就是闭包记得住还能改的原因。</desc>
<defs>
  <style>
    .ti{font-size:13px;font-weight:600;}
    .h{font-size:11px;font-weight:600;}
    .d{font-size:10px;}
    .c{font-size:10.5px;font-family:'SF Mono','JetBrains Mono',ui-monospace,Consolas,monospace;}
  </style>
  <filter id="sh" x="-30%" y="-30%" width="160%" height="160%"><feDropShadow dx="0" dy="1.4" stdDeviation="2" flood-color="#2A2A28" flood-opacity="0.12"/></filter>
  <linearGradient id="gN" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#F1EFE8"/><stop offset="1" stop-color="#E7E4DA"/></linearGradient>
  <linearGradient id="gP" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#F3F1FD"/><stop offset="1" stop-color="#E9E6FB"/></linearGradient>
  <linearGradient id="gG" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#EDF4EE"/><stop offset="1" stop-color="#DDEBE0"/></linearGradient>
  <marker id="ah" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#8E8B80" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker>
</defs>

<rect x="0" y="0" width="640" height="290" fill="#FBFAF6"/>
<text x="320" y="28" text-anchor="middle" class="ti" fill="#2E2972">cell：外层与内层共享同一个盒子</text>

<!-- outer frame -->
<rect x="30" y="56" width="200" height="100" rx="11" fill="url(#gN)" stroke="#D8D3C6" filter="url(#sh)"/>
<text x="130" y="78" text-anchor="middle" class="h" fill="#33322E">make_counter 帧</text>
<text x="130" y="100" text-anchor="middle" class="d" fill="#9A988F">co_cellvars: ('count',)</text>
<rect x="60" y="112" width="140" height="30" rx="6" fill="#FFF" stroke="#C8C3B4"/>
<text x="130" y="131" text-anchor="middle" class="c" fill="#33322E">count（cellvar）</text>

<!-- inner frame -->
<rect x="410" y="56" width="200" height="100" rx="11" fill="url(#gG)" stroke="#BFD8C4" filter="url(#sh)"/>
<text x="510" y="78" text-anchor="middle" class="h" fill="#2F6B43">inc 帧</text>
<text x="510" y="100" text-anchor="middle" class="d" fill="#9A988F">co_freevars: ('count',)</text>
<rect x="440" y="112" width="140" height="30" rx="6" fill="#FFF" stroke="#BFD8C4"/>
<text x="510" y="131" text-anchor="middle" class="c" fill="#2F6B43">count（freevar）</text>

<!-- the shared cell -->
<rect x="260" y="186" width="120" height="64" rx="12" fill="url(#gP)" stroke="#CCC7F1" filter="url(#sh)"/>
<text x="320" y="208" text-anchor="middle" class="h" fill="#2E2972">cell 盒子</text>
<rect x="280" y="216" width="80" height="26" rx="6" fill="#FFF" stroke="#CCC7F1"/>
<text x="320" y="234" text-anchor="middle" class="c" fill="#2E2972">ob_ref = 3</text>

<!-- both point to it -->
<path d="M130,142 C130,200 230,210 258,216" fill="none" stroke="#8E8B80" stroke-width="1.6" marker-end="url(#ah)"/>
<path d="M510,142 C510,200 410,210 382,216" fill="none" stroke="#8E8B80" stroke-width="1.6" marker-end="url(#ah)"/>
<text x="180" y="196" text-anchor="middle" class="d" fill="#9A988F">装进盒子</text>
<text x="460" y="196" text-anchor="middle" class="d" fill="#9A988F">闭包拿到同一个盒子</text>

<text x="320" y="274" text-anchor="middle" class="d" fill="#9A988F">make_counter 返回后帧虽销毁，盒子仍被 inc 的闭包引用而存活</text>
</svg>
