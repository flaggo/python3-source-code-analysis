<svg width="100%" viewBox="0 0 640 320" xmlns="http://www.w3.org/2000/svg" role="img" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'PingFang SC','Microsoft YaHei',sans-serif">
<title>参数绑定：实参如何落进 fastlocals</title>
<desc>以 def f(a, b, c=3, *args, **kw) 调用 f(1, 2, 9, 8, x=5) 为例。_PyEval_EvalCodeEx 把实参填进帧的局部变量区 fastlocals。位置参数 1、2 对号入座填进 a、b 槽；c 没传，用 func_defaults 里的默认值 3 补；多余的位置参数 9、8 打包成元组进 args 槽；关键字参数 x=5 没有形参接住，进 kw 字典。各种参数 TypeError 都诞生在这一绑定过程。</desc>
<defs>
  <style>
    .ti{font-size:13px;font-weight:600;}
    .h{font-size:11px;font-weight:600;}
    .d{font-size:9.5px;}
    .c{font-size:10.5px;font-family:'SF Mono','JetBrains Mono',ui-monospace,Consolas,monospace;}
  </style>
  <filter id="sh" x="-30%" y="-30%" width="160%" height="160%"><feDropShadow dx="0" dy="1.4" stdDeviation="2" flood-color="#2A2A28" flood-opacity="0.12"/></filter>
  <linearGradient id="gN" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#F1EFE8"/><stop offset="1" stop-color="#E7E4DA"/></linearGradient>
  <linearGradient id="gB" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#EFF3FA"/><stop offset="1" stop-color="#E0E9F6"/></linearGradient>
  <linearGradient id="gR" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#FBEFE9"/><stop offset="1" stop-color="#F6E2D6"/></linearGradient>
  <linearGradient id="gG" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#EDF4EE"/><stop offset="1" stop-color="#DDEBE0"/></linearGradient>
  <marker id="ah" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6.5" markerHeight="6.5" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#8E8B80" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></marker>
</defs>

<rect x="0" y="0" width="640" height="320" fill="#FBFAF6"/>
<text x="320" y="26" text-anchor="middle" class="ti" fill="#2E2972">参数绑定：f(1, 2, 9, 8, x=5)</text>
<text x="320" y="44" text-anchor="middle" class="c" fill="#46453F">def f(a, b, c=3, *args, **kw)</text>

<!-- call args (left) -->
<text x="90" y="74" text-anchor="middle" class="h" fill="#46453F">传入的实参</text>
<g class="c">
  <rect x="30" y="84" width="120" height="26" rx="5" fill="url(#gB)" stroke="#C3D2E8"/><text x="90" y="101" text-anchor="middle" fill="#28415F">1（位置）</text>
  <rect x="30" y="114" width="120" height="26" rx="5" fill="url(#gB)" stroke="#C3D2E8"/><text x="90" y="131" text-anchor="middle" fill="#28415F">2（位置）</text>
  <rect x="30" y="144" width="120" height="26" rx="5" fill="url(#gB)" stroke="#C3D2E8"/><text x="90" y="161" text-anchor="middle" fill="#28415F">9（位置）</text>
  <rect x="30" y="174" width="120" height="26" rx="5" fill="url(#gB)" stroke="#C3D2E8"/><text x="90" y="191" text-anchor="middle" fill="#28415F">8（位置）</text>
  <rect x="30" y="204" width="120" height="26" rx="5" fill="url(#gR)" stroke="#E8C9B5"/><text x="90" y="221" text-anchor="middle" fill="#9A4A2F">x=5（关键字）</text>
</g>

<!-- fastlocals slots (right) -->
<text x="440" y="74" text-anchor="middle" class="h" fill="#28415F">帧的 fastlocals 槽</text>
<g class="c">
  <rect x="330" y="84" width="220" height="26" rx="5" fill="#FFF" stroke="#C3D2E8"/><text x="344" y="101" fill="#28415F">a = 1</text>
  <rect x="330" y="114" width="220" height="26" rx="5" fill="#FFF" stroke="#C3D2E8"/><text x="344" y="131" fill="#28415F">b = 2</text>
  <rect x="330" y="144" width="220" height="26" rx="5" fill="url(#gG)" stroke="#BFD8C4"/><text x="344" y="161" fill="#2F6B43">c = 3　（func_defaults 补）</text>
  <rect x="330" y="174" width="220" height="26" rx="5" fill="#FFF" stroke="#C3D2E8"/><text x="344" y="191" fill="#28415F">args = (9, 8)</text>
  <rect x="330" y="204" width="220" height="26" rx="5" fill="#FFF" stroke="#E8C9B5"/><text x="344" y="221" fill="#9A4A2F">kw = {'x': 5}</text>
</g>

<!-- mapping arrows -->
<path d="M150,97 H328" fill="none" stroke="#8E8B80" stroke-width="1.4" marker-end="url(#ah)"/>
<path d="M150,127 H328" fill="none" stroke="#8E8B80" stroke-width="1.4" marker-end="url(#ah)"/>
<path d="M150,157 C230,157 240,187 328,187" fill="none" stroke="#8E8B80" stroke-width="1.3" marker-end="url(#ah)"/>
<path d="M150,187 C220,187 250,187 328,187" fill="none" stroke="#8E8B80" stroke-width="1.3" marker-end="url(#ah)"/>
<path d="M150,217 H328" fill="none" stroke="#C77A52" stroke-width="1.4" marker-end="url(#ah)"/>

<text x="240" y="148" text-anchor="middle" class="d" fill="#9A988F">多余 → *args</text>

<text x="320" y="256" text-anchor="middle" class="d" fill="#9A988F">① 位置对号入座　② 多余进 *args　③ 关键字按名匹配　④ 缺位用默认值补　⑤ 没接住的进 **kw</text>
<text x="320" y="284" text-anchor="middle" class="d" fill="#C77A52">缺/多/重/不认识 → 各种 TypeError 都生于此</text>
<text x="320" y="304" text-anchor="middle" class="d" fill="#9A988F">关键字匹配用裸指针比较加速（形参名多为 interned 字符串）</text>
</svg>
