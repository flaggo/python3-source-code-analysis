<svg width="100%" viewBox="0 0 640 290" xmlns="http://www.w3.org/2000/svg" role="img" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'PingFang SC','Microsoft YaHei',sans-serif">
<title>函数对象与 code 对象的分工</title>
<desc>一个 Python 函数是两样东西的组合。左边是 code object，编译好的静态字节码乐谱，可被多个函数对象共享，在循环里反复 def 时底层是同一个 code object。右边是 PyFunctionObject，运行期对象，背着 func_code 指向那份乐谱，外加随上下文而变的随身道具：func_globals 全局名字空间、func_defaults 默认值、func_closure 闭包、func_kwdefaults 等。静态的可共享，随上下文变的挂在函数对象上。</desc>
<defs>
  <style>
    .ti{font-size:13px;font-weight:600;}
    .h{font-size:11.5px;font-weight:600;}
    .d{font-size:10px;}
    .c{font-size:10.5px;font-family:'SF Mono','JetBrains Mono',ui-monospace,Consolas,monospace;}
  </style>
  <filter id="sh" x="-30%" y="-30%" width="160%" height="160%"><feDropShadow dx="0" dy="1.4" stdDeviation="2" flood-color="#2A2A28" flood-opacity="0.12"/></filter>
  <linearGradient id="gN" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#F1EFE8"/><stop offset="1" stop-color="#E7E4DA"/></linearGradient>
  <linearGradient id="gP" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#F3F1FD"/><stop offset="1" stop-color="#E9E6FB"/></linearGradient>
  <marker id="ah" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#8E8B80" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker>
</defs>

<rect x="0" y="0" width="640" height="290" fill="#FBFAF6"/>
<text x="320" y="28" text-anchor="middle" class="ti" fill="#2E2972">一个函数 = 乐谱（code）+ 演奏者（函数对象）</text>

<!-- function object (right) -->
<rect x="330" y="56" width="280" height="200" rx="12" fill="#FFFFFF" stroke="#CCC7F1" filter="url(#sh)"/>
<rect x="330" y="56" width="280" height="34" rx="12" fill="url(#gP)"/>
<rect x="330" y="74" width="280" height="16" fill="url(#gP)"/>
<text x="470" y="78" text-anchor="middle" class="h" fill="#2E2972">PyFunctionObject（运行期）</text>
<g class="c" fill="#2E2972">
  <text x="348" y="116">func_code</text><text x="592" y="116" text-anchor="end" class="d" fill="#9A988F">→ 乐谱</text>
  <text x="348" y="144">func_globals</text><text x="592" y="144" text-anchor="end" class="d" fill="#9A988F">全局名字空间</text>
  <text x="348" y="172">func_defaults</text><text x="592" y="172" text-anchor="end" class="d" fill="#9A988F">默认值元组</text>
  <text x="348" y="200">func_kwdefaults</text><text x="592" y="200" text-anchor="end" class="d" fill="#9A988F">kw 默认值</text>
  <text x="348" y="228">func_closure</text><text x="592" y="228" text-anchor="end" class="d" fill="#9A988F">闭包 cell 元组</text>
</g>
<text x="470" y="250" text-anchor="middle" class="d" fill="#9A988F">随上下文而变 · 每次 def 新建一个</text>

<!-- code object (left) -->
<rect x="30" y="86" width="220" height="120" rx="12" fill="url(#gN)" stroke="#D8D3C6" filter="url(#sh)"/>
<text x="140" y="112" text-anchor="middle" class="h" fill="#33322E">code object</text>
<text x="140" y="134" text-anchor="middle" class="c" fill="#33322E">co_code（字节码）</text>
<text x="140" y="154" text-anchor="middle" class="c" fill="#33322E">co_consts / co_varnames</text>
<text x="140" y="180" text-anchor="middle" class="d" fill="#9A988F">静态乐谱 · 编译一次</text>
<text x="140" y="196" text-anchor="middle" class="d" fill="#9A988F">可被多个函数对象共享</text>

<path d="M330,116 C300,116 280,140 252,140" fill="none" stroke="#8E8B80" stroke-width="1.6" marker-end="url(#ah)"/>
<text x="290" y="100" text-anchor="middle" class="d" fill="#9A988F">func_code 指向</text>

<text x="320" y="278" text-anchor="middle" class="d" fill="#9A988F">a.__code__ is b.__code__ → True，但 a is b → False</text>
</svg>
