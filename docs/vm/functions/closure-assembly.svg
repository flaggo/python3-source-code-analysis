<svg width="100%" viewBox="0 0 640 280" xmlns="http://www.w3.org/2000/svg" role="img" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'PingFang SC','Microsoft YaHei',sans-serif">
<title>闭包的组装与读写</title>
<desc>盒子怎么从外层传到内层函数手里。外层函数在 def inc 之前，用 LOAD_CLOSURE 把 count 的 cell 压栈、打包成闭包元组，MAKE_FUNCTION 带 0x08 标志把它装进 inc 函数对象的 func_closure。于是 inc 一出生就带着外层那个盒子。运行时，对 cell 的读写是专门的两条指令：LOAD_DEREF 透过盒子取值，STORE_DEREF 透过盒子存值。</desc>
<defs>
  <style>
    .ti{font-size:13px;font-weight:600;}
    .h{font-size:11px;font-weight:600;}
    .d{font-size:10px;}
    .c{font-size:10px;font-family:'SF Mono','JetBrains Mono',ui-monospace,Consolas,monospace;}
  </style>
  <filter id="sh" x="-30%" y="-30%" width="160%" height="160%"><feDropShadow dx="0" dy="1.4" stdDeviation="2" flood-color="#2A2A28" flood-opacity="0.12"/></filter>
  <linearGradient id="gN" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#F1EFE8"/><stop offset="1" stop-color="#E7E4DA"/></linearGradient>
  <linearGradient id="gP" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#F3F1FD"/><stop offset="1" stop-color="#E9E6FB"/></linearGradient>
  <linearGradient id="gG" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#EDF4EE"/><stop offset="1" stop-color="#DDEBE0"/></linearGradient>
  <marker id="ah" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#8E8B80" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker>
</defs>

<rect x="0" y="0" width="640" height="280" fill="#FBFAF6"/>
<text x="320" y="26" text-anchor="middle" class="ti" fill="#2E2972">闭包的组装：把盒子传给内层函数</text>

<!-- assembly chain -->
<rect x="30" y="58" width="150" height="44" rx="9" fill="url(#gN)" stroke="#D8D3C6" filter="url(#sh)"/>
<text x="105" y="78" text-anchor="middle" class="c" fill="#33322E">LOAD_CLOSURE</text>
<text x="105" y="94" text-anchor="middle" class="d" fill="#9A988F">把 count 的 cell 压栈</text>

<rect x="210" y="58" width="150" height="44" rx="9" fill="url(#gN)" stroke="#D8D3C6" filter="url(#sh)"/>
<text x="285" y="78" text-anchor="middle" class="c" fill="#33322E">BUILD_TUPLE</text>
<text x="285" y="94" text-anchor="middle" class="d" fill="#9A988F">打包成闭包元组</text>

<rect x="390" y="58" width="160" height="44" rx="9" fill="url(#gP)" stroke="#CCC7F1" filter="url(#sh)"/>
<text x="470" y="78" text-anchor="middle" class="c" fill="#2E2972">MAKE_FUNCTION</text>
<text x="470" y="94" text-anchor="middle" class="d" fill="#9A988F">oparg &amp; 0x08</text>

<path d="M180,80 H208" fill="none" stroke="#8E8B80" stroke-width="1.5" marker-end="url(#ah)"/>
<path d="M360,80 H388" fill="none" stroke="#8E8B80" stroke-width="1.5" marker-end="url(#ah)"/>

<!-- inner function object -->
<path d="M470,102 V124" fill="none" stroke="#8E8B80" stroke-width="1.5" marker-end="url(#ah)"/>
<rect x="370" y="126" width="200" height="48" rx="10" fill="url(#gG)" stroke="#BFD8C4" filter="url(#sh)"/>
<text x="470" y="146" text-anchor="middle" class="h" fill="#2F6B43">inc 函数对象</text>
<text x="470" y="164" text-anchor="middle" class="c" fill="#2F6B43">func_closure = (cell,)</text>

<!-- deref read/write -->
<text x="180" y="150" text-anchor="middle" class="h" fill="#46453F">运行时透过盒子读写</text>
<rect x="40" y="162" width="270" height="80" rx="10" fill="#FFFFFF" stroke="#CCC7F1" filter="url(#sh)"/>
<g class="c" fill="#2E2972">
  <text x="58" y="188">LOAD_DEREF</text><text x="290" y="188" text-anchor="end" class="d" fill="#9A988F">PyCell_GET → 取值</text>
  <line x1="58" y1="200" x2="292" y2="200" stroke="#ECEAE2"/>
  <text x="58" y="222">STORE_DEREF</text><text x="290" y="222" text-anchor="end" class="d" fill="#9A988F">PyCell_SET → 存值</text>
</g>

<text x="320" y="264" text-anchor="middle" class="d" fill="#9A988F">inc 一出生就带着外层的盒子，之后用 DEREF 指令透过它读写 count</text>
</svg>
