<svg width="100%" viewBox="0 0 640 280" xmlns="http://www.w3.org/2000/svg" role="img" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'PingFang SC','Microsoft YaHei',sans-serif">
<title>生成器的挂起与恢复循环</title>
<desc>生成器在调用者和帧之间反复切换。next 或 send 进入帧，从 f_lasti 指向的断点续跑；遇到 yield，YIELD_VALUE 保存现场、把值交出、控制权回到调用者，帧冻在原地；下次 next 或 send 再进入，从上次断点继续。如此往复，直到函数返回，帧被释放、抛出 StopIteration。同一个帧被反复进入和退出，这就是可暂停的函数。</desc>
<defs>
  <style>
    .ti{font-size:13px;font-weight:600;}
    .h{font-size:11px;font-weight:600;}
    .d{font-size:10px;}
    .c{font-size:10px;font-family:'SF Mono','JetBrains Mono',ui-monospace,Consolas,monospace;}
  </style>
  <filter id="sh" x="-30%" y="-30%" width="160%" height="160%"><feDropShadow dx="0" dy="1.4" stdDeviation="2" flood-color="#2A2A28" flood-opacity="0.12"/></filter>
  <linearGradient id="gN" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#F1EFE8"/><stop offset="1" stop-color="#E7E4DA"/></linearGradient>
  <linearGradient id="gG" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#EDF4EE"/><stop offset="1" stop-color="#DDEBE0"/></linearGradient>
  <marker id="ah" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#2F6B43" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></marker>
  <marker id="ahn" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#8E8B80" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></marker>
</defs>

<rect x="0" y="0" width="640" height="280" fill="#FBFAF6"/>
<text x="320" y="28" text-anchor="middle" class="ti" fill="#2E2972">挂起与恢复：同一个帧反复进出</text>

<!-- caller -->
<rect x="40" y="80" width="190" height="120" rx="12" fill="url(#gN)" stroke="#D8D3C6" filter="url(#sh)"/>
<text x="135" y="104" text-anchor="middle" class="h" fill="#33322E">调用者</text>
<text x="135" y="128" text-anchor="middle" class="d" fill="#9A988F">for x in g</text>
<text x="135" y="146" text-anchor="middle" class="d" fill="#9A988F">/ g.send(v)</text>
<text x="135" y="176" text-anchor="middle" class="c" fill="#33322E">拿到 yield 的值</text>

<!-- generator frame -->
<rect x="410" y="80" width="190" height="120" rx="12" fill="url(#gG)" stroke="#BFD8C4" filter="url(#sh)"/>
<text x="505" y="104" text-anchor="middle" class="h" fill="#2F6B43">生成器的帧</text>
<text x="505" y="128" text-anchor="middle" class="d" fill="#6E8C74">局部变量都还在</text>
<text x="505" y="158" text-anchor="middle" class="c" fill="#2F6B43">从 f_lasti 续跑</text>
<text x="505" y="176" text-anchor="middle" class="d" fill="#6E8C74">冻在上次 yield 处</text>

<!-- resume arrow (top) -->
<path d="M232,118 H408" fill="none" stroke="#8E8B80" stroke-width="1.7" marker-end="url(#ahn)"/>
<text x="320" y="108" text-anchor="middle" class="h" fill="#46453F">next / send → 恢复</text>
<text x="320" y="138" text-anchor="middle" class="d" fill="#9A988F">把 send 的值压回帧的求值栈</text>

<!-- yield arrow (bottom) -->
<path d="M408,176 H232" fill="none" stroke="#2F6B43" stroke-width="1.7" marker-end="url(#ah)"/>
<text x="320" y="196" text-anchor="middle" class="h" fill="#2F6B43">yield → 挂起</text>

<text x="320" y="236" text-anchor="middle" class="d" fill="#9A988F">往复，直到函数返回 → 帧释放、抛 StopIteration</text>
<text x="320" y="258" text-anchor="middle" class="d" fill="#9A988F">控制权在调用者与帧之间来回交接，帧始终不被销毁</text>
</svg>
