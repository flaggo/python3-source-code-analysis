<svg width="100%" viewBox="0 0 640 250" xmlns="http://www.w3.org/2000/svg" role="img" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'PingFang SC','Microsoft YaHei',sans-serif">
<title>生成器耗尽：return 变成 StopIteration</title>
<desc>生成器函数执行到结尾或显式 return 时，帧走正常退出路径，f_stacktop 被置成 NULL。gen_send_ex 一看 f_stacktop 等于 NULL，就知道这次是返回不是 yield，于是转换成 StopIteration，return 的值挂在异常的 value 上，并释放帧。这让生成器和 for 协议天然咬合：for x in g 不断对 g 调 next，每轮取一个 yield 的值，直到某次 next 抛 StopIteration，循环结束。</desc>
<defs>
  <style>
    .ti{font-size:13px;font-weight:600;}
    .h{font-size:11px;font-weight:600;}
    .d{font-size:10px;}
    .c{font-size:10px;font-family:'SF Mono','JetBrains Mono',ui-monospace,Consolas,monospace;}
  </style>
  <filter id="sh" x="-30%" y="-30%" width="160%" height="160%"><feDropShadow dx="0" dy="1.4" stdDeviation="2" flood-color="#2A2A28" flood-opacity="0.12"/></filter>
  <linearGradient id="gN" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#F1EFE8"/><stop offset="1" stop-color="#E7E4DA"/></linearGradient>
  <linearGradient id="gR" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#FBEFE9"/><stop offset="1" stop-color="#F6E2D6"/></linearGradient>
  <linearGradient id="gG" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#EDF4EE"/><stop offset="1" stop-color="#DDEBE0"/></linearGradient>
  <marker id="ah" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#8E8B80" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker>
  <marker id="ahr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#C77A52" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/></marker>
</defs>

<rect x="0" y="0" width="640" height="250" fill="#FBFAF6"/>
<text x="320" y="28" text-anchor="middle" class="ti" fill="#2E2972">耗尽：return → StopIteration，帧释放</text>

<rect x="30" y="60" width="170" height="50" rx="9" fill="url(#gG)" stroke="#BFD8C4" filter="url(#sh)"/>
<text x="115" y="80" text-anchor="middle" class="c" fill="#2F6B43">函数 return</text>
<text x="115" y="98" text-anchor="middle" class="d" fill="#3C5C46">帧走正常退出</text>

<rect x="240" y="60" width="170" height="50" rx="9" fill="url(#gN)" stroke="#D8D3C6" filter="url(#sh)"/>
<text x="325" y="80" text-anchor="middle" class="c" fill="#9A4A2F">f_stacktop = NULL</text>
<text x="325" y="98" text-anchor="middle" class="d" fill="#9A988F">标志位：返回了</text>

<rect x="450" y="60" width="170" height="50" rx="9" fill="url(#gR)" stroke="#E8C9B5" filter="url(#sh)"/>
<text x="535" y="80" text-anchor="middle" class="c" fill="#9A4A2F">raise StopIteration</text>
<text x="535" y="98" text-anchor="middle" class="d" fill="#9A4A2F">return 值挂在 .value</text>

<path d="M200,85 H238" fill="none" stroke="#8E8B80" stroke-width="1.5" marker-end="url(#ah)"/>
<path d="M410,85 H448" fill="none" stroke="#C77A52" stroke-width="1.6" marker-end="url(#ahr)"/>

<!-- for loop tie-in -->
<rect x="120" y="150" width="400" height="60" rx="11" fill="#FFFFFF" stroke="#C3D2E8" filter="url(#sh)"/>
<text x="320" y="172" text-anchor="middle" class="h" fill="#28415F">这正是 for 协议的另一端</text>
<text x="320" y="192" text-anchor="middle" class="c" fill="#28415F">for x in g：不断 next(g)，直到 StopIteration 才停</text>
<path d="M535,110 C535,135 420,145 400,150" fill="none" stroke="#C77A52" stroke-width="1.4" stroke-dasharray="4 3" marker-end="url(#ahr)"/>

<text x="320" y="234" text-anchor="middle" class="d" fill="#9A988F">「yield 一个值」对应「next 返回」，「函数返回」对应「StopIteration」</text>
</svg>
