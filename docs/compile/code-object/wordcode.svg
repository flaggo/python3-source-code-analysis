<svg width="100%" viewBox="0 0 700 290" xmlns="http://www.w3.org/2000/svg" role="img" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'PingFang SC','Microsoft YaHei',sans-serif">
<title>wordcode：每条指令两字节，oparg 是各表的下标</title>
<desc>3.6 起 co_code 采用 wordcode：每条指令固定两字节，前一字节是操作码 opcode，后一字节是参数 oparg。oparg 往往是某张表的下标——例如 LOAD_FAST 0 表示取局部名表 co_varnames 的第 0 项 a。图中展示 c = a + b 的字节码，以及 LOAD_FAST 的 oparg 如何索引到 co_varnames。</desc>
<defs>
  <style>
    .ti{font-size:12.5px;font-weight:600;}
    .op{font-size:11px;font-weight:600;font-family:'SF Mono','JetBrains Mono',ui-monospace,Consolas,monospace;}
    .arg{font-size:12px;font-weight:600;font-family:'SF Mono','JetBrains Mono',ui-monospace,Consolas,monospace;}
    .lab{font-size:10.5px;}
    .tbl{font-size:11px;font-family:'SF Mono','JetBrains Mono',ui-monospace,Consolas,monospace;}
  </style>
  <filter id="sh" x="-30%" y="-30%" width="160%" height="160%"><feDropShadow dx="0" dy="1.4" stdDeviation="2" flood-color="#2A2A28" flood-opacity="0.12"/></filter>
  <marker id="ahg" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#1E8B6F" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></marker>
</defs>

<rect x="0" y="0" width="700" height="290" fill="#FBFAF6"/>
<text x="350" y="28" text-anchor="middle" class="ti" fill="#5C3C08">co_code：每条指令两字节（opcode + oparg）</text>
<text x="350" y="48" text-anchor="middle" class="lab" fill="#9A988F">源码：c = a + b</text>

<!-- bytecode cells: 4 instructions, each opcode+oparg -->
<!-- helper layout: each instr 150 wide (opcode 95 + arg 55), start x=30 -->
<g>
  <!-- LOAD_FAST 0 -->
  <rect x="30" y="70" width="100" height="40" rx="6" fill="#FAEFD9" stroke="#E8CB94"/><text x="80" y="95" text-anchor="middle" class="op" fill="#5C3C08">LOAD_FAST</text>
  <rect x="130" y="70" width="40" height="40" rx="6" fill="#FFFFFF" stroke="#E8CB94"/><text x="150" y="95" text-anchor="middle" class="arg" fill="#0A463A">0</text>
  <!-- LOAD_FAST 1 -->
  <rect x="180" y="70" width="100" height="40" rx="6" fill="#FAEFD9" stroke="#E8CB94"/><text x="230" y="95" text-anchor="middle" class="op" fill="#5C3C08">LOAD_FAST</text>
  <rect x="280" y="70" width="40" height="40" rx="6" fill="#FFFFFF" stroke="#E8CB94"/><text x="300" y="95" text-anchor="middle" class="arg" fill="#0A463A">1</text>
  <!-- BINARY_ADD (no real arg) -->
  <rect x="330" y="70" width="100" height="40" rx="6" fill="#F4E6C8" stroke="#E8CB94"/><text x="380" y="95" text-anchor="middle" class="op" fill="#5C3C08">BINARY_ADD</text>
  <rect x="430" y="70" width="40" height="40" rx="6" fill="#FBFAF6" stroke="#E8CB94"/><text x="450" y="95" text-anchor="middle" class="arg" fill="#B8B5AC">0</text>
  <!-- STORE_FAST 2 -->
  <rect x="480" y="70" width="100" height="40" rx="6" fill="#FAEFD9" stroke="#E8CB94"/><text x="530" y="95" text-anchor="middle" class="op" fill="#5C3C08">STORE_FAST</text>
  <rect x="580" y="70" width="40" height="40" rx="6" fill="#FFFFFF" stroke="#E8CB94"/><text x="600" y="95" text-anchor="middle" class="arg" fill="#0A463A">2</text>
</g>
<!-- labels under -->
<g class="lab" fill="#9A988F" text-anchor="middle">
  <text x="80" y="126">opcode</text><text x="150" y="126">oparg</text>
  <text x="100" y="142">第 0 条（偏移 0）</text>
  <text x="250" y="142">第 1 条（偏移 2）</text>
  <text x="400" y="142">第 2 条（偏移 4）</text>
  <text x="550" y="142">第 3 条（偏移 6）</text>
</g>

<!-- co_varnames table -->
<text x="80" y="196" class="ti" fill="#28415F">co_varnames</text>
<g>
  <rect x="80" y="206" width="60" height="38" rx="6" fill="#EFF3FA" stroke="#C3D2E8" filter="url(#sh)"/><text x="110" y="223" text-anchor="middle" class="tbl" fill="#28415F">a</text><text x="110" y="238" text-anchor="middle" class="lab" fill="#6B7E9E">[0]</text>
  <rect x="142" y="206" width="60" height="38" rx="6" fill="#FFFFFF" stroke="#C3D2E8" filter="url(#sh)"/><text x="172" y="223" text-anchor="middle" class="tbl" fill="#28415F">b</text><text x="172" y="238" text-anchor="middle" class="lab" fill="#6B7E9E">[1]</text>
  <rect x="204" y="206" width="60" height="38" rx="6" fill="#FFFFFF" stroke="#C3D2E8" filter="url(#sh)"/><text x="234" y="223" text-anchor="middle" class="tbl" fill="#28415F">c</text><text x="234" y="238" text-anchor="middle" class="lab" fill="#6B7E9E">[2]</text>
</g>

<!-- arrow from LOAD_FAST oparg 0 to co_varnames[0] -->
<path d="M150,110 C150,150 110,170 110,204" fill="none" stroke="#1E8B6F" stroke-width="1.6" marker-end="url(#ahg)"/>
<text x="300" y="224" class="lab" fill="#0A463A">oparg 0 → co_varnames[0] 即名字 a；STORE_FAST 2 → 写回 c</text>
</svg>
