<svg width="100%" viewBox="0 0 700 210" xmlns="http://www.w3.org/2000/svg" role="img" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'PingFang SC','Microsoft YaHei',sans-serif">
<title>词法分析：源码切成 token 流</title>
<desc>词法分析把源码字符串 x = 1 + 2 逐字符扫描，切成一个个有类型的最小单元 token：名字 x 是 NAME，等号和加号是 OP，1 和 2 是 NUMBER，行尾是 NEWLINE。token 流是后续语法分析的输入。</desc>
<defs>
  <style>
    .ti{font-size:12.5px;font-weight:600;}
    .src{font-size:15px;font-family:'SF Mono','JetBrains Mono',ui-monospace,Consolas,monospace;font-weight:600;}
    .tt{font-size:11px;font-weight:600;}
    .tv{font-size:12px;font-family:'SF Mono','JetBrains Mono',ui-monospace,Consolas,monospace;}
  </style>
  <filter id="sh" x="-30%" y="-30%" width="160%" height="160%"><feDropShadow dx="0" dy="1.4" stdDeviation="2" flood-color="#2A2A28" flood-opacity="0.12"/></filter>
  <linearGradient id="gA" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#FAEFD9"/><stop offset="1" stop-color="#F4E6C8"/></linearGradient>
  <linearGradient id="gN" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#F1EFE8"/><stop offset="1" stop-color="#E7E4DA"/></linearGradient>
  <marker id="ah" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#8E8B80" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></marker>
</defs>

<rect x="0" y="0" width="700" height="210" fill="#FBFAF6"/>
<text x="350" y="30" text-anchor="middle" class="ti" fill="#5C3C08">词法分析：x = 1 + 2 切成 token 流</text>

<!-- source string -->
<rect x="250" y="52" width="200" height="40" rx="9" fill="url(#gN)" stroke="#D8D3C6" stroke-width="1" filter="url(#sh)"/>
<text x="350" y="78" text-anchor="middle" class="src" fill="#33322E">x = 1 + 2</text>
<path d="M350,92 V116" fill="none" stroke="#8E8B80" stroke-width="1.6" marker-end="url(#ah)"/>

<!-- tokens -->
<g>
  <rect x="36" y="120" width="118" height="56" rx="8" fill="url(#gA)" stroke="#E8CB94" stroke-width="1" filter="url(#sh)"/>
  <text x="95" y="142" text-anchor="middle" class="tt" fill="#5C3C08">NAME</text>
  <text x="95" y="162" text-anchor="middle" class="tv" fill="#8A6A1E">'x'</text>

  <rect x="164" y="120" width="92" height="56" rx="8" fill="url(#gA)" stroke="#E8CB94" stroke-width="1" filter="url(#sh)"/>
  <text x="210" y="142" text-anchor="middle" class="tt" fill="#5C3C08">OP</text>
  <text x="210" y="162" text-anchor="middle" class="tv" fill="#8A6A1E">'='</text>

  <rect x="266" y="120" width="118" height="56" rx="8" fill="url(#gA)" stroke="#E8CB94" stroke-width="1" filter="url(#sh)"/>
  <text x="325" y="142" text-anchor="middle" class="tt" fill="#5C3C08">NUMBER</text>
  <text x="325" y="162" text-anchor="middle" class="tv" fill="#8A6A1E">'1'</text>

  <rect x="394" y="120" width="92" height="56" rx="8" fill="url(#gA)" stroke="#E8CB94" stroke-width="1" filter="url(#sh)"/>
  <text x="440" y="142" text-anchor="middle" class="tt" fill="#5C3C08">OP</text>
  <text x="440" y="162" text-anchor="middle" class="tv" fill="#8A6A1E">'+'</text>

  <rect x="496" y="120" width="118" height="56" rx="8" fill="url(#gA)" stroke="#E8CB94" stroke-width="1" filter="url(#sh)"/>
  <text x="555" y="142" text-anchor="middle" class="tt" fill="#5C3C08">NUMBER</text>
  <text x="555" y="162" text-anchor="middle" class="tv" fill="#8A6A1E">'2'</text>

  <rect x="624" y="120" width="58" height="56" rx="8" fill="#F1EFE8" stroke="#D8D3C6" stroke-width="1" filter="url(#sh)"/>
  <text x="653" y="142" text-anchor="middle" class="tt" fill="#7B7A72">NEW</text>
  <text x="653" y="156" text-anchor="middle" class="tt" fill="#7B7A72">LINE</text>
  <text x="653" y="170" text-anchor="middle" class="tv" fill="#B8B5AC">\n</text>
</g>
<text x="350" y="198" text-anchor="middle" font-size="11px" fill="#9A988F">每个 token 是「类型 + 文本」的最小单元，是语法分析的输入</text>
</svg>
