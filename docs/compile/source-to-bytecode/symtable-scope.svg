<svg width="100%" viewBox="0 0 700 270" xmlns="http://www.w3.org/2000/svg" role="img" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'PingFang SC','Microsoft YaHei',sans-serif">
<title>符号表：分析每个名字的作用域</title>
<desc>符号表为每段代码分析其中每个名字属于哪种作用域。在函数 f(a) 里，参数 a 和赋值得到的 b 都是局部变量；而 g 在函数里只被读取、没有被赋值，于是被判定为全局变量，需要到外层模块作用域去找。编译器据此为不同名字生成不同的取值字节码。</desc>
<defs>
  <style>
    .ti{font-size:12.5px;font-weight:600;}
    .lab{font-size:11.5px;font-weight:600;}
    .code{font-size:11.5px;font-family:'SF Mono','JetBrains Mono',ui-monospace,Consolas,monospace;}
    .chip{font-size:11.5px;font-weight:600;font-family:'SF Mono','JetBrains Mono',ui-monospace,Consolas,monospace;}
    .cap{font-size:10.5px;}
  </style>
  <filter id="sh" x="-30%" y="-30%" width="160%" height="160%"><feDropShadow dx="0" dy="1.4" stdDeviation="2" flood-color="#2A2A28" flood-opacity="0.12"/></filter>
  <linearGradient id="gG" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#E9F6F1"/><stop offset="1" stop-color="#DBF0E7"/></linearGradient>
  <linearGradient id="gB" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#EFF3FA"/><stop offset="1" stop-color="#E0E9F6"/></linearGradient>
  <marker id="ah" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#4A5E80" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></marker>
</defs>

<rect x="0" y="0" width="700" height="270" fill="#FBFAF6"/>
<text x="350" y="28" text-anchor="middle" class="ti" fill="#0A463A">符号表：判定每个名字的作用域</text>

<!-- outer: module / global scope -->
<rect x="28" y="46" width="644" height="200" rx="11" fill="#FFFFFF" stroke="#C3D2E8" stroke-width="1.3" stroke-dasharray="6 5"/>
<text x="46" y="68" class="lab" fill="#28415F">模块（全局作用域）</text>
<text x="600" y="68" class="code" fill="#4A5E80">g = 0</text>

<!-- global name g chip -->
<rect x="556" y="150" width="96" height="40" rx="9" fill="url(#gB)" stroke="#C3D2E8" stroke-width="1" filter="url(#sh)"/>
<text x="604" y="167" text-anchor="middle" class="chip" fill="#28415F">g</text>
<text x="604" y="182" text-anchor="middle" class="cap" fill="#4A5E80">全局变量</text>

<!-- inner: function f local scope -->
<rect x="52" y="84" width="420" height="146" rx="10" fill="url(#gG)" stroke="#A8DCC9" stroke-width="1.2" filter="url(#sh)"/>
<text x="70" y="106" class="lab" fill="#0A463A">函数 f 的局部作用域</text>
<g class="code" fill="#0C5945">
  <text x="70" y="130">def f(a):</text>
  <text x="70" y="148">    b = a + g</text>
  <text x="70" y="166">    return b</text>
</g>

<!-- local chips -->
<rect x="70" y="182" width="86" height="36" rx="9" fill="#FFFFFF" stroke="#A8DCC9" stroke-width="1"/>
<text x="113" y="198" text-anchor="middle" class="chip" fill="#0A463A">a</text>
<text x="113" y="212" text-anchor="middle" class="cap" fill="#0C5945">参数·局部</text>
<rect x="166" y="182" width="86" height="36" rx="9" fill="#FFFFFF" stroke="#A8DCC9" stroke-width="1"/>
<text x="209" y="198" text-anchor="middle" class="chip" fill="#0A463A">b</text>
<text x="209" y="212" text-anchor="middle" class="cap" fill="#0C5945">赋值·局部</text>

<!-- arrow: g not local -> go global -->
<path d="M300,148 C420,140 480,150 552,166" fill="none" stroke="#4A5E80" stroke-width="1.6" marker-end="url(#ah)"/>
<text x="430" y="128" text-anchor="middle" class="cap" fill="#4A5E80">本地没赋值 → 判为全局，去外层找</text>
</svg>
