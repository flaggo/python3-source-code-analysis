<svg width="100%" viewBox="0 0 640 250" xmlns="http://www.w3.org/2000/svg" role="img" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'PingFang SC','Microsoft YaHei',sans-serif">
<title>__main__ 模块与代码的运行</title>
<desc>舞台搭好后，无论你是 python foo.py、python -c 还是进 REPL，顶层代码都在 __main__ 模块的 __dict__ 里执行，这就是顶层那层全局名字空间，由阶段二的 add_main_module 早早建好。直接运行的脚本，其模块名被设成 __main__；被 import 时，模块名是它的文件名。所以 if __name__ == __main__ 这个判断，本质就是在问我是不是那个顶层模块，而不是被 import 进来的。</desc>
<defs>
  <style>
    .ti{font-size:13px;font-weight:600;}
    .h{font-size:11px;font-weight:600;}
    .d{font-size:10px;}
    .c{font-size:10px;font-family:'SF Mono','JetBrains Mono',ui-monospace,Consolas,monospace;}
  </style>
  <filter id="sh" x="-30%" y="-30%" width="160%" height="160%"><feDropShadow dx="0" dy="1.4" stdDeviation="2" flood-color="#2A2A28" flood-opacity="0.12"/></filter>
  <linearGradient id="gG" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#EDF4EE"/><stop offset="1" stop-color="#DDEBE0"/></linearGradient>
  <linearGradient id="gN" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#F1EFE8"/><stop offset="1" stop-color="#E7E4DA"/></linearGradient>
  <marker id="ah" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#8E8B80" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker>
</defs>

<rect x="0" y="0" width="640" height="250" fill="#FBFAF6"/>
<text x="320" y="28" text-anchor="middle" class="ti" fill="#2E2972">你的代码运行在 __main__ 的名字空间里</text>

<!-- three entries -->
<g class="c">
  <rect x="30" y="60" width="150" height="30" rx="6" fill="url(#gN)" stroke="#D8D3C6"/><text x="105" y="80" text-anchor="middle" fill="#33322E">python foo.py</text>
  <rect x="30" y="98" width="150" height="30" rx="6" fill="url(#gN)" stroke="#D8D3C6"/><text x="105" y="118" text-anchor="middle" fill="#33322E">python -c "..."</text>
  <rect x="30" y="136" width="150" height="30" rx="6" fill="url(#gN)" stroke="#D8D3C6"/><text x="105" y="156" text-anchor="middle" fill="#33322E">REPL</text>
</g>

<!-- __main__ module -->
<rect x="270" y="74" width="190" height="80" rx="11" fill="url(#gG)" stroke="#BFD8C4" filter="url(#sh)"/>
<text x="365" y="98" text-anchor="middle" class="h" fill="#2F6B43">__main__ 模块</text>
<text x="365" y="118" text-anchor="middle" class="d" fill="#3C5C46">add_main_module 建好</text>
<rect x="290" y="126" width="150" height="20" rx="5" fill="#FFF" stroke="#BFD8C4"/>
<text x="365" y="141" text-anchor="middle" class="c" fill="#2F6B43">__dict__ = 顶层全局名字空间</text>

<path d="M180,75 C220,95 240,108 268,112" fill="none" stroke="#8E8B80" stroke-width="1.4" marker-end="url(#ah)"/>
<path d="M180,113 H266" fill="none" stroke="#8E8B80" stroke-width="1.4" marker-end="url(#ah)"/>
<path d="M180,151 C220,135 240,120 268,116" fill="none" stroke="#8E8B80" stroke-width="1.4" marker-end="url(#ah)"/>

<!-- __name__ result -->
<rect x="500" y="84" width="120" height="60" rx="10" fill="#FFFFFF" stroke="#CCC7F1" filter="url(#sh)"/>
<text x="560" y="108" text-anchor="middle" class="c" fill="#2E2972">__name__</text>
<text x="560" y="128" text-anchor="middle" class="c" fill="#2E2972">== "__main__"</text>
<path d="M460,114 H498" fill="none" stroke="#8E8B80" stroke-width="1.5" marker-end="url(#ah)"/>

<text x="320" y="190" text-anchor="middle" class="d" fill="#9A988F">直接运行 → 模块名设为 "__main__"；被 import → 模块名是文件名</text>
<text x="320" y="212" text-anchor="middle" class="c" fill="#46453F">if __name__ == "__main__": 即在问「我是不是那个顶层模块」</text>
</svg>
