<svg width="100%" viewBox="0 0 640 300" xmlns="http://www.w3.org/2000/svg" role="img" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'PingFang SC','Microsoft YaHei',sans-serif">
<title>两阶段初始化</title>
<desc>Py_Initialize 内部分两阶段。阶段一 _Py_InitializeCore 打地基：建主解释器、第一个线程状态、创建 GIL，把最底层的类型系统就绪，立起 sys 和 builtins 模块，启动 frozen importlib。阶段二 _Py_InitializeMainInterpreter 盖房子：补全 sys，装上基于文件系统的 import，创建 __main__ 模块，建标准输入输出流，装信号处理和 site。分两阶段的原因：阶段一末尾要启动用 Python 写的 importlib，必须先有一个最小可运行的 Python 环境。</desc>
<defs>
  <style>
    .ti{font-size:13px;font-weight:600;}
    .h{font-size:11.5px;font-weight:600;}
    .d{font-size:10px;}
    .c{font-size:9.5px;font-family:'SF Mono','JetBrains Mono',ui-monospace,Consolas,monospace;}
  </style>
  <filter id="sh" x="-30%" y="-30%" width="160%" height="160%"><feDropShadow dx="0" dy="1.4" stdDeviation="2" flood-color="#2A2A28" flood-opacity="0.12"/></filter>
  <linearGradient id="gB" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#EFF3FA"/><stop offset="1" stop-color="#E0E9F6"/></linearGradient>
  <linearGradient id="gG" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#EDF4EE"/><stop offset="1" stop-color="#DDEBE0"/></linearGradient>
  <marker id="ah" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#8E8B80" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker>
</defs>

<rect x="0" y="0" width="640" height="300" fill="#FBFAF6"/>
<text x="320" y="28" text-anchor="middle" class="ti" fill="#2E2972">两阶段：先打地基，再盖房子</text>

<!-- phase 1 -->
<rect x="30" y="50" width="270" height="210" rx="12" fill="url(#gB)" stroke="#C3D2E8" filter="url(#sh)"/>
<text x="165" y="72" text-anchor="middle" class="h" fill="#28415F">① _Py_InitializeCore</text>
<text x="165" y="88" text-anchor="middle" class="d" fill="#9A988F">打地基</text>
<g class="c" fill="#28415F">
  <text x="50" y="112">建主解释器 + 线程状态</text>
  <text x="50" y="134">PyEval_InitThreads（GIL）</text>
  <text x="50" y="156">_Py_ReadyTypes（类型系统）</text>
  <text x="50" y="178">sys（半成品）</text>
  <text x="50" y="200">builtins + 内建异常</text>
  <text x="50" y="222">initimport（frozen import）</text>
</g>
<text x="165" y="248" text-anchor="middle" class="d" fill="#28415F">core_initialized = 1</text>

<!-- phase 2 -->
<rect x="340" y="50" width="270" height="210" rx="12" fill="url(#gG)" stroke="#BFD8C4" filter="url(#sh)"/>
<text x="475" y="72" text-anchor="middle" class="h" fill="#2F6B43">② _Py_InitializeMainInterpreter</text>
<text x="475" y="88" text-anchor="middle" class="d" fill="#6E8C74">盖房子</text>
<g class="c" fill="#2F6B43">
  <text x="360" y="112">_PySys_EndInit（argv、path）</text>
  <text x="360" y="134">initexternalimport（文件系统）</text>
  <text x="360" y="156">initsigs（信号）</text>
  <text x="360" y="178">add_main_module（__main__）</text>
  <text x="360" y="200">init_sys_streams（标准流）</text>
  <text x="360" y="222">initsite（site-packages）</text>
</g>
<text x="475" y="248" text-anchor="middle" class="d" fill="#2F6B43">initialized = 1</text>

<path d="M300,155 H338" fill="none" stroke="#8E8B80" stroke-width="1.6" marker-end="url(#ah)"/>

<text x="320" y="284" text-anchor="middle" class="d" fill="#9A988F">分两阶段：阶段一先搭出「最小可运行的 Python」，才有底气启动 import、import 标准库</text>
</svg>
