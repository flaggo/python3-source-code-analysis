<svg width="100%" viewBox="0 0 640 210" xmlns="http://www.w3.org/2000/svg" role="img" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'PingFang SC','Microsoft YaHei',sans-serif">
<title>自举的依赖顺序：类型 → sys/builtins → import</title>
<desc>阶段一的初始化调用顺序是一条严格的依赖链。类型系统打头，_Py_ReadyTypes 把 int、str、type、object 等所有内建类型就绪，没有类型连一个对象都造不出来。有了类型才能造出 sys、builtins 两个模块对象，填进 print、len、内建异常。前两者就绪，才有底气启动 importlib。任何后者都依赖前者已经就绪。</desc>
<defs>
  <style>
    .ti{font-size:13px;font-weight:600;}
    .h{font-size:11.5px;font-weight:600;}
    .d{font-size:10px;}
    .c{font-size:10px;font-family:'SF Mono','JetBrains Mono',ui-monospace,Consolas,monospace;}
  </style>
  <filter id="sh" x="-30%" y="-30%" width="160%" height="160%"><feDropShadow dx="0" dy="1.4" stdDeviation="2" flood-color="#2A2A28" flood-opacity="0.12"/></filter>
  <linearGradient id="g1" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#F3F1FD"/><stop offset="1" stop-color="#E9E6FB"/></linearGradient>
  <linearGradient id="g2" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#EFF3FA"/><stop offset="1" stop-color="#E0E9F6"/></linearGradient>
  <linearGradient id="g3" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#EDF4EE"/><stop offset="1" stop-color="#DDEBE0"/></linearGradient>
  <marker id="ah" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#8E8B80" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker>
</defs>

<rect x="0" y="0" width="640" height="210" fill="#FBFAF6"/>
<text x="320" y="30" text-anchor="middle" class="ti" fill="#2E2972">自举依赖链：后者都站在前者肩上</text>

<rect x="40" y="70" width="150" height="76" rx="11" fill="url(#g1)" stroke="#CCC7F1" filter="url(#sh)"/>
<text x="115" y="98" text-anchor="middle" class="h" fill="#2E2972">① 类型系统</text>
<text x="115" y="118" text-anchor="middle" class="c" fill="#2E2972">_Py_ReadyTypes</text>
<text x="115" y="134" text-anchor="middle" class="d" fill="#9A988F">int/str/type/object</text>

<rect x="245" y="70" width="150" height="76" rx="11" fill="url(#g2)" stroke="#C3D2E8" filter="url(#sh)"/>
<text x="320" y="98" text-anchor="middle" class="h" fill="#28415F">② sys / builtins</text>
<text x="320" y="118" text-anchor="middle" class="c" fill="#28415F">print · len</text>
<text x="320" y="134" text-anchor="middle" class="d" fill="#9A988F">内建异常</text>

<rect x="450" y="70" width="150" height="76" rx="11" fill="url(#g3)" stroke="#BFD8C4" filter="url(#sh)"/>
<text x="525" y="98" text-anchor="middle" class="h" fill="#2F6B43">③ import</text>
<text x="525" y="118" text-anchor="middle" class="c" fill="#2F6B43">importlib</text>
<text x="525" y="134" text-anchor="middle" class="d" fill="#9A988F">frozen 自举</text>

<path d="M190,108 H243" fill="none" stroke="#8E8B80" stroke-width="1.7" marker-end="url(#ah)"/>
<path d="M395,108 H448" fill="none" stroke="#8E8B80" stroke-width="1.7" marker-end="url(#ah)"/>

<text x="320" y="182" text-anchor="middle" class="d" fill="#9A988F">没有类型，造不出对象；没有 sys/builtins，启动不了 import</text>
</svg>
