<svg width="100%" viewBox="0 0 600 320" xmlns="http://www.w3.org/2000/svg" role="img" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'PingFang SC','Microsoft YaHei',sans-serif">
<title>三层运行期状态的嵌套</title>
<desc>运行期状态分三个嵌套层次。最外层是全局唯一的 _PyRuntimeState，装着 GC、GIL 这类整个进程共享的东西，以及所有解释器的链表。中间是解释器级 PyInterpreterState，一个进程可以有多个，各自有独立的 modules、sysdict、builtins、importlib。最内层是线程级 PyThreadState，每个 Python 线程一个，装着当前帧 frame、递归深度、异常状态。一个 runtime 下挂若干 interpreter，每个 interpreter 下挂若干 thread，每个 thread 指着它当前的帧。</desc>
<defs>
  <style>
    .ti{font-size:13px;font-weight:600;}
    .h{font-size:11px;font-weight:600;}
    .d{font-size:9.5px;}
    .c{font-size:10px;font-family:'SF Mono','JetBrains Mono',ui-monospace,Consolas,monospace;}
  </style>
  <filter id="sh" x="-30%" y="-30%" width="160%" height="160%"><feDropShadow dx="0" dy="1.4" stdDeviation="2" flood-color="#2A2A28" flood-opacity="0.12"/></filter>
  <linearGradient id="gN" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#F4F2EC"/><stop offset="1" stop-color="#ECE9DF"/></linearGradient>
  <linearGradient id="gB" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#EFF3FA"/><stop offset="1" stop-color="#E0E9F6"/></linearGradient>
  <linearGradient id="gG" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#EDF4EE"/><stop offset="1" stop-color="#DDEBE0"/></linearGradient>
</defs>

<rect x="0" y="0" width="600" height="320" fill="#FBFAF6"/>
<text x="300" y="28" text-anchor="middle" class="ti" fill="#2E2972">runtime ⊃ interpreter ⊃ thread</text>

<!-- runtime outer -->
<rect x="30" y="44" width="540" height="256" rx="14" fill="url(#gN)" stroke="#D8D3C6" filter="url(#sh)"/>
<text x="50" y="66" class="h" fill="#33322E">_PyRuntimeState（全局唯一 _PyRuntime）</text>
<text x="50" y="82" class="d" fill="#9A988F">GC · GIL · ceval · 解释器链表</text>

<!-- interpreter -->
<rect x="50" y="92" width="500" height="194" rx="12" fill="url(#gB)" stroke="#C3D2E8"/>
<text x="68" y="114" class="h" fill="#28415F">PyInterpreterState（解释器，可多个）</text>
<text x="68" y="130" class="c" fill="#28415F">modules · sysdict · builtins · importlib</text>

<!-- threads -->
<rect x="70" y="140" width="220" height="132" rx="10" fill="url(#gG)" stroke="#BFD8C4"/>
<text x="180" y="162" text-anchor="middle" class="h" fill="#2F6B43">PyThreadState 线程 1</text>
<text x="180" y="182" text-anchor="middle" class="c" fill="#2F6B43">frame（当前帧）</text>
<text x="180" y="200" text-anchor="middle" class="d" fill="#3C5C46">recursion_depth</text>
<text x="180" y="216" text-anchor="middle" class="d" fill="#3C5C46">curexc_* / exc_info</text>
<rect x="100" y="226" width="160" height="34" rx="7" fill="#FFF" stroke="#BFD8C4"/>
<text x="180" y="247" text-anchor="middle" class="c" fill="#2F6B43">→ 帧栈（栈顶）</text>

<rect x="310" y="140" width="220" height="132" rx="10" fill="url(#gG)" stroke="#BFD8C4"/>
<text x="420" y="162" text-anchor="middle" class="h" fill="#2F6B43">PyThreadState 线程 2</text>
<text x="420" y="182" text-anchor="middle" class="c" fill="#2F6B43">frame（当前帧）</text>
<text x="420" y="200" text-anchor="middle" class="d" fill="#3C5C46">recursion_depth</text>
<text x="420" y="216" text-anchor="middle" class="d" fill="#3C5C46">curexc_* / exc_info</text>
<rect x="340" y="226" width="160" height="34" rx="7" fill="#FFF" stroke="#BFD8C4"/>
<text x="420" y="247" text-anchor="middle" class="c" fill="#2F6B43">→ 帧栈（栈顶）</text>
</svg>
