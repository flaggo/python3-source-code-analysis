<svg width="100%" viewBox="0 0 660 200" xmlns="http://www.w3.org/2000/svg" role="img" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'PingFang SC','Microsoft YaHei',sans-serif">
<title>Python 启动流水线</title>
<desc>从 main 到你的代码的启动主线。main 是可执行文件入口，调用 Py_Main。Py_Main 解析命令行参数后做两件大事：先初始化运行环境 Py_Initialize，再运行你的代码。Py_Initialize 底层分为 _Py_InitializeCore 和 _Py_InitializeMainInterpreter 两阶段，把运行环境从无到有搭起来。初始化做完，才视参数运行文件、-c 命令、-m 模块或进入 REPL。</desc>
<defs>
  <style>
    .ti{font-size:13px;font-weight:600;}
    .h{font-size:11px;font-weight:600;}
    .d{font-size:9.5px;}
    .c{font-size:10.5px;font-family:'SF Mono','JetBrains Mono',ui-monospace,Consolas,monospace;}
  </style>
  <filter id="sh" x="-30%" y="-30%" width="160%" height="160%"><feDropShadow dx="0" dy="1.4" stdDeviation="2" flood-color="#2A2A28" flood-opacity="0.12"/></filter>
  <linearGradient id="gN" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#F1EFE8"/><stop offset="1" stop-color="#E7E4DA"/></linearGradient>
  <linearGradient id="gP" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#F3F1FD"/><stop offset="1" stop-color="#E9E6FB"/></linearGradient>
  <linearGradient id="gG" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#EDF4EE"/><stop offset="1" stop-color="#DDEBE0"/></linearGradient>
  <marker id="ah" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#8E8B80" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker>
</defs>

<rect x="0" y="0" width="660" height="200" fill="#FBFAF6"/>
<text x="330" y="28" text-anchor="middle" class="ti" fill="#2E2972">从 main() 到你的第一行代码</text>

<rect x="24" y="76" width="110" height="44" rx="9" fill="url(#gN)" stroke="#D8D3C6" filter="url(#sh)"/>
<text x="79" y="96" text-anchor="middle" class="c" fill="#33322E">main()</text>
<text x="79" y="111" text-anchor="middle" class="d" fill="#9A988F">入口</text>

<rect x="164" y="76" width="120" height="44" rx="9" fill="url(#gN)" stroke="#D8D3C6" filter="url(#sh)"/>
<text x="224" y="96" text-anchor="middle" class="c" fill="#33322E">Py_Main</text>
<text x="224" y="111" text-anchor="middle" class="d" fill="#9A988F">解析参数</text>

<rect x="314" y="68" width="160" height="60" rx="10" fill="url(#gP)" stroke="#CCC7F1" filter="url(#sh)"/>
<text x="394" y="88" text-anchor="middle" class="h" fill="#2E2972">Py_Initialize</text>
<text x="394" y="106" text-anchor="middle" class="d" fill="#46453F">搭舞台（两阶段）</text>
<text x="394" y="120" text-anchor="middle" class="d" fill="#9A988F">本章主角</text>

<rect x="504" y="76" width="132" height="44" rx="9" fill="url(#gG)" stroke="#BFD8C4" filter="url(#sh)"/>
<text x="570" y="96" text-anchor="middle" class="h" fill="#2F6B43">运行你的代码</text>
<text x="570" y="111" text-anchor="middle" class="d" fill="#3C5C46">文件 / -c / -m / REPL</text>

<path d="M134,98 H162" fill="none" stroke="#8E8B80" stroke-width="1.5" marker-end="url(#ah)"/>
<path d="M284,98 H312" fill="none" stroke="#8E8B80" stroke-width="1.5" marker-end="url(#ah)"/>
<path d="M474,98 H502" fill="none" stroke="#8E8B80" stroke-width="1.5" marker-end="url(#ah)"/>

<text x="330" y="160" text-anchor="middle" class="d" fill="#9A988F">初始化做完，舞台就绪，你的代码才登场</text>
</svg>
