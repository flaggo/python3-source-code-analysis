<svg width="100%" viewBox="0 0 640 230" xmlns="http://www.w3.org/2000/svg" role="img" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'PingFang SC','Microsoft YaHei',sans-serif">
<title>import 语句的几种字节码</title>
<desc>三种 import 写法的字节码。import os 编译成 LOAD_CONST level、LOAD_CONST fromlist None、IMPORT_NAME os、STORE_NAME os，核心是 IMPORT_NAME。from os import getcwd 让 IMPORT_NAME 带上 fromlist 拿到模块，再用 IMPORT_FROM 从模块取出 getcwd 属性。from os import 星号走 IMPORT_STAR。三者起点都是同一个 IMPORT_NAME。</desc>
<defs>
  <style>
    .ti{font-size:13px;font-weight:600;}
    .h{font-size:11px;font-weight:600;}
    .d{font-size:9.5px;}
    .c{font-size:10px;font-family:'SF Mono','JetBrains Mono',ui-monospace,Consolas,monospace;}
  </style>
  <filter id="sh" x="-30%" y="-30%" width="160%" height="160%"><feDropShadow dx="0" dy="1.4" stdDeviation="2" flood-color="#2A2A28" flood-opacity="0.12"/></filter>
  <linearGradient id="gN" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#F1EFE8"/><stop offset="1" stop-color="#E7E4DA"/></linearGradient>
  <linearGradient id="gP" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#F3F1FD"/><stop offset="1" stop-color="#E9E6FB"/></linearGradient>
</defs>

<rect x="0" y="0" width="640" height="230" fill="#FBFAF6"/>
<text x="320" y="28" text-anchor="middle" class="ti" fill="#2E2972">三种 import，同一个起点 IMPORT_NAME</text>

<!-- import os -->
<text x="30" y="58" class="h" fill="#46453F">import os</text>
<g class="c">
  <rect x="30" y="66" width="250" height="22" rx="4" fill="url(#gN)" stroke="#D8D3C6"/><text x="42" y="81" fill="#9A988F">LOAD_CONST level / fromlist</text>
  <rect x="30" y="90" width="250" height="22" rx="4" fill="url(#gP)" stroke="#CCC7F1"/><text x="42" y="105" fill="#2E2972">IMPORT_NAME  os</text>
  <rect x="30" y="114" width="250" height="22" rx="4" fill="url(#gN)" stroke="#D8D3C6"/><text x="42" y="129" fill="#33322E">STORE_NAME   os</text>
</g>

<!-- from os import getcwd -->
<text x="360" y="58" class="h" fill="#46453F">from os import getcwd</text>
<g class="c">
  <rect x="360" y="66" width="250" height="22" rx="4" fill="url(#gP)" stroke="#CCC7F1"/><text x="372" y="81" fill="#2E2972">IMPORT_NAME  os（fromlist=getcwd）</text>
  <rect x="360" y="90" width="250" height="22" rx="4" fill="url(#gP)" stroke="#CCC7F1"/><text x="372" y="105" fill="#2E2972">IMPORT_FROM  getcwd</text>
  <rect x="360" y="114" width="250" height="22" rx="4" fill="url(#gN)" stroke="#D8D3C6"/><text x="372" y="129" fill="#33322E">STORE_NAME   getcwd</text>
</g>

<!-- from os import * -->
<text x="30" y="166" class="h" fill="#46453F">from os import *</text>
<g class="c">
  <rect x="30" y="174" width="250" height="22" rx="4" fill="url(#gP)" stroke="#CCC7F1"/><text x="42" y="189" fill="#2E2972">IMPORT_NAME  os</text>
  <rect x="290" y="174" width="200" height="22" rx="4" fill="url(#gP)" stroke="#CCC7F1"/><text x="302" y="189" fill="#2E2972">IMPORT_STAR</text>
</g>

<text x="500" y="189" text-anchor="middle" class="d" fill="#9A988F">核心都是 IMPORT_NAME</text>
</svg>
