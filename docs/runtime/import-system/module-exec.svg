<svg width="100%" viewBox="0 0 640 300" xmlns="http://www.w3.org/2000/svg" role="img" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'PingFang SC','Microsoft YaHei',sans-serif">
<title>加载一个模块的全过程</title>
<desc>import os 首次导入的完整旅程：IMPORT_NAME 取出 builtins.__import__ 并调用；落到 C 的 PyImport_ImportModuleLevelObject，解析出绝对名，查 sys.modules 未命中；转交 importlib._find_and_load；_find_spec 遍历 sys.meta_path，PathFinder 在 sys.path 里找到 os.py 产出带 SourceFileLoader 的 spec；按 spec 造出空模块对象先放进 sys.modules；loader.exec_module 把 os.py 编译成字节码在 os.__dict__ 里执行；模块对象返回，STORE_NAME 绑定到名字。下次再 import 在查缓存这步就返回。</desc>
<defs>
  <style>
    .ti{font-size:13px;font-weight:600;}
    .h{font-size:10.5px;font-weight:600;}
    .d{font-size:9.5px;}
    .c{font-size:9.5px;font-family:'SF Mono','JetBrains Mono',ui-monospace,Consolas,monospace;}
  </style>
  <filter id="sh" x="-30%" y="-30%" width="160%" height="160%"><feDropShadow dx="0" dy="1.4" stdDeviation="2" flood-color="#2A2A28" flood-opacity="0.12"/></filter>
  <linearGradient id="gP" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#F3F1FD"/><stop offset="1" stop-color="#E9E6FB"/></linearGradient>
  <linearGradient id="gB" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#EFF3FA"/><stop offset="1" stop-color="#E0E9F6"/></linearGradient>
  <linearGradient id="gG" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#EDF4EE"/><stop offset="1" stop-color="#DDEBE0"/></linearGradient>
  <linearGradient id="gN" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#F1EFE8"/><stop offset="1" stop-color="#E7E4DA"/></linearGradient>
  <marker id="ah" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#8E8B80" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker>
</defs>

<rect x="0" y="0" width="640" height="300" fill="#FBFAF6"/>
<text x="320" y="26" text-anchor="middle" class="ti" fill="#2E2972">import os 首次导入的完整旅程</text>

<g class="c">
  <rect x="40" y="46" width="250" height="30" rx="6" fill="url(#gP)" stroke="#CCC7F1"/><text x="54" y="65" fill="#2E2972">① IMPORT_NAME → __import__</text>
  <rect x="40" y="84" width="250" height="30" rx="6" fill="url(#gN)" stroke="#D8D3C6"/><text x="54" y="103" fill="#33322E">② C：解析绝对名，查 sys.modules</text>
  <rect x="40" y="122" width="250" height="30" rx="6" fill="url(#gN)" stroke="#D8D3C6"/><text x="54" y="141" fill="#9A4A2F">　 未命中 → 转交 importlib</text>
  <rect x="40" y="160" width="250" height="30" rx="6" fill="url(#gB)" stroke="#C3D2E8"/><text x="54" y="179" fill="#28415F">③ _find_spec 遍历 meta_path</text>
  <rect x="40" y="198" width="250" height="30" rx="6" fill="url(#gB)" stroke="#C3D2E8"/><text x="54" y="217" fill="#28415F">④ PathFinder 在 sys.path 找到 os.py</text>
</g>

<g class="c">
  <rect x="350" y="84" width="250" height="30" rx="6" fill="url(#gG)" stroke="#BFD8C4"/><text x="364" y="103" fill="#2F6B43">⑤ 造空模块，先放进 sys.modules</text>
  <rect x="350" y="122" width="250" height="46" rx="6" fill="url(#gG)" stroke="#BFD8C4"/><text x="364" y="140" fill="#2F6B43">⑥ exec_module：编译 + 执行</text><text x="364" y="158" fill="#3C5C46">　 在 os.__dict__（模块帧）里跑</text>
  <rect x="350" y="176" width="250" height="30" rx="6" fill="url(#gN)" stroke="#D8D3C6"/><text x="364" y="195" fill="#33322E">⑦ 返回模块，STORE_NAME os</text>
</g>

<path d="M290,137 C320,137 320,99 348,99" fill="none" stroke="#8E8B80" stroke-width="1.5" marker-end="url(#ah)"/>
<path d="M165,228 C165,250 480,250 475,210" fill="none" stroke="#8E8B80" stroke-width="1.4" stroke-dasharray="4 3" marker-end="url(#ah)"/>

<text x="320" y="276" text-anchor="middle" class="d" fill="#9A988F">下次 import os 在第 ② 步缓存命中即返回 —— 第一次慢，后来快</text>
</svg>
