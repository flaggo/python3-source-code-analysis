<svg width="100%" viewBox="0 0 620 250" xmlns="http://www.w3.org/2000/svg" role="img" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'PingFang SC','Microsoft YaHei',sans-serif">
<title>sys.modules：导入的第一道缓存</title>
<desc>真正去加载之前，先查 sys.modules 缓存，一个模块名到模块对象的字典。命中就直接返回缓存对象，绝不重复加载，这是模块顶层代码只执行一次、再次 import 拿到同一对象的原因。未命中才去查找并加载。这道缓存也支撑了循环导入：加载时先把半成品模块放进缓存再执行代码，所以 A 导入 B、B 回头导入 A 时拿到还没执行完的 A 半成品，不会无限递归。</desc>
<defs>
  <style>
    .ti{font-size:13px;font-weight:600;}
    .h{font-size:11px;font-weight:600;}
    .d{font-size:10px;}
    .c{font-size:10px;font-family:'SF Mono','JetBrains Mono',ui-monospace,Consolas,monospace;}
  </style>
  <filter id="sh" x="-30%" y="-30%" width="160%" height="160%"><feDropShadow dx="0" dy="1.4" stdDeviation="2" flood-color="#2A2A28" flood-opacity="0.12"/></filter>
  <linearGradient id="gB" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#EFF3FA"/><stop offset="1" stop-color="#E0E9F6"/></linearGradient>
  <linearGradient id="gG" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#EDF4EE"/><stop offset="1" stop-color="#DDEBE0"/></linearGradient>
  <linearGradient id="gR" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#FBEFE9"/><stop offset="1" stop-color="#F6E2D6"/></linearGradient>
  <marker id="ah" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#8E8B80" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker>
  <marker id="ahg" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#2F6B43" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></marker>
  <marker id="ahr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#C77A52" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></marker>
</defs>

<rect x="0" y="0" width="620" height="250" fill="#FBFAF6"/>
<text x="310" y="28" text-anchor="middle" class="ti" fill="#2E2972">先查 sys.modules，命中即返回</text>

<rect x="30" y="92" width="130" height="44" rx="9" fill="#FFFFFF" stroke="#CCC7F1" filter="url(#sh)"/>
<text x="95" y="112" text-anchor="middle" class="c" fill="#2E2972">import os</text>
<text x="95" y="128" text-anchor="middle" class="d" fill="#9A988F">请求导入</text>

<!-- cache -->
<rect x="220" y="78" width="180" height="74" rx="11" fill="url(#gB)" stroke="#C3D2E8" filter="url(#sh)"/>
<text x="310" y="100" text-anchor="middle" class="h" fill="#28415F">sys.modules</text>
<text x="310" y="116" text-anchor="middle" class="d" fill="#9A988F">名 → 模块对象</text>
<rect x="238" y="124" width="144" height="20" rx="5" fill="#FFF" stroke="#C3D2E8"/>
<text x="310" y="139" text-anchor="middle" class="c" fill="#28415F">{'json': &lt;mod&gt;, …}</text>
<path d="M160,114 H218" fill="none" stroke="#8E8B80" stroke-width="1.5" marker-end="url(#ah)"/>

<!-- hit -->
<rect x="450" y="60" width="150" height="44" rx="9" fill="url(#gG)" stroke="#BFD8C4" filter="url(#sh)"/>
<text x="525" y="80" text-anchor="middle" class="h" fill="#2F6B43">命中</text>
<text x="525" y="96" text-anchor="middle" class="d" fill="#3C5C46">直接返回，不重复加载</text>
<path d="M400,104 C420,92 430,86 448,84" fill="none" stroke="#2F6B43" stroke-width="1.6" marker-end="url(#ahg)"/>

<!-- miss -->
<rect x="450" y="124" width="150" height="44" rx="9" fill="url(#gR)" stroke="#E8C9B5" filter="url(#sh)"/>
<text x="525" y="144" text-anchor="middle" class="h" fill="#9A4A2F">未命中</text>
<text x="525" y="160" text-anchor="middle" class="d" fill="#9A4A2F">才去查找并加载</text>
<path d="M400,134 C420,142 430,146 448,148" fill="none" stroke="#C77A52" stroke-width="1.6" marker-end="url(#ahr)"/>

<text x="310" y="200" text-anchor="middle" class="d" fill="#9A988F">顶层代码只执行一次 · 再次 import 拿到同一对象</text>
<text x="310" y="222" text-anchor="middle" class="d" fill="#9A988F">加载时「先登记半成品再执行」→ 循环导入能半工作</text>
</svg>
