<svg width="100%" viewBox="0 0 640 240" xmlns="http://www.w3.org/2000/svg" role="img" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'PingFang SC','Microsoft YaHei',sans-serif">
<title>find_spec 与 exec_module 两段式加载协议</title>
<desc>importlib 把导入一个模块拆成两段，由两类角色分工。finder 查找器回答这个模块在哪、该用什么方式加载，产出一个 ModuleSpec 导入规格，内含一个 loader。loader 加载器回答把模块真正建出来，执行模块代码、填充模块对象。流程是：遍历 finder 找到 spec，按 spec 造出空模块对象，先把它登记进 sys.modules，再调 loader.exec_module 在模块的 __dict__ 里执行其代码。先登记后执行支撑了循环导入。</desc>
<defs>
  <style>
    .ti{font-size:13px;font-weight:600;}
    .h{font-size:11px;font-weight:600;}
    .d{font-size:9.5px;}
    .c{font-size:10px;font-family:'SF Mono','JetBrains Mono',ui-monospace,Consolas,monospace;}
  </style>
  <filter id="sh" x="-30%" y="-30%" width="160%" height="160%"><feDropShadow dx="0" dy="1.4" stdDeviation="2" flood-color="#2A2A28" flood-opacity="0.12"/></filter>
  <linearGradient id="gB" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#EFF3FA"/><stop offset="1" stop-color="#E0E9F6"/></linearGradient>
  <linearGradient id="gP" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#F3F1FD"/><stop offset="1" stop-color="#E9E6FB"/></linearGradient>
  <linearGradient id="gG" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#EDF4EE"/><stop offset="1" stop-color="#DDEBE0"/></linearGradient>
  <marker id="ah" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#8E8B80" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker>
</defs>

<rect x="0" y="0" width="640" height="240" fill="#FBFAF6"/>
<text x="320" y="26" text-anchor="middle" class="ti" fill="#2E2972">两段式：finder 找规格，loader 建模块</text>

<!-- finder -->
<rect x="24" y="58" width="140" height="58" rx="10" fill="url(#gB)" stroke="#C3D2E8" filter="url(#sh)"/>
<text x="94" y="80" text-anchor="middle" class="h" fill="#28415F">finder</text>
<text x="94" y="98" text-anchor="middle" class="d" fill="#46453F">find_spec(name)</text>
<text x="94" y="110" text-anchor="middle" class="d" fill="#9A988F">在哪、怎么加载</text>

<!-- spec -->
<rect x="200" y="58" width="140" height="58" rx="10" fill="url(#gP)" stroke="#CCC7F1" filter="url(#sh)"/>
<text x="270" y="80" text-anchor="middle" class="h" fill="#2E2972">ModuleSpec</text>
<text x="270" y="98" text-anchor="middle" class="c" fill="#2E2972">.loader</text>
<text x="270" y="110" text-anchor="middle" class="d" fill="#9A988F">导入规格</text>

<!-- loader -->
<rect x="376" y="58" width="140" height="58" rx="10" fill="url(#gB)" stroke="#C3D2E8" filter="url(#sh)"/>
<text x="446" y="80" text-anchor="middle" class="h" fill="#28415F">loader</text>
<text x="446" y="98" text-anchor="middle" class="d" fill="#46453F">exec_module(mod)</text>
<text x="446" y="110" text-anchor="middle" class="d" fill="#9A988F">真正建出模块</text>

<path d="M164,87 H198" fill="none" stroke="#8E8B80" stroke-width="1.5" marker-end="url(#ah)"/>
<path d="M340,87 H374" fill="none" stroke="#8E8B80" stroke-width="1.5" marker-end="url(#ah)"/>

<!-- module dict -->
<rect x="540" y="50" width="86" height="74" rx="10" fill="url(#gG)" stroke="#BFD8C4" filter="url(#sh)"/>
<text x="583" y="78" text-anchor="middle" class="h" fill="#2F6B43">模块</text>
<text x="583" y="98" text-anchor="middle" class="d" fill="#3C5C46">__dict__</text>
<text x="583" y="112" text-anchor="middle" class="d" fill="#6E8C74">里跑代码</text>
<path d="M516,87 H538" fill="none" stroke="#8E8B80" stroke-width="1.5" marker-end="url(#ah)"/>

<!-- register before exec -->
<rect x="120" y="150" width="400" height="56" rx="11" fill="#FFFFFF" stroke="#C3D2E8" filter="url(#sh)"/>
<text x="320" y="172" text-anchor="middle" class="h" fill="#28415F">关键顺序</text>
<text x="320" y="192" text-anchor="middle" class="c" fill="#28415F">造空模块 → 先登记进 sys.modules → 再 exec_module</text>
<text x="320" y="228" text-anchor="middle" class="d" fill="#9A988F">「先登记后执行」正是循环导入能半工作的原因</text>
</svg>
