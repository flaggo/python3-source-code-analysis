<svg width="100%" viewBox="0 0 640 240" xmlns="http://www.w3.org/2000/svg" role="img" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'PingFang SC','Microsoft YaHei',sans-serif">
<title>eval_breaker：聚合所有待办的一个标志</title>
<desc>每条字节码都去检查多个标志太亏。CPython 用一个聚合标志 eval_breaker：只要任何一件待办发生，让棒、信号、待处理回调、异步异常，就把这一个标志置位。求值循环每轮只需做一次廉价的原子读，eval_breaker 没置位就径直执行下一条指令，只有它置位了才进去逐项核对到底是哪件事。常态下多线程的检查成本几乎可以忽略。</desc>
<defs>
  <style>
    .ti{font-size:13px;font-weight:600;}
    .h{font-size:11px;font-weight:600;}
    .d{font-size:9.5px;}
    .c{font-size:10px;font-family:'SF Mono','JetBrains Mono',ui-monospace,Consolas,monospace;}
  </style>
  <filter id="sh" x="-30%" y="-30%" width="160%" height="160%"><feDropShadow dx="0" dy="1.4" stdDeviation="2" flood-color="#2A2A28" flood-opacity="0.12"/></filter>
  <linearGradient id="gP" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#F3F1FD"/><stop offset="1" stop-color="#E9E6FB"/></linearGradient>
  <linearGradient id="gN" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#F1EFE8"/><stop offset="1" stop-color="#E7E4DA"/></linearGradient>
  <linearGradient id="gG" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#EDF4EE"/><stop offset="1" stop-color="#DDEBE0"/></linearGradient>
  <marker id="ah" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#8E8B80" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker>
</defs>

<rect x="0" y="0" width="640" height="240" fill="#FBFAF6"/>
<text x="320" y="26" text-anchor="middle" class="ti" fill="#2E2972">eval_breaker：一次廉价检查，管住所有待办</text>

<!-- sources -->
<g class="c">
  <rect x="24" y="56" width="150" height="26" rx="6" fill="url(#gN)" stroke="#D8D3C6"/><text x="99" y="74" text-anchor="middle" fill="#33322E">gil_drop_request</text>
  <rect x="24" y="90" width="150" height="26" rx="6" fill="url(#gN)" stroke="#D8D3C6"/><text x="99" y="108" text-anchor="middle" fill="#33322E">收到信号</text>
  <rect x="24" y="124" width="150" height="26" rx="6" fill="url(#gN)" stroke="#D8D3C6"/><text x="99" y="142" text-anchor="middle" fill="#33322E">待处理回调</text>
  <rect x="24" y="158" width="150" height="26" rx="6" fill="url(#gN)" stroke="#D8D3C6"/><text x="99" y="176" text-anchor="middle" fill="#33322E">异步异常</text>
</g>

<!-- aggregate -->
<rect x="240" y="92" width="150" height="56" rx="11" fill="url(#gP)" stroke="#CCC7F1" filter="url(#sh)"/>
<text x="315" y="116" text-anchor="middle" class="h" fill="#2E2972">eval_breaker</text>
<text x="315" y="134" text-anchor="middle" class="d" fill="#46453F">任一待办 → 置位</text>

<path d="M174,69 C210,80 210,108 238,112" fill="none" stroke="#8E8B80" stroke-width="1.3" marker-end="url(#ah)"/>
<path d="M174,103 H238" fill="none" stroke="#8E8B80" stroke-width="1.3" marker-end="url(#ah)"/>
<path d="M174,137 H238" fill="none" stroke="#8E8B80" stroke-width="1.3" marker-end="url(#ah)"/>
<path d="M174,171 C210,160 210,140 238,134" fill="none" stroke="#8E8B80" stroke-width="1.3" marker-end="url(#ah)"/>

<!-- loop check -->
<rect x="440" y="76" width="180" height="88" rx="11" fill="url(#gG)" stroke="#BFD8C4" filter="url(#sh)"/>
<text x="530" y="98" text-anchor="middle" class="h" fill="#2F6B43">求值循环每轮</text>
<text x="530" y="120" text-anchor="middle" class="c" fill="#2F6B43">一次原子读</text>
<text x="530" y="138" text-anchor="middle" class="d" fill="#3C5C46">没置位 → 直接跑下一条</text>
<text x="530" y="153" text-anchor="middle" class="d" fill="#3C5C46">置位了 → 进去逐项核对</text>
<path d="M390,120 H438" fill="none" stroke="#8E8B80" stroke-width="1.6" marker-end="url(#ah)"/>

<text x="320" y="210" text-anchor="middle" class="d" fill="#9A988F">常态零负担 —— 只有真有事时才付出逐项检查的代价</text>
</svg>
