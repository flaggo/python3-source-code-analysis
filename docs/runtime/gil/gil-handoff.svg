<svg width="100%" viewBox="0 0 640 250" xmlns="http://www.w3.org/2000/svg" role="img" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'PingFang SC','Microsoft YaHei',sans-serif">
<title>GIL 的协作式切换</title>
<desc>GIL 在线程间传递是协作式的，由两端配合。等待端线程在 take_gil 里定时等待，默认 5 毫秒，若超时 GIL 仍被同一线程攥着，就设置 gil_drop_request 标志，相当于催对方让棒。持有端线程不会被强行打断，它在求值循环的检查点主动查看有没有谁在催，一旦发现 gil_drop_request 就 drop_gil 让棒，给别人机会，再 take_gil 抢回。合起来：等待线程催，持有线程在检查点主动让，别人抢到棒。</desc>
<defs>
  <style>
    .ti{font-size:13px;font-weight:600;}
    .h{font-size:11px;font-weight:600;}
    .d{font-size:9.5px;}
    .c{font-size:10px;font-family:'SF Mono','JetBrains Mono',ui-monospace,Consolas,monospace;}
  </style>
  <filter id="sh" x="-30%" y="-30%" width="160%" height="160%"><feDropShadow dx="0" dy="1.4" stdDeviation="2" flood-color="#2A2A28" flood-opacity="0.12"/></filter>
  <linearGradient id="gG" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#EDF4EE"/><stop offset="1" stop-color="#DDEBE0"/></linearGradient>
  <linearGradient id="gN" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#F1EFE8"/><stop offset="1" stop-color="#E7E4DA"/></linearGradient>
  <linearGradient id="gR" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#FBEFE9"/><stop offset="1" stop-color="#F6E2D6"/></linearGradient>
  <marker id="ah" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#C77A52" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/></marker>
  <marker id="ahg" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#2F6B43" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/></marker>
</defs>

<rect x="0" y="0" width="640" height="250" fill="#FBFAF6"/>
<text x="320" y="26" text-anchor="middle" class="ti" fill="#2E2972">协作式：等待方催，持有方主动让</text>

<!-- holder -->
<rect x="40" y="56" width="250" height="150" rx="12" fill="url(#gG)" stroke="#BFD8C4" filter="url(#sh)"/>
<text x="165" y="78" text-anchor="middle" class="h" fill="#2F6B43">持有线程（正在跑）</text>
<rect x="60" y="92" width="210" height="40" rx="8" fill="#FFF" stroke="#BFD8C4"/>
<text x="165" y="110" text-anchor="middle" class="c" fill="#2F6B43">求值循环检查点</text>
<text x="165" y="124" text-anchor="middle" class="d" fill="#3C5C46">看到 gil_drop_request？</text>
<rect x="60" y="146" width="210" height="44" rx="8" fill="url(#gR)" stroke="#E8C9B5"/>
<text x="165" y="166" text-anchor="middle" class="c" fill="#9A4A2F">drop_gil → take_gil</text>
<text x="165" y="181" text-anchor="middle" class="d" fill="#9A4A2F">主动让棒，再抢回</text>

<!-- waiter -->
<rect x="350" y="56" width="250" height="150" rx="12" fill="url(#gN)" stroke="#D8D3C6" filter="url(#sh)"/>
<text x="475" y="78" text-anchor="middle" class="h" fill="#46453F">等待线程（排队）</text>
<rect x="370" y="92" width="210" height="40" rx="8" fill="#FFF" stroke="#D8D3C6"/>
<text x="475" y="110" text-anchor="middle" class="c" fill="#33322E">take_gil：定时等</text>
<text x="475" y="124" text-anchor="middle" class="d" fill="#9A988F">最多 5ms（switch interval）</text>
<rect x="370" y="146" width="210" height="44" rx="8" fill="url(#gR)" stroke="#E8C9B5"/>
<text x="475" y="166" text-anchor="middle" class="c" fill="#9A4A2F">超时 → SET_GIL_DROP_REQUEST</text>
<text x="475" y="181" text-anchor="middle" class="d" fill="#9A4A2F">催对方让棒</text>

<!-- arrows -->
<path d="M370,168 C330,168 320,120 292,114" fill="none" stroke="#C77A52" stroke-width="1.6" stroke-dasharray="4 3" marker-end="url(#ah)"/>
<text x="320" y="146" text-anchor="middle" class="d" fill="#C77A52">催</text>
<path d="M165,206 C165,228 475,228 475,208" fill="none" stroke="#2F6B43" stroke-width="1.6" marker-end="url(#ahg)"/>
<text x="320" y="244" text-anchor="middle" class="d" fill="#2F6B43">让棒后，等待线程抢到棒开始跑</text>
</svg>
