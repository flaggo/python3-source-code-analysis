<svg width="100%" viewBox="0 0 640 230" xmlns="http://www.w3.org/2000/svg" role="img" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'PingFang SC','Microsoft YaHei',sans-serif">
<title>引用计数：从诞生到销毁</title>
<desc>对象头部的 ob_refcnt 记录有多少处引用着它。多一处引用就 Py_INCREF 加一，少一处就 Py_DECREF 减一，一旦减到 0，对象当场被 _Py_Dealloc 销毁。图示一个列表对象：创建时计数 1，b=a 后计数 2，del b 后计数 1，del a 后计数 0 立即销毁。这是即时、确定性的回收，对象死在它最后一个引用消失的那一刻。</desc>
<defs>
  <style>
    .ti{font-size:13px;font-weight:600;}
    .h{font-size:11px;font-weight:600;}
    .d{font-size:9.5px;}
    .c{font-size:10.5px;font-family:'SF Mono','JetBrains Mono',ui-monospace,Consolas,monospace;}
  </style>
  <filter id="sh" x="-30%" y="-30%" width="160%" height="160%"><feDropShadow dx="0" dy="1.4" stdDeviation="2" flood-color="#2A2A28" flood-opacity="0.12"/></filter>
  <linearGradient id="gB" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#EFF3FA"/><stop offset="1" stop-color="#E0E9F6"/></linearGradient>
  <linearGradient id="gR" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#FBEFE9"/><stop offset="1" stop-color="#F6E2D6"/></linearGradient>
  <marker id="ah" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#8E8B80" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker>
</defs>

<rect x="0" y="0" width="640" height="230" fill="#FBFAF6"/>
<text x="320" y="28" text-anchor="middle" class="ti" fill="#2E2972">ob_refcnt 减到 0，对象当场销毁</text>

<g class="c">
  <rect x="30" y="70" width="120" height="60" rx="10" fill="url(#gB)" stroke="#C3D2E8" filter="url(#sh)"/>
  <text x="90" y="94" text-anchor="middle" fill="#28415F">refcnt = 1</text>
  <text x="90" y="116" text-anchor="middle" class="d" fill="#9A988F">a = []</text>

  <rect x="180" y="70" width="120" height="60" rx="10" fill="url(#gB)" stroke="#C3D2E8" filter="url(#sh)"/>
  <text x="240" y="94" text-anchor="middle" fill="#28415F">refcnt = 2</text>
  <text x="240" y="116" text-anchor="middle" class="d" fill="#9A988F">b = a　INCREF</text>

  <rect x="330" y="70" width="120" height="60" rx="10" fill="url(#gB)" stroke="#C3D2E8" filter="url(#sh)"/>
  <text x="390" y="94" text-anchor="middle" fill="#28415F">refcnt = 1</text>
  <text x="390" y="116" text-anchor="middle" class="d" fill="#9A988F">del b　DECREF</text>

  <rect x="480" y="70" width="130" height="60" rx="10" fill="url(#gR)" stroke="#E8C9B5" filter="url(#sh)"/>
  <text x="545" y="94" text-anchor="middle" fill="#9A4A2F">refcnt = 0</text>
  <text x="545" y="116" text-anchor="middle" class="d" fill="#9A4A2F">del a → _Py_Dealloc</text>
</g>

<path d="M150,100 H178" fill="none" stroke="#8E8B80" stroke-width="1.5" marker-end="url(#ah)"/>
<path d="M300,100 H328" fill="none" stroke="#8E8B80" stroke-width="1.5" marker-end="url(#ah)"/>
<path d="M450,100 H478" fill="none" stroke="#8E8B80" stroke-width="1.5" marker-end="url(#ah)"/>

<text x="320" y="172" text-anchor="middle" class="d" fill="#9A988F">即时、确定性回收 —— 对象死在最后一个引用消失的那一刻</text>
<text x="320" y="196" text-anchor="middle" class="d" fill="#9A988F">代价：每次赋值/传参/返回都要改计数；且管不了循环引用</text>
</svg>
