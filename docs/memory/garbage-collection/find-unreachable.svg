<svg width="100%" viewBox="0 0 640 250" xmlns="http://www.w3.org/2000/svg" role="img" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'PingFang SC','Microsoft YaHei',sans-serif">
<title>用引用计数差值找出不可达的环</title>
<desc>用 a 和 b 互引的例子走一遍。两者真实计数都是 1，且这唯一的引用都来自对方即集合内部，subtract_refs 减完后 gc_refs 双双归 0。又没有任何外部可达对象引用它们，可达性传播 move_unreachable 也救不回它们，于是被准确判定为不可达垃圾。作为对比，若 c 被外部一个根引用着，它的 gc_refs 减完仍大于 0，是确定可达，会留下。</desc>
<defs>
  <style>
    .ti{font-size:13px;font-weight:600;}
    .h{font-size:11px;font-weight:600;}
    .d{font-size:9.5px;}
    .c{font-size:10px;font-family:'SF Mono','JetBrains Mono',ui-monospace,Consolas,monospace;}
  </style>
  <filter id="sh" x="-30%" y="-30%" width="160%" height="160%"><feDropShadow dx="0" dy="1.4" stdDeviation="2" flood-color="#2A2A28" flood-opacity="0.12"/></filter>
  <linearGradient id="gR" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#FBEFE9"/><stop offset="1" stop-color="#F6E2D6"/></linearGradient>
  <linearGradient id="gG" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#EDF4EE"/><stop offset="1" stop-color="#DDEBE0"/></linearGradient>
  <linearGradient id="gN" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#F1EFE8"/><stop offset="1" stop-color="#E7E4DA"/></linearGradient>
  <marker id="ahr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#C77A52" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/></marker>
  <marker id="ahg" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#2F6B43" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/></marker>
</defs>

<rect x="0" y="0" width="640" height="250" fill="#FBFAF6"/>
<text x="320" y="26" text-anchor="middle" class="ti" fill="#2E2972">减完后看 gc_refs：归 0 的就是垃圾</text>

<!-- garbage cycle -->
<text x="170" y="58" text-anchor="middle" class="h" fill="#9A4A2F">无外部引用的环 → 垃圾</text>
<circle cx="110" cy="110" r="32" fill="url(#gR)" stroke="#E8C9B5" filter="url(#sh)"/>
<text x="110" y="108" text-anchor="middle" class="h" fill="#9A4A2F">a</text>
<text x="110" y="124" text-anchor="middle" class="d" fill="#9A4A2F">gc_refs=0</text>
<circle cx="240" cy="110" r="32" fill="url(#gR)" stroke="#E8C9B5" filter="url(#sh)"/>
<text x="240" y="108" text-anchor="middle" class="h" fill="#9A4A2F">b</text>
<text x="240" y="124" text-anchor="middle" class="d" fill="#9A4A2F">gc_refs=0</text>
<path d="M141,98 C175,86 175,86 209,98" fill="none" stroke="#C77A52" stroke-width="1.7" marker-end="url(#ahr)"/>
<path d="M209,122 C175,134 175,134 141,122" fill="none" stroke="#C77A52" stroke-width="1.7" marker-end="url(#ahr)"/>
<text x="175" y="166" text-anchor="middle" class="d" fill="#9A4A2F">引用全来自对方 → 减完归 0 → 不可达</text>

<!-- reachable -->
<text x="500" y="58" text-anchor="middle" class="h" fill="#2F6B43">有外部根引用 → 可达</text>
<rect x="410" y="86" width="80" height="48" rx="9" fill="url(#gN)" stroke="#D8D3C6"/>
<text x="450" y="108" text-anchor="middle" class="c" fill="#33322E">外部根</text>
<text x="450" y="124" text-anchor="middle" class="d" fill="#9A988F">栈/全局</text>
<circle cx="560" cy="110" r="32" fill="url(#gG)" stroke="#BFD8C4" filter="url(#sh)"/>
<text x="560" y="108" text-anchor="middle" class="h" fill="#2F6B43">c</text>
<text x="560" y="124" text-anchor="middle" class="d" fill="#2F6B43">gc_refs&gt;0</text>
<path d="M490,110 H526" fill="none" stroke="#2F6B43" stroke-width="1.7" marker-end="url(#ahg)"/>
<text x="500" y="166" text-anchor="middle" class="d" fill="#2F6B43">外部引用未被减掉 → 留下</text>

<text x="320" y="206" text-anchor="middle" class="d" fill="#9A988F">再从「确定可达」对象传播可达性（move_unreachable），救回被牵连者</text>
<text x="320" y="228" text-anchor="middle" class="d" fill="#9A988F">最终仍归 0 且没被救回的，才是真垃圾</text>
</svg>
