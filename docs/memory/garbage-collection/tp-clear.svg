<svg width="100%" viewBox="0 0 640 230" xmlns="http://www.w3.org/2000/svg" role="img" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'PingFang SC','Microsoft YaHei',sans-serif">
<title>tp_clear 打破环，引用计数收尾</title>
<desc>找到垃圾后，直接 free 会让环里互引的指针悬空。GC 的办法是调用垃圾对象的 tp_clear，把它持有的引用逐个置空。这一置空环就被打破，内部互引一旦解除，对象们的真实 ob_refcnt 纷纷归零，于是又回到引用计数的地盘，被正常 Py_DECREF 逐个销毁。所以循环 GC 并不亲自 free 内存，它只负责打破环，真正的回收仍交还给引用计数。</desc>
<defs>
  <style>
    .ti{font-size:13px;font-weight:600;}
    .h{font-size:11px;font-weight:600;}
    .d{font-size:10px;}
    .c{font-size:10px;font-family:'SF Mono','JetBrains Mono',ui-monospace,Consolas,monospace;}
  </style>
  <filter id="sh" x="-30%" y="-30%" width="160%" height="160%"><feDropShadow dx="0" dy="1.4" stdDeviation="2" flood-color="#2A2A28" flood-opacity="0.12"/></filter>
  <linearGradient id="gR" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#FBEFE9"/><stop offset="1" stop-color="#F6E2D6"/></linearGradient>
  <linearGradient id="gG" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#EDF4EE"/><stop offset="1" stop-color="#DDEBE0"/></linearGradient>
  <marker id="ahr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#C77A52" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/></marker>
  <marker id="ah" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#8E8B80" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></marker>
</defs>

<rect x="0" y="0" width="640" height="230" fill="#FBFAF6"/>
<text x="320" y="26" text-anchor="middle" class="ti" fill="#2E2972">tp_clear 打破环，引用计数完成回收</text>

<!-- before: cycle -->
<text x="130" y="58" text-anchor="middle" class="h" fill="#9A4A2F">环还在</text>
<circle cx="90" cy="110" r="28" fill="url(#gR)" stroke="#E8C9B5"/>
<text x="90" y="115" text-anchor="middle" class="c" fill="#9A4A2F">a=1</text>
<circle cx="190" cy="110" r="28" fill="url(#gR)" stroke="#E8C9B5"/>
<text x="190" y="115" text-anchor="middle" class="c" fill="#9A4A2F">b=1</text>
<path d="M117,99 C140,90 140,90 163,99" fill="none" stroke="#C77A52" stroke-width="1.7" marker-end="url(#ahr)"/>
<path d="M163,121 C140,130 140,130 117,121" fill="none" stroke="#C77A52" stroke-width="1.7" marker-end="url(#ahr)"/>

<!-- tp_clear -->
<rect x="248" y="88" width="140" height="44" rx="9" fill="#FFFFFF" stroke="#CCC7F1" filter="url(#sh)"/>
<text x="318" y="108" text-anchor="middle" class="c" fill="#2E2972">tp_clear</text>
<text x="318" y="124" text-anchor="middle" class="d" fill="#9A988F">把引用逐个置空</text>
<path d="M220,110 H246" fill="none" stroke="#8E8B80" stroke-width="1.6" marker-end="url(#ah)"/>

<!-- after: broken -->
<text x="510" y="58" text-anchor="middle" class="h" fill="#2F6B43">环被打破 → 计数归零</text>
<circle cx="470" cy="110" r="28" fill="url(#gG)" stroke="#BFD8C4"/>
<text x="470" y="115" text-anchor="middle" class="c" fill="#2F6B43">a=0</text>
<circle cx="570" cy="110" r="28" fill="url(#gG)" stroke="#BFD8C4"/>
<text x="570" y="115" text-anchor="middle" class="c" fill="#2F6B43">b=0</text>
<path d="M400,110 H440" fill="none" stroke="#8E8B80" stroke-width="1.6" marker-end="url(#ah)"/>
<text x="520" y="156" text-anchor="middle" class="d" fill="#2F6B43">Py_DECREF 逐个销毁</text>

<text x="320" y="198" text-anchor="middle" class="d" fill="#9A988F">循环 GC 不亲自 free，只负责打破环；真正的回收交还引用计数</text>
</svg>
