<svg width="100%" viewBox="0 0 640 200" xmlns="http://www.w3.org/2000/svg" role="img" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'PingFang SC','Microsoft YaHei',sans-serif">
<title>一次循环回收的全流程</title>
<desc>把整章串成一条线，一次循环回收的全流程：update_refs 把每个候选对象的真实计数抄进 gc_refs；subtract_refs 减掉所有内部引用，得到外部引用数；move_unreachable 从外部可达对象传播可达性，分出可达与不可达；对不可达对象调 tp_clear 打破环；环一断，引用计数立即把它们逐个 Py_DECREF 销毁。前三步找垃圾，后两步清垃圾，清的活儿仍交还引用计数。</desc>
<defs>
  <style>
    .ti{font-size:13px;font-weight:600;}
    .h{font-size:10px;font-weight:600;}
    .d{font-size:9px;}
    .c{font-size:9.5px;font-family:'SF Mono','JetBrains Mono',ui-monospace,Consolas,monospace;}
  </style>
  <filter id="sh" x="-30%" y="-30%" width="160%" height="160%"><feDropShadow dx="0" dy="1.4" stdDeviation="2" flood-color="#2A2A28" flood-opacity="0.12"/></filter>
  <linearGradient id="gB" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#EFF3FA"/><stop offset="1" stop-color="#E0E9F6"/></linearGradient>
  <linearGradient id="gP" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#F3F1FD"/><stop offset="1" stop-color="#E9E6FB"/></linearGradient>
  <linearGradient id="gR" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#FBEFE9"/><stop offset="1" stop-color="#F6E2D6"/></linearGradient>
  <linearGradient id="gG" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#EDF4EE"/><stop offset="1" stop-color="#DDEBE0"/></linearGradient>
  <marker id="ah" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#8E8B80" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker>
</defs>

<rect x="0" y="0" width="640" height="200" fill="#FBFAF6"/>
<text x="320" y="28" text-anchor="middle" class="ti" fill="#2E2972">一次循环回收：前三步找垃圾，后两步清垃圾</text>

<rect x="18" y="64" width="110" height="58" rx="9" fill="url(#gB)" stroke="#C3D2E8" filter="url(#sh)"/>
<text x="73" y="84" text-anchor="middle" class="h" fill="#28415F">① update_refs</text>
<text x="73" y="100" text-anchor="middle" class="d" fill="#46453F">gc_refs = 真实计数</text>
<text x="73" y="114" text-anchor="middle" class="d" fill="#9A988F">抄副本</text>

<rect x="146" y="64" width="110" height="58" rx="9" fill="url(#gB)" stroke="#C3D2E8" filter="url(#sh)"/>
<text x="201" y="84" text-anchor="middle" class="h" fill="#28415F">② subtract_refs</text>
<text x="201" y="100" text-anchor="middle" class="d" fill="#46453F">减内部引用</text>
<text x="201" y="114" text-anchor="middle" class="d" fill="#9A988F">得外部引用数</text>

<rect x="274" y="64" width="110" height="58" rx="9" fill="url(#gP)" stroke="#CCC7F1" filter="url(#sh)"/>
<text x="329" y="84" text-anchor="middle" class="h" fill="#2E2972">③ move_unreach</text>
<text x="329" y="100" text-anchor="middle" class="d" fill="#46453F">传播可达性</text>
<text x="329" y="114" text-anchor="middle" class="d" fill="#9A988F">分出真垃圾</text>

<rect x="402" y="64" width="110" height="58" rx="9" fill="url(#gR)" stroke="#E8C9B5" filter="url(#sh)"/>
<text x="457" y="84" text-anchor="middle" class="h" fill="#9A4A2F">④ tp_clear</text>
<text x="457" y="100" text-anchor="middle" class="d" fill="#9A4A2F">置空引用</text>
<text x="457" y="114" text-anchor="middle" class="d" fill="#9A4A2F">打破环</text>

<rect x="530" y="64" width="100" height="58" rx="9" fill="url(#gG)" stroke="#BFD8C4" filter="url(#sh)"/>
<text x="580" y="84" text-anchor="middle" class="h" fill="#2F6B43">⑤ 引用计数</text>
<text x="580" y="100" text-anchor="middle" class="d" fill="#3C5C46">Py_DECREF</text>
<text x="580" y="114" text-anchor="middle" class="d" fill="#6E8C74">逐个销毁</text>

<path d="M128,93 H144" fill="none" stroke="#8E8B80" stroke-width="1.5" marker-end="url(#ah)"/>
<path d="M256,93 H272" fill="none" stroke="#8E8B80" stroke-width="1.5" marker-end="url(#ah)"/>
<path d="M384,93 H400" fill="none" stroke="#8E8B80" stroke-width="1.5" marker-end="url(#ah)"/>
<path d="M512,93 H528" fill="none" stroke="#8E8B80" stroke-width="1.5" marker-end="url(#ah)"/>

<text x="201" y="158" text-anchor="middle" class="d" fill="#9A988F">找垃圾（引用计数差值）</text>
<text x="500" y="158" text-anchor="middle" class="d" fill="#9A988F">清垃圾（交还引用计数）</text>
<line x1="20" y1="168" x2="384" y2="168" stroke="#C3D2E8" stroke-width="1.5"/>
<line x1="400" y1="168" x2="630" y2="168" stroke="#BFD8C4" stroke-width="1.5"/>
</svg>
