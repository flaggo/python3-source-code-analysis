<svg width="100%" viewBox="0 0 760 250" xmlns="http://www.w3.org/2000/svg" role="img" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'PingFang SC','Microsoft YaHei',sans-serif">
<title>列表扩容（over-allocation）示意</title>
<desc>当容量用尽（ob_size == allocated）时再 append，list_resize 会 realloc 一块更大的内存（多分配约 1/8 作预留），把原元素拷贝过去并放入新元素。容量增长序列为 0,4,8,16,25,35,46,58,72,88,…。</desc>
<defs>
  <style>
    .lab{font-size:11.5px;}
    .val{font-size:13px;font-family:'SF Mono','JetBrains Mono',ui-monospace,Consolas,monospace;}
    .fd{font-size:11.5px;font-family:'SF Mono','JetBrains Mono',ui-monospace,Consolas,monospace;}
    .idx{font-size:10px;}
    .cap{font-size:12px;}
  </style>
  <filter id="sh" x="-30%" y="-30%" width="160%" height="160%"><feDropShadow dx="0" dy="1.4" stdDeviation="2" flood-color="#2A2A28" flood-opacity="0.12"/></filter>
  <marker id="ah" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#8E8B80" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></marker>
</defs>

<rect x="0" y="0" width="760" height="250" fill="#FBFAF6"/>

<!-- before: full -->
<text x="116" y="56" text-anchor="middle" class="lab" fill="#7B7A72">容量已满</text>
<g class="idx" fill="#9A988F" text-anchor="middle"><text x="50" y="76">0</text><text x="94" y="76">1</text><text x="138" y="76">2</text><text x="182" y="76">3</text></g>
<rect x="28" y="84" width="176" height="42" rx="8" fill="#FFFFFF" stroke="#C3D2E8" stroke-width="1.2" filter="url(#sh)"/>
<g stroke="#DCE6F2"><line x1="72" y1="84" x2="72" y2="126"/><line x1="116" y1="84" x2="116" y2="126"/><line x1="160" y1="84" x2="160" y2="126"/></g>
<g class="val" fill="#28415F" text-anchor="middle"><text x="50" y="111">1</text><text x="94" y="111">2</text><text x="138" y="111">3</text><text x="182" y="111">4</text></g>
<g class="fd" fill="#7B7A72" text-anchor="middle"><text x="116" y="148">ob_size = allocated = 4</text></g>

<!-- arrow -->
<text x="258" y="98" text-anchor="middle" class="fd" fill="#28415F">append(5)</text>
<line x1="214" y1="105" x2="300" y2="105" stroke="#8E8B80" stroke-width="1.8" marker-end="url(#ah)"/>

<!-- after: realloc bigger -->
<text x="500" y="56" text-anchor="middle" class="lab" fill="#7B7A72">realloc 更大内存</text>
<g class="idx" fill="#9A988F" text-anchor="middle"><text x="346" y="76">0</text><text x="390" y="76">1</text><text x="434" y="76">2</text><text x="478" y="76">3</text><text x="522" y="76">4</text><text x="566" y="76">5</text><text x="610" y="76">6</text><text x="654" y="76">7</text></g>
<rect x="324" y="84" width="352" height="42" rx="8" fill="#FFFFFF" stroke="#C3D2E8" stroke-width="1.2" filter="url(#sh)"/>
<rect x="545" y="85" width="42" height="40" fill="#E4F2EB"/>
<rect x="588" y="85" width="87" height="40" fill="#F4F2EC"/>
<g stroke="#DCE6F2"><line x1="368" y1="84" x2="368" y2="126"/><line x1="412" y1="84" x2="412" y2="126"/><line x1="456" y1="84" x2="456" y2="126"/><line x1="500" y1="84" x2="500" y2="126"/><line x1="544" y1="84" x2="544" y2="126"/><line x1="588" y1="84" x2="588" y2="126"/><line x1="632" y1="84" x2="632" y2="126"/></g>
<g class="val" fill="#28415F" text-anchor="middle"><text x="346" y="111">1</text><text x="390" y="111">2</text><text x="434" y="111">3</text><text x="478" y="111">4</text></g>
<text x="522" y="111" text-anchor="middle" class="val" fill="#0A463A" font-weight="700">5</text>
<text x="631" y="111" text-anchor="middle" class="idx" fill="#B8B5AC">预留空位</text>
<g class="fd" fill="#7B7A72" text-anchor="middle"><text x="500" y="148">ob_size = 5　allocated = 8</text></g>

<text x="380" y="186" text-anchor="middle" class="cap" fill="#9A988F">容量不足时 realloc 一块更大内存，多分配约 1/8 作预留，避免每次追加都重新分配</text>
<text x="380" y="210" text-anchor="middle" class="cap" fill="#9A988F">容量增长序列：0, 4, 8, 16, 25, 35, 46, 58, 72, 88, …</text>
</svg>
