<svg width="100%" viewBox="0 0 720 220" xmlns="http://www.w3.org/2000/svg" role="img" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'PingFang SC','Microsoft YaHei',sans-serif">
<title>列表追加 append 示意</title>
<desc>对 [1,2,3]（ob_size=3，allocated=4）执行 append(4)：末尾本就预留了一个空位，直接把 4 放进去，ob_size 变为 4，allocated 不变，无需重新分配内存。</desc>
<defs>
  <style>
    .lab{font-size:12px;font-weight:600;}
    .val{font-size:14px;font-family:'SF Mono','JetBrains Mono',ui-monospace,Consolas,monospace;}
    .fd{font-size:12px;font-family:'SF Mono','JetBrains Mono',ui-monospace,Consolas,monospace;}
    .idx{font-size:10.5px;}
    .cap{font-size:12px;}
  </style>
  <filter id="sh" x="-30%" y="-30%" width="160%" height="160%"><feDropShadow dx="0" dy="1.4" stdDeviation="2" flood-color="#2A2A28" flood-opacity="0.12"/></filter>
  <marker id="ah" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#8E8B80" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></marker>
</defs>

<rect x="0" y="0" width="720" height="220" fill="#FBFAF6"/>

<!-- before -->
<text x="182" y="44" text-anchor="middle" class="lab" fill="#7B7A72">调用前</text>
<g class="idx" fill="#9A988F" text-anchor="middle"><text x="98" y="62">0</text><text x="154" y="62">1</text><text x="210" y="62">2</text><text x="266" y="62">3</text></g>
<rect x="70" y="72" width="224" height="44" rx="8" fill="#FFFFFF" stroke="#C3D2E8" stroke-width="1.2" filter="url(#sh)"/>
<g stroke="#DCE6F2"><line x1="126" y1="72" x2="126" y2="116"/><line x1="182" y1="72" x2="182" y2="116"/><line x1="238" y1="72" x2="238" y2="116"/></g>
<g class="val" fill="#28415F" text-anchor="middle"><text x="98" y="100">1</text><text x="154" y="100">2</text><text x="210" y="100">3</text></g>
<text x="266" y="100" text-anchor="middle" class="idx" fill="#C0BDB4">空</text>
<g class="fd" fill="#7B7A72" text-anchor="middle"><text x="182" y="138">ob_size = 3</text><text x="182" y="156">allocated = 4</text></g>

<!-- arrow -->
<text x="357" y="86" text-anchor="middle" class="fd" fill="#28415F">append(4)</text>
<line x1="312" y1="94" x2="402" y2="94" stroke="#8E8B80" stroke-width="1.8" marker-end="url(#ah)"/>

<!-- after -->
<text x="532" y="44" text-anchor="middle" class="lab" fill="#7B7A72">调用后</text>
<g class="idx" fill="#9A988F" text-anchor="middle"><text x="448" y="62">0</text><text x="504" y="62">1</text><text x="560" y="62">2</text><text x="616" y="62">3</text></g>
<rect x="420" y="72" width="224" height="44" rx="8" fill="#FFFFFF" stroke="#C3D2E8" stroke-width="1.2" filter="url(#sh)"/>
<rect x="589" y="73" width="54" height="42" fill="#E4F2EB"/>
<g stroke="#DCE6F2"><line x1="476" y1="72" x2="476" y2="116"/><line x1="532" y1="72" x2="532" y2="116"/><line x1="588" y1="72" x2="588" y2="116"/></g>
<g class="val" fill="#28415F" text-anchor="middle"><text x="448" y="100">1</text><text x="504" y="100">2</text><text x="560" y="100">3</text></g>
<text x="616" y="100" text-anchor="middle" class="val" fill="#0A463A" font-weight="700">4</text>
<g class="fd" fill="#7B7A72" text-anchor="middle"><text x="532" y="138">ob_size = 4</text><text x="532" y="156">allocated = 4</text></g>

<text x="360" y="196" text-anchor="middle" class="cap" fill="#9A988F">末尾有预留空位 → 直接放入，无需重新分配内存（append 摊还 O(1)）</text>
</svg>
