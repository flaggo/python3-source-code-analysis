<svg width="100%" viewBox="0 0 640 250" xmlns="http://www.w3.org/2000/svg" role="img" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'PingFang SC','Microsoft YaHei',sans-serif">
<title>列表的创建与 free_list 缓冲池</title>
<desc>创建列表时，PyList_New 先看缓冲池 free_list（最多缓存 80 个已释放的列表对象壳）：池里有就复用一个，没有才用 PyObject_GC_New 新建。复用或新建的只是 PyListObject 对象壳（对象头部分），存放元素指针的 ob_item 数组总是另行申请。</desc>
<defs>
  <style>
    .ti{font-size:13px;font-weight:600;}
    .b{font-size:11.5px;}
    .code{font-size:11px;font-family:'SF Mono','JetBrains Mono',ui-monospace,Consolas,monospace;}
    .lab{font-size:11px;}
    .cap{font-size:11.5px;}
  </style>
  <filter id="sh" x="-30%" y="-30%" width="160%" height="160%"><feDropShadow dx="0" dy="1.4" stdDeviation="2" flood-color="#2A2A28" flood-opacity="0.12"/></filter>
  <linearGradient id="gA" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#FAEFD9"/><stop offset="1" stop-color="#F4E6C8"/></linearGradient>
  <linearGradient id="gB" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#EFF3FA"/><stop offset="1" stop-color="#E0E9F6"/></linearGradient>
  <linearGradient id="gG" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#E9F6F1"/><stop offset="1" stop-color="#DBF0E7"/></linearGradient>
  <marker id="ah" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#8E8B80" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker>
</defs>

<rect x="0" y="0" width="640" height="250" fill="#FBFAF6"/>

<!-- free_list pool -->
<text x="372" y="40" class="lab" fill="#7B7A72">free_list（最多缓存 80 个空闲对象壳）</text>
<rect x="372" y="48" width="232" height="40" rx="8" fill="#FFFFFF" stroke="#C3D2E8" stroke-width="1.1" filter="url(#sh)"/>
<g><rect x="382" y="56" width="44" height="24" rx="5" fill="url(#gB)" stroke="#C3D2E8"/><rect x="432" y="56" width="44" height="24" rx="5" fill="url(#gB)" stroke="#C3D2E8"/><rect x="482" y="56" width="44" height="24" rx="5" fill="url(#gB)" stroke="#C3D2E8"/></g>
<text x="566" y="73" class="lab" fill="#9A988F">⋯ 壳</text>

<!-- flow -->
<rect x="24" y="116" width="140" height="40" rx="9" fill="url(#gA)" stroke="#E8CB94" stroke-width="1" filter="url(#sh)"/><text x="94" y="141" text-anchor="middle" class="code" fill="#5C3C08">PyList_New(size)</text>
<path d="M164,136 H196" fill="none" stroke="#8E8B80" stroke-width="1.5" marker-end="url(#ah)"/>
<rect x="198" y="116" width="120" height="40" rx="9" fill="url(#gA)" stroke="#E8CB94" stroke-width="1" filter="url(#sh)"/><text x="258" y="141" text-anchor="middle" class="code" fill="#5C3C08">numfree &gt; 0 ?</text>

<!-- yes -> reuse from pool -->
<path d="M318,128 C360,116 380,104 410,90" fill="none" stroke="#8E8B80" stroke-width="1.5" marker-end="url(#ah)"/>
<text x="350" y="110" class="lab" fill="#0A463A">是：复用一个壳</text>

<!-- no -> new -->
<path d="M258,156 V184 H372" fill="none" stroke="#8E8B80" stroke-width="1.5" marker-end="url(#ah)"/>
<text x="266" y="178" class="lab" fill="#28415F">否</text>
<rect x="374" y="166" width="230" height="38" rx="9" fill="url(#gB)" stroke="#C3D2E8" stroke-width="1" filter="url(#sh)"/><text x="489" y="189" text-anchor="middle" class="code" fill="#28415F">PyObject_GC_New 新建对象壳</text>

<text x="320" y="234" text-anchor="middle" class="cap" fill="#9A988F">复用/新建的只是对象壳；存放元素指针的 ob_item 数组总是另行申请</text>
</svg>
