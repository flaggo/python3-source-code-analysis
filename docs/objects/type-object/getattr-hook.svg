<svg width="100%" viewBox="0 0 700 250" xmlns="http://www.w3.org/2000/svg" role="img" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'PingFang SC','Microsoft YaHei',sans-serif">
<title>__getattribute__ 总是先走，__getattr__ 只在找不到时兜底</title>
<desc>访问 obj.x 时，总是先调用 __getattribute__ 走正常的属性查找（数据描述符、实例字典、类属性）。若找到就返回；只有当它抛出 AttributeError 时，才回退去调用 __getattr__（如果类定义了的话）。所以 __getattribute__ 每次都执行，__getattr__ 只是兜底。</desc>
<defs>
  <style>
    .ti{font-size:12.5px;font-weight:600;}
    .b{font-size:11.5px;font-weight:600;}
    .c{font-size:11px;font-family:'SF Mono','JetBrains Mono',ui-monospace,Consolas,monospace;}
    .s{font-size:10.5px;}
    .lbl{font-size:10.5px;font-weight:600;}
  </style>
  <filter id="sh" x="-30%" y="-30%" width="160%" height="160%"><feDropShadow dx="0" dy="1.4" stdDeviation="2" flood-color="#2A2A28" flood-opacity="0.12"/></filter>
  <linearGradient id="gN" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#F1EFE8"/><stop offset="1" stop-color="#E7E4DA"/></linearGradient>
  <linearGradient id="gB" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#EFF3FA"/><stop offset="1" stop-color="#E0E9F6"/></linearGradient>
  <linearGradient id="gG" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#E9F6F1"/><stop offset="1" stop-color="#DBF0E7"/></linearGradient>
  <linearGradient id="gR" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#F8EEEE"/><stop offset="1" stop-color="#F1E1E1"/></linearGradient>
  <marker id="ah" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#8E8B80" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker>
  <marker id="ahg" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#1E8B6F" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></marker>
  <marker id="ahr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#B07575" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></marker>
</defs>

<rect x="0" y="0" width="700" height="250" fill="#FBFAF6"/>
<text x="350" y="28" text-anchor="middle" class="ti" fill="#28415F">obj.x：先走 __getattribute__，找不到才兜底 __getattr__</text>

<!-- obj.x -->
<rect x="28" y="98" width="104" height="48" rx="9" fill="url(#gN)" stroke="#D8D3C6" stroke-width="1" filter="url(#sh)"/>
<text x="80" y="127" text-anchor="middle" class="c" fill="#33322E">obj.x</text>

<!-- __getattribute__ -->
<path d="M132,122 H172" fill="none" stroke="#8E8B80" stroke-width="1.6" marker-end="url(#ah)"/>
<rect x="174" y="92" width="190" height="60" rx="9" fill="url(#gB)" stroke="#C3D2E8" stroke-width="1" filter="url(#sh)"/>
<text x="269" y="115" text-anchor="middle" class="b" fill="#28415F">__getattribute__（总是执行）</text>
<text x="269" y="133" text-anchor="middle" class="s" fill="#4A5E80">数据描述符 → 实例字典 → 类属性</text>
<text x="269" y="147" text-anchor="middle" class="s" fill="#4A5E80">即正常的属性查找顺序</text>

<!-- found -> return -->
<path d="M364,108 H560" fill="none" stroke="#1E8B6F" stroke-width="1.6" marker-end="url(#ahg)"/>
<text x="462" y="100" text-anchor="middle" class="lbl" fill="#0A463A">找到 → 返回值</text>
<rect x="562" y="90" width="110" height="36" rx="9" fill="url(#gG)" stroke="#A8DCC9" stroke-width="1" filter="url(#sh)"/>
<text x="617" y="113" text-anchor="middle" class="b" fill="#0A463A">返回属性</text>

<!-- not found -> AttributeError -> __getattr__ -->
<path d="M269,152 V184" fill="none" stroke="#B07575" stroke-width="1.6" marker-end="url(#ahr)"/>
<text x="386" y="172" text-anchor="middle" class="lbl" fill="#7A3B3B">抛 AttributeError → 回退</text>
<rect x="174" y="186" width="190" height="44" rx="9" fill="url(#gR)" stroke="#E0C6C6" stroke-width="1" filter="url(#sh)"/>
<text x="269" y="206" text-anchor="middle" class="b" fill="#5C3030">__getattr__（兜底，可选）</text>
<text x="269" y="221" text-anchor="middle" class="s" fill="#7A3B3B">类若没定义它 → 真的 AttributeError</text>

<!-- getattr return -->
<path d="M364,208 H560" fill="none" stroke="#1E8B6F" stroke-width="1.6" marker-end="url(#ahg)"/>
<rect x="562" y="190" width="110" height="36" rx="9" fill="url(#gG)" stroke="#A8DCC9" stroke-width="1" filter="url(#sh)"/>
<text x="617" y="213" text-anchor="middle" class="b" fill="#0A463A">返回兜底值</text>
</svg>
