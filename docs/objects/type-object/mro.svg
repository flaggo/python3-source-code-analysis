<svg width="100%" viewBox="0 0 640 280" xmlns="http://www.w3.org/2000/svg" role="img" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'PingFang SC','Microsoft YaHei',sans-serif">
<title>MRO 与多继承的 C3 线性化</title>
<desc>菱形继承 class D(B, Cc)、B(A)、Cc(A)、A(object)，经 C3 线性化算出的方法解析顺序 MRO 为 D → B → Cc → A → object。属性查找就沿这个顺序在各个类里依次找。</desc>
<defs>
  <style>
    .ti{font-size:12.5px;font-weight:600;}
    .n{font-size:12px;font-weight:600;font-family:'SF Mono','JetBrains Mono',ui-monospace,Consolas,monospace;}
    .lab{font-size:11.5px;}
    .cap{font-size:11.5px;}
  </style>
  <filter id="sh" x="-30%" y="-30%" width="160%" height="160%"><feDropShadow dx="0" dy="1.4" stdDeviation="2" flood-color="#2A2A28" flood-opacity="0.12"/></filter>
  <linearGradient id="gP" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#F3F1FD"/><stop offset="1" stop-color="#E9E6FB"/></linearGradient>
  <marker id="ah" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#9A988F" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker>
  <marker id="ahg" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#1E8B6F" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></marker>
</defs>

<rect x="0" y="0" width="640" height="280" fill="#FBFAF6"/>
<text x="160" y="28" text-anchor="middle" class="ti" fill="#2E2972">菱形继承</text>

<!-- inheritance edges (arrow points to parent) -->
<g fill="none" stroke="#C0BDB4" stroke-width="1.5" marker-end="url(#ah)">
  <path d="M168,212 L128,184"/>
  <path d="M192,212 L232,184"/>
  <path d="M120,150 L160,120"/>
  <path d="M240,150 L200,120"/>
  <path d="M180,88 V62"/>
</g>

<!-- nodes -->
<g class="n" text-anchor="middle">
  <rect x="152" y="34" width="56" height="28" rx="7" fill="#FFFFFF" stroke="#D8D3C6"/><text x="180" y="53" fill="#33322E">object</text>
  <rect x="152" y="92" width="56" height="28" rx="7" fill="url(#gP)" stroke="#CCC7F1"/><text x="180" y="111" fill="#2E2972">A</text>
  <rect x="92" y="154" width="56" height="28" rx="7" fill="url(#gP)" stroke="#CCC7F1"/><text x="120" y="173" fill="#2E2972">B</text>
  <rect x="212" y="154" width="56" height="28" rx="7" fill="url(#gP)" stroke="#CCC7F1"/><text x="240" y="173" fill="#2E2972">Cc</text>
  <rect x="152" y="214" width="56" height="28" rx="7" fill="url(#gP)" stroke="#CCC7F1"/><text x="180" y="233" fill="#2E2972">D</text>
</g>
<text x="160" y="266" text-anchor="middle" class="cap" fill="#9A988F">D(B, Cc)，B(A)，Cc(A)，A(object)</text>

<!-- MRO order -->
<line x1="330" y1="40" x2="330" y2="250" stroke="#E2DED2" stroke-width="1" stroke-dasharray="4 5"/>
<text x="490" y="28" text-anchor="middle" class="ti" fill="#0A463A">C3 线性化得到 MRO</text>
<g class="n" text-anchor="middle" fill="#0A463A">
  <rect x="372" y="64" width="100" height="30" rx="8" fill="#E9F6F1" stroke="#A8DCC9"/><text x="422" y="84">D</text>
  <rect x="372" y="104" width="100" height="30" rx="8" fill="#E9F6F1" stroke="#A8DCC9"/><text x="422" y="124">B</text>
  <rect x="372" y="144" width="100" height="30" rx="8" fill="#E9F6F1" stroke="#A8DCC9"/><text x="422" y="164">Cc</text>
  <rect x="372" y="184" width="100" height="30" rx="8" fill="#E9F6F1" stroke="#A8DCC9"/><text x="422" y="204">A</text>
  <rect x="372" y="224" width="100" height="30" rx="8" fill="#E9F6F1" stroke="#A8DCC9"/><text x="422" y="244">object</text>
</g>
<g fill="none" stroke="#1E8B6F" stroke-width="1.6" marker-end="url(#ahg)">
  <path d="M422,94 V102"/><path d="M422,134 V142"/><path d="M422,174 V182"/><path d="M422,214 V222"/>
</g>
<text x="540" y="159" class="cap" fill="#9A988F" transform="rotate(90 540 159)">属性查找沿此顺序</text>
</svg>
