<svg width="100%" viewBox="0 0 640 320" xmlns="http://www.w3.org/2000/svg" role="img" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'PingFang SC','Microsoft YaHei',sans-serif">
<title>obj.attr 的属性查找顺序</title>
<desc>访问 obj.attr 时，_PyObject_GenericGetAttrWithDict 按优先级查找：① 先在类型的 MRO 里找数据描述符（同时有 __get__ 和 __set__），命中则调用其 __get__ 返回；② 否则查实例自己的 __dict__；③ 否则用类 MRO 里找到的非数据描述符（如方法）或类属性；④ 都没有则抛 AttributeError。</desc>
<defs>
  <style>
    .ti{font-size:13px;font-weight:600;}
    .b{font-size:11.5px;font-weight:600;}
    .s{font-size:10.5px;}
    .lab{font-size:10.5px;}
  </style>
  <filter id="sh" x="-30%" y="-30%" width="160%" height="160%"><feDropShadow dx="0" dy="1.4" stdDeviation="2" flood-color="#2A2A28" flood-opacity="0.12"/></filter>
  <linearGradient id="gP" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#F3F1FD"/><stop offset="1" stop-color="#E9E6FB"/></linearGradient>
  <linearGradient id="gG" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#E9F6F1"/><stop offset="1" stop-color="#DBF0E7"/></linearGradient>
  <linearGradient id="gB" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#EFF3FA"/><stop offset="1" stop-color="#E0E9F6"/></linearGradient>
  <linearGradient id="gR" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#F8EEEE"/><stop offset="1" stop-color="#F1E1E1"/></linearGradient>
  <marker id="ah" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#8E8B80" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker>
  <marker id="ahg" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#1E8B6F" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></marker>
</defs>

<rect x="0" y="0" width="640" height="320" fill="#FBFAF6"/>
<text x="240" y="28" text-anchor="middle" class="ti" fill="#33322E">obj.attr 的查找顺序（优先级从上到下）</text>

<!-- box1 -->
<rect x="80" y="44" width="332" height="46" rx="10" fill="url(#gP)" stroke="#CCC7F1" stroke-width="1" filter="url(#sh)"/>
<text x="96" y="65" class="b" fill="#2E2972">① 数据描述符（类的 MRO 中）</text>
<text x="96" y="82" class="s" fill="#4A4396">同时有 __get__ 和 __set__，优先级最高</text>
<!-- box2 -->
<rect x="80" y="118" width="332" height="46" rx="10" fill="url(#gG)" stroke="#A8DCC9" stroke-width="1" filter="url(#sh)"/>
<text x="96" y="139" class="b" fill="#0A463A">② 实例自己的 __dict__</text>
<text x="96" y="156" class="s" fill="#0C5945">对象上 self.x = ... 设的属性</text>
<!-- box3 -->
<rect x="80" y="192" width="332" height="46" rx="10" fill="url(#gB)" stroke="#C3D2E8" stroke-width="1" filter="url(#sh)"/>
<text x="96" y="213" class="b" fill="#28415F">③ 非数据描述符 / 类属性（类 MRO）</text>
<text x="96" y="230" class="s" fill="#4A5E80">方法（只有 __get__）、类变量等</text>
<!-- box4 -->
<rect x="80" y="266" width="332" height="40" rx="10" fill="url(#gR)" stroke="#E0C6C6" stroke-width="1" filter="url(#sh)"/>
<text x="96" y="291" class="b" fill="#5C3030">④ 都没有 → 抛 AttributeError</text>

<!-- down arrows (miss) -->
<g fill="none" stroke="#8E8B80" stroke-width="1.5" marker-end="url(#ah)">
  <path d="M246,90 V116"/><path d="M246,164 V190"/><path d="M246,238 V264"/>
</g>
<g class="lab" fill="#9A988F"><text x="256" y="108">未命中 ↓</text><text x="256" y="182">未命中 ↓</text><text x="256" y="256">未命中 ↓</text></g>

<!-- hit -> return -->
<g fill="none" stroke="#1E8B6F" stroke-width="1.6" marker-end="url(#ahg)">
  <path d="M412,67 H470"/><path d="M412,141 H470"/><path d="M412,215 H470"/>
</g>
<g class="lab" fill="#1E8B6F"><text x="476" y="64">命中</text><text x="476" y="79">→ 返回</text><text x="476" y="138">命中→返回</text><text x="476" y="212">命中→返回</text></g>
</svg>
