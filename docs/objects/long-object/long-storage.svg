<svg width="100%" viewBox="0 0 720 220" xmlns="http://www.w3.org/2000/svg" role="img" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'PingFang SC','Microsoft YaHei',sans-serif">
<title>整数对象的存储结构</title>
<desc>整数 9223372043297226753 以 30 位为一组拆分存入 ob_digit 数组：ob_size 为 3，ob_digit 依次为 1、6、8，其值等于 1·(2^30)^0 + 6·(2^30)^1 + 8·(2^30)^2。</desc>
<defs>
  <style>
    .fd{font-size:14px;font-family:'SF Mono','JetBrains Mono',ui-monospace,Consolas,monospace;font-weight:600;}
    .val{font-size:14px;font-family:'SF Mono','JetBrains Mono',ui-monospace,Consolas,monospace;}
    .idx{font-size:11px;}
    .cap{font-size:12px;}
  </style>
  <filter id="sh" x="-30%" y="-30%" width="160%" height="160%"><feDropShadow dx="0" dy="1.4" stdDeviation="2" flood-color="#2A2A28" flood-opacity="0.12"/></filter>
  <marker id="ah" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#8E8B80" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></marker>
</defs>

<rect x="0" y="0" width="720" height="220" fill="#FBFAF6"/>

<!-- ob_size -->
<text x="108" y="75" text-anchor="end" class="fd" fill="#0A463A">ob_size</text>
<rect x="122" y="52" width="58" height="40" rx="6" fill="#FFFFFF" stroke="#A8DCC9" stroke-width="1.2" filter="url(#sh)"/>
<text x="151" y="77" text-anchor="middle" class="val" fill="#0A463A">3</text>

<!-- ob_digit -->
<g class="idx" fill="#9A988F">
  <text x="151" y="118" text-anchor="middle">0</text>
  <text x="209" y="118" text-anchor="middle">1</text>
  <text x="267" y="118" text-anchor="middle">2</text>
</g>
<text x="108" y="153" text-anchor="end" class="fd" fill="#0A463A">ob_digit</text>
<rect x="122" y="128" width="174" height="40" rx="6" fill="#FFFFFF" stroke="#A8DCC9" stroke-width="1.2" filter="url(#sh)"/>
<line x1="180" y1="128" x2="180" y2="168" stroke="#CFE6DC" stroke-width="1"/>
<line x1="238" y1="128" x2="238" y2="168" stroke="#CFE6DC" stroke-width="1"/>
<g class="val" fill="#0A463A">
  <text x="151" y="153" text-anchor="middle">1</text>
  <text x="209" y="153" text-anchor="middle">6</text>
  <text x="267" y="153" text-anchor="middle">8</text>
</g>

<!-- arrow -->
<line x1="316" y1="148" x2="366" y2="148" stroke="#8E8B80" stroke-width="2" marker-end="url(#ah)"/>

<!-- formula -->
<text x="384" y="153" font-size="16" fill="#0A463A">1·(2<tspan dy="-7" font-size="10">30</tspan><tspan dy="7">)</tspan><tspan dy="-7" font-size="10">0</tspan><tspan dy="7"> + 6·(2</tspan><tspan dy="-7" font-size="10">30</tspan><tspan dy="7">)</tspan><tspan dy="-7" font-size="10">1</tspan><tspan dy="7"> + 8·(2</tspan><tspan dy="-7" font-size="10">30</tspan><tspan dy="7">)</tspan><tspan dy="-7" font-size="10">2</tspan></text>

<text x="384" y="190" class="cap" fill="#9A988F">= 9223372043297226753　（2<tspan dy="-5" font-size="9">30</tspan><tspan dy="5"> 由 PyLong_SHIFT 决定）</tspan></text>
</svg>
