<svg width="100%" viewBox="0 0 660 230" xmlns="http://www.w3.org/2000/svg" role="img" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'PingFang SC','Microsoft YaHei',sans-serif">
<title>整数创建的三路分派</title>
<desc>long_new_impl 按参数分流：int() 无参时返回 PyLong_FromLong(0) 即整数 0；int(x) 未指定进制时调用 PyNumber_Long(x) 按 x 的类型转换；int(s, base) 指定进制时调用 PyLong_FromString 按该进制解析字符串或字节串。</desc>
<defs>
  <style>
    .ti{font-size:13px;font-weight:600;}
    .c{font-size:11.5px;font-family:'SF Mono','JetBrains Mono',ui-monospace,Consolas,monospace;}
    .f{font-size:11.5px;font-family:'SF Mono','JetBrains Mono',ui-monospace,Consolas,monospace;}
    .r{font-size:11px;}
  </style>
  <filter id="sh" x="-30%" y="-30%" width="160%" height="160%"><feDropShadow dx="0" dy="1.4" stdDeviation="2" flood-color="#2A2A28" flood-opacity="0.12"/></filter>
  <linearGradient id="gN" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#F1EFE8"/><stop offset="1" stop-color="#E7E4DA"/></linearGradient>
  <linearGradient id="gB" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#EFF3FA"/><stop offset="1" stop-color="#E0E9F6"/></linearGradient>
  <linearGradient id="gG" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#E9F6F1"/><stop offset="1" stop-color="#DBF0E7"/></linearGradient>
  <marker id="ah" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#8E8B80" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker>
</defs>

<rect x="0" y="0" width="660" height="230" fill="#FBFAF6"/>
<text x="330" y="28" text-anchor="middle" class="ti" fill="#28415F">整数创建：long_new_impl 按参数分派</text>

<g fill="none" stroke="#8E8B80" stroke-width="1.5" marker-end="url(#ah)">
  <path d="M196,68 H228"/><path d="M420,68 H452"/>
  <path d="M196,128 H228"/><path d="M420,128 H452"/>
  <path d="M196,188 H228"/><path d="M420,188 H452"/>
</g>

<!-- row 1 -->
<rect x="28" y="50" width="168" height="36" rx="8" fill="url(#gN)" stroke="#D8D3C6" stroke-width="1" filter="url(#sh)"/><text x="112" y="73" text-anchor="middle" class="c" fill="#46453F">int()　无参</text>
<rect x="228" y="50" width="192" height="36" rx="8" fill="url(#gB)" stroke="#C3D2E8" stroke-width="1" filter="url(#sh)"/><text x="324" y="73" text-anchor="middle" class="f" fill="#28415F">PyLong_FromLong(0)</text>
<rect x="452" y="50" width="180" height="36" rx="8" fill="url(#gG)" stroke="#A8DCC9" stroke-width="1" filter="url(#sh)"/><text x="542" y="73" text-anchor="middle" class="r" fill="#0A463A">整数 0</text>

<!-- row 2 -->
<rect x="28" y="110" width="168" height="36" rx="8" fill="url(#gN)" stroke="#D8D3C6" stroke-width="1" filter="url(#sh)"/><text x="112" y="133" text-anchor="middle" class="c" fill="#46453F">int(x)　未给进制</text>
<rect x="228" y="110" width="192" height="36" rx="8" fill="url(#gB)" stroke="#C3D2E8" stroke-width="1" filter="url(#sh)"/><text x="324" y="133" text-anchor="middle" class="f" fill="#28415F">PyNumber_Long(x)</text>
<rect x="452" y="110" width="180" height="36" rx="8" fill="url(#gG)" stroke="#A8DCC9" stroke-width="1" filter="url(#sh)"/><text x="542" y="133" text-anchor="middle" class="r" fill="#0A463A">按 x 的类型转换</text>

<!-- row 3 -->
<rect x="28" y="170" width="168" height="36" rx="8" fill="url(#gN)" stroke="#D8D3C6" stroke-width="1" filter="url(#sh)"/><text x="112" y="193" text-anchor="middle" class="c" fill="#46453F">int(s, base)　给进制</text>
<rect x="228" y="170" width="192" height="36" rx="8" fill="url(#gB)" stroke="#C3D2E8" stroke-width="1" filter="url(#sh)"/><text x="324" y="193" text-anchor="middle" class="f" fill="#28415F">PyLong_FromString</text>
<rect x="452" y="170" width="180" height="36" rx="8" fill="url(#gG)" stroke="#A8DCC9" stroke-width="1" filter="url(#sh)"/><text x="542" y="193" text-anchor="middle" class="r" fill="#0A463A">按进制解析字符串</text>
</svg>
