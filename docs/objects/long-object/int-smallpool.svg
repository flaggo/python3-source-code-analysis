<svg width="100%" viewBox="0 0 640 280" xmlns="http://www.w3.org/2000/svg" role="img" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'PingFang SC','Microsoft YaHei',sans-serif">
<title>小整数对象池</title>
<desc>CPython 在启动时预分配并共享 [-5, 257) 范围内的小整数对象。256 在池内，a=256 与 b=256 拿到同一个对象，a is b 为 True；257 在池外，a=257 与 b=257 各自新建对象，a is b 为 False。</desc>
<defs>
  <style>
    .ti{font-size:13px;font-weight:600;}
    .st{font-size:11.5px;font-weight:600;}
    .v{font-size:12.5px;font-family:'SF Mono','JetBrains Mono',ui-monospace,Consolas,monospace;}
    .lab{font-size:11px;}
    .cap{font-size:12px;}
  </style>
  <filter id="sh" x="-30%" y="-30%" width="160%" height="160%"><feDropShadow dx="0" dy="1.4" stdDeviation="2" flood-color="#2A2A28" flood-opacity="0.12"/></filter>
  <linearGradient id="gG" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#E9F6F1"/><stop offset="1" stop-color="#DBF0E7"/></linearGradient>
  <linearGradient id="gB" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#EFF3FA"/><stop offset="1" stop-color="#E0E9F6"/></linearGradient>
  <marker id="ah" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#8E8B80" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker>
</defs>

<rect x="0" y="0" width="640" height="280" fill="#FBFAF6"/>

<!-- pool strip -->
<text x="320" y="28" text-anchor="middle" class="ti" fill="#0A463A">小整数对象池　small_ints[]　预分配 [-5, 257)，全局共享</text>
<rect x="80" y="42" width="480" height="32" rx="7" fill="#FFFFFF" stroke="#A8DCC9" stroke-width="1.1" filter="url(#sh)"/>
<rect x="497" y="43" width="62" height="30" fill="#E4F2EB"/>
<g stroke="#CFE6DC"><line x1="140" y1="42" x2="140" y2="74"/><line x1="220" y1="42" x2="220" y2="74"/><line x1="300" y1="42" x2="300" y2="74"/><line x1="380" y1="42" x2="380" y2="74"/><line x1="438" y1="42" x2="438" y2="74"/><line x1="498" y1="42" x2="498" y2="74"/></g>
<g class="v" fill="#0A463A" text-anchor="middle"><text x="110" y="63">-5</text><text x="180" y="63">⋯</text><text x="260" y="63">0</text><text x="340" y="63">1</text><text x="409" y="63">⋯</text><text x="468" y="63">⋯</text><text x="528" y="63" font-weight="700">256</text></g>

<line x1="320" y1="92" x2="320" y2="252" stroke="#E2DED2" stroke-width="1" stroke-dasharray="4 5"/>

<!-- left: 256 in pool -->
<text x="170" y="112" text-anchor="middle" class="st" fill="#0A463A">256　在池内</text>
<rect x="44" y="128" width="84" height="32" rx="8" fill="url(#gB)" stroke="#C3D2E8" stroke-width="1"/><text x="86" y="149" text-anchor="middle" class="v" fill="#28415F">a = 256</text>
<rect x="44" y="174" width="84" height="32" rx="8" fill="url(#gB)" stroke="#C3D2E8" stroke-width="1"/><text x="86" y="195" text-anchor="middle" class="v" fill="#28415F">b = 256</text>
<rect x="188" y="150" width="110" height="34" rx="9" fill="url(#gG)" stroke="#A8DCC9" stroke-width="1.1" filter="url(#sh)"/><text x="243" y="172" text-anchor="middle" class="v" fill="#0A463A">池中的 256</text>
<g fill="none" stroke="#8E8B80" stroke-width="1.5" marker-end="url(#ah)"><path d="M128,144 C160,144 160,164 186,166"/><path d="M128,190 C160,190 160,170 186,168"/></g>
<text x="170" y="234" text-anchor="middle" class="cap" fill="#0A463A">a is b → True（同一对象）</text>

<!-- right: 257 out of pool -->
<text x="470" y="112" text-anchor="middle" class="st" fill="#5C3030">257　在池外</text>
<rect x="346" y="128" width="84" height="32" rx="8" fill="url(#gB)" stroke="#C3D2E8" stroke-width="1"/><text x="388" y="149" text-anchor="middle" class="v" fill="#28415F">a = 257</text>
<rect x="346" y="174" width="84" height="32" rx="8" fill="url(#gB)" stroke="#C3D2E8" stroke-width="1"/><text x="388" y="195" text-anchor="middle" class="v" fill="#28415F">b = 257</text>
<rect x="490" y="124" width="110" height="32" rx="9" fill="#FFFFFF" stroke="#E0C6C6" stroke-width="1.1" filter="url(#sh)"/><text x="545" y="145" text-anchor="middle" class="v" fill="#5C3030">257 新对象①</text>
<rect x="490" y="178" width="110" height="32" rx="9" fill="#FFFFFF" stroke="#E0C6C6" stroke-width="1.1" filter="url(#sh)"/><text x="545" y="199" text-anchor="middle" class="v" fill="#5C3030">257 新对象②</text>
<g fill="none" stroke="#8E8B80" stroke-width="1.5" marker-end="url(#ah)"><path d="M430,144 H488"/><path d="M430,190 H488"/></g>
<text x="470" y="234" text-anchor="middle" class="cap" fill="#5C3030">a is b → False（各自新建）</text>
</svg>
