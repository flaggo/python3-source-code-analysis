<svg width="100%" viewBox="0 0 660 250" xmlns="http://www.w3.org/2000/svg" role="img" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'PingFang SC','Microsoft YaHei',sans-serif">
<title>对象的行为：类型对象里的协议族</title>
<desc>类型对象 PyTypeObject 有三组操作族指针：tp_as_number、tp_as_sequence、tp_as_mapping。整数的 tp_as_number 指向 long_as_number（PyNumberMethods），其中 nb_add 槽位填的是 long_add。所以 a + b 在 a 为整数时，会顺着 tp_as_number -> nb_add 找到 long_add 执行。序列、映射操作同理。</desc>
<defs>
  <style>
    .ct{font-size:12px;font-weight:600;}
    .fd{font-size:11.5px;font-family:'SF Mono','JetBrains Mono',ui-monospace,Consolas,monospace;}
    .cap{font-size:11.5px;}
  </style>
  <filter id="sh" x="-30%" y="-30%" width="160%" height="160%"><feDropShadow dx="0" dy="1.4" stdDeviation="2" flood-color="#2A2A28" flood-opacity="0.12"/></filter>
  <linearGradient id="gB" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#EFF3FA"/><stop offset="1" stop-color="#E0E9F6"/></linearGradient>
  <linearGradient id="gG" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#E9F6F1"/><stop offset="1" stop-color="#DBF0E7"/></linearGradient>
  <marker id="ah" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#8E8B80" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker>
</defs>

<rect x="0" y="0" width="660" height="250" fill="#FBFAF6"/>
<text x="330" y="26" text-anchor="middle" class="ct" fill="#28415F">a + b（a 为整数）如何找到加法实现</text>

<!-- PyTypeObject -->
<rect x="36" y="48" width="194" height="150" rx="10" fill="#FFFFFF" stroke="#C3D2E8" stroke-width="1" filter="url(#sh)"/>
<path d="M36,80 V58 Q36,48 46,48 H220 Q230,48 230,58 V80 Z" fill="url(#gB)"/>
<text x="133" y="69" text-anchor="middle" class="ct" fill="#28415F">PyTypeObject（PyLong_Type）</text>
<rect x="36" y="80" width="194" height="40" fill="#EEF3FA"/>
<g stroke="#ECEFF5"><line x1="36" y1="120" x2="230" y2="120"/><line x1="36" y1="158" x2="230" y2="158"/></g>
<g class="fd" fill="#28415F"><text x="50" y="104">tp_as_number ●</text><text x="50" y="143">tp_as_sequence ●</text><text x="50" y="181">tp_as_mapping ●</text></g>

<!-- arrow -->
<path d="M230,100 C280,100 290,108 338,108" fill="none" stroke="#8E8B80" stroke-width="1.6" marker-end="url(#ah)"/>

<!-- PyNumberMethods -->
<rect x="340" y="48" width="244" height="150" rx="10" fill="#FFFFFF" stroke="#A8DCC9" stroke-width="1" filter="url(#sh)"/>
<path d="M340,80 V58 Q340,48 350,48 H574 Q584,48 584,58 V80 Z" fill="url(#gG)"/>
<text x="462" y="69" text-anchor="middle" class="ct" fill="#0A463A">PyNumberMethods（long_as_number）</text>
<rect x="340" y="80" width="244" height="40" fill="#EAF6F0"/>
<g stroke="#E4F0EA"><line x1="340" y1="120" x2="584" y2="120"/><line x1="340" y1="158" x2="584" y2="158"/></g>
<g class="fd" fill="#0A463A"><text x="354" y="104">nb_add　　→ long_add</text><text x="354" y="143">nb_subtract → long_sub</text><text x="354" y="181">nb_multiply → long_mul　⋯</text></g>

<text x="330" y="228" text-anchor="middle" class="cap" fill="#9A988F">a + b 顺着 tp_as_number → nb_add 找到 long_add；序列、映射操作族同理</text>
</svg>
