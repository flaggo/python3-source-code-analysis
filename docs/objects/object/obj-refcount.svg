<svg width="100%" viewBox="0 0 680 220" xmlns="http://www.w3.org/2000/svg" role="img" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'PingFang SC','Microsoft YaHei',sans-serif">
<title>引用计数与对象的销毁</title>
<desc>Py_INCREF 让对象的 ob_refcnt 加一，Py_DECREF 让它减一。每次 Py_DECREF 后若 ob_refcnt 仍大于 0，对象继续存活；一旦归零，就调用 _Py_Dealloc，进而调用该类型的 tp_dealloc 释放内存（或把空间归还给对象池）。</desc>
<defs>
  <style>
    .ct{font-size:12px;font-weight:600;}
    .b{font-size:11.5px;}
    .code{font-size:11px;font-family:'SF Mono','JetBrains Mono',ui-monospace,Consolas,monospace;}
    .lab{font-size:11px;}
  </style>
  <filter id="sh" x="-30%" y="-30%" width="160%" height="160%"><feDropShadow dx="0" dy="1.4" stdDeviation="2" flood-color="#2A2A28" flood-opacity="0.12"/></filter>
  <linearGradient id="gN" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#F1EFE8"/><stop offset="1" stop-color="#E7E4DA"/></linearGradient>
  <linearGradient id="gA" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#FAEFD9"/><stop offset="1" stop-color="#F4E6C8"/></linearGradient>
  <linearGradient id="gG" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#E9F6F1"/><stop offset="1" stop-color="#DBF0E7"/></linearGradient>
  <linearGradient id="gR" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#F8EEEE"/><stop offset="1" stop-color="#F1E1E1"/></linearGradient>
  <marker id="ah" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#8E8B80" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker>
</defs>

<rect x="0" y="0" width="680" height="220" fill="#FBFAF6"/>
<text x="30" y="28" class="b" fill="#0A463A">Py_INCREF：新增一处引用 → ob_refcnt + 1</text>

<!-- object -->
<rect x="28" y="84" width="120" height="44" rx="9" fill="url(#gN)" stroke="#D8D3C6" stroke-width="1" filter="url(#sh)"/>
<text x="88" y="102" text-anchor="middle" class="ct" fill="#33322E">对象</text>
<text x="88" y="119" text-anchor="middle" class="code" fill="#5C5B53">ob_refcnt</text>

<!-- decref arrow -->
<path d="M148,106 H206" fill="none" stroke="#8E8B80" stroke-width="1.6" marker-end="url(#ah)"/>
<text x="177" y="98" text-anchor="middle" class="lab" fill="#8A6212">Py_DECREF</text>
<text x="177" y="124" text-anchor="middle" class="lab" fill="#9A988F">−1</text>

<!-- decision -->
<rect x="208" y="84" width="138" height="44" rx="9" fill="url(#gA)" stroke="#E8CB94" stroke-width="1" filter="url(#sh)"/>
<text x="277" y="111" text-anchor="middle" class="code" fill="#5C3C08">ob_refcnt == 0 ?</text>

<!-- yes branch -->
<path d="M346,96 C380,80 392,64 416,58" fill="none" stroke="#8E8B80" stroke-width="1.6" marker-end="url(#ah)"/>
<text x="378" y="64" class="lab" fill="#5C3030">是</text>
<rect x="418" y="40" width="244" height="40" rx="9" fill="url(#gR)" stroke="#E0C6C6" stroke-width="1" filter="url(#sh)"/>
<text x="540" y="64" text-anchor="middle" class="b" fill="#5C3030">_Py_Dealloc → tp_dealloc → 释放/回池</text>

<!-- no branch -->
<path d="M346,116 C380,132 392,148 416,154" fill="none" stroke="#8E8B80" stroke-width="1.6" marker-end="url(#ah)"/>
<text x="378" y="150" class="lab" fill="#0A463A">否</text>
<rect x="418" y="136" width="244" height="40" rx="9" fill="url(#gG)" stroke="#A8DCC9" stroke-width="1" filter="url(#sh)"/>
<text x="540" y="160" text-anchor="middle" class="b" fill="#0A463A">ob_refcnt &gt; 0 → 对象继续存活</text>
</svg>
