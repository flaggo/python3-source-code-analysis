<svg width="100%" viewBox="0 0 680 300" xmlns="http://www.w3.org/2000/svg" role="img" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'PingFang SC','Microsoft YaHei',sans-serif">
<title>对象的多态：按 ob_type 分派</title>
<desc>同一行调用 object->ob_type->tp_hash(object)：若传入整数对象，ob_type 指向 PyLong_Type，其 tp_hash 绑定 long_hash；若传入字符串对象，ob_type 指向 PyUnicode_Type，其 tp_hash 绑定 unicode_hash。同一调用因 ob_type 不同走到不同实现，这就是多态。</desc>
<defs>
  <style>
    .ct{font-size:12.5px;font-weight:600;}
    .code{font-size:12px;font-family:'SF Mono','JetBrains Mono',ui-monospace,Consolas,monospace;}
    .lab{font-size:10.5px;font-family:'SF Mono','JetBrains Mono',ui-monospace,Consolas,monospace;}
    .cap{font-size:12px;}
  </style>
  <filter id="sh" x="-30%" y="-30%" width="160%" height="160%"><feDropShadow dx="0" dy="1.4" stdDeviation="2" flood-color="#2A2A28" flood-opacity="0.12"/></filter>
  <linearGradient id="gN" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#F1EFE8"/><stop offset="1" stop-color="#E7E4DA"/></linearGradient>
  <linearGradient id="gB" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#EFF3FA"/><stop offset="1" stop-color="#E0E9F6"/></linearGradient>
  <linearGradient id="gP" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#F3F1FD"/><stop offset="1" stop-color="#E9E6FB"/></linearGradient>
  <linearGradient id="gG" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#E9F6F1"/><stop offset="1" stop-color="#DBF0E7"/></linearGradient>
  <marker id="ah" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#8E8B80" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker>
</defs>

<rect x="0" y="0" width="680" height="300" fill="#FBFAF6"/>

<!-- shared call -->
<rect x="190" y="40" width="300" height="38" rx="9" fill="url(#gN)" stroke="#D8D3C6" stroke-width="1" filter="url(#sh)"/>
<text x="340" y="64" text-anchor="middle" class="code" fill="#33322E">object-&gt;ob_type-&gt;tp_hash(object)</text>
<g fill="none" stroke="#8E8B80" stroke-width="1.5" marker-end="url(#ah)"><path d="M300,78 C250,92 200,96 172,106"/><path d="M380,78 C430,92 480,96 508,106"/></g>

<!-- left: int -->
<rect x="100" y="108" width="144" height="34" rx="8" fill="url(#gG)" stroke="#A8DCC9" stroke-width="1" filter="url(#sh)"/><text x="172" y="130" text-anchor="middle" class="ct" fill="#0A463A">整数对象　int 10</text>
<text x="186" y="160" class="lab" fill="#9A988F">ob_type ↓</text>
<rect x="100" y="166" width="144" height="34" rx="8" fill="url(#gB)" stroke="#C3D2E8" stroke-width="1" filter="url(#sh)"/><text x="172" y="188" text-anchor="middle" class="ct" fill="#28415F">PyLong_Type</text>
<text x="186" y="218" class="lab" fill="#9A988F">tp_hash ↓</text>
<rect x="100" y="224" width="144" height="34" rx="8" fill="url(#gG)" stroke="#A8DCC9" stroke-width="1.2" filter="url(#sh)"/><text x="172" y="246" text-anchor="middle" class="code" fill="#0A463A">long_hash()</text>
<line x1="172" y1="142" x2="172" y2="164" stroke="#8E8B80" stroke-width="1.4" marker-end="url(#ah)"/>
<line x1="172" y1="200" x2="172" y2="222" stroke="#8E8B80" stroke-width="1.4" marker-end="url(#ah)"/>

<!-- right: str -->
<rect x="436" y="108" width="144" height="34" rx="8" fill="url(#gG)" stroke="#A8DCC9" stroke-width="1" filter="url(#sh)"/><text x="508" y="130" text-anchor="middle" class="ct" fill="#0A463A">字符串对象　str</text>
<text x="522" y="160" class="lab" fill="#9A988F">ob_type ↓</text>
<rect x="436" y="166" width="144" height="34" rx="8" fill="url(#gP)" stroke="#CCC7F1" stroke-width="1" filter="url(#sh)"/><text x="508" y="188" text-anchor="middle" class="ct" fill="#2E2972">PyUnicode_Type</text>
<text x="522" y="218" class="lab" fill="#9A988F">tp_hash ↓</text>
<rect x="436" y="224" width="144" height="34" rx="8" fill="url(#gG)" stroke="#A8DCC9" stroke-width="1.2" filter="url(#sh)"/><text x="508" y="246" text-anchor="middle" class="code" fill="#0A463A">unicode_hash()</text>
<line x1="508" y1="142" x2="508" y2="164" stroke="#8E8B80" stroke-width="1.4" marker-end="url(#ah)"/>
<line x1="508" y1="200" x2="508" y2="222" stroke="#8E8B80" stroke-width="1.4" marker-end="url(#ah)"/>

<text x="340" y="288" text-anchor="middle" class="cap" fill="#9A988F">同一行调用，按 ob_type 走到不同实现——这就是多态</text>
</svg>
