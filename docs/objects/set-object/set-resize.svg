<svg width="100%" viewBox="0 0 620 300" xmlns="http://www.w3.org/2000/svg" role="img" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'PingFang SC','Microsoft YaHei',sans-serif">
<title>集合扩容 set_table_resize 示意</title>
<desc>旧表 size 8 中有活跃元素 1（槽1）、9（槽6）和一个 dummy 墓碑（槽2）。扩容时申请更大的新表 size 16，只把活跃元素按新掩码 mask=15 重新插入——1 落到槽1、9 落到槽9，dummy 墓碑被丢弃，于是 fill 重新等于 used。扩容大小由 used 决定：超过 5 万扩 2 倍，否则扩 4 倍。</desc>
<defs>
  <style>
    .h{font-size:13px;font-weight:600;font-family:'SF Mono','JetBrains Mono',ui-monospace,Consolas,monospace;}
    .lab{font-size:11px;}
    .val{font-size:12.5px;font-family:'SF Mono','JetBrains Mono',ui-monospace,Consolas,monospace;}
    .idx{font-size:9px;}
    .cap{font-size:11.5px;}
  </style>
  <filter id="sh" x="-30%" y="-30%" width="160%" height="160%"><feDropShadow dx="0" dy="1.4" stdDeviation="2" flood-color="#2A2A28" flood-opacity="0.12"/></filter>
  <marker id="ah" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#8E8B80" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></marker>
</defs>

<rect x="0" y="0" width="620" height="300" fill="#FBFAF6"/>

<!-- old table -->
<text x="80" y="58" class="lab" fill="#7B7A72">旧表　size 8　mask=7</text>
<g class="idx" fill="#9A988F" text-anchor="middle"><text x="116" y="68">0</text><text x="168" y="68">1</text><text x="220" y="68">2</text><text x="272" y="68">3</text><text x="324" y="68">4</text><text x="376" y="68">5</text><text x="428" y="68">6</text><text x="480" y="68">7</text></g>
<rect x="90" y="74" width="416" height="38" rx="8" fill="#FFFFFF" stroke="#CCC7F1" stroke-width="1.1" filter="url(#sh)"/>
<rect x="143" y="75" width="50" height="36" fill="#E4F2EB"/><rect x="195" y="75" width="50" height="36" fill="#F7EAEA"/><rect x="403" y="75" width="50" height="36" fill="#E4F2EB"/>
<g stroke="#EEE9F6"><line x1="142" y1="74" x2="142" y2="112"/><line x1="194" y1="74" x2="194" y2="112"/><line x1="246" y1="74" x2="246" y2="112"/><line x1="298" y1="74" x2="298" y2="112"/><line x1="350" y1="74" x2="350" y2="112"/><line x1="402" y1="74" x2="402" y2="112"/><line x1="454" y1="74" x2="454" y2="112"/></g>
<g class="val" fill="#0A463A" font-weight="700" text-anchor="middle"><text x="168" y="98">1</text><text x="428" y="98">9</text></g>
<text x="220" y="97" text-anchor="middle" font-size="9" fill="#5C3030" font-weight="700">dummy</text>
<text x="520" y="97" class="lab" fill="#7B7A72">fill=3 used=2</text>

<!-- arrow -->
<line x1="300" y1="118" x2="300" y2="156" stroke="#8E8B80" stroke-width="1.8" marker-end="url(#ah)"/>
<text x="312" y="142" class="lab" fill="#9A988F">重哈希活跃元素，丢弃墓碑（used&gt;50000 ? ×2 : ×4）</text>

<!-- new table -->
<text x="28" y="184" class="lab" fill="#7B7A72">新表　size 16　mask=15</text>
<g class="idx" fill="#9A988F" text-anchor="middle"><text x="45" y="196">0</text><text x="79" y="196">1</text><text x="113" y="196">2</text><text x="147" y="196">3</text><text x="181" y="196">4</text><text x="215" y="196">5</text><text x="249" y="196">6</text><text x="283" y="196">7</text><text x="317" y="196">8</text><text x="351" y="196">9</text><text x="385" y="196">10</text><text x="419" y="196">11</text><text x="453" y="196">12</text><text x="487" y="196">13</text><text x="521" y="196">14</text><text x="555" y="196">15</text></g>
<rect x="28" y="202" width="544" height="36" rx="8" fill="#FFFFFF" stroke="#CCC7F1" stroke-width="1.1" filter="url(#sh)"/>
<rect x="62" y="203" width="34" height="34" fill="#E4F2EB"/><rect x="334" y="203" width="34" height="34" fill="#E4F2EB"/>
<g stroke="#EEE9F6"><line x1="62" y1="202" x2="62" y2="238"/><line x1="96" y1="202" x2="96" y2="238"/><line x1="130" y1="202" x2="130" y2="238"/><line x1="164" y1="202" x2="164" y2="238"/><line x1="198" y1="202" x2="198" y2="238"/><line x1="232" y1="202" x2="232" y2="238"/><line x1="266" y1="202" x2="266" y2="238"/><line x1="300" y1="202" x2="300" y2="238"/><line x1="334" y1="202" x2="334" y2="238"/><line x1="368" y1="202" x2="368" y2="238"/><line x1="402" y1="202" x2="402" y2="238"/><line x1="436" y1="202" x2="436" y2="238"/><line x1="470" y1="202" x2="470" y2="238"/><line x1="504" y1="202" x2="504" y2="238"/><line x1="538" y1="202" x2="538" y2="238"/></g>
<g class="val" fill="#0A463A" font-weight="700" text-anchor="middle"><text x="79" y="225">1</text><text x="351" y="225">9</text></g>

<text x="310" y="276" text-anchor="middle" class="cap" fill="#9A988F">只把活跃元素按新掩码重新插入，丢弃所有墓碑，于是 fill 重新等于 used</text>
</svg>
