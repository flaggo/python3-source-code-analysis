<svg width="100%" viewBox="0 0 640 300" xmlns="http://www.w3.org/2000/svg" role="img" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'PingFang SC','Microsoft YaHei',sans-serif">
<title>元组的索引与切片</title>
<desc>对元组 (10,20,30,40)：索引 t[1] 直接定位到内联数组第 1 项、返回元素 20，是 O(1)。切片 t[1:3] 则新建一个元组，把区间内的元素指针复制过去——新元组与原元组共享同一批元素对象。</desc>
<defs>
  <style>
    .ti{font-size:13px;font-weight:600;}
    .lab{font-size:11.5px;font-family:'SF Mono','JetBrains Mono',ui-monospace,Consolas,monospace;}
    .idx{font-size:10px;}
    .v{font-size:13px;font-family:'SF Mono','JetBrains Mono',ui-monospace,Consolas,monospace;}
    .cap{font-size:11.5px;}
  </style>
  <filter id="sh" x="-30%" y="-30%" width="160%" height="160%"><feDropShadow dx="0" dy="1.4" stdDeviation="2" flood-color="#2A2A28" flood-opacity="0.12"/></filter>
  <marker id="ah" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#8E8B80" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker>
  <marker id="ahG" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#1E8B6F" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></marker>
</defs>

<rect x="0" y="0" width="640" height="300" fill="#FBFAF6"/>

<!-- original tuple cells -->
<text x="92" y="76" text-anchor="end" class="lab" fill="#5C3C08">t</text>
<g class="idx" fill="#9A988F" text-anchor="middle"><text x="143" y="50">0</text><text x="253" y="50">1</text><text x="363" y="50">2</text><text x="473" y="50">3</text></g>
<rect x="104" y="56" width="440" height="34" rx="7" fill="#FFFFFF" stroke="#E8CB94" stroke-width="1.2" filter="url(#sh)"/>
<g stroke="#EAD2A0"><line x1="214" y1="56" x2="214" y2="90"/><line x1="324" y1="56" x2="324" y2="90"/><line x1="434" y1="56" x2="434" y2="90"/></g>
<g class="lab" fill="#8A6212" text-anchor="middle"><text x="143" y="78">●</text><text x="253" y="78">●</text><text x="363" y="78">●</text><text x="473" y="78">●</text></g>

<!-- element objects -->
<g class="v" fill="#0A463A" text-anchor="middle">
  <rect x="118" y="140" width="50" height="30" rx="7" fill="#E9F6F1" stroke="#A8DCC9" stroke-width="1"/><text x="143" y="160">10</text>
  <rect x="228" y="140" width="50" height="30" rx="7" fill="#E9F6F1" stroke="#A8DCC9" stroke-width="1"/><text x="253" y="160">20</text>
  <rect x="338" y="140" width="50" height="30" rx="7" fill="#E9F6F1" stroke="#A8DCC9" stroke-width="1"/><text x="363" y="160">30</text>
  <rect x="448" y="140" width="50" height="30" rx="7" fill="#E9F6F1" stroke="#A8DCC9" stroke-width="1"/><text x="473" y="160">40</text>
</g>
<g fill="none" stroke="#8E8B80" stroke-width="1.4" marker-end="url(#ah)">
  <path d="M143,90 V138"/><path d="M253,90 V138"/><path d="M363,90 V138"/><path d="M473,90 V138"/>
</g>

<!-- index t[1] callout -->
<text x="253" y="112" text-anchor="middle" class="cap" fill="#5C3C08">t[1] → 20（O(1) 直达）</text>

<!-- slice result tuple -->
<text x="196" y="230" text-anchor="end" class="lab" fill="#5C3C08">t[1:3]</text>
<rect x="208" y="210" width="220" height="34" rx="7" fill="#FBF1DE" stroke="#E8CB94" stroke-width="1.2" filter="url(#sh)"/>
<line x1="318" y1="210" x2="318" y2="244" stroke="#EAD2A0"/>
<g class="lab" fill="#8A6212" text-anchor="middle"><text x="263" y="232">●</text><text x="373" y="232">●</text></g>
<g fill="none" stroke="#1E8B6F" stroke-width="1.5" stroke-dasharray="4 3" marker-end="url(#ahG)">
  <path d="M263,210 C263,192 253,188 253,172"/>
  <path d="M373,210 C373,192 363,188 363,172"/>
</g>
<text x="448" y="232" class="cap" fill="#1E8B6F">新建元组，复制指针</text>
<text x="448" y="248" class="cap" fill="#9A988F">指向同一批元素对象</text>
</svg>
