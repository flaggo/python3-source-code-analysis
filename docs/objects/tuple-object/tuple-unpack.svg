<svg width="100%" viewBox="0 0 680 220" xmlns="http://www.w3.org/2000/svg" role="img" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'PingFang SC','Microsoft YaHei',sans-serif">
<title>元组的打包与解包</title>
<desc>打包：把多个值聚成一个元组，对应字节码 BUILD_TUPLE。解包：把一个元组拆成多个变量，对应字节码 UNPACK_SEQUENCE。交换 a, b = b, a 就是先把右边打包成临时元组、再解包赋给左边，无需中间变量。</desc>
<defs>
  <style>
    .ti{font-size:13px;font-weight:600;}
    .v{font-size:13px;font-family:'SF Mono','JetBrains Mono',ui-monospace,Consolas,monospace;}
    .lab{font-size:11px;font-family:'SF Mono','JetBrains Mono',ui-monospace,Consolas,monospace;}
    .cap{font-size:12px;}
  </style>
  <filter id="sh" x="-30%" y="-30%" width="160%" height="160%"><feDropShadow dx="0" dy="1.4" stdDeviation="2" flood-color="#2A2A28" flood-opacity="0.12"/></filter>
  <linearGradient id="gA" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#FAEFD9"/><stop offset="1" stop-color="#F4E6C8"/></linearGradient>
  <marker id="ah" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#8E8B80" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker>
</defs>

<rect x="0" y="0" width="680" height="220" fill="#FBFAF6"/>

<!-- left: three values -->
<g class="v" fill="#5C3C08">
  <rect x="34" y="50" width="42" height="28" rx="6" fill="#FFFFFF" stroke="#E8CB94" stroke-width="1"/><text x="55" y="69" text-anchor="middle">1</text>
  <rect x="34" y="88" width="42" height="28" rx="6" fill="#FFFFFF" stroke="#E8CB94" stroke-width="1"/><text x="55" y="107" text-anchor="middle">2</text>
  <rect x="34" y="126" width="42" height="28" rx="6" fill="#FFFFFF" stroke="#E8CB94" stroke-width="1"/><text x="55" y="145" text-anchor="middle">3</text>
</g>

<!-- packing arrows -->
<g fill="none" stroke="#8E8B80" stroke-width="1.5" marker-end="url(#ah)">
  <path d="M78,64 C150,64 170,90 246,96"/>
  <path d="M78,102 H246"/>
  <path d="M78,140 C150,140 170,114 246,108"/>
</g>
<text x="162" y="40" text-anchor="middle" class="lab" fill="#5C5B53">打包 BUILD_TUPLE</text>

<!-- center: tuple -->
<rect x="248" y="62" width="160" height="80" rx="10" fill="url(#gA)" stroke="#E8CB94" stroke-width="1.1" filter="url(#sh)"/>
<text x="328" y="98" text-anchor="middle" class="ti" fill="#5C3C08">元组</text>
<text x="328" y="122" text-anchor="middle" class="v" fill="#5C3C08" font-weight="700">(1, 2, 3)</text>

<!-- unpacking arrows -->
<g fill="none" stroke="#8E8B80" stroke-width="1.5" marker-end="url(#ah)">
  <path d="M410,96 C480,90 500,64 556,64"/>
  <path d="M410,102 H556"/>
  <path d="M410,108 C480,114 500,140 556,140"/>
</g>
<text x="496" y="40" text-anchor="middle" class="lab" fill="#5C5B53">解包 UNPACK_SEQUENCE</text>

<!-- right: variables -->
<g class="v" fill="#28415F">
  <rect x="558" y="50" width="74" height="28" rx="6" fill="#FFFFFF" stroke="#C3D2E8" stroke-width="1"/><text x="595" y="69" text-anchor="middle">a = 1</text>
  <rect x="558" y="88" width="74" height="28" rx="6" fill="#FFFFFF" stroke="#C3D2E8" stroke-width="1"/><text x="595" y="107" text-anchor="middle">b = 2</text>
  <rect x="558" y="126" width="74" height="28" rx="6" fill="#FFFFFF" stroke="#C3D2E8" stroke-width="1"/><text x="595" y="145" text-anchor="middle">c = 3</text>
</g>

<text x="340" y="190" text-anchor="middle" class="cap" fill="#9A988F">a, b = b, a 交换变量：右边先打包成临时元组，再解包赋给左边，无需中间变量</text>
</svg>
