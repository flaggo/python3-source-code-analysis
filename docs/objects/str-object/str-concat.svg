<svg width="100%" viewBox="0 0 660 290" xmlns="http://www.w3.org/2000/svg" role="img" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'PingFang SC','Microsoft YaHei',sans-serif">
<title>字符串 += 的两种结果：原地扩展 vs 新建</title>
<desc>执行 s += t 时，若 s 只被唯一引用（refcount==1，且未算过哈希、未驻留），CPython 会原地把 s 扩展并把 t 拷到末尾，仍是同一个对象；否则会新建一个字符串。这是 CPython 的实现细节，不保证触发；循环里拼接应用 ''.join() 以获得稳定的 O(n)。</desc>
<defs>
  <style>
    .h{font-size:13px;font-weight:600;font-family:'SF Mono','JetBrains Mono',ui-monospace,Consolas,monospace;}
    .st{font-size:11.5px;font-weight:600;}
    .val{font-size:13px;font-family:'SF Mono','JetBrains Mono',ui-monospace,Consolas,monospace;}
    .lab{font-size:11px;}
    .cap{font-size:12px;}
  </style>
  <filter id="sh" x="-30%" y="-30%" width="160%" height="160%"><feDropShadow dx="0" dy="1.4" stdDeviation="2" flood-color="#2A2A28" flood-opacity="0.12"/></filter>
  <marker id="ah" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#8E8B80" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></marker>
</defs>

<rect x="0" y="0" width="660" height="290" fill="#FBFAF6"/>
<text x="330" y="30" text-anchor="middle" class="h" fill="#28415F">s += t　（s = "abc"，t = "de"）</text>
<line x1="330" y1="48" x2="330" y2="250" stroke="#E2DED2" stroke-width="1" stroke-dasharray="4 5"/>

<!-- left: in-place -->
<text x="165" y="66" text-anchor="middle" class="st" fill="#0A463A">① s 仅被唯一引用（refcount==1）</text>
<rect x="100" y="82" width="90" height="30" rx="6" fill="#FFFFFF" stroke="#C3D2E8" stroke-width="1.1"/>
<g stroke="#DCE6F2"><line x1="130" y1="82" x2="130" y2="112"/><line x1="160" y1="82" x2="160" y2="112"/></g>
<g class="val" fill="#28415F" text-anchor="middle"><text x="115" y="103">a</text><text x="145" y="103">b</text><text x="175" y="103">c</text></g>
<line x1="165" y1="116" x2="165" y2="142" stroke="#8E8B80" stroke-width="1.7" marker-end="url(#ah)"/>
<text x="230" y="133" class="lab" fill="#0A463A">原地扩展</text>
<rect x="90" y="148" width="150" height="32" rx="6" fill="#FFFFFF" stroke="#A8DCC9" stroke-width="1.3" filter="url(#sh)"/>
<rect x="180" y="149" width="59" height="30" fill="#E4F2EB"/>
<g stroke="#DCE6F2"><line x1="120" y1="148" x2="120" y2="180"/><line x1="150" y1="148" x2="150" y2="180"/><line x1="180" y1="148" x2="180" y2="180"/><line x1="210" y1="148" x2="210" y2="180"/></g>
<g class="val" fill="#28415F" text-anchor="middle"><text x="105" y="170">a</text><text x="135" y="170">b</text><text x="165" y="170">c</text></g>
<g class="val" fill="#0A463A" font-weight="700" text-anchor="middle"><text x="195" y="170">d</text><text x="225" y="170">e</text></g>
<text x="165" y="202" text-anchor="middle" class="lab" fill="#0A463A">仍是同一对象，无需新分配</text>

<!-- right: new object -->
<text x="495" y="66" text-anchor="middle" class="st" fill="#5C3C08">② s 被共享 / 已哈希 / 已驻留</text>
<rect x="430" y="82" width="90" height="30" rx="6" fill="#FFFFFF" stroke="#C3D2E8" stroke-width="1.1"/>
<g stroke="#DCE6F2"><line x1="460" y1="82" x2="460" y2="112"/><line x1="490" y1="82" x2="490" y2="112"/></g>
<g class="val" fill="#28415F" text-anchor="middle"><text x="445" y="103">a</text><text x="475" y="103">b</text><text x="505" y="103">c</text></g>
<text x="535" y="103" class="lab" fill="#9A988F">不变</text>
<line x1="495" y1="116" x2="495" y2="142" stroke="#8E8B80" stroke-width="1.7" marker-end="url(#ah)"/>
<text x="560" y="133" class="lab" fill="#5C3C08">新建</text>
<rect x="420" y="148" width="150" height="32" rx="6" fill="#FDF6E9" stroke="#E8CB94" stroke-width="1.3" filter="url(#sh)"/>
<g stroke="#EAD2A0"><line x1="450" y1="148" x2="450" y2="180"/><line x1="480" y1="148" x2="480" y2="180"/><line x1="510" y1="148" x2="510" y2="180"/><line x1="540" y1="148" x2="540" y2="180"/></g>
<g class="val" fill="#5C3C08" text-anchor="middle"><text x="435" y="170">a</text><text x="465" y="170">b</text><text x="495" y="170">c</text><text x="525" y="170">d</text><text x="555" y="170">e</text></g>
<text x="495" y="202" text-anchor="middle" class="lab" fill="#5C3C08">新建对象，s 改指向它</text>

<text x="330" y="240" text-anchor="middle" class="cap" fill="#9A988F">这是 CPython 的实现细节，不保证触发；循环里拼接字符串请用 ''.join() 以获得稳定的 O(n)</text>
</svg>
