<svg width="100%" viewBox="0 0 660 280" xmlns="http://www.w3.org/2000/svg" role="img" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'PingFang SC','Microsoft YaHei',sans-serif">
<title>字符串的编码与解码：str ⇄ bytes</title>
<desc>str 在内部按码点定宽存储（PEP 393 的 1/2/4 字节）；bytes 则是一串字节。encode 把 str 编码成 bytes（如 UTF-8 变长字节），decode 把 bytes 解码回 str。以 "café" 为例，4 个码点编码成 5 个 UTF-8 字节（é 占 2 字节）。内部还会把 UTF-8 结果缓存到 utf8 字段，供 C 层 API 复用。</desc>
<defs>
  <style>
    .ct{font-size:12.5px;font-weight:600;}
    .val{font-size:13px;font-family:'SF Mono','JetBrains Mono',ui-monospace,Consolas,monospace;}
    .lab{font-size:11px;}
    .mid{font-size:12px;font-family:'SF Mono','JetBrains Mono',ui-monospace,Consolas,monospace;}
    .cap{font-size:12px;}
  </style>
  <filter id="sh" x="-30%" y="-30%" width="160%" height="160%"><feDropShadow dx="0" dy="1.4" stdDeviation="2" flood-color="#2A2A28" flood-opacity="0.12"/></filter>
  <linearGradient id="gA" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#FAEFD9"/><stop offset="1" stop-color="#F4E6C8"/></linearGradient>
  <linearGradient id="gN" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#F1EFE8"/><stop offset="1" stop-color="#E7E4DA"/></linearGradient>
  <marker id="ah" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#8E8B80" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></marker>
</defs>

<rect x="0" y="0" width="660" height="280" fill="#FBFAF6"/>

<!-- str side -->
<rect x="40" y="70" width="200" height="92" rx="10" fill="#FFFFFF" stroke="#E8CB94" stroke-width="1.1" filter="url(#sh)"/>
<path d="M40,100 V80 Q40,70 50,70 H230 Q240,70 240,80 V100 Z" fill="url(#gA)"/>
<text x="140" y="90" text-anchor="middle" class="ct" fill="#5C3C08">str  "café"</text>
<rect x="56" y="112" width="168" height="34" rx="6" fill="#FFFFFF" stroke="#E8CB94" stroke-width="1"/>
<g stroke="#EAD2A0"><line x1="98" y1="112" x2="98" y2="146"/><line x1="140" y1="112" x2="140" y2="146"/><line x1="182" y1="112" x2="182" y2="146"/></g>
<g class="val" fill="#5C3C08" text-anchor="middle"><text x="77" y="134">c</text><text x="119" y="134">a</text><text x="161" y="134">f</text><text x="203" y="134">é</text></g>
<text x="140" y="158" text-anchor="middle" class="lab" fill="#8A6212">4 个码点 · 内部定宽存储</text>

<!-- bytes side -->
<rect x="420" y="70" width="200" height="92" rx="10" fill="#FFFFFF" stroke="#D8D3C6" stroke-width="1.1" filter="url(#sh)"/>
<path d="M420,100 V80 Q420,70 430,70 H610 Q620,70 620,80 V100 Z" fill="url(#gN)"/>
<text x="520" y="90" text-anchor="middle" class="ct" fill="#46453F">bytes  b'caf\xc3\xa9'</text>
<rect x="436" y="112" width="168" height="34" rx="6" fill="#FFFFFF" stroke="#D8D3C6" stroke-width="1"/>
<g stroke="#E6E2D8"><line x1="469" y1="112" x2="469" y2="146"/><line x1="503" y1="112" x2="503" y2="146"/><line x1="537" y1="112" x2="537" y2="146"/><line x1="571" y1="112" x2="571" y2="146"/></g>
<g class="val" fill="#46453F" text-anchor="middle" font-size="11"><text x="452" y="133">63</text><text x="486" y="133">61</text><text x="520" y="133">66</text><text x="554" y="133">c3</text><text x="588" y="133">a9</text></g>
<text x="520" y="158" text-anchor="middle" class="lab" fill="#9A988F">5 字节 UTF-8（é 占 2 字节）</text>

<!-- arrows -->
<path d="M244,108 H416" fill="none" stroke="#8E8B80" stroke-width="1.8" marker-end="url(#ah)"/>
<text x="330" y="100" text-anchor="middle" class="mid" fill="#5C5B53">encode("utf-8")</text>
<path d="M416,134 H244" fill="none" stroke="#8E8B80" stroke-width="1.8" marker-end="url(#ah)"/>
<text x="330" y="128" text-anchor="middle" class="mid" fill="#5C5B53">decode("utf-8")</text>

<text x="330" y="210" text-anchor="middle" class="cap" fill="#9A988F">str 存「码点」，bytes 存「字节」；二者经编码/解码相互转换</text>
<text x="330" y="232" text-anchor="middle" class="cap" fill="#9A988F">内部还会把 UTF-8 结果缓存到对象的 utf8 字段，供 C 层 API 复用</text>
</svg>
