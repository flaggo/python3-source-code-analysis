<svg width="100%" viewBox="0 0 660 210" xmlns="http://www.w3.org/2000/svg" role="img" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'PingFang SC','Microsoft YaHei',sans-serif">
<title>字符串查找：跳跃式匹配（FASTSEARCH）</title>
<desc>str.find / in / replace 用 stringlib 的 FASTSEARCH，基于 Boyer-Moore 与 Horspool 的混合算法，并用 Bloom 过滤器快速判断某字符是否在模式串中。匹配失败时，按“坏字符”一次跳过一大段（最多约模式串长度），而不是像朴素做法那样逐位 +1，因此平均远快。</desc>
<defs>
  <style>
    .ti{font-size:13px;font-weight:600;}
    .v{font-size:13px;font-family:'SF Mono','JetBrains Mono',ui-monospace,Consolas,monospace;}
    .lab{font-size:11px;}
    .cap{font-size:11.5px;}
  </style>
  <filter id="sh" x="-30%" y="-30%" width="160%" height="160%"><feDropShadow dx="0" dy="1.4" stdDeviation="2" flood-color="#2A2A28" flood-opacity="0.12"/></filter>
  <marker id="ah" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#1E8B6F" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/></marker>
  <marker id="ahg" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#B8B5AC" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></marker>
</defs>

<rect x="0" y="0" width="660" height="210" fill="#FBFAF6"/>
<text x="330" y="28" text-anchor="middle" class="ti" fill="#5C3C08">在文本里查找模式串：失配时跳过一大段</text>

<!-- text strip -->
<text x="44" y="62" text-anchor="end" class="lab" fill="#7B7A72">文本</text>
<rect x="54" y="46" width="528" height="32" rx="6" fill="#FFFFFF" stroke="#D8D3C6" stroke-width="1.1" filter="url(#sh)"/>
<g stroke="#E6E2D8"><line x1="98" y1="46" x2="98" y2="78"/><line x1="142" y1="46" x2="142" y2="78"/><line x1="186" y1="46" x2="186" y2="78"/><line x1="230" y1="46" x2="230" y2="78"/><line x1="274" y1="46" x2="274" y2="78"/><line x1="318" y1="46" x2="318" y2="78"/><line x1="362" y1="46" x2="362" y2="78"/><line x1="406" y1="46" x2="406" y2="78"/><line x1="450" y1="46" x2="450" y2="78"/><line x1="494" y1="46" x2="494" y2="78"/><line x1="538" y1="46" x2="538" y2="78"/></g>
<g class="v" fill="#46453F" text-anchor="middle"><text x="76" y="68">a</text><text x="120" y="68">b</text><text x="164" y="68">x</text><text x="208" y="68">y</text><text x="252" y="68">z</text><text x="296" y="68">a</text><text x="340" y="68">b</text><text x="384" y="68">c</text><text x="428" y="68">…</text><text x="472" y="68">…</text><text x="516" y="68">…</text><text x="560" y="68">…</text></g>

<!-- pattern at pos 0 -->
<rect x="54" y="96" width="132" height="30" rx="6" fill="#FBF1DE" stroke="#E8CB94" stroke-width="1.2"/>
<g stroke="#EAD2A0"><line x1="98" y1="96" x2="98" y2="126"/><line x1="142" y1="96" x2="142" y2="126"/></g>
<g class="v" fill="#5C3C08" text-anchor="middle"><text x="76" y="117">a</text><text x="120" y="117">b</text><text x="164" y="117">c</text></g>
<text x="200" y="116" class="lab" fill="#9A988F">模式串：此处失配</text>

<!-- big skip arrow -->
<path d="M120,130 C160,166 256,166 296,134" fill="none" stroke="#1E8B6F" stroke-width="1.8" marker-end="url(#ah)"/>
<text x="208" y="178" text-anchor="middle" class="cap" fill="#1E8B6F">失配 → 一次跳过一大段（坏字符 / Bloom）</text>

<!-- naive +1 (faint) -->
<path d="M120,130 C128,150 132,150 140,132" fill="none" stroke="#B8B5AC" stroke-width="1.3" stroke-dasharray="3 3" marker-end="url(#ahg)"/>
<text x="470" y="116" class="cap" fill="#9A988F">朴素做法只 +1，逐位回退</text>
</svg>
