<svg width="100%" viewBox="0 0 600 270" xmlns="http://www.w3.org/2000/svg" role="img" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'PingFang SC','Microsoft YaHei',sans-serif">
<title>字符串驻留（interning）</title>
<desc>Python 维护一个全局 interned 字典，驻留过的等值字符串只保留一个对象。变量 a 和 b 都赋值 "foo"，由于 "foo" 被驻留，两者指向同一个 str 对象，于是 a is b 成立。可用 sys.intern() 手动驻留。</desc>
<defs>
  <style>
    .ct{font-size:12.5px;font-weight:600;}
    .fd{font-size:12px;font-family:'SF Mono','JetBrains Mono',ui-monospace,Consolas,monospace;}
    .big{font-size:16px;font-weight:700;font-family:'SF Mono','JetBrains Mono',ui-monospace,Consolas,monospace;}
    .lab{font-size:11px;}
    .cap{font-size:12px;}
  </style>
  <filter id="sh" x="-30%" y="-30%" width="160%" height="160%"><feDropShadow dx="0" dy="1.4" stdDeviation="2" flood-color="#2A2A28" flood-opacity="0.12"/></filter>
  <linearGradient id="gB" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#EFF3FA"/><stop offset="1" stop-color="#E0E9F6"/></linearGradient>
  <linearGradient id="gA" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#FAEFD9"/><stop offset="1" stop-color="#F4E6C8"/></linearGradient>
  <linearGradient id="gP" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#F3F1FD"/><stop offset="1" stop-color="#E9E6FB"/></linearGradient>
  <marker id="ah" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7.5" markerHeight="7.5" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#8E8B80" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></marker>
</defs>

<rect x="0" y="0" width="600" height="270" fill="#FBFAF6"/>
<text x="300" y="32" text-anchor="middle" class="ct" fill="#5C3C08" font-size="13">a = "foo"　b = "foo"　→　a is b 成立</text>

<!-- variables -->
<rect x="46" y="92" width="84" height="40" rx="9" fill="url(#gB)" stroke="#C3D2E8" stroke-width="1" filter="url(#sh)"/>
<text x="88" y="117" text-anchor="middle" class="big" fill="#28415F">a</text>
<rect x="46" y="172" width="84" height="40" rx="9" fill="url(#gB)" stroke="#C3D2E8" stroke-width="1" filter="url(#sh)"/>
<text x="88" y="197" text-anchor="middle" class="big" fill="#28415F">b</text>

<!-- one str object -->
<rect x="300" y="108" width="170" height="92" rx="10" fill="#FFFFFF" stroke="#E8CB94" stroke-width="1.1" filter="url(#sh)"/>
<path d="M300,138 V118 Q300,108 310,108 H460 Q470,108 470,118 V138 Z" fill="url(#gA)"/>
<text x="385" y="128" text-anchor="middle" class="ct" fill="#5C3C08">同一个 str 对象</text>
<text x="385" y="166" text-anchor="middle" class="big" fill="#5C3C08">"foo"</text>
<text x="385" y="188" text-anchor="middle" class="lab" fill="#8A6212">ob_refcnt 共享</text>

<!-- arrows a,b -> str -->
<path d="M130,112 C220,112 230,142 298,148" fill="none" stroke="#8E8B80" stroke-width="1.7" marker-end="url(#ah)"/>
<path d="M130,192 C220,192 230,162 298,156" fill="none" stroke="#8E8B80" stroke-width="1.7" marker-end="url(#ah)"/>

<!-- interned dict -->
<rect x="320" y="20" width="240" height="58" rx="9" fill="#FFFFFF" stroke="#CCC7F1" stroke-width="1" filter="url(#sh)"/>
<path d="M320,46 V30 Q320,20 330,20 H550 Q560,20 560,30 V46 Z" fill="url(#gP)"/>
<text x="440" y="39" text-anchor="middle" class="ct" fill="#2E2972">interned（全局字典）</text>
<text x="440" y="68" text-anchor="middle" class="fd" fill="#2E2972">{ "foo" : 唯一对象 }</text>
<path d="M408,108 C408,96 420,88 432,80" fill="none" stroke="#8E8B80" stroke-width="1.4" stroke-dasharray="4 3" marker-end="url(#ah)"/>
<text x="468" y="100" class="lab" fill="#9A988F">登记一次</text>

<text x="300" y="248" text-anchor="middle" class="cap" fill="#9A988F">驻留后等值字符串共享同一对象，比较可用指针相等（极快）；也可用 sys.intern() 手动驻留</text>
</svg>
