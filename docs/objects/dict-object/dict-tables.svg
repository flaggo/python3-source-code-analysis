<svg width="100%" viewBox="0 0 720 300" xmlns="http://www.w3.org/2000/svg" role="img" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'PingFang SC','Microsoft YaHei',sans-serif">
<title>字典的两种表：combined 与 split</title>
<desc>combined 联合表（默认）：key 与 value 一起存在 ma_keys 指向的 entries 里，ma_values 为 NULL。split 分离表（用于实例 __dict__）：多个实例共享同一份只含 key 的 ma_keys，各自的 value 单独存放在自己的 ma_values 数组里，从而省内存。</desc>
<defs>
  <style>
    .ti{font-size:13px;font-weight:700;}
    .ct{font-size:11.5px;font-weight:600;}
    .fd{font-size:11px;font-family:'SF Mono','JetBrains Mono',ui-monospace,Consolas,monospace;}
    .cap{font-size:11.5px;}
  </style>
  <filter id="sh" x="-30%" y="-30%" width="160%" height="160%"><feDropShadow dx="0" dy="1.4" stdDeviation="2" flood-color="#2A2A28" flood-opacity="0.12"/></filter>
  <linearGradient id="gB" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#EFF3FA"/><stop offset="1" stop-color="#E0E9F6"/></linearGradient>
  <linearGradient id="gP" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#F3F1FD"/><stop offset="1" stop-color="#E9E6FB"/></linearGradient>
  <marker id="ah" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#8E8B80" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker>
</defs>

<rect x="0" y="0" width="720" height="300" fill="#FBFAF6"/>
<line x1="360" y1="30" x2="360" y2="270" stroke="#E2DED2" stroke-width="1" stroke-dasharray="4 5"/>

<!-- ===== combined ===== -->
<text x="180" y="34" text-anchor="middle" class="ti" fill="#28415F">combined（联合表）· 默认</text>
<!-- PyDictObject -->
<rect x="36" y="74" width="128" height="92" rx="9" fill="#FFFFFF" stroke="#C3D2E8" stroke-width="1" filter="url(#sh)"/>
<path d="M36,100 V83 Q36,74 45,74 H155 Q164,74 164,83 V100 Z" fill="url(#gB)"/>
<text x="100" y="92" text-anchor="middle" class="ct" fill="#28415F">PyDictObject</text>
<g class="fd" fill="#28415F"><text x="48" y="124">ma_keys ●</text><text x="48" y="150">ma_values</text></g>
<text x="150" y="150" text-anchor="end" class="fd" fill="#A9B4C4">NULL</text>
<!-- keys -->
<rect x="214" y="74" width="130" height="116" rx="9" fill="#FFFFFF" stroke="#CCC7F1" stroke-width="1" filter="url(#sh)"/>
<path d="M214,100 V83 Q214,74 223,74 H335 Q344,74 344,83 V100 Z" fill="url(#gP)"/>
<text x="279" y="92" text-anchor="middle" class="ct" fill="#2E2972">PyDictKeysObject</text>
<text x="279" y="124" text-anchor="middle" class="fd" fill="#2E2972">entries：</text>
<text x="279" y="148" text-anchor="middle" class="fd" fill="#0A463A">key + value</text>
<text x="279" y="170" text-anchor="middle" class="fd" fill="#0A463A">一起存放</text>
<path d="M164,120 C188,120 190,120 212,120" fill="none" stroke="#8E8B80" stroke-width="1.6" marker-end="url(#ah)"/>
<text x="180" y="282" text-anchor="middle" class="cap" fill="#9A988F">key 与 value 同存于 entries</text>

<!-- ===== split ===== -->
<text x="540" y="34" text-anchor="middle" class="ti" fill="#28415F">split（分离表）· 实例 __dict__</text>
<!-- instance a -->
<rect x="392" y="64" width="96" height="40" rx="8" fill="#FFFFFF" stroke="#C3D2E8" stroke-width="1" filter="url(#sh)"/>
<rect x="392" y="64" width="96" height="40" rx="8" fill="url(#gB)" fill-opacity="0.5"/>
<text x="440" y="80" text-anchor="middle" class="ct" fill="#28415F">实例 a</text>
<text x="440" y="96" text-anchor="middle" class="fd" fill="#28415F">ma_values ●</text>
<!-- instance b -->
<rect x="392" y="196" width="96" height="40" rx="8" fill="#FFFFFF" stroke="#C3D2E8" stroke-width="1" filter="url(#sh)"/>
<rect x="392" y="196" width="96" height="40" rx="8" fill="url(#gB)" fill-opacity="0.5"/>
<text x="440" y="212" text-anchor="middle" class="ct" fill="#28415F">实例 b</text>
<text x="440" y="228" text-anchor="middle" class="fd" fill="#28415F">ma_values ●</text>
<!-- values arrays -->
<rect x="392" y="120" width="96" height="26" rx="6" fill="#EAF6F0" stroke="#A8DCC9" stroke-width="1"/>
<text x="440" y="137" text-anchor="middle" class="fd" fill="#0A463A">values_a</text>
<rect x="392" y="154" width="96" height="26" rx="6" fill="#EAF6F0" stroke="#A8DCC9" stroke-width="1"/>
<text x="440" y="171" text-anchor="middle" class="fd" fill="#0A463A">values_b</text>
<!-- shared keys -->
<rect x="566" y="110" width="124" height="80" rx="9" fill="#FFFFFF" stroke="#CCC7F1" stroke-width="1" filter="url(#sh)"/>
<path d="M566,136 V119 Q566,110 575,110 H681 Q690,110 690,119 V136 Z" fill="url(#gP)"/>
<text x="628" y="128" text-anchor="middle" class="ct" fill="#2E2972">共享 keys</text>
<text x="628" y="160" text-anchor="middle" class="fd" fill="#2E2972">只存 key</text>
<text x="628" y="178" text-anchor="middle" class="fd" fill="#2E2972">（不含 value）</text>
<!-- arrows -->
<g fill="none" stroke="#8E8B80" stroke-width="1.5">
  <path d="M440,104 V118" marker-end="url(#ah)"/>
  <path d="M440,196 V182" marker-end="url(#ah)"/>
  <path d="M488,76 C540,76 548,130 564,138" marker-end="url(#ah)"/>
  <path d="M488,224 C540,224 548,166 564,160" marker-end="url(#ah)"/>
</g>
<text x="540" y="282" text-anchor="middle" class="cap" fill="#9A988F">多实例共享 keys，value 各存一份 → 省内存</text>
</svg>
