<svg width="100%" viewBox="0 0 660 230" xmlns="http://www.w3.org/2000/svg" role="img" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'PingFang SC','Microsoft YaHei',sans-serif">
<title>字典查找与探测（开放寻址）</title>
<desc>查找一个 key：从 hash &amp; mask 定位的索引槽出发，若槽非空但 key 不同则发生冲突，按扰动公式 i = (i*5 + perturb + 1) &amp; mask 跳到下一槽（perturb 每次右移 5 位）；如此重复，直到 key 相同（命中，返回 entry 下标）或遇到空槽（key 不存在）。</desc>
<defs>
  <style>
    .t{font-size:12px;font-weight:600;}
    .s{font-size:11px;font-family:'SF Mono','JetBrains Mono',ui-monospace,Consolas,monospace;}
    .lab{font-size:10.5px;}
    .cap{font-size:12px;}
  </style>
  <filter id="sh" x="-30%" y="-30%" width="160%" height="160%"><feDropShadow dx="0" dy="1.4" stdDeviation="2" flood-color="#2A2A28" flood-opacity="0.12"/></filter>
  <linearGradient id="gA" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#FAEFD9"/><stop offset="1" stop-color="#F4E6C8"/></linearGradient>
  <linearGradient id="gG" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#E9F6F1"/><stop offset="1" stop-color="#DBF0E7"/></linearGradient>
  <linearGradient id="gN" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#F6F4EE"/><stop offset="1" stop-color="#EFEDE4"/></linearGradient>
  <marker id="ah" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7.5" markerHeight="7.5" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#8E8B80" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></marker>
</defs>

<rect x="0" y="0" width="660" height="230" fill="#FBFAF6"/>

<!-- box1: start slot -->
<rect x="28" y="66" width="172" height="76" rx="10" fill="url(#gA)" stroke="#E8CB94" stroke-width="1" filter="url(#sh)"/>
<text x="114" y="92" text-anchor="middle" class="t" fill="#5C3C08">起始槽</text>
<text x="114" y="112" text-anchor="middle" class="s" fill="#5C3C08">i = hash &amp; mask</text>
<text x="114" y="130" text-anchor="middle" class="lab" fill="#8A6212">槽非空且 key 不同 → 冲突</text>

<!-- box2: probe -->
<rect x="248" y="66" width="186" height="76" rx="10" fill="url(#gA)" stroke="#E8CB94" stroke-width="1" filter="url(#sh)"/>
<text x="341" y="92" text-anchor="middle" class="t" fill="#5C3C08">探测下一槽</text>
<text x="341" y="112" text-anchor="middle" class="s" fill="#5C3C08">i = (i*5+perturb+1) &amp; mask</text>
<text x="341" y="130" text-anchor="middle" class="lab" fill="#8A6212">perturb &gt;&gt;= 5</text>

<!-- loop -->
<path d="M300,66 C300,40 382,40 382,66" fill="none" stroke="#B57A12" stroke-width="1.4" stroke-dasharray="4 3" marker-end="url(#ah)"/>
<text x="341" y="36" text-anchor="middle" class="lab" fill="#B57A12">仍冲突则重复</text>

<!-- arrow box1->box2 -->
<line x1="200" y1="104" x2="246" y2="104" stroke="#8E8B80" stroke-width="1.7" marker-end="url(#ah)"/>

<!-- outcome A: hit -->
<rect x="482" y="30" width="150" height="56" rx="10" fill="url(#gG)" stroke="#A8DCC9" stroke-width="1" filter="url(#sh)"/>
<text x="557" y="53" text-anchor="middle" class="t" fill="#0A463A">key 相同 → 命中</text>
<text x="557" y="71" text-anchor="middle" class="lab" fill="#0C5945">返回 entry 下标</text>

<!-- outcome B: empty -->
<rect x="482" y="122" width="150" height="56" rx="10" fill="url(#gN)" stroke="#D8D3C6" stroke-width="1" filter="url(#sh)"/>
<text x="557" y="145" text-anchor="middle" class="t" fill="#46453F">遇到空槽</text>
<text x="557" y="163" text-anchor="middle" class="lab" fill="#7B7A72">→ key 不存在</text>

<!-- arrows box2 -> outcomes -->
<path d="M434,96 C458,82 460,62 480,58" fill="none" stroke="#8E8B80" stroke-width="1.7" marker-end="url(#ah)"/>
<path d="M434,112 C458,128 460,146 480,150" fill="none" stroke="#8E8B80" stroke-width="1.7" marker-end="url(#ah)"/>

<text x="330" y="212" text-anchor="middle" class="cap" fill="#9A988F">从 hash 定位的槽出发，冲突就按扰动公式跳到下一槽，直到命中或遇空槽（平均 O(1)）</text>
</svg>
