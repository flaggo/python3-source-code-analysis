<svg width="100%" viewBox="0 0 660 240" xmlns="http://www.w3.org/2000/svg" role="img" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'PingFang SC','Microsoft YaHei',sans-serif">
<title>bool 是 int 的子类，True/False 是整数 1/0</title>
<desc>PyBool_Type 的 tp_base 是 PyLong_Type，所以 bool 是 int 的子类（继承自 object → int → bool）。True 和 False 本身就是值为 1 和 0 的整数对象，只是类型为 bool。因此 True == 1、True + True == 2、isinstance(True, int) 为真。</desc>
<defs>
  <style>
    .ct{font-size:12px;font-weight:600;}
    .v{font-size:13px;font-family:'SF Mono','JetBrains Mono',ui-monospace,Consolas,monospace;}
    .lab{font-size:10.5px;font-family:'SF Mono','JetBrains Mono',ui-monospace,Consolas,monospace;}
    .cap{font-size:12px;}
  </style>
  <filter id="sh" x="-30%" y="-30%" width="160%" height="160%"><feDropShadow dx="0" dy="1.4" stdDeviation="2" flood-color="#2A2A28" flood-opacity="0.12"/></filter>
  <linearGradient id="gN" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#F1EFE8"/><stop offset="1" stop-color="#E7E4DA"/></linearGradient>
  <linearGradient id="gG" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#E9F6F1"/><stop offset="1" stop-color="#DBF0E7"/></linearGradient>
  <linearGradient id="gP" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#F3F1FD"/><stop offset="1" stop-color="#E9E6FB"/></linearGradient>
  <marker id="ah" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#8E8B80" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker>
</defs>

<rect x="0" y="0" width="660" height="240" fill="#FBFAF6"/>
<text x="330" y="28" text-anchor="middle" class="ct" fill="#2E2972" font-size="13">bool 是 int 的子类；True / False 是值为 1 / 0 的整数</text>

<!-- type hierarchy -->
<rect x="56" y="52" width="150" height="34" rx="8" fill="url(#gN)" stroke="#D8D3C6" stroke-width="1" filter="url(#sh)"/><text x="131" y="74" text-anchor="middle" class="v" fill="#33322E">object</text>
<rect x="56" y="116" width="150" height="34" rx="8" fill="url(#gG)" stroke="#A8DCC9" stroke-width="1" filter="url(#sh)"/><text x="131" y="138" text-anchor="middle" class="v" fill="#0A463A">int　PyLong_Type</text>
<rect x="56" y="180" width="150" height="34" rx="8" fill="url(#gP)" stroke="#CCC7F1" stroke-width="1" filter="url(#sh)"/><text x="131" y="202" text-anchor="middle" class="v" fill="#2E2972">bool　PyBool_Type</text>
<g fill="none" stroke="#8E8B80" stroke-width="1.5" marker-end="url(#ah)">
  <path d="M131,116 V90"/><path d="M131,180 V154"/>
</g>
<text x="146" y="106" class="lab" fill="#9A988F">tp_base</text>
<text x="146" y="170" class="lab" fill="#9A988F">tp_base</text>

<!-- True / False -->
<rect x="380" y="78" width="200" height="40" rx="9" fill="#FFFFFF" stroke="#CCC7F1" stroke-width="1.1" filter="url(#sh)"/><text x="402" y="103" text-anchor="middle" class="v" fill="#2E2972" font-weight="700">True</text><text x="500" y="103" text-anchor="middle" class="lab" fill="#5C5B53">整数 1 · type=bool</text>
<rect x="380" y="146" width="200" height="40" rx="9" fill="#FFFFFF" stroke="#CCC7F1" stroke-width="1.1" filter="url(#sh)"/><text x="402" y="171" text-anchor="middle" class="v" fill="#2E2972" font-weight="700">False</text><text x="500" y="171" text-anchor="middle" class="lab" fill="#5C5B53">整数 0 · type=bool</text>
<g fill="none" stroke="#8E8B80" stroke-width="1.4" marker-end="url(#ah)">
  <path d="M378,98 C320,98 270,160 210,193"/>
  <path d="M378,166 C300,170 250,190 210,197"/>
</g>
<text x="300" y="150" text-anchor="middle" class="lab" fill="#9A988F">ob_type</text>

<text x="330" y="230" text-anchor="middle" class="cap" fill="#9A988F">True == 1，True + True == 2，sum([True,True,True]) == 3，isinstance(True, int) 为真</text>
</svg>
