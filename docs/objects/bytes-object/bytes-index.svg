<svg width="100%" viewBox="0 0 620 220" xmlns="http://www.w3.org/2000/svg" role="img" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'PingFang SC','Microsoft YaHei',sans-serif">
<title>bytes 索引返回整数，切片返回 bytes</title>
<desc>对 b'abc'：b[0] 返回的是该字节的整数值 97（0–255 的 int），而不是长度 1 的 bytes；b[1:3] 返回的才是 bytes，即 b'bc'。这与字符串不同——'abc'[0] 返回长度 1 的字符串 'a'。</desc>
<defs>
  <style>
    .ti{font-size:13px;font-weight:600;}
    .v{font-size:14px;font-family:'SF Mono','JetBrains Mono',ui-monospace,Consolas,monospace;}
    .by{font-size:10.5px;font-family:'SF Mono','JetBrains Mono',ui-monospace,Consolas,monospace;}
    .lab{font-size:11.5px;font-family:'SF Mono','JetBrains Mono',ui-monospace,Consolas,monospace;}
    .cap{font-size:11.5px;}
  </style>
  <filter id="sh" x="-30%" y="-30%" width="160%" height="160%"><feDropShadow dx="0" dy="1.4" stdDeviation="2" flood-color="#2A2A28" flood-opacity="0.12"/></filter>
  <linearGradient id="gG" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#E9F6F1"/><stop offset="1" stop-color="#DBF0E7"/></linearGradient>
  <linearGradient id="gA" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#FAEFD9"/><stop offset="1" stop-color="#F4E6C8"/></linearGradient>
  <marker id="ah" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#8E8B80" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker>
</defs>

<rect x="0" y="0" width="620" height="220" fill="#FBFAF6"/>
<text x="310" y="28" text-anchor="middle" class="ti" fill="#5C3C08">bytes 索引出整数，切片出 bytes</text>

<!-- bytes strip -->
<text x="40" y="80" text-anchor="end" class="lab" fill="#5C3C08">b'abc'</text>
<rect x="50" y="60" width="156" height="38" rx="7" fill="#FFFFFF" stroke="#E8CB94" stroke-width="1.2" filter="url(#sh)"/>
<g stroke="#EAD2A0"><line x1="102" y1="60" x2="102" y2="98"/><line x1="154" y1="60" x2="154" y2="98"/></g>
<g class="v" fill="#5C3C08" text-anchor="middle"><text x="76" y="85">a</text><text x="128" y="85">b</text><text x="180" y="85">c</text></g>
<g class="by" fill="#9A988F" text-anchor="middle"><text x="76" y="114">97</text><text x="128" y="114">98</text><text x="180" y="114">99</text></g>

<!-- b[0] -> int -->
<path d="M76,60 C76,44 200,44 300,52" fill="none" stroke="#8E8B80" stroke-width="1.5" marker-end="url(#ah)"/>
<text x="220" y="44" text-anchor="middle" class="lab" fill="#9A988F">b[0]</text>
<rect x="302" y="40" width="120" height="34" rx="9" fill="url(#gG)" stroke="#A8DCC9" stroke-width="1" filter="url(#sh)"/><text x="362" y="62" text-anchor="middle" class="v" fill="#0A463A">97</text><text x="438" y="62" class="lab" fill="#0A463A">int</text>

<!-- b[1:3] -> bytes -->
<path d="M154,98 C200,120 240,120 300,120" fill="none" stroke="#8E8B80" stroke-width="1.5" marker-end="url(#ah)"/>
<text x="230" y="112" text-anchor="middle" class="lab" fill="#9A988F">b[1:3]</text>
<rect x="302" y="104" width="120" height="34" rx="9" fill="url(#gA)" stroke="#E8CB94" stroke-width="1" filter="url(#sh)"/><text x="362" y="126" text-anchor="middle" class="v" fill="#5C3C08">b'bc'</text><text x="438" y="126" class="lab" fill="#5C3C08">bytes</text>

<text x="310" y="186" text-anchor="middle" class="cap" fill="#9A988F">对比字符串：'abc'[0] → 'a'（长度 1 的 str），而 bytes 的索引给的是字节的数值</text>
</svg>
