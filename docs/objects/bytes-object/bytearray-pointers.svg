<svg width="100%" viewBox="0 0 700 300" xmlns="http://www.w3.org/2000/svg" role="img" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'PingFang SC','Microsoft YaHei',sans-serif">
<title>bytearray 的两个指针：从头部删除时只移动 ob_start</title>
<desc>bytearray 同时记录 ob_bytes（malloc 出的缓冲块起点，用于最终释放）和 ob_start（逻辑上的第一个字节）。执行 del ba[0] 时，只需把 ob_start 向右移一格，缓冲里的字节完全不用搬动，因此从头部删除是 O(1)。被跳过的字节成为头部空槽。</desc>
<defs>
  <style>
    .ti{font-size:12.5px;font-weight:600;}
    .lab{font-size:11px;font-family:'SF Mono','JetBrains Mono',ui-monospace,Consolas,monospace;}
    .cell{font-size:12px;font-family:'SF Mono','JetBrains Mono',ui-monospace,Consolas,monospace;}
    .cap{font-size:11px;}
  </style>
  <filter id="sh" x="-30%" y="-30%" width="160%" height="160%"><feDropShadow dx="0" dy="1.4" stdDeviation="2" flood-color="#2A2A28" flood-opacity="0.12"/></filter>
  <marker id="ah" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#C08A2E" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></marker>
</defs>

<rect x="0" y="0" width="700" height="300" fill="#FBFAF6"/>
<text x="350" y="28" text-anchor="middle" class="ti" fill="#5C3C08">del ba[0]：只把 ob_start 右移一格，缓冲不搬动</text>

<!-- BEFORE -->
<text x="40" y="74" class="lab" fill="#5C3C08">删除前</text>
<text x="40" y="92" class="cap" fill="#9A988F">ob_start == ob_bytes</text>
<g>
  <rect x="150" y="64" width="360" height="40" rx="6" fill="#FFFFFF" stroke="#E8CB94" stroke-width="1.2" filter="url(#sh)"/>
  <g stroke="#EAD2A0"><line x1="210" y1="64" x2="210" y2="104"/><line x1="270" y1="64" x2="270" y2="104"/><line x1="330" y1="64" x2="330" y2="104"/><line x1="390" y1="64" x2="390" y2="104"/><line x1="450" y1="64" x2="450" y2="104"/></g>
  <g class="cell" fill="#5C3C08" text-anchor="middle"><text x="180" y="89">a</text><text x="240" y="89">b</text><text x="300" y="89">c</text><text x="360" y="89">d</text></g>
  <g class="cell" fill="#C9C5BA" text-anchor="middle"><text x="420" y="89">空</text><text x="480" y="89">空</text></g>
</g>
<!-- pointers before -->
<path d="M150,128 V108" fill="none" stroke="#C08A2E" stroke-width="1.6" marker-end="url(#ah)"/>
<text x="150" y="142" text-anchor="middle" class="lab" fill="#5C3C08">ob_bytes</text>
<text x="150" y="156" text-anchor="middle" class="lab" fill="#5C3C08">= ob_start</text>

<!-- AFTER -->
<text x="40" y="218" class="lab" fill="#5C3C08">删除后</text>
<text x="40" y="236" class="cap" fill="#9A988F">ob_start 前移 1</text>
<g>
  <rect x="150" y="208" width="360" height="40" rx="6" fill="#FFFFFF" stroke="#E8CB94" stroke-width="1.2" filter="url(#sh)"/>
  <rect x="151" y="209" width="58" height="38" fill="#F6EAD2"/>
  <g stroke="#EAD2A0"><line x1="210" y1="208" x2="210" y2="248"/><line x1="270" y1="208" x2="270" y2="248"/><line x1="330" y1="208" x2="330" y2="248"/><line x1="390" y1="208" x2="390" y2="248"/><line x1="450" y1="208" x2="450" y2="248"/></g>
  <g class="cell" fill="#B8B5AC" text-anchor="middle"><text x="180" y="233">a</text></g>
  <g class="cell" fill="#5C3C08" text-anchor="middle"><text x="240" y="233">b</text><text x="300" y="233">c</text><text x="360" y="233">d</text></g>
  <g class="cell" fill="#C9C5BA" text-anchor="middle"><text x="420" y="233">空</text><text x="480" y="233">空</text></g>
</g>
<!-- pointers after -->
<path d="M150,272 V252" fill="none" stroke="#B8B5AC" stroke-width="1.5" marker-end="url(#ah)"/>
<text x="150" y="286" text-anchor="middle" class="lab" fill="#9A988F">ob_bytes</text>
<path d="M210,272 V252" fill="none" stroke="#C08A2E" stroke-width="1.7" marker-end="url(#ah)"/>
<text x="232" y="286" text-anchor="middle" class="lab" fill="#5C3C08">ob_start（右移）</text>
<text x="180" y="200" text-anchor="middle" class="cap" fill="#9A988F">头部空槽</text>
</svg>
