<svg width="100%" viewBox="0 0 700 290" xmlns="http://www.w3.org/2000/svg" role="img" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'PingFang SC','Microsoft YaHei',sans-serif">
<title>bytes 与 bytearray 的内存布局对比</title>
<desc>bytes 把字节数据内联在对象自身里（ob_sval），是一块连续内存、不可变，并把哈希缓存在 ob_shash，类似不可变的字符串。bytearray 则用 ob_bytes 指向另一块可增长的缓冲，配合 ob_alloc 过分配，所以可变、可 append，类似字节版的列表。</desc>
<defs>
  <style>
    .lab{font-size:12px;font-family:'SF Mono','JetBrains Mono',ui-monospace,Consolas,monospace;}
    .fd{font-size:11px;font-family:'SF Mono','JetBrains Mono',ui-monospace,Consolas,monospace;}
    .cap{font-size:11.5px;}
  </style>
  <filter id="sh" x="-30%" y="-30%" width="160%" height="160%"><feDropShadow dx="0" dy="1.4" stdDeviation="2" flood-color="#2A2A28" flood-opacity="0.12"/></filter>
  <marker id="ah" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#8E8B80" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></marker>
</defs>

<rect x="0" y="0" width="700" height="290" fill="#FBFAF6"/>

<!-- bytes: one block -->
<text x="110" y="62" text-anchor="end" class="lab" fill="#5C3C08">bytes b'abc'</text>
<rect x="120" y="40" width="392" height="40" rx="7" fill="#FFFFFF" stroke="#E8CB94" stroke-width="1.2" filter="url(#sh)"/>
<rect x="313" y="41" width="198" height="38" fill="#FBF1DE"/>
<g stroke="#EAD2A0"><line x1="216" y1="40" x2="216" y2="80"/><line x1="312" y1="40" x2="312" y2="80"/><line x1="362" y1="40" x2="362" y2="80"/><line x1="412" y1="40" x2="412" y2="80"/><line x1="462" y1="40" x2="462" y2="80"/></g>
<g class="fd" fill="#5C3C08" text-anchor="middle"><text x="168" y="64">对象头</text><text x="264" y="64">ob_shash</text><text x="337" y="64">a</text><text x="387" y="64">b</text><text x="437" y="64">c</text><text x="487" y="64" fill="#B8B5AC">\0</text></g>
<path d="M120,90 H512" fill="none" stroke="#C0BDB4" stroke-width="1.2"/>
<text x="316" y="106" text-anchor="middle" class="cap" fill="#9A988F">一块连续内存：字节内联（ob_sval），不可变，哈希缓存在 ob_shash</text>

<!-- bytearray: struct + buffer -->
<text x="110" y="168" text-anchor="end" class="lab" fill="#28415F">bytearray</text>
<rect x="120" y="146" width="300" height="40" rx="7" fill="#FFFFFF" stroke="#C3D2E8" stroke-width="1.2" filter="url(#sh)"/>
<g stroke="#DCE6F2"><line x1="216" y1="146" x2="216" y2="186"/><line x1="300" y1="146" x2="300" y2="186"/></g>
<g class="fd" fill="#28415F" text-anchor="middle"><text x="168" y="170">对象头</text><text x="258" y="170">ob_alloc=8</text><text x="360" y="170">*ob_bytes ●</text></g>
<path d="M360,186 C360,202 320,204 320,218" fill="none" stroke="#8E8B80" stroke-width="1.7" marker-end="url(#ah)"/>
<rect x="216" y="220" width="288" height="38" rx="7" fill="#FFFFFF" stroke="#C3D2E8" stroke-width="1.2" filter="url(#sh)"/>
<g stroke="#DCE6F2"><line x1="252" y1="220" x2="252" y2="258"/><line x1="288" y1="220" x2="288" y2="258"/><line x1="324" y1="220" x2="324" y2="258"/><line x1="360" y1="220" x2="360" y2="258"/><line x1="396" y1="220" x2="396" y2="258"/><line x1="432" y1="220" x2="432" y2="258"/><line x1="468" y1="220" x2="468" y2="258"/></g>
<g class="fd" fill="#28415F" text-anchor="middle"><text x="234" y="244">a</text><text x="270" y="244">b</text><text x="306" y="244">c</text></g>
<g class="fd" fill="#B8B5AC" text-anchor="middle"><text x="342" y="244">空</text><text x="378" y="244">空</text></g>
<text x="520" y="244" class="cap" fill="#9A988F">ob_bytes 缓冲（可增长）</text>

<text x="350" y="282" text-anchor="middle" class="cap" fill="#9A988F">bytes 像不可变的字符串（一块·内联·哈希缓存）；bytearray 像可变的列表（独立缓冲·过分配扩容）</text>
</svg>
