<svg width="100%" viewBox="0 0 640 280" xmlns="http://www.w3.org/2000/svg" role="img" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'PingFang SC','Microsoft YaHei',sans-serif">
<title>if / while 的跳转回填</title>
<desc>编译 while 的条件时还不知道循环出口在哪，它的地址要等循环体的指令都生成完才确定。办法是先 emit 一条占位的 POP_JUMP_IF_FALSE，参数暂填 None，记下它的位置；编译完循环体、emit 末尾的 JUMP_ABSOLUTE 往回跳之后，循环出口地址才确定，这时回头把占位的 None 改成真实地址。这就是跳转回填。</desc>
<defs>
  <style>
    .ti{font-size:13px;font-weight:600;}
    .h{font-size:11px;font-weight:600;}
    .d{font-size:9.5px;}
    .c{font-size:10.5px;font-family:'SF Mono','JetBrains Mono',ui-monospace,Consolas,monospace;}
  </style>
  <filter id="sh" x="-30%" y="-30%" width="160%" height="160%"><feDropShadow dx="0" dy="1.4" stdDeviation="2" flood-color="#2A2A28" flood-opacity="0.12"/></filter>
  <linearGradient id="gN" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#F1EFE8"/><stop offset="1" stop-color="#E7E4DA"/></linearGradient>
  <linearGradient id="gR" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#FBEFE9"/><stop offset="1" stop-color="#F6E2D6"/></linearGradient>
  <linearGradient id="gG" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#EDF4EE"/><stop offset="1" stop-color="#DDEBE0"/></linearGradient>
  <marker id="ahp" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#6A63B0" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></marker>
</defs>

<rect x="0" y="0" width="640" height="280" fill="#FBFAF6"/>
<text x="320" y="26" text-anchor="middle" class="ti" fill="#2E2972">先占位、后回填：跳转目标编译完才知道</text>

<!-- bytecode listing -->
<g class="c">
  <rect x="160" y="48" width="320" height="28" rx="5" fill="url(#gG)" stroke="#BFD8C4"/><text x="174" y="67" fill="#2F6B43">2 ▸ 循环顶部：算条件</text>
  <rect x="160" y="80" width="320" height="28" rx="5" fill="url(#gR)" stroke="#E8C9B5"/><text x="174" y="99" fill="#9A4A2F">4  POP_JUMP_IF_FALSE  ?</text>
  <rect x="160" y="112" width="320" height="28" rx="5" fill="url(#gN)" stroke="#D8D3C6"/><text x="174" y="131" fill="#33322E">6  循环体 …</text>
  <rect x="160" y="144" width="320" height="28" rx="5" fill="url(#gN)" stroke="#D8D3C6"/><text x="174" y="163" fill="#33322E">8  循环体 …</text>
  <rect x="160" y="176" width="320" height="28" rx="5" fill="url(#gN)" stroke="#D8D3C6"/><text x="174" y="195" fill="#33322E">10 JUMP_ABSOLUTE  2</text>
  <rect x="160" y="208" width="320" height="28" rx="5" fill="url(#gG)" stroke="#BFD8C4"/><text x="174" y="227" fill="#2F6B43">12 循环出口（汇合点）</text>
</g>

<!-- back jump -->
<path d="M160,190 C120,190 120,62 158,62" fill="none" stroke="#6A63B0" stroke-width="1.7" marker-end="url(#ahp)"/>
<text x="96" y="128" text-anchor="middle" class="d" fill="#6A63B0">往回跳</text>
<text x="96" y="142" text-anchor="middle" class="d" fill="#6A63B0">形成循环</text>

<!-- backpatch arrow -->
<path d="M484,94 C560,94 560,222 482,222" fill="none" stroke="#C77A52" stroke-width="1.7" stroke-dasharray="5 4" marker-end="url(#ahp)"/>
<text x="582" y="150" text-anchor="middle" class="d" fill="#C77A52">回填</text>
<text x="582" y="164" text-anchor="middle" class="d" fill="#C77A52">? → 12</text>

<text x="320" y="262" text-anchor="middle" class="d" fill="#9A988F">编译条件时先 emit 占位的 None，循环体编译完、出口地址确定后，再回头改写</text>
</svg>
