<svg width="100%" viewBox="0 0 640 320" xmlns="http://www.w3.org/2000/svg" role="img" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'PingFang SC','Microsoft YaHei',sans-serif">
<title>玩具指令集对照 CPython</title>
<desc>迷你虚拟机的玩具指令集，刻意模仿 CPython 栈式指令，只保留最核心的十几条。LOAD_CONST 压入常量，LOAD_FAST 压入局部变量，STORE_FAST 弹栈存入局部变量，LOAD_NAME 与 STORE_NAME 用于模块级，LOAD_GLOBAL 取模块级名字，BINARY_OP 弹两个算一个压回，COMPARE_OP 比较，POP_JUMP_IF_FALSE 条件跳转，JUMP_ABSOLUTE 无条件跳转，PRINT 输出，MAKE_FUNCTION 造函数对象，CALL_FUNCTION 调用，RETURN_VALUE 返回。为直观，名字和常量直接内联在参数里，真实 CPython 用下标去 co_consts 和 co_varnames 查表。</desc>
<defs>
  <style>
    .ti{font-size:13px;font-weight:600;}
    .h{font-size:10px;font-weight:600;}
    .d{font-size:10px;}
    .c{font-size:10.5px;font-family:'SF Mono','JetBrains Mono',ui-monospace,Consolas,monospace;}
  </style>
  <filter id="sh" x="-30%" y="-30%" width="160%" height="160%"><feDropShadow dx="0" dy="1.4" stdDeviation="2" flood-color="#2A2A28" flood-opacity="0.12"/></filter>
  <linearGradient id="gP" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#F3F1FD"/><stop offset="1" stop-color="#E9E6FB"/></linearGradient>
</defs>

<rect x="0" y="0" width="640" height="320" fill="#FBFAF6"/>
<text x="320" y="26" text-anchor="middle" class="ti" fill="#2E2972">玩具指令集（对照 CPython，只留核心十几条）</text>

<g class="c">
  <rect x="30" y="44" width="580" height="26" rx="5" fill="url(#gP)" stroke="#CCC7F1"/>
  <text x="44" y="62" class="h" fill="#2E2972">玩具指令</text>
  <text x="250" y="62" class="h" fill="#2E2972">作用</text>
  <text x="500" y="62" class="h" fill="#2E2972">对照 CPython</text>
</g>

<g class="c" fill="#33322E">
  <text x="44" y="88">LOAD_CONST v</text><text x="250" y="88" class="d" fill="#46453F">压入常量 v</text><text x="500" y="88" class="d" fill="#9A988F">同名</text>
  <text x="44" y="110">LOAD_FAST / STORE_FAST</text><text x="250" y="110" class="d" fill="#46453F">读 / 写局部变量</text><text x="500" y="110" class="d" fill="#9A988F">同名</text>
  <text x="44" y="132">LOAD_NAME / STORE_NAME</text><text x="250" y="132" class="d" fill="#46453F">读 / 写模块级名字</text><text x="500" y="132" class="d" fill="#9A988F">同名</text>
  <text x="44" y="154">LOAD_GLOBAL n</text><text x="250" y="154" class="d" fill="#46453F">取模块级名字（调函数）</text><text x="500" y="154" class="d" fill="#9A988F">同名</text>
  <text x="44" y="176">BINARY_OP / COMPARE_OP</text><text x="250" y="176" class="d" fill="#46453F">弹两个、算一个、压回</text><text x="500" y="176" class="d" fill="#9A988F">BINARY_ADD…</text>
  <text x="44" y="198">POP_JUMP_IF_FALSE t</text><text x="250" y="198" class="d" fill="#46453F">栈顶为假则跳到 t</text><text x="500" y="198" class="d" fill="#9A988F">同名</text>
  <text x="44" y="220">JUMP_ABSOLUTE t</text><text x="250" y="220" class="d" fill="#46453F">无条件跳到 t</text><text x="500" y="220" class="d" fill="#9A988F">同名</text>
  <text x="44" y="242">MAKE_FUNCTION / CALL_FUNCTION</text><text x="250" y="242" class="d" fill="#46453F">造函数对象 / 调用</text><text x="500" y="242" class="d" fill="#9A988F">同名</text>
  <text x="44" y="264">RETURN_VALUE / PRINT</text><text x="250" y="264" class="d" fill="#46453F">返回 / 输出</text><text x="500" y="264" class="d" fill="#9A988F">RETURN_VALUE</text>
</g>
<line x1="30" y1="72" x2="610" y2="72" stroke="#E7E4DA"/>
<line x1="30" y1="274" x2="610" y2="274" stroke="#E7E4DA"/>

<text x="320" y="298" text-anchor="middle" class="d" fill="#9A988F">为直观，玩具版把名字 / 常量内联在参数里；真实 CPython 用下标查 co_consts / co_varnames 表</text>
</svg>
