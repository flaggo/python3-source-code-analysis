<svg width="100%" viewBox="0 0 640 260" xmlns="http://www.w3.org/2000/svg" role="img" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'PingFang SC','Microsoft YaHei',sans-serif">
<title>frozen importlib 打破鸡生蛋难题</title>
<desc>启动 import 系统有个鸡生蛋难题：importlib 是用 Python 写的，可启动它本身又需要 import。CPython 的破解办法是 frozen 冻结模块：把 importlib._bootstrap 的字节码在编译 CPython 时就固化进可执行文件，存为 Python/importlib.h 里一个巨大的字节数组。启动时无需从磁盘读文件、无需走 import 流程，直接把这段冻结的字节码喂给求值循环执行，import 系统就凭空启动了。</desc>
<defs>
  <style>
    .ti{font-size:13px;font-weight:600;}
    .h{font-size:11px;font-weight:600;}
    .d{font-size:10px;}
    .c{font-size:10px;font-family:'SF Mono','JetBrains Mono',ui-monospace,Consolas,monospace;}
  </style>
  <filter id="sh" x="-30%" y="-30%" width="160%" height="160%"><feDropShadow dx="0" dy="1.4" stdDeviation="2" flood-color="#2A2A28" flood-opacity="0.12"/></filter>
  <linearGradient id="gR" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#FBEFE9"/><stop offset="1" stop-color="#F6E2D6"/></linearGradient>
  <linearGradient id="gN" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#F1EFE8"/><stop offset="1" stop-color="#E7E4DA"/></linearGradient>
  <linearGradient id="gG" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#EDF4EE"/><stop offset="1" stop-color="#DDEBE0"/></linearGradient>
  <marker id="ah" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#8E8B80" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker>
</defs>

<rect x="0" y="0" width="640" height="260" fill="#FBFAF6"/>
<text x="320" y="28" text-anchor="middle" class="ti" fill="#2E2972">鸡生蛋：启动 import 又需要 import</text>

<!-- the dilemma -->
<rect x="40" y="52" width="230" height="66" rx="11" fill="url(#gR)" stroke="#E8C9B5" filter="url(#sh)"/>
<text x="155" y="76" text-anchor="middle" class="h" fill="#9A4A2F">难题</text>
<text x="155" y="96" text-anchor="middle" class="d" fill="#9A4A2F">importlib 用 Python 写</text>
<text x="155" y="110" text-anchor="middle" class="d" fill="#9A4A2F">可加载它本身又得 import</text>

<!-- the fix -->
<rect x="40" y="146" width="560" height="86" rx="12" fill="url(#gG)" stroke="#BFD8C4" filter="url(#sh)"/>
<text x="320" y="168" text-anchor="middle" class="h" fill="#2F6B43">破解：frozen 冻结模块</text>

<rect x="60" y="180" width="150" height="40" rx="8" fill="#FFF" stroke="#BFD8C4"/>
<text x="135" y="198" text-anchor="middle" class="d" fill="#3C5C46">编译 CPython 时</text>
<text x="135" y="213" text-anchor="middle" class="c" fill="#2F6B43">importlib._bootstrap</text>

<rect x="245" y="180" width="150" height="40" rx="8" fill="#FFF" stroke="#BFD8C4"/>
<text x="320" y="198" text-anchor="middle" class="d" fill="#3C5C46">固化为字节数组</text>
<text x="320" y="213" text-anchor="middle" class="c" fill="#2F6B43">Python/importlib.h</text>

<rect x="430" y="180" width="150" height="40" rx="8" fill="#FFF" stroke="#BFD8C4"/>
<text x="505" y="198" text-anchor="middle" class="d" fill="#3C5C46">启动时直接执行</text>
<text x="505" y="213" text-anchor="middle" class="c" fill="#2F6B43">无需读盘、无需 import</text>

<path d="M210,200 H243" fill="none" stroke="#8E8B80" stroke-width="1.5" marker-end="url(#ah)"/>
<path d="M395,200 H428" fill="none" stroke="#8E8B80" stroke-width="1.5" marker-end="url(#ah)"/>

<path d="M270,90 C320,90 320,120 320,144" fill="none" stroke="#8E8B80" stroke-width="1.5" stroke-dasharray="4 3" marker-end="url(#ah)"/>
<text x="400" y="92" text-anchor="middle" class="d" fill="#9A988F">把冻结字节码喂给求值循环 → import 凭空启动</text>
</svg>
