<svg width="100%" viewBox="0 0 640 250" xmlns="http://www.w3.org/2000/svg" role="img" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'PingFang SC','Microsoft YaHei',sans-serif">
<title>builtins 名字空间的来历，LEGB 的 B</title>
<desc>LEGB 查找的最后一层内建，就来自这里。阶段一的 _PyBuiltin_Init 造出 builtins 模块，把 print、len、range、内建异常填进去，再把它的 __dict__ 存进 interp->builtins。之后每个帧创建时，f_builtins 都指向这同一份字典。所以任何代码、任何函数里都能直接用 print、len。LEGB 的 B 不是魔法，就是初始化时挂在解释器上、再分发给每个帧的那份 builtins.__dict__。</desc>
<defs>
  <style>
    .ti{font-size:13px;font-weight:600;}
    .h{font-size:11px;font-weight:600;}
    .d{font-size:10px;}
    .c{font-size:10px;font-family:'SF Mono','JetBrains Mono',ui-monospace,Consolas,monospace;}
  </style>
  <filter id="sh" x="-30%" y="-30%" width="160%" height="160%"><feDropShadow dx="0" dy="1.4" stdDeviation="2" flood-color="#2A2A28" flood-opacity="0.12"/></filter>
  <linearGradient id="gB" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#EFF3FA"/><stop offset="1" stop-color="#E0E9F6"/></linearGradient>
  <linearGradient id="gP" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#F3F1FD"/><stop offset="1" stop-color="#E9E6FB"/></linearGradient>
  <linearGradient id="gN" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#F1EFE8"/><stop offset="1" stop-color="#E7E4DA"/></linearGradient>
  <marker id="ah" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#8E8B80" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker>
</defs>

<rect x="0" y="0" width="640" height="250" fill="#FBFAF6"/>
<text x="320" y="28" text-anchor="middle" class="ti" fill="#2E2972">LEGB 的 B 从哪来</text>

<!-- builtins module -->
<rect x="30" y="60" width="170" height="130" rx="11" fill="url(#gB)" stroke="#C3D2E8" filter="url(#sh)"/>
<text x="115" y="84" text-anchor="middle" class="h" fill="#28415F">builtins 模块</text>
<text x="115" y="102" text-anchor="middle" class="d" fill="#9A988F">_PyBuiltin_Init 造</text>
<rect x="50" y="114" width="130" height="64" rx="7" fill="#FFF" stroke="#C3D2E8"/>
<text x="115" y="134" text-anchor="middle" class="c" fill="#28415F">print · len</text>
<text x="115" y="152" text-anchor="middle" class="c" fill="#28415F">range · 内建异常</text>
<text x="115" y="170" text-anchor="middle" class="d" fill="#9A988F">__dict__</text>

<!-- interp->builtins -->
<rect x="245" y="92" width="150" height="66" rx="11" fill="url(#gP)" stroke="#CCC7F1" filter="url(#sh)"/>
<text x="320" y="120" text-anchor="middle" class="c" fill="#2E2972">interp-&gt;builtins</text>
<text x="320" y="140" text-anchor="middle" class="d" fill="#46453F">挂在解释器上</text>

<!-- frames -->
<rect x="440" y="60" width="170" height="58" rx="10" fill="url(#gN)" stroke="#D8D3C6" filter="url(#sh)"/>
<text x="525" y="84" text-anchor="middle" class="h" fill="#33322E">帧 A</text>
<text x="525" y="104" text-anchor="middle" class="c" fill="#33322E">f_builtins →</text>
<rect x="440" y="130" width="170" height="58" rx="10" fill="url(#gN)" stroke="#D8D3C6" filter="url(#sh)"/>
<text x="525" y="154" text-anchor="middle" class="h" fill="#33322E">帧 B</text>
<text x="525" y="174" text-anchor="middle" class="c" fill="#33322E">f_builtins →</text>

<path d="M200,125 H243" fill="none" stroke="#8E8B80" stroke-width="1.6" marker-end="url(#ah)"/>
<path d="M395,118 C420,100 425,92 438,90" fill="none" stroke="#8E8B80" stroke-width="1.5" marker-end="url(#ah)"/>
<path d="M395,132 C420,150 425,158 438,160" fill="none" stroke="#8E8B80" stroke-width="1.5" marker-end="url(#ah)"/>

<text x="320" y="216" text-anchor="middle" class="d" fill="#9A988F">每个帧的 f_builtins 都指向同一份 builtins.__dict__ —— 所以 print、len 触手可及</text>
</svg>
