<svg width="100%" viewBox="0 0 620 230" xmlns="http://www.w3.org/2000/svg" role="img" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'PingFang SC','Microsoft YaHei',sans-serif">
<title>import 语句本质是调用 __import__</title>
<desc>IMPORT_NAME 做的第一件事是去 builtins 里取出 __import__ 函数来调用。所以 import X 本质等价于 X 等于 __import__ 调用 X。__import__ 是个普通的内建函数，因此可以被替换，这是导入钩子、沙箱、惰性导入库的工作原理。如果 __import__ 没被覆盖，走快路径直接调底层 C 实现 PyImport_ImportModuleLevelObject；否则当成普通函数调用。</desc>
<defs>
  <style>
    .ti{font-size:13px;font-weight:600;}
    .h{font-size:11px;font-weight:600;}
    .d{font-size:10px;}
    .c{font-size:10px;font-family:'SF Mono','JetBrains Mono',ui-monospace,Consolas,monospace;}
  </style>
  <filter id="sh" x="-30%" y="-30%" width="160%" height="160%"><feDropShadow dx="0" dy="1.4" stdDeviation="2" flood-color="#2A2A28" flood-opacity="0.12"/></filter>
  <linearGradient id="gP" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#F3F1FD"/><stop offset="1" stop-color="#E9E6FB"/></linearGradient>
  <linearGradient id="gB" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#EFF3FA"/><stop offset="1" stop-color="#E0E9F6"/></linearGradient>
  <linearGradient id="gN" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#F1EFE8"/><stop offset="1" stop-color="#E7E4DA"/></linearGradient>
  <marker id="ah" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#8E8B80" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker>
</defs>

<rect x="0" y="0" width="620" height="230" fill="#FBFAF6"/>
<text x="310" y="28" text-anchor="middle" class="ti" fill="#2E2972">import X 等价于 X = __import__('X', …)</text>

<rect x="30" y="64" width="140" height="48" rx="9" fill="url(#gP)" stroke="#CCC7F1" filter="url(#sh)"/>
<text x="100" y="84" text-anchor="middle" class="c" fill="#2E2972">IMPORT_NAME</text>
<text x="100" y="101" text-anchor="middle" class="d" fill="#9A988F">字节码指令</text>

<rect x="220" y="64" width="170" height="48" rx="9" fill="url(#gN)" stroke="#D8D3C6" filter="url(#sh)"/>
<text x="305" y="84" text-anchor="middle" class="c" fill="#33322E">builtins.__import__</text>
<text x="305" y="101" text-anchor="middle" class="d" fill="#C77A52">普通内建函数，可替换</text>

<path d="M170,88 H218" fill="none" stroke="#8E8B80" stroke-width="1.5" marker-end="url(#ah)"/>
<text x="194" y="78" text-anchor="middle" class="d" fill="#9A988F">取出</text>

<!-- two paths -->
<path d="M390,80 C420,80 430,70 448,66" fill="none" stroke="#8E8B80" stroke-width="1.5" marker-end="url(#ah)"/>
<path d="M390,96 C420,96 430,118 448,126" fill="none" stroke="#8E8B80" stroke-width="1.5" marker-end="url(#ah)"/>

<rect x="450" y="44" width="150" height="44" rx="9" fill="url(#gB)" stroke="#C3D2E8" filter="url(#sh)"/>
<text x="525" y="62" text-anchor="middle" class="d" fill="#28415F">未覆盖（快路径）</text>
<text x="525" y="78" text-anchor="middle" class="c" fill="#28415F">C 实现</text>

<rect x="450" y="106" width="150" height="44" rx="9" fill="url(#gN)" stroke="#D8D3C6" filter="url(#sh)"/>
<text x="525" y="124" text-anchor="middle" class="d" fill="#9A988F">已覆盖</text>
<text x="525" y="140" text-anchor="middle" class="c" fill="#33322E">当普通函数调</text>

<text x="310" y="186" text-anchor="middle" class="d" fill="#9A988F">替换 builtins.__import__ → 导入钩子 / 沙箱 / 惰性导入的工作原理</text>
<text x="310" y="208" text-anchor="middle" class="c" fill="#46453F">import json  ≡  json = __import__('json', globals(), locals(), None, 0)</text>
</svg>
