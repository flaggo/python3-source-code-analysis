<svg width="100%" viewBox="0 0 620 220" xmlns="http://www.w3.org/2000/svg" role="img" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'PingFang SC','Microsoft YaHei',sans-serif">
<title>C 把查找加载交给 Python 写的 importlib</title>
<desc>缓存未命中后，C 层的 import_find_and_load 实现短得惊人：把活儿原样转交给用 Python 写的 importlib，调它的 _find_and_load。这是一处精彩的分工：C 层只管查缓存这种性能敏感的快路径，真正复杂多变的查找加载逻辑全用 Python 写在 importlib._bootstrap 里，让它易读易改易扩展，代价由前面的 sys.modules 缓存兜住。</desc>
<defs>
  <style>
    .ti{font-size:13px;font-weight:600;}
    .h{font-size:11px;font-weight:600;}
    .d{font-size:10px;}
    .c{font-size:10px;font-family:'SF Mono','JetBrains Mono',ui-monospace,Consolas,monospace;}
  </style>
  <filter id="sh" x="-30%" y="-30%" width="160%" height="160%"><feDropShadow dx="0" dy="1.4" stdDeviation="2" flood-color="#2A2A28" flood-opacity="0.12"/></filter>
  <linearGradient id="gN" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#F1EFE8"/><stop offset="1" stop-color="#E7E4DA"/></linearGradient>
  <linearGradient id="gG" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#EDF4EE"/><stop offset="1" stop-color="#DDEBE0"/></linearGradient>
  <marker id="ah" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#8E8B80" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker>
</defs>

<rect x="0" y="0" width="620" height="220" fill="#FBFAF6"/>
<text x="310" y="28" text-anchor="middle" class="ti" fill="#2E2972">C 管缓存快路径，Python 管复杂逻辑</text>

<!-- C side -->
<rect x="30" y="64" width="250" height="100" rx="12" fill="url(#gN)" stroke="#D8D3C6" filter="url(#sh)"/>
<text x="155" y="86" text-anchor="middle" class="h" fill="#33322E">C 层（import.c）</text>
<text x="155" y="108" text-anchor="middle" class="c" fill="#33322E">查 sys.modules 缓存</text>
<text x="155" y="128" text-anchor="middle" class="c" fill="#33322E">import_find_and_load</text>
<text x="155" y="148" text-anchor="middle" class="d" fill="#9A988F">短小，只管快路径</text>

<!-- Python side -->
<rect x="340" y="64" width="250" height="100" rx="12" fill="url(#gG)" stroke="#BFD8C4" filter="url(#sh)"/>
<text x="465" y="86" text-anchor="middle" class="h" fill="#2F6B43">Python 层（importlib）</text>
<text x="465" y="108" text-anchor="middle" class="c" fill="#2F6B43">_find_and_load</text>
<text x="465" y="128" text-anchor="middle" class="d" fill="#3C5C46">finder / loader 全套逻辑</text>
<text x="465" y="148" text-anchor="middle" class="d" fill="#9A988F">易读 · 易改 · 易扩展</text>

<path d="M280,114 H338" fill="none" stroke="#8E8B80" stroke-width="1.7" marker-end="url(#ah)"/>
<text x="309" y="104" text-anchor="middle" class="d" fill="#9A988F">转交</text>

<text x="310" y="196" text-anchor="middle" class="d" fill="#9A988F">用 Python 实现 import，加载开销由 sys.modules 缓存兜住</text>
</svg>
