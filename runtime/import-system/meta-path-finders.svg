<svg width="100%" viewBox="0 0 640 290" xmlns="http://www.w3.org/2000/svg" role="img" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'PingFang SC','Microsoft YaHei',sans-serif">
<title>meta_path 上的三个查找器与 sys.path 搜索</title>
<desc>_find_spec 依次问 sys.meta_path 上的每个 finder 你认识这个模块吗，谁先返回非空 spec 就用谁。默认有三位：BuiltinImporter 找编译进解释器的内建模块如 sys；FrozenImporter 找字节码固化进二进制的冻结模块；PathFinder 找文件系统上的模块，是绝大多数 import 走的路。PathFinder 遍历 sys.path 每个目录，借 sys.path_hooks 取得 FileFinder 并缓存，FileFinder 按后缀匹配选 loader：.py 用 SourceFileLoader，.pyc 用 SourcelessFileLoader，.so 用 ExtensionFileLoader。</desc>
<defs>
  <style>
    .ti{font-size:13px;font-weight:600;}
    .h{font-size:10.5px;font-weight:600;}
    .d{font-size:9.5px;}
    .c{font-size:9.5px;font-family:'SF Mono','JetBrains Mono',ui-monospace,Consolas,monospace;}
  </style>
  <filter id="sh" x="-30%" y="-30%" width="160%" height="160%"><feDropShadow dx="0" dy="1.4" stdDeviation="2" flood-color="#2A2A28" flood-opacity="0.12"/></filter>
  <linearGradient id="gB" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#EFF3FA"/><stop offset="1" stop-color="#E0E9F6"/></linearGradient>
  <linearGradient id="gN" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#F1EFE8"/><stop offset="1" stop-color="#E7E4DA"/></linearGradient>
  <linearGradient id="gG" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#EDF4EE"/><stop offset="1" stop-color="#DDEBE0"/></linearGradient>
  <marker id="ah" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#8E8B80" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></marker>
</defs>

<rect x="0" y="0" width="640" height="290" fill="#FBFAF6"/>
<text x="320" y="26" text-anchor="middle" class="ti" fill="#2E2972">sys.meta_path：依次问每个查找器</text>

<g class="c">
  <rect x="40" y="48" width="180" height="40" rx="8" fill="url(#gB)" stroke="#C3D2E8" filter="url(#sh)"/>
  <text x="130" y="66" text-anchor="middle" class="h" fill="#28415F">BuiltinImporter</text>
  <text x="130" y="80" text-anchor="middle" class="d" fill="#9A988F">内建模块（sys…）</text>

  <rect x="230" y="48" width="180" height="40" rx="8" fill="url(#gB)" stroke="#C3D2E8" filter="url(#sh)"/>
  <text x="320" y="66" text-anchor="middle" class="h" fill="#28415F">FrozenImporter</text>
  <text x="320" y="80" text-anchor="middle" class="d" fill="#9A988F">冻结模块</text>

  <rect x="420" y="48" width="180" height="40" rx="8" fill="url(#gG)" stroke="#BFD8C4" filter="url(#sh)"/>
  <text x="510" y="66" text-anchor="middle" class="h" fill="#2F6B43">PathFinder</text>
  <text x="510" y="80" text-anchor="middle" class="d" fill="#6E8C74">文件系统（最常走）</text>
</g>

<!-- PathFinder expands -->
<path d="M510,88 V108" fill="none" stroke="#8E8B80" stroke-width="1.5" marker-end="url(#ah)"/>
<rect x="120" y="110" width="400" height="150" rx="12" fill="#FFFFFF" stroke="#BFD8C4" filter="url(#sh)"/>
<text x="320" y="130" text-anchor="middle" class="h" fill="#2F6B43">PathFinder 的内部</text>

<rect x="140" y="142" width="160" height="34" rx="7" fill="url(#gN)" stroke="#D8D3C6"/>
<text x="220" y="163" text-anchor="middle" class="c" fill="#33322E">遍历 sys.path 目录</text>
<rect x="340" y="142" width="160" height="34" rx="7" fill="url(#gN)" stroke="#D8D3C6"/>
<text x="420" y="158" text-anchor="middle" class="c" fill="#33322E">path_hooks →</text>
<text x="420" y="170" text-anchor="middle" class="c" fill="#33322E">FileFinder（缓存）</text>
<path d="M300,159 H338" fill="none" stroke="#8E8B80" stroke-width="1.4" marker-end="url(#ah)"/>

<text x="320" y="196" text-anchor="middle" class="d" fill="#46453F">FileFinder 按后缀挑 loader：</text>
<g class="c">
  <rect x="135" y="206" width="120" height="40" rx="7" fill="url(#gG)" stroke="#BFD8C4"/>
  <text x="195" y="223" text-anchor="middle" fill="#2F6B43">.py</text><text x="195" y="237" text-anchor="middle" class="d" fill="#3C5C46">SourceFileLoader</text>
  <rect x="262" y="206" width="116" height="40" rx="7" fill="url(#gG)" stroke="#BFD8C4"/>
  <text x="320" y="223" text-anchor="middle" fill="#2F6B43">.pyc</text><text x="320" y="237" text-anchor="middle" class="d" fill="#3C5C46">Sourceless…</text>
  <rect x="385" y="206" width="120" height="40" rx="7" fill="url(#gG)" stroke="#BFD8C4"/>
  <text x="445" y="223" text-anchor="middle" fill="#2F6B43">.so / .pyd</text><text x="445" y="237" text-anchor="middle" class="d" fill="#3C5C46">ExtensionFile…</text>
</g>

<text x="320" y="280" text-anchor="middle" class="d" fill="#9A988F">向 sys.meta_path / sys.path_hooks 注入自定义 finder → 扩展导入来源</text>
</svg>
