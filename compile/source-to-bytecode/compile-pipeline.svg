<svg width="100%" viewBox="0 0 720 250" xmlns="http://www.w3.org/2000/svg" role="img" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'PingFang SC','Microsoft YaHei',sans-serif">
<title>从源码到字节码的编译管线</title>
<desc>Python 源码先经词法分析（tokenizer.c）切成 token 流，再经语法分析（parser 与 ast.c）建成抽象语法树 AST，AST 经优化与符号表分析（ast_opt.c、symtable.c）后，由代码生成（compile.c）汇编成 code object，其中 co_code 就是字节码。这一整条管线把文本变成可被虚拟机执行的字节码。</desc>
<defs>
  <style>
    .ti{font-size:13px;font-weight:600;}
    .b{font-size:11.5px;font-weight:600;}
    .c{font-size:10.5px;font-family:'SF Mono','JetBrains Mono',ui-monospace,Consolas,monospace;}
    .stage{font-size:11px;font-weight:600;}
    .file{font-size:10px;font-family:'SF Mono','JetBrains Mono',ui-monospace,Consolas,monospace;}
  </style>
  <filter id="sh" x="-30%" y="-30%" width="160%" height="160%"><feDropShadow dx="0" dy="1.4" stdDeviation="2" flood-color="#2A2A28" flood-opacity="0.12"/></filter>
  <linearGradient id="gN" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#F1EFE8"/><stop offset="1" stop-color="#E7E4DA"/></linearGradient>
  <linearGradient id="gA" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#FAEFD9"/><stop offset="1" stop-color="#F4E6C8"/></linearGradient>
  <linearGradient id="gB" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#EFF3FA"/><stop offset="1" stop-color="#E0E9F6"/></linearGradient>
  <linearGradient id="gP" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#F3F1FD"/><stop offset="1" stop-color="#E9E6FB"/></linearGradient>
  <linearGradient id="gG" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#E9F6F1"/><stop offset="1" stop-color="#DBF0E7"/></linearGradient>
  <marker id="ah" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#8E8B80" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></marker>
  <marker id="ahg" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#1E8B6F" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker>
</defs>

<rect x="0" y="0" width="720" height="250" fill="#FBFAF6"/>
<text x="360" y="30" text-anchor="middle" class="ti" fill="#2E2972">编译：源码文本 → 字节码</text>

<!-- boxes -->
<rect x="20" y="78" width="120" height="54" rx="9" fill="url(#gN)" stroke="#D8D3C6" stroke-width="1" filter="url(#sh)"/>
<text x="80" y="100" text-anchor="middle" class="b" fill="#33322E">源码文本</text>
<text x="80" y="119" text-anchor="middle" class="c" fill="#7B7A72">x = 1 + 2</text>

<rect x="210" y="78" width="120" height="54" rx="9" fill="url(#gA)" stroke="#E8CB94" stroke-width="1" filter="url(#sh)"/>
<text x="270" y="100" text-anchor="middle" class="b" fill="#5C3C08">token 流</text>
<text x="270" y="119" text-anchor="middle" class="c" fill="#8A6A1E">NAME = NUM + NUM</text>

<rect x="400" y="78" width="120" height="54" rx="9" fill="url(#gB)" stroke="#C3D2E8" stroke-width="1" filter="url(#sh)"/>
<text x="460" y="100" text-anchor="middle" class="b" fill="#28415F">语法树 AST</text>
<text x="460" y="119" text-anchor="middle" class="c" fill="#4A5E80">Assign·BinOp</text>

<rect x="590" y="78" width="120" height="54" rx="9" fill="url(#gP)" stroke="#CCC7F1" stroke-width="1" filter="url(#sh)"/>
<text x="650" y="100" text-anchor="middle" class="b" fill="#2E2972">code object</text>
<text x="650" y="119" text-anchor="middle" class="c" fill="#4A4396">co_code 字节码</text>

<!-- arrows + stage labels -->
<g fill="none" stroke="#8E8B80" stroke-width="1.7" marker-end="url(#ah)">
  <path d="M140,105 H206"/><path d="M330,105 H396"/><path d="M520,105 H586"/>
</g>
<g class="stage" text-anchor="middle" fill="#46453F"><text x="173" y="96">词法分析</text><text x="363" y="96">语法分析</text><text x="553" y="96">代码生成</text></g>
<g class="file" text-anchor="middle" fill="#9A988F"><text x="173" y="124">tokenizer.c</text><text x="363" y="124">parser·ast.c</text><text x="553" y="124">compile.c</text></g>

<!-- symtable + optimize callout under AST→code -->
<path d="M460,132 V168" fill="none" stroke="#1E8B6F" stroke-width="1.4" stroke-dasharray="4 4" marker-end="url(#ahg)"/>
<rect x="372" y="170" width="280" height="46" rx="9" fill="url(#gG)" stroke="#A8DCC9" stroke-width="1" filter="url(#sh)"/>
<text x="512" y="190" text-anchor="middle" class="b" fill="#0A463A">先优化 AST，再分析符号表</text>
<text x="512" y="207" text-anchor="middle" class="file" fill="#0C5945">ast_opt.c（常量折叠）· symtable.c（名字作用域）</text>
</svg>
