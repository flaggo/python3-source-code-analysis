<svg width="100%" viewBox="0 0 640 270" xmlns="http://www.w3.org/2000/svg" role="img" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'PingFang SC','Microsoft YaHei',sans-serif">
<title>函数调用的帧栈压入与弹出</title>
<desc>每次 CALL_FUNCTION 都新建一个帧压入帧栈，RETURN_VALUE 则弹出帧、把返回值交还调用者。当前活动的永远是帧栈顶那个帧。以 fact 递归为例：模块帧调用 fact(3)，压入 fact(n=3) 帧；它又调 fact(2)、fact(1)，帧栈一层层叠起，每个帧有自己的局部变量 n 和求值栈。到达基准情形后逐层 RETURN，帧一层层弹出，返回值层层交还上一层，最终回到模块帧。这正是第四部分帧与求值循环讲的调用栈。</desc>
<defs>
  <style>
    .ti{font-size:13px;font-weight:600;}
    .h{font-size:10.5px;font-weight:600;}
    .d{font-size:9.5px;}
    .c{font-size:10px;font-family:'SF Mono','JetBrains Mono',ui-monospace,Consolas,monospace;}
  </style>
  <filter id="sh" x="-30%" y="-30%" width="160%" height="160%"><feDropShadow dx="0" dy="1.4" stdDeviation="2" flood-color="#2A2A28" flood-opacity="0.12"/></filter>
  <linearGradient id="gN" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#F1EFE8"/><stop offset="1" stop-color="#E7E4DA"/></linearGradient>
  <linearGradient id="gB" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#EFF3FA"/><stop offset="1" stop-color="#E0E9F6"/></linearGradient>
  <linearGradient id="gG" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#EDF4EE"/><stop offset="1" stop-color="#DDEBE0"/></linearGradient>
  <marker id="ahg" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#2F6B43" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></marker>
  <marker id="ahr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#C77A52" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></marker>
</defs>

<rect x="0" y="0" width="640" height="270" fill="#FBFAF6"/>
<text x="320" y="26" text-anchor="middle" class="ti" fill="#2E2972">CALL 压帧，RETURN 弹帧，活动帧永在栈顶</text>

<!-- frame stack: bottom module, then fact(3), fact(2), fact(1) on top -->
<g class="c">
  <rect x="220" y="62" width="200" height="34" rx="6" fill="url(#gG)" stroke="#BFD8C4"/>
  <text x="234" y="83" fill="#2F6B43">fact(n=1)</text><text x="406" y="83" text-anchor="end" class="d" fill="#2F6B43">活动帧（栈顶）</text>
  <rect x="220" y="100" width="200" height="34" rx="6" fill="url(#gB)" stroke="#C3D2E8"/>
  <text x="234" y="121" fill="#28415F">fact(n=2)</text><text x="406" y="121" text-anchor="end" class="d" fill="#9A988F">等待返回</text>
  <rect x="220" y="138" width="200" height="34" rx="6" fill="url(#gB)" stroke="#C3D2E8"/>
  <text x="234" y="159" fill="#28415F">fact(n=3)</text><text x="406" y="159" text-anchor="end" class="d" fill="#9A988F">等待返回</text>
  <rect x="220" y="176" width="200" height="34" rx="6" fill="url(#gN)" stroke="#D8D3C6"/>
  <text x="234" y="197" fill="#33322E">&lt;module&gt;</text><text x="406" y="197" text-anchor="end" class="d" fill="#9A988F">最初的帧</text>
</g>

<!-- push arrow (down→up, left side) -->
<path d="M205,200 C175,160 175,110 205,82" fill="none" stroke="#2F6B43" stroke-width="1.8" marker-end="url(#ahg)"/>
<text x="150" y="120" text-anchor="middle" class="h" fill="#2F6B43">CALL</text>
<text x="150" y="136" text-anchor="middle" class="d" fill="#2F6B43">压入新帧</text>
<text x="150" y="150" text-anchor="middle" class="d" fill="#6E8C74">fact 调 fact</text>

<!-- return arrow (up→down, right side) -->
<path d="M436,80 C470,120 470,165 436,194" fill="none" stroke="#C77A52" stroke-width="1.8" marker-end="url(#ahr)"/>
<text x="494" y="120" text-anchor="middle" class="h" fill="#9A4A2F">RETURN</text>
<text x="494" y="136" text-anchor="middle" class="d" fill="#9A4A2F">弹出帧</text>
<text x="494" y="150" text-anchor="middle" class="d" fill="#C77A52">返回值交还上一层</text>

<text x="320" y="244" text-anchor="middle" class="d" fill="#9A988F">每个帧有自己的局部变量 n 与求值栈；递归 = 同一函数的多次调用各占一帧</text>
</svg>
