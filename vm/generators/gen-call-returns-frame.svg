<svg width="100%" viewBox="0 0 640 250" xmlns="http://www.w3.org/2000/svg" role="img" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'PingFang SC','Microsoft YaHei',sans-serif">
<title>调用生成器函数：建帧、包壳、返回，不执行</title>
<desc>普通函数调用会建帧、绑参，然后立即跑求值循环执行函数体。生成器函数不同：只要函数体里有 yield，code object 就带 CO_GENERATOR 标志，_PyEval_EvalCodeEx 建好帧、绑好参数后检测到这个标志，就不跑求值循环，而是把这个准备就绪却尚未执行的帧包进一个 PyGenObject 直接返回。所以 g = gen() 只是建一个帧加包个壳，函数体一行都没执行，要等到第一次 next 才真正开跑。</desc>
<defs>
  <style>
    .ti{font-size:13px;font-weight:600;}
    .h{font-size:11px;font-weight:600;}
    .d{font-size:10px;}
    .c{font-size:10px;font-family:'SF Mono','JetBrains Mono',ui-monospace,Consolas,monospace;}
  </style>
  <filter id="sh" x="-30%" y="-30%" width="160%" height="160%"><feDropShadow dx="0" dy="1.4" stdDeviation="2" flood-color="#2A2A28" flood-opacity="0.12"/></filter>
  <linearGradient id="gN" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#F1EFE8"/><stop offset="1" stop-color="#E7E4DA"/></linearGradient>
  <linearGradient id="gP" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#F3F1FD"/><stop offset="1" stop-color="#E9E6FB"/></linearGradient>
  <linearGradient id="gG" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#EDF4EE"/><stop offset="1" stop-color="#DDEBE0"/></linearGradient>
  <marker id="ah" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#8E8B80" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker>
</defs>

<rect x="0" y="0" width="640" height="250" fill="#FBFAF6"/>
<text x="320" y="28" text-anchor="middle" class="ti" fill="#2E2972">g = gen()：只建帧包壳，不执行函数体</text>

<rect x="30" y="58" width="120" height="44" rx="9" fill="url(#gN)" stroke="#D8D3C6" filter="url(#sh)"/>
<text x="90" y="78" text-anchor="middle" class="c" fill="#33322E">gen()</text>
<text x="90" y="93" text-anchor="middle" class="d" fill="#9A988F">调用</text>

<rect x="190" y="50" width="160" height="60" rx="10" fill="#FFFFFF" stroke="#CCC7F1" filter="url(#sh)"/>
<text x="270" y="72" text-anchor="middle" class="c" fill="#2E2972">_PyEval_EvalCodeEx</text>
<text x="270" y="90" text-anchor="middle" class="d" fill="#46453F">建帧 + 绑参</text>
<text x="270" y="103" text-anchor="middle" class="d" fill="#C77A52">检测 CO_GENERATOR</text>

<path d="M150,80 H188" fill="none" stroke="#8E8B80" stroke-width="1.5" marker-end="url(#ah)"/>

<!-- branch: not run -->
<path d="M350,80 H388" fill="none" stroke="#8E8B80" stroke-width="1.5" marker-end="url(#ah)"/>
<rect x="390" y="52" width="220" height="58" rx="10" fill="url(#gG)" stroke="#BFD8C4" filter="url(#sh)"/>
<text x="500" y="74" text-anchor="middle" class="h" fill="#2F6B43">PyGenObject（壳）</text>
<rect x="410" y="82" width="180" height="22" rx="5" fill="#FFF" stroke="#BFD8C4"/>
<text x="500" y="98" text-anchor="middle" class="c" fill="#2F6B43">gi_frame = 就绪的帧</text>

<text x="320" y="150" text-anchor="middle" class="d" fill="#C77A52">求值循环没有运行 —— 函数体一行都没跑</text>

<rect x="190" y="172" width="260" height="44" rx="9" fill="url(#gP)" stroke="#CCC7F1"/>
<text x="320" y="192" text-anchor="middle" class="c" fill="#2E2972">第一次 next(g)</text>
<text x="320" y="208" text-anchor="middle" class="d" fill="#46453F">函数体才真正开跑</text>
<path d="M500,110 C500,150 420,165 400,170" fill="none" stroke="#8E8B80" stroke-width="1.4" stroke-dasharray="4 3" marker-end="url(#ah)"/>
</svg>
