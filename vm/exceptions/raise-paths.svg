<svg width="100%" viewBox="0 0 640 250" xmlns="http://www.w3.org/2000/svg" role="img" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'PingFang SC','Microsoft YaHei',sans-serif">
<title>进入 error 标签的两条路</title>
<desc>异常进入求值循环的 error 标签有两条来路。第一条是显式 raise：源码的 raise 语句编译成 RAISE_VARARGS 指令，调用 do_raise 设置当前异常后跳转。第二条是隐式出错：任何指令执行失败，例如 BINARY_ADD 调用 PyNumber_Add 返回 NULL，分支里直接 goto error；整个 ceval.c 里这样的 goto error 有几百处，是异常最主要的来源。两条路都先填好线程状态的 curexc 字段，再汇到同一个 error 标签。</desc>
<defs>
  <style>
    .ti{font-size:13px;font-weight:600;}
    .h{font-size:11.5px;font-weight:600;}
    .d{font-size:10px;}
    .c{font-size:10.5px;font-family:'SF Mono','JetBrains Mono',ui-monospace,Consolas,monospace;}
  </style>
  <filter id="sh" x="-30%" y="-30%" width="160%" height="160%"><feDropShadow dx="0" dy="1.4" stdDeviation="2" flood-color="#2A2A28" flood-opacity="0.12"/></filter>
  <linearGradient id="gR" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#FBEFE9"/><stop offset="1" stop-color="#F6E2D6"/></linearGradient>
  <linearGradient id="gN" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#F1EFE8"/><stop offset="1" stop-color="#E7E4DA"/></linearGradient>
  <linearGradient id="gP" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#F3F1FD"/><stop offset="1" stop-color="#E9E6FB"/></linearGradient>
  <marker id="ahr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#C77A52" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/></marker>
</defs>

<rect x="0" y="0" width="640" height="250" fill="#FBFAF6"/>
<text x="320" y="28" text-anchor="middle" class="ti" fill="#2E2972">两条路，同一个落点</text>

<!-- path 1: explicit -->
<text x="120" y="58" text-anchor="middle" class="h" fill="#9A4A2F">① 显式 raise</text>
<rect x="30" y="70" width="180" height="36" rx="8" fill="url(#gN)" stroke="#D8D3C6"/>
<text x="120" y="92" text-anchor="middle" class="c" fill="#33322E">RAISE_VARARGS</text>
<rect x="30" y="120" width="180" height="36" rx="8" fill="url(#gR)" stroke="#E8C9B5"/>
<text x="120" y="142" text-anchor="middle" class="c" fill="#9A4A2F">do_raise() 设异常</text>
<path d="M120,106 V118" fill="none" stroke="#C77A52" stroke-width="1.6" marker-end="url(#ahr)"/>

<!-- path 2: implicit -->
<text x="430" y="58" text-anchor="middle" class="h" fill="#9A4A2F">② 操作失败（最常见）</text>
<rect x="340" y="70" width="180" height="36" rx="8" fill="url(#gN)" stroke="#D8D3C6"/>
<text x="430" y="92" text-anchor="middle" class="c" fill="#33322E">PyNumber_Add → NULL</text>
<rect x="340" y="120" width="180" height="36" rx="8" fill="url(#gR)" stroke="#E8C9B5"/>
<text x="430" y="142" text-anchor="middle" class="c" fill="#9A4A2F">goto error</text>
<path d="M430,106 V118" fill="none" stroke="#C77A52" stroke-width="1.6" marker-end="url(#ahr)"/>

<!-- merge to error -->
<rect x="220" y="186" width="200" height="44" rx="10" fill="url(#gP)" stroke="#CCC7F1" filter="url(#sh)"/>
<text x="320" y="205" text-anchor="middle" class="h" fill="#2E2972">error 标签</text>
<text x="320" y="221" text-anchor="middle" class="d" fill="#46453F">why=EXCEPTION · 记 traceback · 展开</text>

<path d="M120,156 C120,180 240,182 270,188" fill="none" stroke="#C77A52" stroke-width="1.6" marker-end="url(#ahr)"/>
<path d="M430,156 C430,180 400,182 370,188" fill="none" stroke="#C77A52" stroke-width="1.6" marker-end="url(#ahr)"/>

<text x="320" y="120" text-anchor="middle" class="d" fill="#9A988F">ceval.c 里</text>
<text x="320" y="134" text-anchor="middle" class="d" fill="#9A988F">几百处</text>
<text x="320" y="148" text-anchor="middle" class="d" fill="#9A988F">goto error</text>
</svg>
