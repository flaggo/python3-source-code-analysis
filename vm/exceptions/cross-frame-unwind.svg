<svg width="100%" viewBox="0 0 640 360" xmlns="http://www.w3.org/2000/svg" role="img" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'PingFang SC','Microsoft YaHei',sans-serif">
<title>跨帧展开与 traceback 逐层累积</title>
<desc>异常在一帧内沿 block 栈展开，若该帧无人接住，求值循环带着 NULL 返回。调用它的上层帧里，CALL 指令拿到 NULL 就 goto error，在自己这一帧重演展开。三帧自下而上：inner 帧 raise，展开无人接，返回 NULL；outer 帧 CALL 拿到 NULL，展开仍无人接，返回 NULL；module 帧 CALL 拿到 NULL，这里有 SETUP_EXCEPT，异常被接住。每经过一帧，该帧的 error 标签都会执行 PyTraceBack_Here 把自己添进 traceback，于是最终的 traceback 正是异常穿过的帧序列 inner、outer、module。帧内沿 block 栈展开，帧间沿 f_back 调用链接力。</desc>
<defs>
  <style>
    .ti{font-size:13px;font-weight:600;}
    .h{font-size:11px;font-weight:600;}
    .d{font-size:10px;}
    .c{font-size:10px;font-family:'SF Mono','JetBrains Mono',ui-monospace,Consolas,monospace;}
  </style>
  <filter id="sh" x="-30%" y="-30%" width="160%" height="160%"><feDropShadow dx="0" dy="1.4" stdDeviation="2" flood-color="#2A2A28" flood-opacity="0.12"/></filter>
  <linearGradient id="gN" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#F1EFE8"/><stop offset="1" stop-color="#E7E4DA"/></linearGradient>
  <linearGradient id="gG" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#EDF4EE"/><stop offset="1" stop-color="#DDEBE0"/></linearGradient>
  <marker id="ahr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#C77A52" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></marker>
  <marker id="ah" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#8E8B80" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker>
</defs>

<rect x="0" y="0" width="640" height="360" fill="#FBFAF6"/>
<text x="320" y="26" text-anchor="middle" class="ti" fill="#2E2972">跨帧展开：沿 f_back 一路炸到外层</text>

<!-- frames: inner (bottom) → outer → module (top) -->
<!-- inner -->
<rect x="60" y="262" width="300" height="70" rx="10" fill="url(#gN)" stroke="#D8D3C6" filter="url(#sh)"/>
<text x="78" y="284" class="c" fill="#33322E">inner 帧</text>
<text x="78" y="302" class="d" fill="#46453F">raise ValueError</text>
<text x="78" y="318" class="d" fill="#9A988F">展开 block 栈 → 无人接 → 返回 NULL</text>

<!-- outer -->
<rect x="60" y="166" width="300" height="70" rx="10" fill="url(#gN)" stroke="#D8D3C6" filter="url(#sh)"/>
<text x="78" y="188" class="c" fill="#33322E">outer 帧</text>
<text x="78" y="206" class="d" fill="#46453F">CALL 拿到 NULL → goto error</text>
<text x="78" y="222" class="d" fill="#9A988F">展开 → 无人接 → 返回 NULL</text>

<!-- module -->
<rect x="60" y="70" width="300" height="70" rx="10" fill="url(#gG)" stroke="#BFD8C4" filter="url(#sh)"/>
<text x="78" y="92" class="c" fill="#2F6B43">&lt;module&gt; 帧</text>
<text x="78" y="110" class="d" fill="#3C5C46">CALL 拿到 NULL → goto error</text>
<text x="78" y="126" class="d" fill="#2F6B43">这里有 SETUP_EXCEPT → 接住！</text>

<!-- f_back unwind arrows (upward) -->
<path d="M210,262 V238" fill="none" stroke="#C77A52" stroke-width="1.8" marker-end="url(#ahr)"/>
<path d="M210,166 V142" fill="none" stroke="#C77A52" stroke-width="1.8" marker-end="url(#ahr)"/>
<text x="250" y="254" class="d" fill="#C77A52">返回 NULL</text>
<text x="250" y="158" class="d" fill="#C77A52">返回 NULL</text>
<text x="378" y="205" class="d" fill="#9A988F" transform="rotate(-90 378 205)">沿 f_back 调用链</text>

<!-- traceback accumulation on the right -->
<text x="520" y="60" text-anchor="middle" class="h" fill="#46453F">traceback 逐层累积</text>
<rect x="420" y="70" width="200" height="262" rx="10" fill="#FFFFFF" stroke="#D8D3C6" filter="url(#sh)"/>
<text x="436" y="94" class="d" fill="#9A988F">每帧 error 处 PyTraceBack_Here(f)：</text>

<rect x="436" y="104" width="168" height="30" rx="5" fill="url(#gG)" stroke="#BFD8C4"/>
<text x="448" y="123" class="c" fill="#2F6B43">in &lt;module&gt;</text>
<rect x="436" y="140" width="168" height="30" rx="5" fill="url(#gN)" stroke="#D8D3C6"/>
<text x="448" y="159" class="c" fill="#33322E">in outer</text>
<rect x="436" y="176" width="168" height="30" rx="5" fill="url(#gN)" stroke="#D8D3C6"/>
<text x="448" y="195" class="c" fill="#33322E">in inner　← 起点</text>

<path d="M520,206 V224" fill="none" stroke="#8E8B80" stroke-width="1.3" marker-end="url(#ah)"/>
<rect x="436" y="226" width="168" height="40" rx="6" fill="url(#gN)" stroke="#D8D3C6"/>
<text x="520" y="250" text-anchor="middle" class="c" fill="#9A4A2F">ValueError: boom</text>
<text x="520" y="296" text-anchor="middle" class="d" fill="#9A988F">异常穿过的帧序列，</text>
<text x="520" y="312" text-anchor="middle" class="d" fill="#9A988F">一层不落地记下</text>
</svg>
