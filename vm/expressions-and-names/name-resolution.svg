<svg width="100%" viewBox="0 0 700 300" xmlns="http://www.w3.org/2000/svg" role="img" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'PingFang SC','Microsoft YaHei',sans-serif">
<title>取名字：编译期定指令，运行期查名字空间</title>
<desc>取一个名字的工作分两半。编译期：符号表已判定名字的作用域，据此选定用哪条指令——局部变量用 LOAD_FAST，函数里的全局引用用 LOAD_GLOBAL，模块顶层与类体用 LOAD_NAME。运行期：每条指令各查不同的名字空间——LOAD_FAST 直接按下标取（不查字典），LOAD_GLOBAL 查全局再查内建，LOAD_NAME 依次查局部、全局、内建。</desc>
<defs>
  <style>
    .ti{font-size:12.5px;font-weight:600;}
    .h{font-size:11px;font-weight:600;}
    .ins{font-size:11px;font-weight:600;font-family:'SF Mono','JetBrains Mono',ui-monospace,Consolas,monospace;}
    .d{font-size:10px;}
  </style>
  <filter id="sh" x="-30%" y="-30%" width="160%" height="160%"><feDropShadow dx="0" dy="1.4" stdDeviation="2" flood-color="#2A2A28" flood-opacity="0.12"/></filter>
  <linearGradient id="gG" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#E9F6F1"/><stop offset="1" stop-color="#DBF0E7"/></linearGradient>
  <linearGradient id="gB" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#EFF3FA"/><stop offset="1" stop-color="#E0E9F6"/></linearGradient>
  <linearGradient id="gP" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#F3F1FD"/><stop offset="1" stop-color="#E9E6FB"/></linearGradient>
  <marker id="ah" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#8E8B80" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker>
</defs>

<rect x="0" y="0" width="700" height="300" fill="#FBFAF6"/>
<text x="350" y="26" text-anchor="middle" class="ti" fill="#28415F">取名字：编译期选指令，运行期查名字空间</text>

<!-- column headers -->
<text x="180" y="52" text-anchor="middle" class="h" fill="#8A887E">编译期：符号表定作用域 → 选指令</text>
<text x="520" y="52" text-anchor="middle" class="h" fill="#8A887E">运行期：指令各查不同名字空间</text>
<line x1="350" y1="62" x2="350" y2="288" stroke="#E2DED2" stroke-width="1" stroke-dasharray="4 5"/>

<!-- row 1: local -> LOAD_FAST -->
<rect x="24" y="74" width="120" height="44" rx="9" fill="#FFFFFF" stroke="#A8DCC9" filter="url(#sh)"/>
<text x="84" y="92" text-anchor="middle" class="h" fill="#0A463A">局部变量</text><text x="84" y="108" text-anchor="middle" class="d" fill="#0C5945">函数内赋值的名字</text>
<rect x="166" y="78" width="150" height="36" rx="9" fill="url(#gG)" stroke="#A8DCC9" filter="url(#sh)"/><text x="241" y="101" text-anchor="middle" class="ins" fill="#0A463A">LOAD_FAST</text>
<path d="M144,96 H164" fill="none" stroke="#8E8B80" stroke-width="1.5" marker-end="url(#ah)"/>
<text x="360" y="92" class="d" fill="#0A463A">按下标直接取（fastlocals）</text>
<text x="360" y="108" class="d" fill="#9A988F">不查任何字典，最快</text>
<path d="M316,96 H356" fill="none" stroke="#8E8B80" stroke-width="1.5" marker-end="url(#ah)"/>

<!-- row 2: global -> LOAD_GLOBAL -->
<rect x="24" y="140" width="120" height="44" rx="9" fill="#FFFFFF" stroke="#C3D2E8" filter="url(#sh)"/>
<text x="84" y="158" text-anchor="middle" class="h" fill="#28415F">全局引用</text><text x="84" y="174" text-anchor="middle" class="d" fill="#4A5E80">函数里只读的外部名</text>
<rect x="166" y="144" width="150" height="36" rx="9" fill="url(#gB)" stroke="#C3D2E8" filter="url(#sh)"/><text x="241" y="167" text-anchor="middle" class="ins" fill="#28415F">LOAD_GLOBAL</text>
<path d="M144,162 H164" fill="none" stroke="#8E8B80" stroke-width="1.5" marker-end="url(#ah)"/>
<text x="360" y="158" class="d" fill="#28415F">全局 f_globals →</text>
<text x="360" y="174" class="d" fill="#28415F">内建 f_builtins</text>
<path d="M316,162 H356" fill="none" stroke="#8E8B80" stroke-width="1.5" marker-end="url(#ah)"/>

<!-- row 3: module/class -> LOAD_NAME -->
<rect x="24" y="206" width="120" height="44" rx="9" fill="#FFFFFF" stroke="#CCC7F1" filter="url(#sh)"/>
<text x="84" y="224" text-anchor="middle" class="h" fill="#2E2972">模块层 / 类体</text><text x="84" y="240" text-anchor="middle" class="d" fill="#6A63B0">顶层或 class 体内</text>
<rect x="166" y="210" width="150" height="36" rx="9" fill="url(#gP)" stroke="#CCC7F1" filter="url(#sh)"/><text x="241" y="233" text-anchor="middle" class="ins" fill="#2E2972">LOAD_NAME</text>
<path d="M144,228 H164" fill="none" stroke="#8E8B80" stroke-width="1.5" marker-end="url(#ah)"/>
<text x="360" y="222" class="d" fill="#2E2972">局部 → 全局 → 内建</text>
<text x="360" y="238" class="d" fill="#9A988F">运行期依次查三处</text>
<path d="M316,228 H356" fill="none" stroke="#8E8B80" stroke-width="1.5" marker-end="url(#ah)"/>

<text x="350" y="282" text-anchor="middle" class="d" fill="#9A988F">作用域在编译期就定了，所以指令一旦选好，运行期不再「猜」名字在哪类作用域</text>
</svg>
