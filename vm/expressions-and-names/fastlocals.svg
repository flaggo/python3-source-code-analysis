<svg width="100%" viewBox="0 0 700 240" xmlns="http://www.w3.org/2000/svg" role="img" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'PingFang SC','Microsoft YaHei',sans-serif">
<title>LOAD_FAST：按下标直接取局部变量</title>
<desc>函数的局部变量存在帧的 f_localsplus 数组里，每个变量占一个固定槽位。LOAD_FAST 的参数就是槽位下标——LOAD_FAST 0 直接取数组第 0 个槽（变量 a），把它的值压入求值栈。整个过程只是一次数组索引，不查任何字典，所以最快。</desc>
<defs>
  <style>
    .ti{font-size:12.5px;font-weight:600;}
    .h{font-size:11px;font-weight:600;}
    .c{font-size:11px;font-family:'SF Mono','JetBrains Mono',ui-monospace,Consolas,monospace;}
    .v{font-size:12px;font-weight:600;font-family:'SF Mono','JetBrains Mono',ui-monospace,Consolas,monospace;}
    .d{font-size:10px;}
  </style>
  <filter id="sh" x="-30%" y="-30%" width="160%" height="160%"><feDropShadow dx="0" dy="1.4" stdDeviation="2" flood-color="#2A2A28" flood-opacity="0.12"/></filter>
  <linearGradient id="gG" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#E9F6F1"/><stop offset="1" stop-color="#DBF0E7"/></linearGradient>
  <linearGradient id="gA" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#FAEFD9"/><stop offset="1" stop-color="#F4E6C8"/></linearGradient>
  <marker id="ah" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#8E8B80" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></marker>
  <marker id="ahg" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#1E8B6F" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></marker>
</defs>

<rect x="0" y="0" width="700" height="240" fill="#FBFAF6"/>
<text x="350" y="28" text-anchor="middle" class="ti" fill="#0A463A">LOAD_FAST 0：按下标取局部变量，不查字典</text>

<!-- instruction -->
<rect x="30" y="92" width="130" height="44" rx="9" fill="url(#gA)" stroke="#E8CB94" filter="url(#sh)"/>
<text x="95" y="112" text-anchor="middle" class="c" fill="#5C3C08">LOAD_FAST 0</text>
<text x="95" y="128" text-anchor="middle" class="d" fill="#8A6A1E">参数 0 = 槽位下标</text>

<!-- f_localsplus array -->
<text x="370" y="74" text-anchor="middle" class="h" fill="#0A463A">f_localsplus 数组（帧里的局部变量区）</text>
<g>
  <rect x="250" y="86" width="80" height="56" rx="6" fill="url(#gG)" stroke="#A8DCC9" filter="url(#sh)"/><text x="290" y="110" text-anchor="middle" class="v" fill="#0A463A">a = 5</text><text x="290" y="130" text-anchor="middle" class="d" fill="#0C5945">[0]</text>
  <rect x="332" y="86" width="80" height="56" rx="6" fill="#FFFFFF" stroke="#A8DCC9" filter="url(#sh)"/><text x="372" y="110" text-anchor="middle" class="v" fill="#0A463A">b = 3</text><text x="372" y="130" text-anchor="middle" class="d" fill="#0C5945">[1]</text>
  <rect x="414" y="86" width="80" height="56" rx="6" fill="#FFFFFF" stroke="#A8DCC9" filter="url(#sh)"/><text x="454" y="110" text-anchor="middle" class="v" fill="#0A463A">c = …</text><text x="454" y="130" text-anchor="middle" class="d" fill="#0C5945">[2]</text>
</g>

<!-- arrow instruction -> slot 0 -->
<path d="M160,114 H246" fill="none" stroke="#8E8B80" stroke-width="1.6" marker-end="url(#ah)"/>
<text x="203" y="106" text-anchor="middle" class="d" fill="#9A988F">取第 0 槽</text>

<!-- value stack -->
<text x="610" y="74" text-anchor="middle" class="h" fill="#0A463A">求值栈</text>
<rect x="566" y="86" width="88" height="78" rx="6" fill="#FFFFFF" stroke="#CFCABA"/>
<rect x="570" y="124" width="80" height="36" rx="5" fill="url(#gG)" stroke="#A8DCC9"/><text x="610" y="148" text-anchor="middle" class="v" fill="#0A463A">5</text>
<path d="M494,114 C520,114 540,128 564,134" fill="none" stroke="#1E8B6F" stroke-width="1.6" marker-end="url(#ahg)"/>
<text x="528" y="106" text-anchor="middle" class="d" fill="#0A463A">压入值 5</text>

<text x="350" y="200" text-anchor="middle" class="d" fill="#9A988F">下标在编译期就由符号表定好（见 co_varnames 的顺序），运行期一次数组索引即可——这就是它快的原因</text>
</svg>
