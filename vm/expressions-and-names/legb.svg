<svg width="100%" viewBox="0 0 700 280" xmlns="http://www.w3.org/2000/svg" role="img" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'PingFang SC','Microsoft YaHei',sans-serif">
<title>LEGB：四类作用域与对应的取名字指令</title>
<desc>Python 取名字遵循 LEGB 顺序：先局部 Local，再外层函数 Enclosing，然后全局 Global，最后内建 Builtin。这四类作用域分别由不同指令负责：局部用 LOAD_FAST，外层闭包用 LOAD_DEREF，全局与内建由 LOAD_GLOBAL 一并查（先全局后内建）。编译期就按符号表把名字归到其中一类，选定对应指令。</desc>
<defs>
  <style>
    .ti{font-size:12.5px;font-weight:600;}
    .L{font-size:13px;font-weight:700;}
    .h{font-size:11.5px;font-weight:600;}
    .ins{font-size:10.5px;font-weight:600;font-family:'SF Mono','JetBrains Mono',ui-monospace,Consolas,monospace;}
    .d{font-size:10px;}
  </style>
  <filter id="sh" x="-30%" y="-30%" width="160%" height="160%"><feDropShadow dx="0" dy="1.4" stdDeviation="2" flood-color="#2A2A28" flood-opacity="0.12"/></filter>
  <linearGradient id="gG" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#E9F6F1"/><stop offset="1" stop-color="#DBF0E7"/></linearGradient>
  <linearGradient id="gP" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#F3F1FD"/><stop offset="1" stop-color="#E9E6FB"/></linearGradient>
  <linearGradient id="gB" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#EFF3FA"/><stop offset="1" stop-color="#E0E9F6"/></linearGradient>
  <linearGradient id="gN" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#F1EFE8"/><stop offset="1" stop-color="#E7E4DA"/></linearGradient>
  <marker id="ah" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#8E8B80" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></marker>
</defs>

<rect x="0" y="0" width="700" height="280" fill="#FBFAF6"/>
<text x="350" y="28" text-anchor="middle" class="ti" fill="#2E2972">LEGB：四类作用域，各有对应指令</text>
<text x="350" y="48" text-anchor="middle" class="d" fill="#9A988F">查找顺序：Local → Enclosing → Global → Builtin</text>

<!-- 4 stages -->
<g>
  <rect x="24" y="76" width="150" height="92" rx="10" fill="url(#gG)" stroke="#A8DCC9" stroke-width="1.1" filter="url(#sh)"/>
  <text x="99" y="100" text-anchor="middle" class="L" fill="#0A463A">L</text><text x="99" y="120" text-anchor="middle" class="h" fill="#0A463A">Local 局部</text><text x="99" y="138" text-anchor="middle" class="d" fill="#0C5945">本函数的局部变量</text>
  <rect x="34" y="144" width="130" height="18" rx="6" fill="#FFFFFF" stroke="#A8DCC9"/><text x="99" y="157" text-anchor="middle" class="ins" fill="#0A463A">LOAD_FAST</text>

  <rect x="190" y="76" width="150" height="92" rx="10" fill="url(#gP)" stroke="#CCC7F1" stroke-width="1.1" filter="url(#sh)"/>
  <text x="265" y="100" text-anchor="middle" class="L" fill="#2E2972">E</text><text x="265" y="120" text-anchor="middle" class="h" fill="#2E2972">Enclosing 外层</text><text x="265" y="138" text-anchor="middle" class="d" fill="#6A63B0">外层函数的变量（闭包）</text>
  <rect x="200" y="144" width="130" height="18" rx="6" fill="#FFFFFF" stroke="#CCC7F1"/><text x="265" y="157" text-anchor="middle" class="ins" fill="#2E2972">LOAD_DEREF</text>

  <rect x="356" y="76" width="150" height="92" rx="10" fill="url(#gB)" stroke="#C3D2E8" stroke-width="1.1" filter="url(#sh)"/>
  <text x="431" y="100" text-anchor="middle" class="L" fill="#28415F">G</text><text x="431" y="120" text-anchor="middle" class="h" fill="#28415F">Global 全局</text><text x="431" y="138" text-anchor="middle" class="d" fill="#4A5E80">模块级的名字</text>
  <rect x="366" y="144" width="130" height="18" rx="6" fill="#FFFFFF" stroke="#C3D2E8"/><text x="431" y="157" text-anchor="middle" class="ins" fill="#28415F">LOAD_GLOBAL</text>

  <rect x="522" y="76" width="150" height="92" rx="10" fill="url(#gN)" stroke="#D8D3C6" stroke-width="1.1" filter="url(#sh)"/>
  <text x="597" y="100" text-anchor="middle" class="L" fill="#46453F">B</text><text x="597" y="120" text-anchor="middle" class="h" fill="#46453F">Builtin 内建</text><text x="597" y="138" text-anchor="middle" class="d" fill="#8A887E">len、print 等</text>
  <rect x="532" y="144" width="130" height="18" rx="6" fill="#FFFFFF" stroke="#D8D3C6"/><text x="597" y="157" text-anchor="middle" class="ins" fill="#46453F">（同上，回退到此）</text>
</g>

<!-- arrows between stages -->
<g fill="none" stroke="#8E8B80" stroke-width="1.7" marker-end="url(#ah)">
  <path d="M174,122 H188"/><path d="M340,122 H354"/><path d="M506,122 H520"/>
</g>
<g class="d" fill="#9A988F" text-anchor="middle"><text x="181" y="112">没有↓</text><text x="347" y="112">没有↓</text><text x="513" y="112">没有↓</text></g>

<!-- bracket: G+B handled by LOAD_GLOBAL -->
<path d="M366,180 H662" fill="none" stroke="#C0BDB4" stroke-width="1.2"/>
<path d="M366,180 V174 M662,180 V174" fill="none" stroke="#C0BDB4" stroke-width="1.2"/>
<text x="514" y="198" text-anchor="middle" class="d" fill="#9A988F">函数里 LOAD_GLOBAL 先查全局、再查内建（两者由它一并负责）</text>

<text x="350" y="230" text-anchor="middle" class="d" fill="#9A988F">编译期符号表把名字归到 L/E/G 之一并选好指令；运行期再没找到才报 NameError</text>
<text x="350" y="252" text-anchor="middle" class="d" fill="#9A988F">（LOAD_DEREF 等闭包细节留到「函数机制」一章）</text>
</svg>
